<meta charset="UTF-8">

<title>마인드캐치</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;}
#app{max-width:430px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column;}
.top-bar{display:flex;align-items:center;gap:10px;padding:1rem 1rem 0.75rem;border-bottom:1px solid #eee;}
.back-btn{background:none;border:none;cursor:pointer;color:#888;font-size:20px;padding:2px 8px;border-radius:8px;}
.top-title{font-size:15px;font-weight:600;color:#111;flex:1;}
.wrap{padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;flex:1;}
.center-msg{text-align:center;padding:2rem 1rem;color:#8a8a9a;font-size:13px;line-height:1.8;}
.big-btn{font-family:-apple-system,sans-serif;font-weight:700;font-size:14px;padding:11px 22px;border-radius:20px;cursor:pointer;text-align:center;}
.opt-label{font-family:-apple-system,sans-serif;font-weight:700;font-size:12px;color:#666;margin:6px 0 4px;align-self:flex-start;}
.opt-row{display:flex;gap:6px;flex-wrap:wrap;width:100%;}
.opt-row div{padding:8px 10px;border-radius:10px;background:#f0f0f0;font-family:-apple-system,sans-serif;font-weight:700;font-size:12px;cursor:pointer;color:#555;}
.opt-row div.sel{background:#3d5afe;color:#fff;}
.lobby-row{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid #f5f5f5;width:100%;}
.kickBtn{font-family:-apple-system,sans-serif;font-size:11px;font-weight:700;color:#fff;background:#c0392b;padding:4px 9px;border-radius:10px;cursor:pointer;}

.canvas-area{position:relative;width:100%;aspect-ratio:5/4;border:4px solid #e63946;border-radius:12px;background:#fff;overflow:hidden;touch-action:none;}
.canvas-area canvas{position:absolute;left:0;top:0;width:100%;height:100%;}
.round-popup{position:absolute;left:0;top:0;right:0;bottom:0;background:rgba(255,255,255,0.88);z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:14px;overflow-y:auto;}
.drawer-badge{display:flex;align-items:center;gap:6px;background:#ffd166;border-radius:16px;padding:6px 14px;font-family:-apple-system,sans-serif;font-weight:800;font-size:13px;color:#5c4200;}
.audience-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:4px 0;}
.audience-chip{display:flex;flex-direction:column;align-items:center;gap:3px;}
.audience-circle{width:38px;height:38px;border-radius:50%;background:#e8f0ff;border:2px solid #3d5afe;display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;font-weight:800;font-size:13px;color:#3d5afe;}
.audience-circle.correct{background:#0f9e75;border-color:#0f9e75;color:#fff;}
.audience-name{font-family:-apple-system,sans-serif;font-size:9px;color:#666;max-width:44px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.timer-wrap{width:100%;height:8px;background:#eee;border-radius:4px;overflow:hidden;}
.timer-bar{height:100%;background:linear-gradient(90deg,#3d5afe,#7c5cff);transition:width .3s linear;}
.timer-bar.warn{background:linear-gradient(90deg,#ff5e3a,#e63946);}
.palette-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;align-items:center;width:100%;}
.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid rgba(0,0,0,0.1);}
.color-dot.sel{box-shadow:0 0 0 3px #3d5afe;}
.tool-row{display:flex;gap:6px;justify-content:center;width:100%;flex-wrap:wrap;}
.tool-btn{font-family:-apple-system,sans-serif;font-weight:700;font-size:11px;padding:7px 12px;border-radius:12px;background:#f0f0f0;color:#555;cursor:pointer;}
.tool-btn.sel{background:#3d5afe;color:#fff;}
.word-box{font-family:-apple-system,sans-serif;font-weight:800;font-size:16px;color:#8a1a1a;background:#fff3e0;padding:6px 14px;border-radius:10px;letter-spacing:2px;}
.chat-log{width:100%;height:120px;overflow-y:auto;border:1px solid #eee;border-radius:10px;padding:6px 8px;font-family:-apple-system,sans-serif;font-size:12px;display:flex;flex-direction:column;gap:3px;}
.chat-line{line-height:1.4;word-break:break-all;}
.chat-line .nick{font-weight:700;color:#3d5afe;}
.chat-line.correct{color:#0f9e75;font-weight:700;}
.chat-line.sys{color:#999;font-style:italic;}
#chatBar{position:sticky;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:8px 12px;display:flex;gap:8px;align-items:center;z-index:40;}
#chatInput{flex:1;border:1px solid #ddd;border-radius:20px;padding:9px 14px;font-size:13px;font-family:inherit;outline:none;}
#chatInput:disabled{background:#f5f5f5;color:#bbb;}
#chatSendBtn{font-weight:700;color:#3d5afe;font-size:13px;cursor:pointer;padding:8px 12px;flex-shrink:0;}
.score-table{width:100%;border-collapse:collapse;font-family:-apple-system,sans-serif;font-size:13px;}
.score-table td{padding:8px 6px;border-bottom:1px solid #f0f0f0;}
.score-table .rank{font-weight:800;color:#c9861a;width:28px;}
.score-table .delta{color:#0f9e75;font-weight:700;text-align:right;}
</style>
</head>

let currentUser=null;
try{currentUser=JSON.parse(localStorage.getItem('puzzle_user')||'null');}catch(e){}
const roomId=new URLSearchParams(location.search).get('id');
function headers(){ return {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function jheaders(){ return {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function esc(str){ return String(str??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }

let room=null,mySeat=-1,pollTimer=null;

async function fetchRoom(){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/catchmind_rooms?id=eq.${roomId}&select=*`,{headers:headers()});
    const data=await r.json();
    if(!data.length){ document.getElementById('wrap').innerHTML='<div class="center-msg">방을 찾을 수 없어요.</div>'; clearInterval(pollTimer); return; }
    room=data[0];
    const players=room.players||[];
    mySeat=currentUser?players.findIndex(p=>String(p.user_id)===String(currentUser.id)):-1;
    render();
  }catch(e){}
}

function render(){
  document.getElementById('roomTitle').textContent=esc(room.host_username)+'님의 방 ('+room.rounds+'라운드 · '+room.time_limit+'초)';
  const wrap=document.getElementById('wrap');
  const chatBar=document.getElementById('chatBar');
  if(room.status==='waiting'){ chatBar.style.display='none'; renderLobby(wrap); }
  else if(room.status==='playing'){ chatBar.style.display='flex'; renderGame(wrap); }
}

function renderLobby(wrap){
  const players=room.players||[];
  const isHost=currentUser&&String(room.host_user_id)===String(currentUser.id);
  const me=mySeat>=0?players[mySeat]:null;
  const allReady=players.length>=2&&players.every(p=>p.ready);
  let html='';
  if(isHost){
    html+='<div class="opt-label">라운드 수</div><div class="opt-row" id="roundsRow">';
    [3,5,7,10,15,20].forEach(v=>{ html+=`<div class="roundOpt ${room.rounds===v?'sel':''}" data-v="${v}">${v}</div>`; });
    html+='</div>';
    html+='<div class="opt-label">그리는 시간</div><div class="opt-row" id="timeRow">';
    [30,60,90,120].forEach(v=>{ html+=`<div class="timeOpt ${room.time_limit===v?'sel':''}" data-v="${v}">${v}초</div>`; });
    html+='</div>';
  }
  html+='<div class="opt-label">참가자 ('+players.length+'/8)</div>';
  html+='<div style="width:100%;">';
  players.forEach((p,i)=>{
    const canKick=isHost&&i!==mySeat;
    html+=`<div class="lobby-row" id="lobby-row-${i}">
      <div style="font-family:-apple-system,sans-serif;font-size:13px;flex:1;">${esc(p.username)}${String(p.user_id)===String(room.host_user_id)?' 👑':''}</div>
      <div style="font-family:-apple-system,sans-serif;font-size:11px;font-weight:700;color:${p.ready?'#0f9e75':'#bbb'};">${p.ready?'준비완료':'대기중'}</div>
      ${canKick?`<div class="kickBtn" data-i="${i}">강퇴</div>`:''}
    </div>`;
  });
  html+='</div>';
  if(me){
    html+=`<div class="big-btn" id="readyBtn" style="width:100%;margin-top:10px;background:${me.ready?'#eee':'#3d5afe'};color:${me.ready?'#666':'#fff'};">${me.ready?'준비 취소':'준비하기'}</div>`;
  }
  if(isHost){
    html+=`<div class="big-btn" id="startBtn" style="width:100%;margin-top:6px;background:${allReady?'#ff5e3a':'#e2e2e2'};color:${allReady?'#fff':'#999'};">게임 시작</div>`;
  }
  wrap.innerHTML=html;

  if(isHost){
    wrap.querySelectorAll('.roundOpt').forEach(el=>{
      el.addEventListener('click',async()=>{
        await fetch(`${SUPABASE_URL}/rest/v1/catchmind_rooms?id=eq.${room.id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({rounds:parseInt(el.dataset.v)})});
        fetchRoom();
      });
    });
    wrap.querySelectorAll('.timeOpt').forEach(el=>{
      el.addEventListener('click',async()=>{
        await fetch(`${SUPABASE_URL}/rest/v1/catchmind_rooms?id=eq.${room.id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({time_limit:parseInt(el.dataset.v)})});
        fetchRoom();
      });
    });
    wrap.querySelectorAll('.kickBtn').forEach(el=>{
      el.addEventListener('click',()=>kickPlayer(parseInt(el.dataset.i)));
    });
    const startBtn=document.getElementById('startBtn');
    if(startBtn&&allReady) startBtn.addEventListener('click',startMatch);
  }
  const readyBtn=document.getElementById('readyBtn');
  if(readyBtn) readyBtn.addEventListener('click',toggleReady);
}

async function toggleReady(){
  const np=room.players.map((p,i)=>i===mySeat?{...p,ready:!p.ready}:p);
  await fetch(`${SUPABASE_URL}/rest/v1/catchmind_rooms?id=eq.${room.id}&move_count=eq.${room.move_count}`,{
    method:'PATCH',headers:jheaders(),body:JSON.stringify({players:np,move_count:room.move_count+1})
  });
  fetchRoom();
}
async function kickPlayer(idx){
  if(!confirm('정말 이 플레이어를 강퇴하시겠어요?')) return;
  const np=(room.players||[]).filter((_,i)=>i!==idx).map((p,i)=>({...p,seat:i}));
  await fetch(`${SUPABASE_URL}/rest/v1/catchmind_rooms?id=eq.${room.id}&move_count=eq.${room.move_count}`,{
    method:'PATCH',headers:jheaders(),body:JSON.stringify({players:np,move_count:room.move_count+1})
  });
  fetchRoom();
}

function pickWord(usedWords){
  let pool=WORDS.filter(w=>!usedWords.includes(w));
  if(!pool.length) pool=WORDS.slice();
  return pool[Math.floor(Math.random()*pool.length)];
}
function scoreForElapsed(elapsedMs,timeLimitSec){
  const frac=Math.min(1,Math.max(0,elapsedMs/(timeLimitSec*1000)));
  return Math.max(1,Math.round(10-9*frac));
}

async function startMatch(){
  const players=room.players||[];
  const n=players.length;
  const word=pickWord([]);
  const state={
    round:1, drawerSeat:0,
    word, usedWords:[word],
    strokes:[], liveStroke:null,
    correctGuesses:[], scores:players.map(()=>0),
    stage:'drawing', roundStartedAt:Date.now(),
    roundEndedAt:null, roundDeltas:null
  };
  await fetch(`${SUPABASE_URL}/rest/v1/catchmind_rooms?id=eq.${room.id}`,{
    method:'PATCH',headers:jheaders(),
    body:JSON.stringify({status:'playing',state,move_count:room.move_count+1})
  });
  fetchRoom();
}

let gameAnimLock=false;
async function patchGameState(mutator){
  // 잠겨있으면 그냥 무시하지 않고 잠깐 기다렸다가 재시도 (그림 커밋이 유실되면 안 되므로)
  let waited=0;
  while(gameAnimLock&&waited<3000){ await new Promise(r=>setTimeout(r,40)); waited+=40; }
  if(gameAnimLock) return; // 그래도 안 풀리면 포기 (워치독이 곧 풀어줄 것)
  gameAnimLock=true;
  const watchdog=setTimeout(()=>{ gameAnimLock=false; },4000);
  try{
    const st=JSON.parse(JSON.stringify(room.state));
    mutator(st);
    const res=await fetch(`${SUPABASE_URL}/rest/v1/catchmind_rooms?id=eq.${room.id}&move_count=eq.${room.move_count}`,{
      method:'PATCH',headers:{...jheaders(),'Prefer':'return=representation'},
      body:JSON.stringify({state:st,move_count:room.move_count+1})
    });
    const data=await res.json();
    if(data&&data.length){ room=data[0]; } else { await fetchRoom(); }
  }catch(e){ console.error(e); }
  finally{ clearTimeout(watchdog); gameAnimLock=false; }
}
// 실시간 미리보기(liveStroke) 전송 전용: 밀리면 그냥 스킵해도 되는 것들(다음 flush가 곧 또 오니까)
async function patchGameStateBestEffort(mutator){
  if(gameAnimLock) return;
  return patchGameState(mutator);
}

function endRound(st){
  const players=room.players;
  const deltas=players.map(()=>0);
  st.correctGuesses.forEach(g=>{ deltas[g.seat]+=g.points; deltas[st.drawerSeat]+=g.points; });
  st.scores=st.scores.map((s,i)=>s+deltas[i]);
  st.roundDeltas=deltas;
  st.stage='roundResult';
  st.roundEndedAt=Date.now();
}
function goNextRound(st){
  const n=room.players.length;
  const nextRoundNum=st.round+1;
  if(nextRoundNum>room.rounds){
    st.stage='matchResult';
    return;
  }
  const word=pickWord(st.usedWords);
  st.round=nextRoundNum;
  st.drawerSeat=(st.drawerSeat+1)%n;
  st.word=word;
  st.usedWords=[...st.usedWords,word];
  st.strokes=[]; st.liveStroke=null;
  st.correctGuesses=[];
  st.stage='drawing';
  st.roundStartedAt=Date.now();
  st.roundEndedAt=null;
  st.roundDeltas=null;
}

      audEl.innerHTML='';
      players.forEach((p,i)=>{
        if(i===st.drawerSeat) return;

    lastDrawingSkeletonKey=null;
    renderMatchResult(wrap,st,players);

function updateChatBarState(st,isDrawer){
  const input=document.getElementById('chatInput');
  const sendBtn=document.getElementById('chatSendBtn');
  if(!input) return;
  const alreadyCorrect=mySeat>=0&&st.correctGuesses.some(g=>g.seat===mySeat);
  const onCooldown=chatCooldownUntil&&Date.now()<chatCooldownUntil;
  if(isDrawer){
    input.disabled=true; input.placeholder='그리는 중에는 채팅할 수 없어요';
  } else if(alreadyCorrect){
    input.disabled=true; input.placeholder='이미 정답을 맞췄어요!';
  } else if(onCooldown){
    input.disabled=true; input.placeholder='잠시 후 다시 채팅할 수 있어요';
  } else {
    input.disabled=false; input.placeholder='정답을 채팅으로 입력하세요';
  }
}

function canvasCtx(id){ const c=document.getElementById(id); return c?c.getContext('2d'):null; }
function drawSegment(ctx,seg){
  if(!seg||!seg.points||seg.points.length<1) return;
  ctx.lineJoin='round'; ctx.lineCap='round';
  if(seg.tool==='eraser'){ ctx.globalCompositeOperation='destination-out'; ctx.strokeStyle='rgba(0,0,0,1)'; }
  else { ctx.globalCompositeOperation='source-over'; ctx.strokeStyle=seg.color; }
  ctx.lineWidth=seg.size||6;
  ctx.beginPath();
  ctx.moveTo(seg.points[0][0],seg.points[0][1]);
  for(let i=1;i<seg.points.length;i++) ctx.lineTo(seg.points[i][0],seg.points[i][1]);
  if(seg.points.length===1){ ctx.lineTo(seg.points[0][0]+0.1,seg.points[0][1]+0.1); }
  ctx.stroke();
  ctx.globalCompositeOperation='source-over';
}
function redrawBaseFull(st){
  const ctx=canvasCtx('baseCanvas');
  if(!ctx) return;
  ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
  st.strokes.forEach(seg=>{
    if(seg.type==='fill'){ ctx.fillStyle=seg.color; ctx.fillRect(0,0,CANVAS_W,CANVAS_H); }
    else drawSegment(ctx,seg);
  });
  baseDrawnCount=st.strokes.length;
}
function redrawLiveFromState(st){
  const ctx=canvasCtx('liveCanvas');
  if(!ctx) return;
  ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
  if(st.liveStroke) drawSegment(ctx,st.liveStroke);
}

let drawing=false, curPoints=[], flushTimer=null, globalPointerUpBound=false;
function toLogicalPoint(e,areaEl){
  const rect=areaEl.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return [ (cx-rect.left)/rect.width*CANVAS_W, (cy-rect.top)/rect.height*CANVAS_H ];
}
async function flushLive(final){
  if(curPoints.length<1) return;
  const seg={color:myColor,size:myTool==='eraser'?24:mySize,tool:myTool,points:curPoints.slice()};
  if(final){
    curPoints=[];
    await patchGameState(s=>{
      if(s.stage!=='drawing') return;
      s.strokes=[...s.strokes,seg];
      s.liveStroke=null;
    });
    redrawLocalLive();
    if(room.state.stage==='drawing') redrawBaseFull(room.state);
  } else {
    patchGameStateBestEffort(s=>{ if(s.stage==='drawing') s.liveStroke=seg; });
  }
}
function redrawLocalLive(){
  const liveCtx=canvasCtx('liveCanvas');
  if(!liveCtx) return;
  liveCtx.clearRect(0,0,CANVAS_W,CANVAS_H);
  drawSegment(liveCtx,{color:myColor,size:myTool==='eraser'?24:mySize,tool:myTool,points:curPoints});
}
function onGlobalPointerUp(){
  if(!drawing) return;
  drawing=false;
  if(flushTimer){ clearInterval(flushTimer); flushTimer=null; }
  flushLive(true);
}
function bindCanvasControls(isDrawer){
  if(!globalPointerUpBound){ window.addEventListener('pointerup',onGlobalPointerUp); globalPointerUpBound=true; }
  if(!isDrawer) return;
  const area=document.getElementById('canvasArea');
  function onDown(e){
    if(!room||!room.state||room.state.stage!=='drawing') return;
    e.preventDefault();
    drawing=true; curPoints=[toLogicalPoint(e,area)];
    redrawLocalLive();
    if(flushTimer) clearInterval(flushTimer);
    flushTimer=setInterval(()=>flushLive(false),350);
  }
  function onMove(e){
    if(!drawing) return;
    e.preventDefault();
    curPoints.push(toLogicalPoint(e,area));
    redrawLocalLive();
  }
  area.addEventListener('pointerdown',onDown);
  area.addEventListener('pointermove',onMove);

  document.querySelectorAll('.color-dot').forEach(el=>{
    el.addEventListener('click',()=>{ myColor=el.dataset.c; myTool='pen'; render(); });
  });
  const penBtn=document.getElementById('penBtn');
  const eraserBtn=document.getElementById('eraserBtn');
  if(penBtn) penBtn.addEventListener('click',()=>{ myTool='pen'; render(); });
  if(eraserBtn) eraserBtn.addEventListener('click',()=>{ myTool='eraser'; render(); });
  const clearBtn=document.getElementById('clearAllBtn');
  if(clearBtn) clearBtn.addEventListener('click',()=>{
    if(!confirm('캔버스를 전체 지우시겠어요?')) return;
    patchGameState(s=>{ s.strokes=[]; s.liveStroke=null; });
  });
  const fillBtn=document.getElementById('fillAllBtn');
  if(fillBtn) fillBtn.addEventListener('click',()=>{
    patchGameState(s=>{ s.strokes=[...s.strokes,{type:'fill',color:myColor}]; s.liveStroke=null; });
  });
}

function renderMatchResult(wrap,st,players){
  let html='<div class="opt-label" style="align-self:center;font-size:15px;">🏆 최종 결과</div>';
  html+='<table class="score-table"><tbody>';
  const order=players.map((p,i)=>({p,i,total:st.scores[i]})).sort((a,b)=>b.total-a.total);
  order.forEach((o,rank)=>{
    html+=`<tr><td class="rank">${rank+1}</td><td>${esc(o.p.username)}</td><td style="text-align:right;font-weight:800;">${o.total}점</td></tr>`;
  });
  html+='</tbody></table>';
  html+='<div class="big-btn" id="confirmResultBtn" style="width:100%;margin-top:12px;background:#ff5e3a;color:#fff;">확인</div>';
  wrap.innerHTML=html;
  document.getElementById('confirmResultBtn').addEventListener('click',backToLobby);
}

async function backToLobby(){
  const np=(room.players||[]).map(p=>({...p,ready:false}));
  await fetch(`${SUPABASE_URL}/rest/v1/catchmind_rooms?id=eq.${room.id}`,{
    method:'PATCH',headers:jheaders(),body:JSON.stringify({status:'waiting',players:np,state:null})
  });
  fetchRoom();
}

// ---- 채팅/정답 처리 ----
let lastChatId=0, chatTimer=null, chatCooldownUntil=0, chatCache=[];
async function initChat(){
  const input=document.getElementById('chatInput');
  const sendBtn=document.getElementById('chatSendBtn');
  sendBtn.addEventListener('click',sendChat);
  input.addEventListener('keydown',e=>{ if(e.key==='Enter') sendChat(); });
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/catchmind_chat?room_id=eq.${roomId}&select=*&order=id.desc&limit=30`,{headers:headers()});
    const data=await r.json();
    if(data&&data.length){ lastChatId=data[0].id; chatCache=data.reverse(); renderChatLog(); }
  }catch(e){ console.error('채팅 초기화 에러',e); }
  chatTimer=setInterval(pollChat,1000);
}
function normalizeGuess(s){ return String(s||'').trim().replace(/\s+/g,'').toLowerCase(); }
async function sendChat(){
  const input=document.getElementById('chatInput');
  const msg=input.value.trim().slice(0,20);
  if(!msg||input.disabled) return;
  if(chatCooldownUntil&&Date.now()<chatCooldownUntil) return;
  const st=room.state;
  const isDrawer=mySeat===st.drawerSeat;
  if(isDrawer||mySeat<0) return;
  if(st.correctGuesses.some(g=>g.seat===mySeat)) return;
  input.value='';
  const isCorrect = st.stage==='drawing' && normalizeGuess(msg)===normalizeGuess(st.word);
  chatCooldownUntil=Date.now()+5000;
  updateChatBarState(st,isDrawer);
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/catchmind_chat`,{
      method:'POST',headers:jheaders(),
      body:JSON.stringify({room_id:String(roomId),seat:mySeat,username:currentUser.username,message:isCorrect?'':msg,correct:isCorrect})
    });
  }catch(e){ console.error('채팅 전송 에러',e); }
  if(isCorrect){
    await patchGameState(s=>{
      if(s.stage!=='drawing') return;
      if(s.correctGuesses.some(g=>g.seat===mySeat)) return;
      const elapsed=Date.now()-s.roundStartedAt;
      const points=scoreForElapsed(elapsed,room.time_limit);
      s.correctGuesses=[...s.correctGuesses,{seat:mySeat,atMs:elapsed,points}];
      const nonDrawerActive=room.players.map((_,i)=>i).filter(i=>i!==s.drawerSeat);
      if(nonDrawerActive.every(i=>s.correctGuesses.some(g=>g.seat===i))){
        endRound(s);
      }
    });
  }
  render();
}
async function pollChat(){
  if(!roomId) return;
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/catchmind_chat?room_id=eq.${roomId}&id=gt.${lastChatId}&order=id.asc&limit=30`,{headers:headers()});
    if(!r.ok) return;
    const data=await r.json();
    if(data.length){
      data.forEach(m=>{ lastChatId=m.id; });
      chatCache=[...chatCache,...data].slice(-40);
      renderChatLog();
    }
  }catch(e){ console.error('채팅 폴링 에러',e); }
}
function renderChatLog(){
  const log=document.getElementById('chatLog');
  if(!log) return;
  log.innerHTML=chatCache.map(m=>{
    if(m.correct) return `<div class="chat-line correct">🎉 ${esc(m.username)}님 정답!</div>`;
    return `<div class="chat-line"><span class="nick">${esc(m.username)}</span> : ${esc(m.message)}</div>`;
  }).join('');
  log.scrollTop=log.scrollHeight;
}

// ---- 타이머/자동 라운드 진행 ----
let roundEndTriggeredKey=null, nextRoundTriggeredKey=null;
function tick(){
  if(!(room&&room.status==='playing'&&room.state)) return;
  const st=room.state;
  if(st.stage==='drawing'){
    const bar=document.getElementById('timerBar');
    const elapsed=Date.now()-st.roundStartedAt;
    const frac=Math.max(0,1-elapsed/(room.time_limit*1000));
    if(bar){
      bar.style.width=(frac*100)+'%';
      bar.classList.toggle('warn',frac<0.25);
    }
    const key=room.id+':'+st.round;
    if(elapsed>=room.time_limit*1000&&roundEndTriggeredKey!==key){
      roundEndTriggeredKey=key;
      patchGameState(s=>{ if(s.stage==='drawing') endRound(s); });
    }
  } else if(st.stage==='roundResult'){
    const key=room.id+':'+st.round+':result';
    const elapsed=Date.now()-(st.roundEndedAt||Date.now());
    if(elapsed>=4500&&nextRoundTriggeredKey!==key){
      nextRoundTriggeredKey=key;
      patchGameState(s=>{ if(s.stage==='roundResult') goNextRound(s); });
    }
  } else if(st.stage==='matchResult'){
    persistMatchPointsIfNeeded();
  }
}

let matchPointsPersistedKey=null;
async function persistMatchPointsIfNeeded(){
  const isHost=currentUser&&String(room.host_user_id)===String(currentUser.id);
  if(!isHost) return;
  const key=room.id+':'+room.move_count;
  if(matchPointsPersistedKey===key) return;
  matchPointsPersistedKey=key;
  const players=room.players;
  const scores=room.state.scores;
  try{
    await Promise.all(players.map(async(p,i)=>{
      const r=await fetch(`${SUPABASE_URL}/rest/v1/catchmind_points?user_id=eq.${p.user_id}&select=points,matches`,{headers:headers()});
      const data=await r.json();
      const cur=data.length?data[0]:null;
      const newPts=(cur?cur.points:0)+scores[i];
      const newMatches=(cur?cur.matches:0)+1;
      if(cur){
        await fetch(`${SUPABASE_URL}/rest/v1/catchmind_points?user_id=eq.${p.user_id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({points:newPts,matches:newMatches,username:p.username})});
      } else {
        await fetch(`${SUPABASE_URL}/rest/v1/catchmind_points`,{method:'POST',headers:jheaders(),body:JSON.stringify({user_id:p.user_id,username:p.username,points:newPts,matches:newMatches})});
      }
    }));
  }catch(e){ console.error('마인드캐치 포인트 저장 에러',e); }
}

async function leaveRoom(){
  if(room&&room.status==='waiting'&&mySeat>=0){
    await removeSelfFromRoom();
  } else if(room&&room.status==='playing'&&mySeat>=0){
    await removeSelfFromRoom();
  }
  location.href='catchmind_rooms.html';
}
async function removeSelfFromRoom(){
  const wasHost=currentUser&&String(room.host_user_id)===String(currentUser.id);
  const np=(room.players||[]).filter((_,i)=>i!==mySeat).map((p,i)=>({...p,seat:i}));
  if(np.length===0){
    let deleted=false;
    try{
      const res=await fetch(`${SUPABASE_URL}/rest/v1/catchmind_rooms?id=eq.${room.id}`,{method:'DELETE',headers:{...headers(),'Prefer':'return=representation'}});
      const data=await res.json().catch(()=>null);
      deleted=res.ok&&data&&data.length>0;
    }catch(e){ console.error(e); }
    if(!deleted){
      try{ await fetch(`${SUPABASE_URL}/rest/v1/catchmind_rooms?id=eq.${room.id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({status:'finished',players:[]})}); }catch(e){}
    }
    return;
  }
  const patch={players:np};
  if(wasHost){ patch.host_user_id=np[0].user_id; patch.host_username=np[0].username; }
  await fetch(`${SUPABASE_URL}/rest/v1/catchmind_rooms?id=eq.${room.id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify(patch)});
}
document.getElementById('leaveBtn').addEventListener('click',leaveRoom);

if(!currentUser){
  document.getElementById('wrap').innerHTML='<div class="center-msg">로그인 후 이용해주세요.</div>';
} else if(!roomId){
  document.getElementById('wrap').innerHTML='<div class="center-msg">잘못된 접근이에요.</div>';
} else {
  fetchRoom();
  pollTimer=setInterval(fetchRoom,1000);
  setInterval(tick,400);
  initChat();
}
</script>
