<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여행 일정 조율</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap');

  :root{
    --navy:#182338;
    --navy-deep:#0f1626;
    --paper:#F7F2E4;
    --paper-dim:#EDE6D2;
    --coral:#E8683F;
    --teal:#2E8577;
    --teal-deep:#1D5C51;
    --red:#C0432E;
    --red-soft:#F1DED2;
    --green-soft:#CFE3D9;
    --ink:#2B2620;
    --ink-soft:#6B6255;
    --line: rgba(43,38,32,0.16);
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Sans KR', sans-serif;
    background:
      radial-gradient(circle at 15% 10%, rgba(232,104,63,0.10), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(46,133,119,0.12), transparent 45%),
      var(--navy);
    color:var(--paper);
    min-height:100vh;
    padding:32px 16px 60px;
  }

  .wrap{max-width:780px;margin:0 auto;}

  .hero{text-align:center;margin-bottom:28px;}
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:0.35em;
    font-size:11px;
    color:var(--coral);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  h1{
    font-family:'Noto Serif KR', serif;
    font-weight:900;
    font-size:clamp(28px,6vw,42px);
    margin:0 0 8px;
    line-height:1.2;
    color:var(--paper);
  }
  .hero p{color:rgba(247,242,228,0.6);font-size:14px;margin:0;}
  .trip-title-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;}
  .trip-title-row input{
    background:transparent;border:none;border-bottom:1px dashed rgba(247,242,228,0.35);
    color:var(--paper);font-family:'Noto Serif KR',serif;font-weight:700;font-size:16px;
    text-align:center;padding:4px 2px;width:auto;min-width:120px;
  }
  .trip-title-row input:focus{outline:none;border-bottom-color:var(--coral);}
  .trip-title-row button{background:none;border:none;color:rgba(247,242,228,0.4);cursor:pointer;font-size:12px;font-family:'IBM Plex Mono',monospace;}
  .trip-title-row button:hover{color:var(--coral);}

  .ticket{
    background:var(--paper);
    color:var(--ink);
    border-radius:14px;
    position:relative;
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
    overflow:hidden;
  }

  .gate{padding:40px 32px;text-align:center;}
  .gate .stub-label{
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.2em;
    color:var(--ink-soft);text-transform:uppercase;margin-bottom:6px;
  }
  .gate h2{font-family:'Noto Serif KR',serif;font-size:22px;margin:0 0 20px;}
  .gate input{
    width:100%;max-width:280px;padding:14px 16px;border:2px solid var(--ink);
    border-radius:8px;font-size:16px;font-family:'Noto Sans KR',sans-serif;
    background:#fff;margin-bottom:16px;text-align:center;
  }
  .gate input:focus{outline:none;border-color:var(--coral);}
  .btn{
    display:inline-block;background:var(--navy);color:var(--paper);border:none;
    padding:13px 30px;border-radius:8px;font-size:15px;font-weight:700;
    font-family:'Noto Sans KR',sans-serif;cursor:pointer;
    transition:transform .15s ease, background .15s ease;
  }
  .btn:hover{background:var(--teal-deep);transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn:disabled{opacity:0.5;cursor:default;transform:none;}
  .btn.coral{background:var(--coral);}
  .btn.coral:hover{background:#c9552f;}

  .strip{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 24px;border-bottom:1px dashed var(--line);
    font-family:'IBM Plex Mono',monospace;flex-wrap:wrap;gap:10px;
  }
  .strip .who{font-size:13px;}
  .strip .who b{color:var(--teal-deep);}
  .tabs{display:flex;gap:6px;}
  .tab-btn{
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.05em;
    padding:8px 14px;border-radius:999px;border:1px solid var(--ink);
    background:transparent;color:var(--ink);cursor:pointer;
  }
  .tab-btn.active{background:var(--ink);color:var(--paper);}

  .perf{position:relative;height:0;border-top:2px dashed var(--line);margin:0;}
  .perf::before,.perf::after{content:"";position:absolute;top:-11px;width:22px;height:22px;background:var(--navy);border-radius:50%;}
  .perf::before{left:-11px;}
  .perf::after{right:-11px;}

  .cal-body{padding:22px 24px 26px;}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .cal-nav button{background:none;border:none;cursor:pointer;font-size:18px;color:var(--ink);padding:6px 10px;font-family:'IBM Plex Mono',monospace;}
  .cal-nav button:hover{color:var(--coral);}
  .cal-month{font-family:'Noto Serif KR',serif;font-weight:700;font-size:19px;}
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;}
  .weekdays div{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);letter-spacing:0.05em;}
  .days{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;}

  .day{
    position:relative;
    aspect-ratio:1/1;
    min-height:56px;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    border-radius:10px;
    font-family:'IBM Plex Mono',monospace;
    font-size:15px;font-weight:600;
    cursor:pointer;
    background:var(--paper-dim);
    border:1.5px solid transparent;
    color:var(--ink);
    user-select:none;
    transition:transform .1s ease;
    overflow:hidden;
  }
  .day.empty{visibility:hidden;cursor:default;}
  .day:hover:not(.empty):not(.past){transform:scale(1.05);}
  .day.past{opacity:0.35;cursor:default;}

  .day.day-yes{background:var(--teal);color:#fff;border-color:var(--teal-deep);}
  .day.day-no{background:var(--red);color:#fff;border-color:#8f2f1e;}

  .day .num{position:relative;z-index:2;}
  .day .sub{
    font-size:9px;font-weight:700;margin-top:2px;position:relative;z-index:2;
    font-family:'IBM Plex Mono',monospace;
  }

  .day.result .bar{
    position:absolute;left:0;right:0;bottom:0;height:34%;display:flex;z-index:1;
  }
  .day.result .bar .seg-yes{background:var(--teal);}
  .day.result .bar .seg-no{background:var(--red);}
  .day.result.no-data{background:var(--paper-dim);}

  .legend{
    display:flex;align-items:center;gap:14px;justify-content:center;flex-wrap:wrap;
    margin-top:16px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);
  }
  .legend .sw{width:14px;height:14px;border-radius:4px;display:inline-block;vertical-align:middle;margin-right:4px;}

  .hint{
    text-align:center;font-size:12px;color:var(--ink-soft);
    font-family:'Noto Sans KR',sans-serif;margin-top:14px;
  }
  .save-row{display:flex;justify-content:center;gap:10px;margin-top:18px;}

  .detail{
    margin-top:18px;background:#fff;border:1.5px solid var(--line);border-radius:10px;
    padding:16px 18px;display:none;
  }
  .detail.show{display:block;}
  .detail .d-date{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);margin-bottom:10px;}
  .detail .d-names{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{background:var(--paper-dim);border-radius:999px;padding:5px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;}
  .chip.ok{background:var(--green-soft);color:var(--teal-deep);font-weight:700;}
  .chip.no{background:var(--red-soft);color:#9C3A22;font-weight:700;}
  .chip.na{color:var(--ink-soft);}
  .empty-note{font-size:13px;color:var(--ink-soft);text-align:center;padding:6px 0;}

  .footer-note{text-align:center;margin-top:18px;font-size:12px;color:rgba(247,242,228,0.4);font-family:'IBM Plex Mono',monospace;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);padding:12px 22px;border-radius:999px;
    font-size:13px;opacity:0;pointer-events:none;transition:all .25s ease;
    font-family:'Noto Sans KR',sans-serif;z-index:50;max-width:80vw;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .loading{
    text-align:center;padding:40px;font-family:'IBM Plex Mono',monospace;
    color:var(--ink-soft);font-size:13px;
  }

  @media (max-width:480px){
    .day{font-size:13px;min-height:44px;}
    .strip{flex-direction:column;align-items:flex-start;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div class="eyebrow">Trip Scheduling · 여행 일정 조율</div>
    <h1>다들 언제 갈 수 있어?</h1>
    <p>날짜를 눌러 가능(초록) / 불가능(빨강)을 표시하면, 전체 인원의 일정이 한눈에 모여요.</p>
    <div class="trip-title-row" id="titleRow">
      <span id="tripTitleDisplay" style="font-family:'Noto Serif KR',serif;font-weight:700;">여행 일정</span>
      <button id="editTitleBtn" title="여행 제목 수정">✎</button>
    </div>
  </div>

  <div class="ticket" id="ticket">
    <div class="gate" id="gateView">
      <div class="stub-label">Passenger · 참가자</div>
      <h2>이름을 입력하고 시작하기</h2>
      <input type="text" id="nameInput" placeholder="예: 김철수" maxlength="20">
      <div><button class="btn coral" id="startBtn">시작하기</button></div>
    </div>

    <div id="mainView" style="display:none;">
      <div class="strip">
        <div class="who">탑승객 · <b id="whoName"></b></div>
        <div class="tabs">
          <button class="tab-btn active" id="tabInput">내 일정 입력</button>
          <button class="tab-btn" id="tabResults">전체 결과 보기</button>
        </div>
      </div>
      <div class="perf"></div>

      <div class="cal-body">
        <div class="cal-nav">
          <button id="prevMonth">‹</button>
          <div class="cal-month" id="monthLabel"></div>
          <button id="nextMonth">›</button>
        </div>
        <div class="weekdays">
          <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
        </div>
        <div class="days" id="daysGrid"></div>

        <div id="inputExtra">
          <div class="legend">
            <span><span class="sw" style="background:var(--teal);"></span>가능</span>
            <span><span class="sw" style="background:var(--red);"></span>불가능</span>
            <span><span class="sw" style="background:var(--paper-dim);"></span>미정</span>
          </div>
          <div class="hint">날짜를 클릭할 때마다 미정 → 가능 → 불가능 → 미정 순서로 바뀌어요</div>
          <div class="save-row">
            <button class="btn" id="saveBtn">내 일정 저장하기</button>
          </div>
        </div>

        <div id="resultsExtra" style="display:none;">
          <div class="legend">
            <span><span class="sw" style="background:var(--teal);"></span>가능 인원 비율</span>
            <span><span class="sw" style="background:var(--red);"></span>불가능 인원 비율</span>
          </div>
          <div class="detail" id="detailBox">
            <div class="d-date" id="detailDate"></div>
            <div class="d-names" id="detailNames"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer-note">이 링크를 그대로 공유하면 다른 사람들도 같은 캘린더에 자기 일정을 표시할 수 있어요</div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  // ---------- Supabase 설정 ----------
  const SUPABASE_URL = 'https://lbyesrvmccvpqaplzcsn.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_Nze9S8yzlYf0wY-u88dYhw_JC1MSGVz';
  const REST = SUPABASE_URL + '/rest/v1';
  const HEADERS = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json'
  };

  async function sbSelect(table, query){
    const res = await fetch(`${REST}/${table}?${query}`, { headers: HEADERS });
    if(!res.ok) throw new Error('select failed: ' + res.status);
    return res.json();
  }
  async function sbUpsert(table, rows, conflictCol){
    const res = await fetch(`${REST}/${table}?on_conflict=${conflictCol}`, {
      method:'POST',
      headers: { ...HEADERS, 'Prefer':'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify(rows)
    });
    if(!res.ok) throw new Error('upsert failed: ' + res.status);
    return true;
  }

  const gateView = document.getElementById('gateView');
  const mainView = document.getElementById('mainView');
  const nameInput = document.getElementById('nameInput');
  const startBtn = document.getElementById('startBtn');
  const whoName = document.getElementById('whoName');
  const tabInput = document.getElementById('tabInput');
  const tabResults = document.getElementById('tabResults');
  const inputExtra = document.getElementById('inputExtra');
  const resultsExtra = document.getElementById('resultsExtra');
  const daysGrid = document.getElementById('daysGrid');
  const monthLabel = document.getElementById('monthLabel');
  const prevMonthBtn = document.getElementById('prevMonth');
  const nextMonthBtn = document.getElementById('nextMonth');
  const saveBtn = document.getElementById('saveBtn');
  const detailBox = document.getElementById('detailBox');
  const detailDate = document.getElementById('detailDate');
  const detailNames = document.getElementById('detailNames');
  const toast = document.getElementById('toast');
  const tripTitleDisplay = document.getElementById('tripTitleDisplay');
  const editTitleBtn = document.getElementById('editTitleBtn');

  let myName = '';
  let myAvail = {};
  let mode = 'input';
  let cursor = new Date(); cursor.setDate(1);
  let allResponses = {};
  let totalResponders = 0;

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'), 2600);
  }

  function pad(n){return n<10?'0'+n:''+n;}
  function keyOf(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
  function todayKey(){const t=new Date(); t.setHours(0,0,0,0); return keyOf(t);}

  // ---------- trip title ----------
  async function loadTripTitle(){
    try{
      const rows = await sbSelect('trip_meta', `key=eq.title&select=value`);
      if(rows && rows[0] && rows[0].value){ tripTitleDisplay.textContent = rows[0].value; }
    }catch(e){ /* 아직 제목 없음 */ }
  }
  editTitleBtn.addEventListener('click', async ()=>{
    const cur = tripTitleDisplay.textContent;
    const next = prompt('여행 제목을 입력하세요', cur === '여행 일정' ? '' : cur);
    if(next && next.trim()){
      tripTitleDisplay.textContent = next.trim();
      try{ await sbUpsert('trip_meta', [{key:'title', value: next.trim()}], 'key'); }
      catch(e){ showToast('제목 저장 실패, 다시 시도해주세요'); }
    }
  });

  // ---------- gate ----------
  startBtn.addEventListener('click', enterApp);
  nameInput.addEventListener('keydown', e=>{ if(e.key==='Enter') enterApp(); });

  async function enterApp(){
    const n = nameInput.value.trim();
    if(!n){ showToast('이름을 입력해주세요'); return; }
    myName = n;
    whoName.textContent = myName;
    startBtn.disabled = true;
    startBtn.textContent = '불러오는 중...';

    try{
      const rows = await sbSelect('trip_availability', `name=eq.${encodeURIComponent(myName)}&select=avail`);
      if(rows && rows[0] && rows[0].avail){ myAvail = rows[0].avail; }
    }catch(e){
      showToast('불러오기에 실패했어요, 새로고침 후 다시 시도해주세요');
      startBtn.disabled = false;
      startBtn.textContent = '시작하기';
      return;
    }

    gateView.style.display = 'none';
    mainView.style.display = 'block';
    renderCalendar();
  }

  // ---------- tabs ----------
  tabInput.addEventListener('click', ()=>{
    mode='input';
    tabInput.classList.add('active'); tabResults.classList.remove('active');
    inputExtra.style.display='block'; resultsExtra.style.display='none';
    renderCalendar();
  });
  tabResults.addEventListener('click', async ()=>{
    mode='results';
    tabResults.classList.add('active'); tabInput.classList.remove('active');
    inputExtra.style.display='none'; resultsExtra.style.display='block';
    detailBox.classList.remove('show');
    daysGrid.innerHTML = '<div class="loading">불러오는 중...</div>';
    await loadAllResponses();
    renderCalendar();
  });

  // ---------- month nav ----------
  prevMonthBtn.addEventListener('click', ()=>{ cursor.setMonth(cursor.getMonth()-1); renderCalendar(); });
  nextMonthBtn.addEventListener('click', ()=>{ cursor.setMonth(cursor.getMonth()+1); renderCalendar(); });

  // ---------- save ----------
  saveBtn.addEventListener('click', async ()=>{
    saveBtn.disabled = true;
    saveBtn.textContent = '저장 중...';
    try{
      await sbUpsert('trip_availability', [{ name: myName, avail: myAvail, updated_at: new Date().toISOString() }], 'name');
      showToast('저장했어요! "전체 결과 보기"에서 확인할 수 있어요');
    }catch(e){
      showToast('저장에 실패했어요, 다시 시도해주세요');
    }
    saveBtn.disabled = false;
    saveBtn.textContent = '내 일정 저장하기';
  });

  // ---------- load all responses ----------
  async function loadAllResponses(){
    allResponses = {};
    totalResponders = 0;
    try{
      const rows = await sbSelect('trip_availability', `select=name,avail`);
      (rows||[]).forEach(r=>{
        allResponses[r.name] = r.avail || {};
        totalResponders++;
      });
    }catch(e){ showToast('결과를 불러오지 못했어요'); }
  }

  // ---------- calendar render ----------
  function renderCalendar(){
    const y = cursor.getFullYear(), m = cursor.getMonth();
    monthLabel.textContent = y + '년 ' + (m+1) + '월';
    daysGrid.innerHTML = '';

    const firstDay = new Date(y,m,1);
    const startOffset = firstDay.getDay();
    const daysInMonth = new Date(y,m+1,0).getDate();
    const tKey = todayKey();

    for(let i=0;i<startOffset;i++){
      const empty = document.createElement('div');
      empty.className='day empty';
      daysGrid.appendChild(empty);
    }

    for(let d=1; d<=daysInMonth; d++){
      const dateObj = new Date(y,m,d);
      const k = keyOf(dateObj);
      const cell = document.createElement('div');
      cell.className='day';
      cell.dataset.key = k;

      const numSpan = document.createElement('div');
      numSpan.className='num';
      numSpan.textContent = d;
      cell.appendChild(numSpan);

      if(mode==='input'){
        const state = myAvail[k];
        if(k < tKey) cell.classList.add('past');
        if(state==='yes') cell.classList.add('day-yes');
        if(state==='no') cell.classList.add('day-no');
        if(state){
          const sub = document.createElement('div');
          sub.className='sub';
          sub.textContent = state==='yes' ? '가능' : '불가능';
          cell.appendChild(sub);
        }
        cell.addEventListener('click', ()=>{
          if(k < tKey) return;
          const cur = myAvail[k];
          if(!cur) myAvail[k]='yes';
          else if(cur==='yes') myAvail[k]='no';
          else delete myAvail[k];
          renderCalendar();
        });
      } else {
        cell.classList.add('result');
        let yesCount=0, noCount=0;
        const yesNames=[], noNames=[];
        Object.keys(allResponses).forEach(n=>{
          const st = allResponses[n][k];
          if(st==='yes'){ yesCount++; yesNames.push(n); }
          else if(st==='no'){ noCount++; noNames.push(n); }
        });
        const respondedTotal = yesCount+noCount;
        if(respondedTotal===0){
          cell.classList.add('no-data');
        } else {
          const bar = document.createElement('div');
          bar.className='bar';
          if(yesCount>0){
            const segY = document.createElement('div');
            segY.className='seg-yes';
            segY.style.flex = yesCount;
            bar.appendChild(segY);
          }
          if(noCount>0){
            const segN = document.createElement('div');
            segN.className='seg-no';
            segN.style.flex = noCount;
            bar.appendChild(segN);
          }
          cell.appendChild(bar);
          const sub = document.createElement('div');
          sub.className='sub';
          sub.textContent = yesCount+'/'+noCount;
          cell.appendChild(sub);
        }
        cell.addEventListener('click', ()=> showDetail(k, yesNames, noNames));
      }
      daysGrid.appendChild(cell);
    }
  }

  function showDetail(k, yesNames, noNames){
    detailBox.classList.add('show');
    const [yy,mm,dd] = k.split('-');
    detailDate.textContent = yy+'년 '+parseInt(mm)+'월 '+parseInt(dd)+'일 · 가능 '+yesNames.length+'명 · 불가능 '+noNames.length+'명';
    detailNames.innerHTML = '';
    const allNames = Object.keys(allResponses);
    if(allNames.length===0){
      detailNames.innerHTML = '<div class="empty-note">아직 입력된 일정이 없어요</div>';
      return;
    }
    allNames.forEach(n=>{
      const chip = document.createElement('span');
      if(yesNames.includes(n)){
        chip.className='chip ok';
        chip.textContent = '✓ ' + n;
      } else if(noNames.includes(n)){
        chip.className='chip no';
        chip.textContent = '✕ ' + n;
      } else {
        chip.className='chip na';
        chip.textContent = '· ' + n + ' (미응답)';
      }
      detailNames.appendChild(chip);
    });
  }

  loadTripTitle();
})();
</script>
</body>
</html>
