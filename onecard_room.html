let cardbackMap={};
function cbShade(hex,amt){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+(r<<16|g<<8|b).toString(16).padStart(6,'0');
}
function cbBgCss(color,pattern){
  if(pattern==='solid') return color;
  if(pattern==='dots') return `radial-gradient(${cbShade(color,-15)} 22%,transparent 23%) 0 0/10px 10px, ${color}`;
  if(pattern==='grid') return `repeating-linear-gradient(0deg,${cbShade(color,-15)},${cbShade(color,-15)} 1px,transparent 1px,transparent 9px),repeating-linear-gradient(90deg,${cbShade(color,-15)},${cbShade(color,-15)} 1px,transparent 1px,transparent 9px),${color}`;
  return `repeating-linear-gradient(45deg,${color},${color} 5px,${cbShade(color,-18)} 5px,${cbShade(color,-18)} 10px)`;
}
function cardbackStyleFor(userId){

}
async function ensureCardbacks(userIds){
  const missing=[...new Set(userIds)].filter(id=>!(id in cardbackMap));
  if(!missing.length) return;
  missing.forEach(id=>cardbackMap[id]=undefined);
  try{
    const idList=missing.map(id=>`"${id}"`).join(',');
    const r=await fetch(`${SUPABASE_URL}/rest/v1/onecard_cardbacks?user_id=in.(${idList})&select=*`,{headers:headers()});
    const data=await r.json();
    missing.forEach(id=>{ if(!(id in cardbackMap)||cardbackMap[id]===undefined) cardbackMap[id]=null; });
    data.forEach(d=>{ cardbackMap[d.user_id]=d; });
    if(room) render();
  }catch(e){}
}

function buildDeck(){
  const d=[];
  SUITS.forEach(s=>RANKS.forEach(r=>d.push({suit:s,rank:r,id:s+r})));
  d.push({suit:null,rank:'BWJ',id:'BWJ',joker:'bw'});
  d.push({suit:null,rank:'CJ',id:'CJ',joker:'color'});
  return d;
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function isSpadeAce(c){ return c.rank==='A'&&c.suit==='♠'; }
function attackTier(c){ if(c.rank==='2')return 1; if(c.rank==='A')return 2; if(c.joker==='bw')return 3; if(c.joker==='color')return 4; return 0; }
function attackAmount(c){ if(c.rank==='2')return 2; if(c.rank==='A')return isSpadeAce(c)?5:3; if(c.joker==='bw')return 5; if(c.joker==='color')return 7; return 0; }
function matchesTop(c,top){ if(top.joker||c.joker) return true; return c.suit===top.suit||c.rank===top.rank; }
function cardCompare(a,b){
  if(a.joker||b.joker){ if(a.joker&&b.joker) return a.joker==='bw'?-1:1; return a.joker?1:-1; }
  const ro=RANK_ORDER[a.rank]-RANK_ORDER[b.rank]; if(ro!==0) return ro;
  return SUIT_ORDER[a.suit]-SUIT_ORDER[b.suit];
}

<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:${Math.round(w*0.38)}px;color:${color};">${card.suit}</div>`;

function showRules(){
  const wrap=document.getElementById('wrap');
  const box=document.createElement('div');
  box.id='rulesOverlay';
  box.style.cssText='position:absolute;inset:0;background:rgba(20,18,30,0.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;';
  box.innerHTML=`<div style="background:#fff;border-radius:16px;padding:20px;max-height:85vh;overflow-y:auto;font-family:-apple-system,sans-serif;font-size:13px;line-height:1.8;color:#333;">
    <div style="font-weight:800;font-size:16px;color:#1a1a2e;margin-bottom:10px;">📖 원카드 규칙</div>
    <b>기본 진행</b><br/>
    카드 52장+조커 2장(흑백/컬러)으로 시작하며, 각자 7장씩 나눠 가져요. 자기 차례에 버림패의 맨 위 카드와 <b>같은 무늬 또는 같은 숫자</b>인 카드를 낼 수 있어요. 낼 카드가 없으면 "카드 가져오기"로 한 장 뽑고 턴이 넘어가요.<br/><br/>
    <b>특수카드</b><br/>
    · <b>J</b> : 다음 사람 턴을 건너뜀<br/>
    · <b>Q</b> : 순서가 반대로 바뀜<br/>
    · <b>K</b> : 턴이 안 넘어가고 한 장 더 낼 수 있음<br/>
    · <b>7</b> : 원하는 무늬를 자유롭게 선언 (선언 후 턴 넘어감)<br/><br/>
    <b>공격카드</b><br/>
    · <b>2</b> : 다음 사람이 2장 드로우<br/>
    · <b>A</b> : 3장 드로우 (♠A는 5장)<br/>
    · <b>흑백조커</b> : 5장 드로우<br/>
    · <b>컬러조커</b> : 7장 드로우 (방어 불가)<br/><br/>
    <b>공격 얹기(스택)</b><br/>
    공격을 받으면 <b>2 → A → 흑백조커 → 컬러조커</b> 순서로만(같은 종류는 자유롭게) 더 강한 공격을 얹어서 다음 사람에게 넘길 수 있어요. ♠A는 특별히 흑백조커 위에도 얹을 수 있어요. 아무도 못 얹으면 그 시점 사람이 누적된 만큼 전부 드로우해요.<br/><br/>
    <b>방어</b><br/>
    <b>3</b>만 방어카드예요. 2 또는 A(♠A 제외) 공격을 완전히 무효화시켜요. 조커 단계 공격은 방어할 수 없어요.<br/><br/>
    <b>ONE CARD</b><br/>
    손에 카드가 1장 남으면 화면에 버튼이 랜덤한 위치에 떠요. 본인이 먼저 누르면 안전, 0.5초 뒤부터는 다른 사람이 "캐치"할 수 있어요. 5초 안에 아무도 안 누르면 자동으로 벌칙 드로우예요.<br/><br/>
    <b>턴 제한시간</b><br/>
    자기 차례에 10초 안에 행동하지 않으면 자동으로 카드를 뽑고 턴이 넘어가요.<br/><br/>
    <b>승리와 순위</b><br/>
    손패를 가장 먼저 다 낸 사람이 1등, 나머지는 남은 카드 수가 적을수록 높은 순위예요. 게임 도중 나가면 몰수패 처리되며, <b>먼저 나간 사람일수록 더 낮은 순위</b>로 기록돼요.<br/><br/>
    <b>점수(레이팅)</b><br/>
    순위 차이에 비례해서 점수를 주고받아요 (상대적으로 낮은 순위를 이기면 더 많이 얻어요).

  </div>
  </div>`;
  wrap.appendChild(box);
  box.addEventListener('click',(e)=>{ if(e.target===box) box.remove(); });
  document.getElementById('rulesCloseBtn').addEventListener('click',()=>box.remove());
}

async function startGame(){
  const players=room.players||[];
  const n=players.length;
  const deck=shuffle(buildDeck());
  const hands=Array.from({length:n},()=>[]);
  for(let r=0;r<7;r++) for(let s=0;s<n;s++) hands[s].push(deck.pop());
  let first=deck.pop();
  while(first.joker||['2','A','J','Q','K','7'].includes(first.rank)){ deck.unshift(first); shuffle(deck); first=deck.pop(); }
  const state={
    hands, deck, discard:[first],
    turn: Math.floor(Math.random()*n), dir:1,
    pending:null, declaredSuit:null,
    turnStartedAt: Date.now(),
    oneCardPending:null
  };
  await fetch(`${SUPABASE_URL}/rest/v1/onecard_rooms?id=eq.${room.id}`,{
    method:'PATCH',headers:jheaders(),
    body:JSON.stringify({status:'playing',state,move_count:0})
  });
  fetchRoom();
}

// ---- 게임 로직 (로컬 프로토타입과 동일 규칙, state 기반) ----
function topCard(st){ return st.discard[st.discard.length-1]; }
function effSuit(st){ return st.declaredSuit||topCard(st).suit; }
function canPlayNormal(st,c){ if(c.joker) return true; if(topCard(st).joker) return true; return c.suit===effSuit(st)||c.rank===topCard(st).rank; }
function canStack(st,c){
  if(!st.pending) return false;
  const t=attackTier(c); if(t===0) return false;
  if(isSpadeAce(c)&&st.pending.tier===3) return true;
  if(t<st.pending.tier) return false;
  return matchesTop(c,topCard(st));
}
function canDefend3(st,c){
  if(!st.pending) return false;
  if(c.rank!=='3') return false;
  if(!((st.pending.tier===1||st.pending.tier===2)&&!st.pending.hasSpadeAce)) return false;
  return matchesTop(c,topCard(st));
}
function playableCards(st,hand){ return hand.filter(c=> st.pending? (canStack(st,c)||canDefend3(st,c)) : canPlayNormal(st,c)); }
function nextSeat(st,n,skip){
  const left=st.leftSeats||[];
  let t=st.turn;
  const steps=skip?2:1;
  for(let k=0;k<steps;k++){
    let guard=0;
    do{ t=(t+st.dir+n)%n; guard++; }while(left.includes(t)&&guard<n+1);
  }
  return t;
}

async function patchState(mutator, extra){
  if(animLock) return false;
  animLock=true;
  const lockWatchdog=setTimeout(()=>{ animLock=false; },4000);
  try{
    const st=JSON.parse(JSON.stringify(room.state));
    const result=mutator(st);
    const body=Object.assign({state:st,move_count:room.move_count+1},extra||{});
    const res=await fetch(`${SUPABASE_URL}/rest/v1/onecard_rooms?id=eq.${room.id}&move_count=eq.${room.move_count}`,{
      method:'PATCH',headers:{...jheaders(),'Prefer':'return=representation'},body:JSON.stringify(body)
    });
    const data=await res.json();
    if(!data||!data.length){ fetchRoom(); return false; }
    room=data[0];
    return result;
  }catch(e){
    console.error('patchState error',e);
    return false;
  }finally{
    clearTimeout(lockWatchdog);
    animLock=false;
  }
}

function checkOneCardTrigger(st,seat){
  if(st.hands[seat].length===1){ st.oneCardPending={seat,createdAt:Date.now()}; }
}
function checkWinner(st,seat){ return st.hands[seat].length===0; }

async function playCard(cardId){
  const st=room.state; const hand=st.hands[mySeat];
  const card=hand.find(c=>c.id===cardId);
  if(!card) return;
  const playable=playableCards(st,hand);
  if(!playable.some(c=>c.id===cardId)) return;

  let winnerSeat=null;
  await patchState(s=>{
    const h=s.hands[mySeat];
    const idx=h.findIndex(c=>c.id===cardId);
    const c=h[idx];
    const n=s.hands.length;
    if(s.pending&&canDefend3(s,c)){
      h.splice(idx,1); s.discard.push(c); s.pending=null;
      s.turn=nextSeat(s,n,false); s.turnStartedAt=Date.now();
      checkOneCardTrigger(s,mySeat);
      if(checkWinner(s,mySeat)) winnerSeat=mySeat;
      return;
    }
    if(s.pending&&canStack(s,c)){
      h.splice(idx,1); s.discard.push(c);
      const newChain=(s.pending.chainLen||1)+1;
      s.pending={tier:Math.max(s.pending.tier,attackTier(c)),amount:s.pending.amount+attackAmount(c),hasSpadeAce:s.pending.hasSpadeAce||isSpadeAce(c),chainLen:newChain};
      s.turn=nextSeat(s,n,false); s.turnStartedAt=Date.now();
      checkOneCardTrigger(s,mySeat);
      if(checkWinner(s,mySeat)) winnerSeat=mySeat;
      return;
    }
    if(!s.pending&&canPlayNormal(s,c)){
      h.splice(idx,1); s.discard.push(c); s.declaredSuit=null;
      const t=attackTier(c);
      if(t>0){ s.pending={tier:t,amount:attackAmount(c),hasSpadeAce:isSpadeAce(c),chainLen:1}; s.turn=nextSeat(s,n,false); s.turnStartedAt=Date.now(); }
      else if(c.rank==='7'){ s._needSuitPick=true; }
      else if(c.rank==='K'){ s.turnStartedAt=Date.now(); }
      else if(c.rank==='Q'){ s.dir*=-1; s.turn=nextSeat(s,n,false); s.turnStartedAt=Date.now(); }
      else if(c.rank==='J'){ s.turn=nextSeat(s,n,true); s.turnStartedAt=Date.now(); }
      else { s.turn=nextSeat(s,n,false); s.turnStartedAt=Date.now(); }
      checkOneCardTrigger(s,mySeat);
      if(checkWinner(s,mySeat)) winnerSeat=mySeat;
    }
  });

  if(room.state._needSuitPick){ showSuitPick(); return; }
  if(winnerSeat!==null){ await finishGame(winnerSeat); return; }
  render();
}

function computeFinalRankOrder(st,winnerSeat,players){
  const leftSeats=(st&&st.leftSeats)||[];
  const activeSeats=players.map((_,i)=>i).filter(i=>!leftSeats.includes(i));
  const activeSorted=activeSeats
    .map(i=>({seat:i,cnt:i===winnerSeat?0:(st&&st.hands&&st.hands[i]?st.hands[i].length:0)}))
    .sort((a,b)=>a.cnt-b.cnt).map(x=>x.seat);
  const leftWorstLast=[...leftSeats].reverse();
  return [...activeSorted, ...leftWorstLast];
}

async function getOrCreateElo(userId,username){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/onecard_elo?user_id=eq.${userId}&select=*`,{headers:headers()});
  const data=await r.json();
  if(data.length) return data[0];
  const created={user_id:userId,username,rating:1000,wins:0,losses:0};
  await fetch(`${SUPABASE_URL}/rest/v1/onecard_elo`,{method:'POST',headers:jheaders(),body:JSON.stringify(created)});
  return created;
}
async function applyEloResults(winnerSeat){
  const players=room.players;
  const st=room.state;
  const order=computeFinalRankOrder(st,winnerSeat,players);
  const rankOf=(seat)=>{ const idx=order.indexOf(seat); return idx<0?order.length:idx; };
  const elos=await Promise.all(players.map(p=>getOrCreateElo(p.user_id,p.username)));
  const K=16;
  const n=players.length;
  const deltas=players.map((p,i)=>{
    let d=0;
    for(let j=0;j<n;j++){
      if(j===i) continue;
      const exp=1/(1+Math.pow(10,(elos[j].rating-elos[i].rating)/400));
      const ri=rankOf(i),rj=rankOf(j);
      const actual= ri<rj?1: ri>rj?0:0.5;
      d+=(actual-exp);
    }
    return Math.round(K*d);
  });
  await Promise.all(players.map((p,i)=>{
    const newRating=Math.max(0,elos[i].rating+deltas[i]);
    const won=i===winnerSeat;
    return fetch(`${SUPABASE_URL}/rest/v1/onecard_elo?user_id=eq.${p.user_id}`,{
      method:'PATCH',headers:jheaders(),
      body:JSON.stringify({rating:newRating,wins:elos[i].wins+(won?1:0),losses:elos[i].losses+(won?0:1)})
    });
  }));
}

function flyCardBack(fromEl,toEl){
  if(!fromEl||!toEl) return;
  const fr=fromEl.getBoundingClientRect(), tr=toEl.getBoundingClientRect();
  if(!fr.width||!tr.width) return;
  const clone=makeCardBack(fr.width,fr.height);
  clone.style.position='fixed'; clone.style.left=fr.left+'px'; clone.style.top=fr.top+'px'; clone.style.margin='0'; clone.style.zIndex='999';
  clone.style.transition='left 0.4s ease,top 0.4s ease';
  document.body.appendChild(clone);
  requestAnimationFrame(()=>{
    clone.style.left=(tr.left+(tr.width-fr.width)/2)+'px';
    clone.style.top=(tr.top+(tr.height-fr.height)/2)+'px';
  });
  setTimeout(()=>clone.remove(),420);
}
function flyCardBackMulti(fromEl,toEl,count){

  if(elapsed>ONE_CARD_WINDOW){ forceOneCardTimeout(st.oneCardPending.seat); return; }
  if(st.oneCardPending.seat!==oneCardPosSeat){ oneCardBucket=-1; oneCardPosSeat=st.oneCardPending.seat; }
  const bucket=Math.floor(elapsed/1000);
  if(bucket!==oneCardBucket){
    oneCardBucket=bucket;
    ov.style.left=Math.random()*60+10+'%';
    ov.style.top=Math.random()*40+20+'%';

  const leftSeats=(st&&st.leftSeats)||[];
  const order=computeFinalRankOrder(st,room.winner_seat,players);
  let html=`<div class="center-msg">${winner?esc(winner.username)+'님 승리! 🎉':'게임 종료'}</div><div style="width:100%;">`;
  order.forEach((seat,i)=>{
    const p=players[seat];
    const isLeft=leftSeats.includes(seat);
    const cnt=isLeft?null:(seat===room.winner_seat?0:(st&&st.hands&&st.hands[seat]?st.hands[seat].length:0));
    html+=`<div style="display:flex;justify-content:space-between;padding:8px 10px;border-bottom:1px solid #f0f0f0;font-family:-apple-system,sans-serif;font-size:13px;"><span>${i+1}등 ${esc(p.username)}${i===0?' 🏆':''}${isLeft?' <span style="color:#e53935;font-size:11px;">(몰수패)</span>':''}</span><span style="color:#999;">${isLeft?'중도퇴장':cnt+'장 남음'}</span></div>`;
  });
  html+='</div><div class="big-btn" id="backBtn" style="background:#7c5cff;color:#fff;margin-top:10px;">방 목록으로</div>';
  wrap.innerHTML=html;
  document.getElementById('backBtn').addEventListener('click',()=>location.href='onecard_rooms.html');
}

async function leaveDuringGame(){
  if(!confirm('정말 나가시겠어요?\n몰수패로 처리되고 순위가 가장 낮게 기록돼요.')) return;
  let autoWinner=-1;
  await patchState(s=>{
    if(!s.leftSeats) s.leftSeats=[];
    if(s.leftSeats.includes(mySeat)) return;
    s.leftSeats.push(mySeat);
    const n=s.hands.length;
    const activeCount=n-s.leftSeats.length;
    if(s.oneCardPending&&s.oneCardPending.seat===mySeat) s.oneCardPending=null;
    if(activeCount<=1){
      for(let i=0;i<n;i++){ if(!s.leftSeats.includes(i)){ autoWinner=i; break; } }
      return;
    }
    if(s.turn===mySeat){ s.turn=nextSeat(s,n,false); s.turnStartedAt=Date.now(); }
  });
  if(autoWinner>=0){ await finishGame(autoWinner); }
  location.href='onecard_rooms.html';
}

async function leaveRoom(){
  if(room&&room.status==='waiting'){
    const isHost=currentUser&&String(room.host_user_id)===String(currentUser.id);
    if(isHost){
      await fetch(`${SUPABASE_URL}/rest/v1/onecard_rooms?id=eq.${room.id}`,{method:'DELETE',headers:headers()});
    } else if(mySeat>=0){
      const np=(room.players||[]).filter((_,i)=>i!==mySeat).map((p,i)=>({...p,seat:i,color:PCOLORS[i]}));
      await fetch(`${SUPABASE_URL}/rest/v1/onecard_rooms?id=eq.${room.id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({players:np})});
    }
  }
  location.href='onecard_rooms.html';
}
document.getElementById('leaveBtn').addEventListener('click',async()=>{
  if(!room){ location.href='onecard_rooms.html'; return; }
  const alreadyLeft=(room.state&&room.state.leftSeats||[]).includes(mySeat);
  if(room.status==='playing'&&mySeat>=0&&!alreadyLeft){
    await leaveDuringGame();
  } else if(room.status==='waiting'){
    await leaveRoom();
  } else {
    location.href='onecard_rooms.html';
  }
});

history.pushState({onecardGuard:true},'',location.href);
window.addEventListener('popstate',()=>{
  if(room&&room.status==='playing'&&mySeat>=0&&!(room.state&&room.state.leftSeats||[]).includes(mySeat)){
    history.pushState({onecardGuard:true},'',location.href);
    document.getElementById('leaveBtn').click();
  }
});

if(!currentUser){
  document.getElementById('wrap').innerHTML='<div class="center-msg">로그인 후 이용해주세요.</div>';
} else if(!roomId){
  document.getElementById('wrap').innerHTML='<div class="center-msg">잘못된 접근이에요.</div>';
} else {
  fetchRoom();
  pollTimer=setInterval(fetchRoom,1000);
}
</script>
