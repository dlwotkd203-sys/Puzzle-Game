<!DOCTYPE html>

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;}
#app{max-width:430px;margin:0 auto;background:#fff;min-height:100vh;}
.top-bar{display:flex;align-items:center;gap:10px;padding:1rem 1rem 0.75rem;border-bottom:1px solid #eee;}
.back-btn{background:none;border:none;cursor:pointer;color:#888;font-size:20px;padding:2px 8px;border-radius:8px;}
.top-title{font-size:17px;font-weight:600;color:#111;flex:1;}
.tab-bar{display:flex;border-bottom:1px solid #eee;overflow-x:auto;}
.tab{flex-shrink:0;padding:10px 14px;text-align:center;font-size:13px;font-weight:600;color:#888;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.tab.active{color:#378ADD;border-bottom-color:#378ADD;}
.ranking-body{padding:1rem;}
.rank-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f0;}
.rank-num{width:28px;text-align:center;font-size:15px;font-weight:700;color:#999;}
.rank-num.gold{color:#F5A623;}
.rank-num.silver{color:#9B9B9B;}
.rank-num.bronze{color:#C47A35;}
.rank-info{flex:1;}
.rank-name{font-size:15px;font-weight:600;color:#111;}
.rank-sub{font-size:12px;color:#888;margin-top:2px;}
.rank-score{font-size:15px;font-weight:700;color:#378ADD;text-align:right;}
.rank-score small{font-size:11px;color:#888;font-weight:400;display:block;}
.me-badge{font-size:10px;background:#E6F1FB;color:#378ADD;border-radius:4px;padding:1px 5px;margin-left:6px;}
.title-badge{font-size:10px;background:#FAEEDA;color:#BA7517;border-radius:4px;padding:1px 5px;margin-left:6px;font-weight:700;}
.loading{text-align:center;padding:2rem;color:#888;font-size:14px;}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:14px;}

// XSS 방지: 사용자가 입력한 값(닉네임 등)을 HTML에 넣기 전에 특수문자를 이스케이프
function esc(str){
  return String(str??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function setTab(tab){

// 게임마다 1위 3pt, 2위 2pt, 3위 1pt를 주고 전체 게임에 걸쳐 합산하는 종합 랭킹
async function computeTotalRanking(){
  const points={};   // username -> 누적 포인트
  const gameCount={}; // username -> 순위권에 든 게임 수
  const bestGames={}; // username -> [게임이름,...] (1위 한 게임들)

  function award(username,game,idx){
    points[username]=(points[username]||0)+RANK_POINTS[idx];
    gameCount[username]=(gameCount[username]||0)+1;
    if(idx===0){
      if(!bestGames[username])bestGames[username]=[];
      bestGames[username].push(game);
    }
  }

  // 점수 기반 게임들 (score.desc 정렬 = 성적 좋은 순)
  await Promise.all(SCORE_GAMES.map(async game=>{
    try{
      const res=await fetch(`${SUPABASE_URL}/rest/v1/scores?game=eq.${game}&select=username,score&order=score.desc&limit=3`,{headers:HEADERS});
      const data=await res.json();
      data.forEach((row,idx)=>award(row.username,game,idx));
    }catch(e){}
  }));

  // 스테이지 클리어 게임들 (클리어 수 많은 순)
  await Promise.all(STAGE_GAMES.map(async game=>{
    try{
      const res=await fetch(`${SUPABASE_URL}/rest/v1/clears?game=eq.${game}&select=username`,{headers:HEADERS});
      const data=await res.json();
      const map={};
      data.forEach(row=>{map[row.username]=(map[row.username]||0)+1;});
      const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]);
      sorted.slice(0,3).forEach(([name],idx)=>award(name,game,idx));
    }catch(e){}
  }));

  // 오목 (레이팅 높은 순)
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/omok_elo?select=username,rating&order=rating.desc&limit=3`,{headers:HEADERS});
    const data=await res.json();
    data.forEach((row,idx)=>award(row.username,'omok',idx));
  }catch(e){}

  // 원카드 (레이팅 높은 순)
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/onecard_elo?select=username,rating&order=rating.desc&limit=3`,{headers:HEADERS});
    const data=await res.json();
    data.forEach((row,idx)=>award(row.username,'onecard',idx));
  }catch(e){}

  // 섯다 (보유 포인트 높은 순)
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/sutda_points?select=username,points&order=points.desc&limit=3`,{headers:HEADERS});
    const data=await res.json();
    data.forEach((row,idx)=>award(row.username,'sutda',idx));
  }catch(e){}

  // 마인드캐치 (누적 포인트 높은 순)
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/catchmind_points?select=username,points&order=points.desc&limit=3`,{headers:HEADERS});
    const data=await res.json();
    data.forEach((row,idx)=>award(row.username,'catchmind',idx));
  }catch(e){}

  // 알까기 (누적 포인트 높은 순)
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/alkkagi_points?select=username,points&order=points.desc&limit=3`,{headers:HEADERS});
    const data=await res.json();
    data.forEach((row,idx)=>award(row.username,'alkkagi',idx));
  }catch(e){}

  // 당구 (누적 포인트 높은 순)
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/billiards_points?select=username,points&order=points.desc&limit=3`,{headers:HEADERS});
    const data=await res.json();
    data.forEach((row,idx)=>award(row.username,'billiards',idx));
  }catch(e){}

  // 볼링 (누적 포인트 높은 순)
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/bowling_points?select=username,points&order=points.desc&limit=3`,{headers:HEADERS});
    const data=await res.json();
    data.forEach((row,idx)=>award(row.username,'bowling',idx));
  }catch(e){}

  // 윷놀이 (누적 포인트 높은 순)
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/yutnori_points?select=username,points&order=points.desc&limit=3`,{headers:HEADERS});
    const data=await res.json();
    data.forEach((row,idx)=>award(row.username,'yutnori',idx));
  }catch(e){}

  const sorted=Object.entries(points).sort((a,b)=>b[1]-a[1]||gameCount[b[0]]-gameCount[a[0]]);
  return sorted.map(([username,pts])=>({username,points:pts,gameCount:gameCount[username],bestCount:(bestGames[username]||[]).length}));
}

        const winrate=total>0?Math.round(row.wins/total*100):0;
        div.innerHTML=`
          <div class="rank-num ${numClass}">${medal}</div>
          <div class="rank-info">
            <div class="rank-name">${esc(row.username)}${isMe?'<span class="me-badge">나</span>':''}${idx===0&&TITLES.onecard?'<span class="title-badge">🏅'+TITLES.onecard+'</span>':''}</div>
            <div class="rank-sub">${row.wins}승 ${row.losses}패 (${winrate}%)</div>
          </div>
          <div class="rank-score">${row.rating}<small>점</small></div>
        `;
        body.appendChild(div);
      });
    } else if(currentTab==='omok'){
      // 오목 레이팅 기준 랭킹
      const res=await fetch(`${SUPABASE_URL}/rest/v1/omok_elo?select=username,rating,wins,losses&order=rating.desc&limit=50`,{
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
      });
      const data=await res.json();
      if(!data.length){body.innerHTML='<div class="empty">아직 기록이 없어요!</div>';return;}
      body.innerHTML='';
      data.forEach((row,idx)=>{
        const isMe=currentUser&&currentUser.username===row.username;
        const div=document.createElement('div');div.className='rank-item';
        const medal=idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':idx+1;
        const numClass=idx===0?'gold':idx===1?'silver':idx===2?'bronze':'';
        const total=row.wins+row.losses;
        const winrate=total>0?Math.round(row.wins/total*100):0;
        div.innerHTML=`
          <div class="rank-num ${numClass}">${medal}</div>
          <div class="rank-info">
            <div class="rank-name">${esc(row.username)}${isMe?'<span class="me-badge">나</span>':''}${idx===0&&TITLES.omok?'<span class="title-badge">🏅'+TITLES.omok+'</span>':''}</div>
            <div class="rank-sub">${row.wins}승 ${row.losses}패 (${winrate}%)</div>
          </div>
          <div class="rank-score">${row.rating}<small>점</small></div>
        `;
        body.appendChild(div);
      });
    } else if(SCORE_GAMES.includes(currentTab)){
      // 점수 기준 랭킹
      const game=currentTab;
      const res=await fetch(`${SUPABASE_URL}/rest/v1/scores?game=eq.${game}&select=username,score&order=score.desc&limit=50`,{
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
      });
      const data=await res.json();
      if(!data.length){body.innerHTML='<div class="empty">아직 기록이 없어요!</div>';return;}
      body.innerHTML='';
      data.forEach((row,idx)=>{
        const isMe=currentUser&&currentUser.username===row.username;
        const div=document.createElement('div');div.className='rank-item';
        const medal=idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':idx+1;
        const numClass=idx===0?'gold':idx===1?'silver':idx===2?'bronze':'';
        const isDodge=game==='dodge';
        const isMemory=game==='memory';
        const isMine=game==='minesweeper';
        const isReactionForScore=game==='reaction';
        const isColormatch=game==='colormatch';
        const isNumrush=game==='numrush';
        const displayScore=isDodge?(row.score/10).toFixed(1)+'s':isMine?(100000-row.score)+'s':isReactionForScore?(100000-row.score)+'ms':isColormatch?(row.score/100).toFixed(2)+'%':isNumrush?((1000000-row.score)/1000).toFixed(2)+'s':row.score.toLocaleString();
        const isRps=game==='rps';
        const isReaction=game==='reaction';
        const scoreLabel=isDodge?'생존 시간':isMine?'클리어 시간 (고수)':isRps?'최고 연승':isReaction?'평균 반응속도':isMemory?'최고 점수':isColormatch?'평균 근접도':isNumrush?'최고 기록':'최고 점수';
        const scoreUnit=(isDodge||isMine||isReaction||isColormatch||isNumrush)?'':isRps?' 연승':' 점';
        div.innerHTML=`
          <div class="rank-num ${numClass}">${medal}</div>
          <div class="rank-info">
            <div class="rank-name">${esc(row.username)}${isMe?'<span class="me-badge">나</span>':''}${idx===0&&TITLES[currentTab]?'<span class="title-badge">🏅'+TITLES[currentTab]+'</span>':''}</div>
            <div class="rank-sub">${scoreLabel}</div>
          </div>
          <div class="rank-score">${displayScore}<small>${scoreUnit}</small></div>
        `;
        body.appendChild(div);
      });
    } else {
      // 나머지는 게임별 클리어 스테이지 수 기준
      const url=`${SUPABASE_URL}/rest/v1/clears?game=eq.${currentTab}&select=username`;
      const res=await fetch(url,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
      const data=await res.json();
      const map={};
      data.forEach(row=>{if(!map[row.username])map[row.username]=0;map[row.username]++;});
      const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]);
      if(!sorted.length){body.innerHTML='<div class="empty">아직 기록이 없어요!</div>';return;}
      const gameLabel={shikaku:'시카쿠',sudoku:'스도쿠',nonogram:'노노그램',flow:'플로우'};
      body.innerHTML='';
      sorted.slice(0,50).forEach(([name,count],idx)=>{
        const isMe=currentUser&&currentUser.username===name;
        const div=document.createElement('div');div.className='rank-item';
        const medal=idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':idx+1;
        const numClass=idx===0?'gold':idx===1?'silver':idx===2?'bronze':'';
        div.innerHTML=`
          <div class="rank-num ${numClass}">${medal}</div>
          <div class="rank-info">
            <div class="rank-name">${esc(name)}${isMe?'<span class="me-badge">나</span>':''}${idx===0&&TITLES[currentTab]?'<span class="title-badge">🏅'+TITLES[currentTab]+'</span>':''}</div>
            <div class="rank-sub">${gameLabel[currentTab]||''} 클리어</div>
          </div>
          <div class="rank-score">${count}<small>스테이지</small></div>
        `;
        body.appendChild(div);
      });
    }
  }catch(e){
    body.innerHTML='<div class="empty">랭킹을 불러올 수 없어요.</div>';
  }
}
loadRanking();
</script>
</body>
</html>
