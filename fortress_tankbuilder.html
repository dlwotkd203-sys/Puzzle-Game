<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>탱크 제작</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%; height:100dvh;
  overflow:hidden; overscroll-behavior:none;
  position:fixed; width:100%;
  background:#0b1220;
}
#app{max-width:430px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative;box-shadow:0 0 0 1px rgba(255,255,255,0.06);}

.hud{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(10,14,22,0.95);border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;}
.back-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.4);font-size:18px;padding:2px 6px;}
.top-title{font-family:-apple-system,sans-serif;font-weight:800;color:#fff;font-size:15px;flex:1;}
.step-dots{display:flex;gap:5px;}
.step-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.15);}
.step-dot.active{background:#60a5fa;}
.step-dot.done{background:#4ade80;}

.body-area{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;align-items:center;gap:12px;}

.section-label{width:100%;max-width:360px;font-family:-apple-system,sans-serif;font-size:11px;font-weight:800;color:rgba(255,255,255,0.4);letter-spacing:0.5px;margin-top:6px;}
.make-btn{width:100%;max-width:360px;padding:13px;border-radius:12px;background:#4ade80;color:#0b1220;text-align:center;font-family:-apple-system,sans-serif;font-weight:800;font-size:14px;cursor:pointer;}

.tank-list-card{width:100%;max-width:360px;display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,0.05);border-radius:12px;}
.tank-list-canvas{background:rgba(255,255,255,0.06);border-radius:8px;flex-shrink:0;}
.tank-list-name{font-family:-apple-system,sans-serif;font-weight:800;color:#fff;font-size:13px;}
.tank-list-desc{font-family:-apple-system,sans-serif;font-size:10.5px;color:rgba(255,255,255,0.45);margin:2px 0 5px;line-height:1.35;}
.tank-stat-row{display:flex;gap:6px;flex-wrap:wrap;}
.tank-stat{font-family:-apple-system,sans-serif;font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:5px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8);}
.edit-btn{flex-shrink:0;padding:8px 12px;border-radius:9px;background:rgba(96,165,250,0.2);color:#60a5fa;font-family:-apple-system,sans-serif;font-weight:700;font-size:12px;cursor:pointer;}
.empty-note{width:100%;max-width:360px;text-align:center;font-family:-apple-system,sans-serif;font-size:12px;color:rgba(255,255,255,0.3);padding:10px;}

.preview-box{background:rgba(255,255,255,0.05);border-radius:14px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:6px;}
.preview-label{font-family:-apple-system,sans-serif;font-size:10px;color:rgba(255,255,255,0.4);font-weight:700;letter-spacing:0.5px;}

.step-title{font-family:-apple-system,sans-serif;font-weight:800;color:#fff;font-size:15px;}
.step-hint{font-family:-apple-system,sans-serif;font-size:11px;color:rgba(255,255,255,0.4);text-align:center;}

.palette-row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;max-width:320px;}
.swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;}
.swatch.sel{border-color:#fff;}
.swatch.eraser{background:repeating-linear-gradient(45deg,#333,#333 4px,#555 4px,#555 8px);}

#partCanvas{border-radius:10px;border:1px solid rgba(255,255,255,0.15);touch-action:none;background:#1a2333;}

.nav-row{display:flex;gap:8px;width:100%;max-width:320px;}
.nbtn{flex:1;padding:12px;border-radius:12px;text-align:center;font-family:-apple-system,sans-serif;font-weight:700;font-size:14px;cursor:pointer;border:none;}
.nbtn.next{background:#60a5fa;color:#0b1220;}
.nbtn.back{background:rgba(255,255,255,0.08);color:#fff;}
.nbtn.clear{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);}

.stat-row{width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px;}
.stat-item{background:rgba(255,255,255,0.05);border-radius:12px;padding:10px 14px;}
.stat-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.stat-name{font-family:-apple-system,sans-serif;font-weight:700;color:#fff;font-size:13px;}
.stat-val{font-family:-apple-system,sans-serif;font-weight:800;color:#60a5fa;font-size:13px;}
.stat-ctrl{display:flex;align-items:center;gap:10px;}
.stat-btn{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.1);border:none;color:#fff;font-weight:800;font-size:15px;cursor:pointer;}
.stat-bar-wrap{flex:1;height:8px;border-radius:5px;background:rgba(255,255,255,0.1);overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:5px;background:#60a5fa;}

.budget-box{width:100%;max-width:340px;text-align:center;font-family:-apple-system,sans-serif;font-size:12px;color:rgba(255,255,255,0.6);padding:8px;background:rgba(255,255,255,0.04);border-radius:10px;}
.budget-box b{color:#4ade80;}
.budget-box.over b{color:#ef4444;}

.name-input{width:100%;max-width:340px;padding:12px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#fff;font-size:14px;font-family:inherit;}
.name-input::placeholder{color:rgba(255,255,255,0.3);}
</style>
</head>
<body>
<div id="app">
  <div class="hud">
    <button class="back-btn" onclick="goBack()">←</button>

    <div class="step-dots" id="stepDots"></div>
  </div>
  <div class="body-area" id="bodyArea"></div>
</div>
<script>
const SUPABASE_URL='https://pampoyeyhwwdpzcaubdm.supabase.co';
const SUPABASE_KEY='sb_publishable_xWRbj6jRwR_sojPBYCLfEg_DylayGH5';
function headers(){ return {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function jheaders(){ return {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
let currentUser=null;
try{currentUser=JSON.parse(localStorage.getItem('puzzle_user')||'null');}catch(e){}
const backRoomId=new URLSearchParams(location.search).get('room');

// ---- 기본 탱크 데이터 (fortress_room.html과 동일한 스탯) ----
const TANK_CLASSES=[
  {id:'standard', name:'표준형',  emoji:'⚙️', color:'#8a93a3', hpMul:1.0, dmgMul:1.0,  radiusMul:1.0, rangeMul:1.0,  turretLen:22, bodyW:30, wheelR:7, desc:'모든 능력치가 무난한 기본형'},
  {id:'assault',  name:'강습형',  emoji:'🔥', color:'#e53935', hpMul:1.0, dmgMul:1.3,  radiusMul:0.9, rangeMul:0.85, turretLen:17, bodyW:32, wheelR:7, desc:'데미지는 세지만 사거리가 짧아요'},
  {id:'howitzer', name:'곡사형',  emoji:'🌙', color:'#0f9e75', hpMul:1.0, dmgMul:0.85, radiusMul:1.0, rangeMul:1.35, turretLen:30, bodyW:26, wheelR:7, desc:'사거리가 아주 길지만 데미지가 약해요'},
  {id:'blast',    name:'광역형',  emoji:'💥', color:'#f5a623', hpMul:1.0, dmgMul:0.78, radiusMul:1.5, rangeMul:0.92, turretLen:19, bodyW:33, wheelR:7, desc:'폭발 범위가 아주 넓지만 데미지가 약해요'},
  {id:'sniper',   name:'저격형',  emoji:'🎯', color:'#7c5cff', hpMul:0.85,dmgMul:1.5,  radiusMul:0.6, rangeMul:1.5,  turretLen:34, bodyW:24, wheelR:6, desc:'사거리·데미지가 뛰어나지만 범위가 좁고 맷집이 약해요'},
  {id:'heavy',    name:'중장갑형',emoji:'🛡️', color:'#b8860b', hpMul:1.35,dmgMul:0.95, radiusMul:1.05,rangeMul:0.8,  turretLen:20, bodyW:37, wheelR:9, desc:'체력이 아주 높지만 사거리가 짧아요'},
];
function shade(hex,amt){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+(r<<16|g<<8|b).toString(16).padStart(6,'0');
}
function roundRectPath(pctx,x,y,w,h,r){
  pctx.beginPath();
  pctx.moveTo(x+r,y);
  pctx.arcTo(x+w,y,x+w,y+h,r);
  pctx.arcTo(x+w,y+h,x,y+h,r);
  pctx.arcTo(x,y+h,x,y,r);
  pctx.arcTo(x,y,x+w,y,r);
  pctx.closePath();
}
function drawPresetPreview(canvasEl,cls){
  const pctx=canvasEl.getContext('2d');
  pctx.clearRect(0,0,canvasEl.width,canvasEl.height);
  const cx=canvasEl.width/2, gy=canvasEl.height-12;
  const wheelR=cls.wheelR, bodyW=cls.bodyW, turretLen=cls.turretLen, color=cls.color;
  const wheelPositions = bodyW>=35 ? [-13,0,13] : [-9,9];
  const wy=gy-wheelR;
  wheelPositions.forEach(ox=>{
    const wx=cx+ox;
    pctx.fillStyle='#1c1c1c';
    pctx.beginPath();pctx.arc(wx,wy,wheelR,0,Math.PI*2);pctx.fill();
    pctx.strokeStyle='#444';pctx.lineWidth=1.5;pctx.stroke();
  });
  pctx.fillStyle='#141414';
  roundRectPath(pctx,cx-bodyW/2,wy-3,bodyW,7,3);pctx.fill();
  const by=gy-wheelR*2-9;
  pctx.fillStyle=shade(color,-25);
  roundRectPath(pctx,cx-bodyW/2,by-1,bodyW,13,4);pctx.fill();
  pctx.fillStyle=color;
  roundRectPath(pctx,cx-bodyW/2+1,by-9,bodyW-2,11,4);pctx.fill();
  const ty=gy-wheelR*2-13;
  pctx.fillStyle=shade(color,-15);
  pctx.beginPath();pctx.arc(cx,ty,7.5,0,Math.PI*2);pctx.fill();
  pctx.save();
  pctx.translate(cx,ty);
  pctx.rotate(-50*Math.PI/180);
  pctx.fillStyle='#2b2b2b';
  const turretWid=cls.id==='blast'?8.5:5.2;
  roundRectPath(pctx,-2.6,-turretWid/2,turretLen,turretWid,2);pctx.fill();
  pctx.restore();
}

// ---- 커스텀(픽셀) 미리보기 ----
function gridToCanvas(grid,cellPx){
  if(!grid||!grid.length||!grid[0]||!grid[0].length){ const c=document.createElement('canvas'); c.width=4;c.height=4; return c; }
  const h=grid.length, w=grid[0].length;
  const c=document.createElement('canvas');
  c.width=Math.max(1,Math.round(w*cellPx)); c.height=Math.max(1,Math.round(h*cellPx));
  const cctx=c.getContext('2d');
  for(let r=0;r<h;r++)for(let cI=0;cI<w;cI++){
    const col=grid[r][cI];
    if(col){ cctx.fillStyle=col; cctx.fillRect(cI*cellPx,r*cellPx,cellPx+0.6,cellPx+0.6); }
  }
  return c;
}
function drawCustomPreview(canvasEl,body_px,turret_px,wheel_px,angle){
  const pctx=canvasEl.getContext('2d');
  pctx.clearRect(0,0,canvasEl.width,canvasEl.height);
  const scale=2.6;
  const wheelImg=gridToCanvas(wheel_px,scale);
  const bodyImg=gridToCanvas(body_px,scale);
  const turretImg=gridToCanvas(turret_px,scale);
  const cx=canvasEl.width/2;
  const groundY=canvasEl.height-10;
  pctx.drawImage(wheelImg, cx-wheelImg.width/2, groundY-wheelImg.height, wheelImg.width, wheelImg.height);
  const bodyY=groundY-wheelImg.height-bodyImg.height;
  pctx.drawImage(bodyImg, cx-bodyImg.width/2, bodyY, bodyImg.width, bodyImg.height);
  const pivotY=bodyY+bodyImg.height*0.4;
  pctx.save();
  pctx.translate(cx,pivotY);
  pctx.rotate((angle!=null?angle:-25)*Math.PI/180);
  pctx.drawImage(turretImg,-4,-turretImg.height/2,turretImg.width,turretImg.height);
  pctx.restore();
}

// ---- 상태 ----
let currentView='list'; // list | editor
let stepIdx=0;
const STEPS=['body','turret','wheel','stats'];
const PARTS=[
  {id:'body',  label:'몸통',   w:14, h:7},
  {id:'turret',label:'포신',   w:12, h:5},
  {id:'wheel', label:'바퀴(하부)', w:16, h:5},
];
const PALETTE=['#8a93a3','#e53935','#378ADD','#0f9e75','#f5a623','#7c5cff','#d4537e','#2b2b2b','#fff7d6'];
const CELL=16;
const BUDGET=400, MIN_STAT=50, MAX_STAT=170;

let grids={ body:null, turret:null, wheel:null };
let curColor=PALETTE[0];
let dragging=false;
let tankName='';
let stats={hp:100,dmg:100,radius:100,range:100};
let editingId=null;

function emptyGrid(w,h){ return Array.from({length:h},()=>new Array(w).fill(null)); }
function resetGrids(){ PARTS.forEach(p=>{ grids[p.id]=emptyGrid(p.w,p.h); }); }
resetGrids();

function goBack(){
  if(currentView==='editor'){
    if(stepIdx>0){ stepIdx--; renderStep(); return; }
    currentView='list'; renderListView(); return;
  }
  location.href = backRoomId? ('fortress_room.html?id='+backRoomId) : 'fortress_rooms.html';
}

// ---------------- 목록 화면 ----------------
async function renderListView(){
  document.getElementById('topTitle').textContent='탱크';
  document.getElementById('stepDots').innerHTML='';
  const area=document.getElementById('bodyArea');
  area.innerHTML='<div class="empty-note">불러오는 중...</div>';

  let myCustoms=[];
  if(currentUser){
    try{
      const r=await fetch(`${SUPABASE_URL}/rest/v1/fortress_custom_tanks?user_id=eq.${currentUser.id}&select=*&order=created_at.desc`,{headers:headers()});
      myCustoms=await r.json();
    }catch(e){}
  }

  area.innerHTML='';

  const makeBtn=document.createElement('div');
  makeBtn.className='make-btn';
  makeBtn.textContent='+ 새 탱크 만들기';
  makeBtn.addEventListener('click',()=>{
    if(!currentUser){ alert('로그인 후 이용해주세요.'); return; }
    editingId=null; tankName=''; stats={hp:100,dmg:100,radius:100,range:100}; resetGrids();
    currentView='editor'; stepIdx=0; renderStep();
  });
  area.appendChild(makeBtn);

  const label1=document.createElement('div');
  label1.className='section-label';
  label1.textContent='내가 만든 탱크';
  area.appendChild(label1);

  if(!myCustoms.length){
    const empty=document.createElement('div');
    empty.className='empty-note';
    empty.textContent='아직 만든 탱크가 없어요.';
    area.appendChild(empty);
  } else {
    myCustoms.forEach(custom=>{
      const card=document.createElement('div');
      card.className='tank-list-card';
      card.innerHTML=`
        <canvas class="tank-list-canvas" width="58" height="54"></canvas>
        <div style="flex:1;">
          <div class="tank-list-name">🛠️ ${custom.name}</div>
          <div class="tank-stat-row">
            <span class="tank-stat">❤️ ${Math.round(custom.hp_mul*100)}%</span>
            <span class="tank-stat">💢 ${Math.round(custom.dmg_mul*100)}%</span>
            <span class="tank-stat">💥 ${Math.round(custom.radius_mul*100)}%</span>
            <span class="tank-stat">🎯 ${Math.round(custom.range_mul*100)}%</span>
          </div>
        </div>
        <div class="edit-btn">수정</div>`;
      card.querySelector('.edit-btn').addEventListener('click',()=>loadCustomForEdit(custom));
      area.appendChild(card);
      drawCustomPreview(card.querySelector('.tank-list-canvas'),custom.body_px,custom.turret_px,custom.wheel_px);
    });
  }

  const label2=document.createElement('div');
  label2.className='section-label';
  label2.textContent='기본 탱크';
  area.appendChild(label2);

  TANK_CLASSES.forEach(cls=>{
    const card=document.createElement('div');
    card.className='tank-list-card';
    card.innerHTML=`
      <canvas class="tank-list-canvas" width="58" height="54"></canvas>
      <div style="flex:1;">
        <div class="tank-list-name">${cls.emoji} ${cls.name}</div>
        <div class="tank-list-desc">${cls.desc}</div>
        <div class="tank-stat-row">
          <span class="tank-stat">❤️ ${Math.round(cls.hpMul*100)}%</span>
          <span class="tank-stat">💢 ${Math.round(cls.dmgMul*100)}%</span>
          <span class="tank-stat">💥 ${Math.round(cls.radiusMul*100)}%</span>
          <span class="tank-stat">🎯 ${Math.round(cls.rangeMul*100)}%</span>
        </div>
      </div>`;
    area.appendChild(card);
    drawPresetPreview(card.querySelector('.tank-list-canvas'),cls);
  });
}

function loadCustomForEdit(custom){
  editingId=custom.id;
  tankName=custom.name;
  stats={hp:Math.round(custom.hp_mul*100),dmg:Math.round(custom.dmg_mul*100),radius:Math.round(custom.radius_mul*100),range:Math.round(custom.range_mul*100)};
  grids={
    body: custom.body_px && custom.body_px.length? custom.body_px : emptyGrid(PARTS[0].w,PARTS[0].h),
    turret: custom.turret_px && custom.turret_px.length? custom.turret_px : emptyGrid(PARTS[1].w,PARTS[1].h),
    wheel: custom.wheel_px && custom.wheel_px.length? custom.wheel_px : emptyGrid(PARTS[2].w,PARTS[2].h),
  };
  currentView='editor'; stepIdx=0; renderStep();
}

// ---------------- 제작 단계 ----------------
function renderStepDots(){
  const wrap=document.getElementById('stepDots');
  wrap.innerHTML='';
  STEPS.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='step-dot'+(i===stepIdx?' active':i<stepIdx?' done':'');
    wrap.appendChild(d);
  });
}

function drawCombinedPreview(canvasEl,animateAngle){
  drawCustomPreview(canvasEl,grids.body,grids.turret,grids.wheel,animateAngle);
}

function renderStep(){
  document.getElementById('topTitle').textContent=editingId?'탱크 수정':'탱크 제작';
  renderStepDots();
  const area=document.getElementById('bodyArea');
  area.innerHTML='';
  const stepId=STEPS[stepIdx];

  const previewBox=document.createElement('div');
  previewBox.className='preview-box';
  previewBox.innerHTML='<div class="preview-label">전체 모습 미리보기</div>';
  const previewCanvas=document.createElement('canvas');
  previewCanvas.width=140; previewCanvas.height=110;
  previewBox.appendChild(previewCanvas);
  area.appendChild(previewBox);

  if(stepId==='stats'){
    renderStatsStep(area,previewCanvas);
    return;
  }

  const part=PARTS.find(p=>p.id===stepId);
  const title=document.createElement('div');
  title.className='step-title';
  title.textContent=(stepIdx+1)+'/3 · '+part.label+' 그리기';
  area.appendChild(title);
  const hint=document.createElement('div');
  hint.className='step-hint';
  hint.textContent='아래 색을 고르고 칸을 눌러서(드래그도 가능) 칠하세요';
  area.appendChild(hint);

  const paletteRow=document.createElement('div');
  paletteRow.className='palette-row';
  PALETTE.forEach(c=>{
    const sw=document.createElement('div');
    sw.className='swatch'+(c===curColor?' sel':'');
    sw.style.background=c;
    sw.addEventListener('click',()=>{ curColor=c; document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('sel')); sw.classList.add('sel'); });
    paletteRow.appendChild(sw);
  });
  const eraser=document.createElement('div');
  eraser.className='swatch eraser';
  eraser.addEventListener('click',()=>{ curColor=null; document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('sel')); eraser.classList.add('sel'); });
  paletteRow.appendChild(eraser);
  area.appendChild(paletteRow);

  const canvas=document.createElement('canvas');
  canvas.id='partCanvas';
  canvas.width=part.w*CELL; canvas.height=part.h*CELL;
  area.appendChild(canvas);
  const pctx=canvas.getContext('2d');
  function redraw(){
    pctx.clearRect(0,0,canvas.width,canvas.height);
    for(let r=0;r<part.h;r++)for(let c=0;c<part.w;c++){
      const col=grids[part.id][r][c];
      pctx.fillStyle=col||'#1a2333';
      pctx.fillRect(c*CELL,r*CELL,CELL,CELL);
      pctx.strokeStyle='rgba(255,255,255,0.08)';
      pctx.strokeRect(c*CELL+0.5,r*CELL+0.5,CELL-1,CELL-1);
    }
    drawCombinedPreview(previewCanvas);
  }
  function paintAt(e){
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left, y=e.clientY-rect.top;
    const c=Math.floor(x/CELL), r=Math.floor(y/CELL);
    if(r<0||r>=part.h||c<0||c>=part.w) return;
    grids[part.id][r][c]=curColor;
    redraw();
  }
  canvas.addEventListener('pointerdown',e=>{ dragging=true; paintAt(e); });
  canvas.addEventListener('pointermove',e=>{ if(dragging) paintAt(e); });
  window.addEventListener('pointerup',()=>{ dragging=false; });
  redraw();

  const navRow=document.createElement('div');
  navRow.className='nav-row';
  const backBtn=document.createElement('button');
  backBtn.className='nbtn back';
  backBtn.textContent='이전';
  backBtn.addEventListener('click',goBack);
  const clearBtn=document.createElement('button');
  clearBtn.className='nbtn clear';
  clearBtn.textContent='전체 지우기';
  clearBtn.addEventListener('click',()=>{ grids[part.id]=emptyGrid(part.w,part.h); redraw(); });
  const nextBtn=document.createElement('button');
  nextBtn.className='nbtn next';
  nextBtn.textContent=stepIdx<2?'다음':'능력치 설정으로';
  nextBtn.addEventListener('click',()=>{ stepIdx++; renderStep(); });
  navRow.appendChild(backBtn);
  navRow.appendChild(clearBtn);
  navRow.appendChild(nextBtn);
  area.appendChild(navRow);
}

function renderStatsStep(area,previewCanvas){
  drawCombinedPreview(previewCanvas);
  const title=document.createElement('div');
  title.className='step-title';
  title.textContent='4/4 · 이름 & 능력치';
  area.appendChild(title);

  const nameInput=document.createElement('input');
  nameInput.className='name-input';
  nameInput.placeholder='탱크 이름 (예: 번개포)';
  nameInput.maxLength=10;
  nameInput.value=tankName;
  nameInput.addEventListener('input',()=>{ tankName=nameInput.value; });
  area.appendChild(nameInput);

  const budgetBox=document.createElement('div');
  budgetBox.className='budget-box';
  area.appendChild(budgetBox);

  const statRow=document.createElement('div');
  statRow.className='stat-row';
  area.appendChild(statRow);

  const STAT_DEFS=[
    {id:'hp',label:'❤️ 체력'},
    {id:'dmg',label:'💢 데미지'},
    {id:'radius',label:'💥 범위'},
    {id:'range',label:'🎯 사거리'},
  ];
  function totalUsed(){ return stats.hp+stats.dmg+stats.radius+stats.range; }
  function refreshBudget(){
    const used=totalUsed();
    budgetBox.className='budget-box'+(used>BUDGET?' over':'');
    budgetBox.innerHTML=`예산 <b>${used}</b> / ${BUDGET} 사용중${used>BUDGET?' (초과! 줄여주세요)':''}`;
  }
  function adjust(id,delta){
    const next=stats[id]+delta;
    if(next<MIN_STAT||next>MAX_STAT) return;
    if(delta>0 && totalUsed()+delta>BUDGET) return;
    stats[id]=next;
    renderStatsInner();
  }
  function renderStatsInner(){
    statRow.innerHTML='';
    STAT_DEFS.forEach(sd=>{
      const item=document.createElement('div');
      item.className='stat-item';
      const pct=Math.round((stats[sd.id]-MIN_STAT)/(MAX_STAT-MIN_STAT)*100);
      item.innerHTML=`
        <div class="stat-head"><span class="stat-name">${sd.label}</span><span class="stat-val">${stats[sd.id]}%</span></div>
        <div class="stat-ctrl">
          <button class="stat-btn" data-act="-">−</button>
          <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${pct}%;"></div></div>
          <button class="stat-btn" data-act="+">＋</button>
        </div>`;
      item.querySelector('[data-act="-"]').addEventListener('click',()=>adjust(sd.id,-5));
      item.querySelector('[data-act="+"]').addEventListener('click',()=>adjust(sd.id,5));
      statRow.appendChild(item);
    });
    refreshBudget();
  }
  renderStatsInner();

  const navRow=document.createElement('div');
  navRow.className='nav-row';
  const backBtn=document.createElement('button');
  backBtn.className='nbtn back';
  backBtn.textContent='이전';
  backBtn.addEventListener('click',goBack);
  const saveBtn=document.createElement('button');
  saveBtn.className='nbtn next';
  saveBtn.textContent=editingId?'수정 저장':'저장하기';
  saveBtn.addEventListener('click',saveTank);
  navRow.appendChild(backBtn);
  navRow.appendChild(saveBtn);
  area.appendChild(navRow);
}

async function saveTank(){
  if(!currentUser){ alert('로그인 후 이용해주세요.'); return; }
  if(!tankName.trim()){ alert('탱크 이름을 입력해주세요.'); return; }
  const hasAnyPixel = ['body','turret','wheel'].some(k=>grids[k].some(row=>row.some(c=>c)));
  if(!hasAnyPixel){ if(!confirm('아무것도 안 그렸어요. 그래도 저장할까요?')) return; }
  const bodyColor = grids.body.flat().find(c=>c) || '#8a93a3';
  const payload={
    user_id:currentUser.id, username:currentUser.username, name:tankName.trim(),
    body_px:grids.body, turret_px:grids.turret, wheel_px:grids.wheel,
    body_color:bodyColor,
    hp_mul:stats.hp/100, dmg_mul:stats.dmg/100, radius_mul:stats.radius/100, range_mul:stats.range/100
  };
  try{
    let res;
    if(editingId){
      res=await fetch(`${SUPABASE_URL}/rest/v1/fortress_custom_tanks?id=eq.${editingId}`,{
        method:'PATCH', headers:{...jheaders(),'Prefer':'return=representation'}, body:JSON.stringify(payload)
      });
    } else {
      res=await fetch(`${SUPABASE_URL}/rest/v1/fortress_custom_tanks`,{
        method:'POST', headers:{...jheaders(),'Prefer':'return=representation'}, body:JSON.stringify(payload)
      });
    }
    const data=await res.json();
    if(data&&data[0]){ renderSavedScreen(); }
    else { alert('저장에 실패했어요.'); }
  }catch(e){ alert('저장에 실패했어요.'); }
}
function renderSavedScreen(){
  document.getElementById('stepDots').innerHTML='';
  const area=document.getElementById('bodyArea');
  area.innerHTML='';
  const previewBox=document.createElement('div');
  previewBox.className='preview-box';
  previewBox.innerHTML='<div class="preview-label">완성!</div>';
  const previewCanvas=document.createElement('canvas');
  previewCanvas.width=160; previewCanvas.height=126;
  previewBox.appendChild(previewCanvas);
  area.appendChild(previewBox);
  drawCombinedPreview(previewCanvas);

  const title=document.createElement('div');
  title.className='step-title';
  title.textContent='"'+tankName.trim()+'" 저장 완료!';
  area.appendChild(title);
  const hint=document.createElement('div');
  hint.className='step-hint';
  hint.textContent='방 로비 탱크 선택에서 바로 고를 수 있어요.';
  area.appendChild(hint);

  const navRow=document.createElement('div');
  navRow.className='nav-row';
  const listBtn=document.createElement('button');
  listBtn.className='nbtn back';
  listBtn.textContent='탱크 목록으로';
  listBtn.addEventListener('click',()=>{ currentView='list'; renderListView(); });
  const backBtn=document.createElement('button');
  backBtn.className='nbtn back';
  backBtn.textContent='방으로';
  backBtn.addEventListener('click',()=>{
    location.href = backRoomId? ('fortress_room.html?id='+backRoomId) : 'fortress_rooms.html';
  });
  const moreBtn=document.createElement('button');
  moreBtn.className='nbtn next';
  moreBtn.textContent='하나 더 만들기';
  moreBtn.addEventListener('click',()=>{
    editingId=null; tankName=''; stats={hp:100,dmg:100,radius:100,range:100}; resetGrids();
    stepIdx=0; renderStep();
  });
  navRow.appendChild(listBtn);
  navRow.appendChild(backBtn);
  navRow.appendChild(moreBtn);
  area.appendChild(navRow);
}

renderListView();
</script>
