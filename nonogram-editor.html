<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>노노그램 제작</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;}
#app{max-width:430px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column;}
.top-bar{display:flex;align-items:center;gap:10px;padding:0.85rem 1rem;border-bottom:1px solid #eee;flex-shrink:0;}
.back-btn{background:none;border:none;cursor:pointer;color:#888;font-size:20px;padding:2px 8px;border-radius:8px;}
.top-title{font-size:16px;font-weight:600;color:#111;flex:1;}

/* 사이즈 선택 화면 */
.size-pick{padding:1.5rem 1.25rem;}
.size-pick h2{font-size:16px;font-weight:700;margin-bottom:14px;color:#111;}
.size-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.size-opt{border:1.5px solid #eee;border-radius:14px;padding:20px 10px;text-align:center;background:#fafafa;cursor:pointer;font-weight:800;font-size:16px;color:#333;}
.size-opt:active{transform:scale(0.96);}

/* 에디터 화면 */
.editor{display:none;flex:1;flex-direction:column;padding:0.75rem;gap:0.65rem;align-items:center;}
.editor.show{display:flex;}
.color-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;}
.swatch{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;}
.swatch.active{border-color:#333;}
.canvas-wrap{display:flex;justify-content:center;width:100%;overflow:auto;}
.grid{border:2px solid #333;display:flex;flex-direction:column;flex-shrink:0;}
.grow{display:flex;}
.cell{background:#fff;cursor:pointer;position:relative;}
.cell.hl{box-shadow:inset 0 0 0 999px rgba(55,138,221,0.14);}
.hint-cell{color:#333;font-weight:700;}
.hint-cell.hl{background:rgba(55,138,221,0.14);border-radius:4px;}
.tool-row{display:flex;gap:8px;width:100%;justify-content:center;}
.gbtn{font-family:inherit;font-size:13px;cursor:pointer;border-radius:8px;border:1px solid #ddd;padding:8px 16px;background:#fff;color:#111;font-weight:600;}
.gbtn.primary{background:#333;color:#fff;border-color:transparent;}
.name-row{width:100%;padding:0 0.25rem;}
.name-row input{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid #ddd;font-size:14px;font-family:inherit;}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <button class="back-btn" onclick="goBack()">←</button>
    <span class="top-title">문제 만들기</span>
  </div>

  <div class="size-pick" id="sizePick">
    <h2>몇 × 몇 크기로 만들까요?</h2>
    <div class="size-grid">
      <div class="size-opt" onclick="startEditor(5)">5×5</div>
      <div class="size-opt" onclick="startEditor(10)">10×10</div>
      <div class="size-opt" onclick="startEditor(15)">15×15</div>
      <div class="size-opt" onclick="startEditor(20)">20×20</div>
      <div class="size-opt" onclick="startEditor(25)">25×25</div>
      <div class="size-opt" onclick="startEditor(30)">30×30</div>
    </div>
  </div>

  <div class="editor" id="editor">
    <div class="color-row" id="colorRow"></div>
    <div class="canvas-wrap" id="canvasWrap"></div>
    <div class="tool-row">
      <button class="gbtn" onclick="clearGrid()">전체 지우기</button>
    </div>
    <div class="name-row">
      <input type="text" id="puzzleName" placeholder="문제 이름 (예: 우리집 강아지)" maxlength="12">
    </div>
    <div class="name-row">
      <input type="text" id="creatorName" placeholder="내 이름 (선택)" maxlength="12">
    </div>
    <div class="tool-row">
      <button class="gbtn primary" style="flex:1;" onclick="saveCustom()" id="saveBtn">저장하고 목록에 올리기</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://pampoyeyhwwdpzcaubdm.supabase.co';
const SUPABASE_KEY='sb_publishable_xWRbj6jRwR_sojPBYCLfEg_DylayGH5';
const COLORS=['#333333','#E24B4A','#F5A623','#1D9E75','#378ADD','#534AB7','#D4537E','#BA7517'];

let N=0, board=[], curColor=COLORS[0], dragging=false, dragVal=0, cellSize=0, gridEl=null;

function goBack(){
  const editor=document.getElementById('editor');
  if(editor.classList.contains('show')){
    if(!confirm('그리던 내용이 사라져요. 뒤로 갈까요?'))return;
    editor.classList.remove('show');
    document.getElementById('sizePick').style.display='block';
  }else{
    location.href='nonogram-custom.html';
  }
}

function startEditor(size){
  N=size;
  board=Array.from({length:N},()=>new Array(N).fill(0));
  document.getElementById('sizePick').style.display='none';
  document.getElementById('editor').classList.add('show');
  buildColorRow();
  buildGrid();
}

function buildColorRow(){
  const row=document.getElementById('colorRow');
  row.innerHTML='';
  COLORS.forEach(c=>{
    const sw=document.createElement('div');
    sw.className='swatch'+(c===curColor?' active':'');
    sw.style.background=c;
    sw.addEventListener('click',()=>{curColor=c;buildColorRow();});
    row.appendChild(sw);
  });
}

function calcHints(line){
  const h=[];let cnt=0;
  for(const v of line){if(v)cnt++;else if(cnt){h.push(cnt);cnt=0;}}
  if(cnt)h.push(cnt);
  return h.length?h:[0];
}

let rowHintWraps=[], colHintWraps=[];
let rowHintSpans=[], colHintSpans=[];
let curHintCap=3;

function maxHintsNeeded(){
  let m=1;
  for(let r=0;r<N;r++){const h=calcHints(board[r]);if(h.length>m)m=h.length;}
  for(let c=0;c<N;c++){const col=board.map(row=>row[c]);const h=calcHints(col);if(h.length>m)m=h.length;}
  return m;
}

function buildGrid(){
  hlR=-1;hlC=-1;
  const wrap=document.getElementById('canvasWrap');
  wrap.innerHTML='';
  const maxW=Math.min(window.innerWidth-24,400);
  const fs=N<=5?11:N<=10?10:N<=20?8:7;
  const hintCellW=N<=5?22:N<=10?19:N<=20?14:12;
  curHintCap=Math.max(maxHintsNeeded()+1, 3);
  const hintW=curHintCap*hintCellW;
  const hintH=N<=5?54:N<=10?46:34;

  cellSize=Math.max(Math.floor((maxW-hintW)/N), N<=5?30:N<=10?22:N<=15?16:N<=20?12:N<=25?10:8);
  cellSize=Math.min(cellSize, N<=5?44:N<=10?30:20);

  rowHintWraps=[];colHintWraps=[];rowHintSpans=[];colHintSpans=[];

  const nano=document.createElement('div');
  nano.style.display='inline-flex';
  nano.style.flexDirection='column';

  // 상단 열 힌트
  const top=document.createElement('div');
  top.style.display='flex';
  const corner=document.createElement('div');
  corner.style.cssText=`width:${hintW}px;height:${hintH}px;flex-shrink:0;`;
  top.appendChild(corner);
  const colHWrap=document.createElement('div');
  colHWrap.style.display='flex';
  for(let c=0;c<N;c++){
    const ch=document.createElement('div');
    ch.className='hint-cell';
    ch.style.cssText=`width:${cellSize}px;height:${hintH}px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;font-size:${fs}px;padding-bottom:2px;gap:1px;overflow:hidden;`;
    const spans=[];
    for(let i=0;i<curHintCap;i++){const sp=document.createElement('span');sp.style.lineHeight='1.1';sp.style.display='none';ch.appendChild(sp);spans.push(sp);}
    colHWrap.appendChild(ch);
    colHintWraps.push(ch);
    colHintSpans.push(spans);
  }
  top.appendChild(colHWrap);
  nano.appendChild(top);

  // 본체 (행 힌트 + 그리드)
  const body=document.createElement('div');
  body.style.display='flex';
  const rowHWrap=document.createElement('div');
  rowHWrap.style.cssText=`width:${hintW}px;flex-shrink:0;display:flex;flex-direction:column;`;
  for(let r=0;r<N;r++){
    const rh=document.createElement('div');
    rh.className='hint-cell';
    rh.style.cssText=`height:${cellSize}px;display:flex;align-items:center;justify-content:flex-end;padding-right:4px;gap:${Math.max(4,Math.round(cellSize*0.18))}px;font-size:${fs}px;overflow:hidden;`;
    const spans=[];
    for(let i=0;i<curHintCap;i++){const sp=document.createElement('span');sp.style.display='none';rh.appendChild(sp);spans.push(sp);}
    rowHWrap.appendChild(rh);
    rowHintWraps.push(rh);
    rowHintSpans.push(spans);
  }
  body.appendChild(rowHWrap);

  const grid=document.createElement('div');
  grid.className='grid';
  for(let r=0;r<N;r++){
    const row=document.createElement('div');
    row.className='grow';
    for(let c=0;c<N;c++){
      const cell=document.createElement('div');
      cell.className='cell';
      const borderR=(c+1)%5===0&&c!==N-1?'1.5px solid #999':'0.5px solid #ddd';
      const borderB=(r+1)%5===0&&r!==N-1?'1.5px solid #999':'0.5px solid #ddd';
      cell.style.cssText=`width:${cellSize}px;height:${cellSize}px;border-right:${borderR};border-bottom:${borderB};`;
      cell.id=`e-${r}-${c}`;
      row.appendChild(cell);
    }
    grid.appendChild(row);
  }
  grid.style.touchAction='none';
  gridEl=grid;
  grid.addEventListener('pointerdown',e=>{
    e.preventDefault();
    const pos=cellFromEvent(e);
    if(pos){setHighlight(pos.r,pos.c);startDrag(pos.r,pos.c);}
  });
  grid.addEventListener('pointermove',e=>{
    const pos=cellFromEvent(e);
    if(pos)setHighlight(pos.r,pos.c);
    if(!dragging)return;
    e.preventDefault();
    if(pos)doDrag(pos.r,pos.c);
  });
  grid.addEventListener('pointerleave',()=>{ if(!dragging) clearHighlight(); });
  window.addEventListener('pointerup',()=>{dragging=false;clearHighlight();});
  body.appendChild(grid);
  nano.appendChild(body);
  wrap.appendChild(nano);
  updateHints();
}

function cellFromEvent(e){
  const rect=gridEl.getBoundingClientRect();
  const x=e.clientX-rect.left, y=e.clientY-rect.top;
  const c=Math.floor(x/cellSize), r=Math.floor(y/cellSize);
  if(r<0||r>=N||c<0||c>=N)return null;
  return {r,c};
}

let hlR=-1, hlC=-1;
function setHighlight(r,c){
  if(hlR===r && hlC===c)return;
  clearHighlight();
  hlR=r;hlC=c;
  for(let i=0;i<N;i++){
    const rc=document.getElementById(`e-${r}-${i}`); if(rc)rc.classList.add('hl');
    const cc=document.getElementById(`e-${i}-${c}`); if(cc)cc.classList.add('hl');
  }
  if(rowHintWraps[r])rowHintWraps[r].classList.add('hl');
  if(colHintWraps[c])colHintWraps[c].classList.add('hl');
}
function clearHighlight(){
  if(hlR>=0){
    for(let i=0;i<N;i++){
      const rc=document.getElementById(`e-${hlR}-${i}`); if(rc)rc.classList.remove('hl');
      const cc=document.getElementById(`e-${i}-${hlC}`); if(cc)cc.classList.remove('hl');
    }
    if(rowHintWraps[hlR])rowHintWraps[hlR].classList.remove('hl');
    if(colHintWraps[hlC])colHintWraps[hlC].classList.remove('hl');
  }
  hlR=-1;hlC=-1;
}

function updateHints(){
  for(let r=0;r<N;r++){
    const hints=calcHints(board[r]);
    const spans=rowHintSpans[r]||[];
    spans.forEach((sp,i)=>{
      if(i<hints.length){sp.textContent=hints[i];sp.style.display='';}
      else sp.style.display='none';
    });
  }
  for(let c=0;c<N;c++){
    const col=board.map(row=>row[c]);
    const hints=calcHints(col);
    const spans=colHintSpans[c]||[];
    spans.forEach((sp,i)=>{
      if(i<hints.length){sp.textContent=hints[i];sp.style.display='';}
      else sp.style.display='none';
    });
  }
}

function paintCell(r,c,v){
  board[r][c]=v;
  const el=document.getElementById(`e-${r}-${c}`);
  el.style.background=v?curColor:'#fff';
  if(maxHintsNeeded()+1>curHintCap){
    buildGrid(); // 힌트 슬롯이 부족해지면 레이아웃 다시 계산
  }else{
    updateHints();
  }
}

function startDrag(r,c){
  dragging=true;
  dragVal=board[r][c]?0:1;
  paintCell(r,c,dragVal);
}
function doDrag(r,c){
  if(!dragging)return;
  paintCell(r,c,dragVal);
}

function clearGrid(){
  if(!confirm('전체를 지울까요?'))return;
  board=Array.from({length:N},()=>new Array(N).fill(0));
  buildGrid();
}

async function saveCustom(){
  const name=document.getElementById('puzzleName').value.trim();
  if(!name){alert('문제 이름을 입력해주세요');return;}
  const filled=board.some(row=>row.some(v=>v===1));
  if(!filled){alert('칸을 하나 이상 칠해주세요');return;}
  const creator=document.getElementById('creatorName').value.trim();

  const btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='저장 중...';

  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/nonogram_custom`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=minimal'},
      body:JSON.stringify({size:N,name:name,color:curColor,solution:board,creator:creator||null})
    });
    if(!res.ok)throw new Error('save failed');
    location.href='nonogram-custom.html';
  }catch(e){
    alert('저장에 실패했어요, 다시 시도해주세요');
    btn.disabled=false;btn.textContent='저장하고 목록에 올리기';
  }
}
</script>
</body>
</html>
