<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>노노그램</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;}
#app{max-width:430px;margin:0 auto;background:#fff;min-height:100vh;}
.top-bar{display:flex;align-items:center;gap:10px;padding:1rem 1rem 0.75rem;border-bottom:1px solid #eee;}
.back-btn{background:none;border:none;cursor:pointer;color:#888;font-size:20px;padding:2px 8px;border-radius:8px;}
.top-title{font-size:17px;font-weight:600;color:#111;flex:1;}
.body{padding:1.5rem 1.25rem;display:flex;flex-direction:column;gap:16px;}
.mode-card{border-radius:16px;padding:1.5rem;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.1s;}
.mode-card:active{transform:scale(0.97);}
.mode-card.stage{background:linear-gradient(135deg,#534AB7,#378ADD);}
.mode-card.custom{background:linear-gradient(135deg,#F5A623,#E24B4A);}
.mode-emoji{font-size:34px;margin-bottom:8px;}
.mode-name{font-size:19px;font-weight:800;color:#fff;margin-bottom:4px;}
.mode-desc{font-size:13px;color:rgba(255,255,255,0.85);line-height:1.4;}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <button class="back-btn" onclick="location.href='index.html'">←</button>
    <span class="top-title">노노그램</span>
  </div>
  <div class="body">
    <div class="mode-card stage" onclick="location.href='nonogram_stages.html'">
      <div class="mode-emoji">🗺️</div>
      <div class="mode-name">스테이지</div>
      <div class="mode-desc">난이도별로 준비된 40개의 스테이지를 순서대로 플레이해요</div>
    </div>
    <div class="mode-card custom" onclick="location.href='nonogram-custom.html'">
      <div class="mode-emoji">🎨</div>
      <div class="mode-name">커스텀</div>
      <div class="mode-desc">다른 사람들이 만든 문제를 풀거나, 직접 그림을 그려서 문제를 만들어봐요</div>
    </div>
  </div>
</div>
</body>
</html>
