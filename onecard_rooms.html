<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>원카드 - 실시간대전</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;}
#app{max-width:430px;margin:0 auto;background:#fff;min-height:100vh;}
.top-bar{display:flex;align-items:center;gap:10px;padding:1rem 1rem 0.75rem;border-bottom:1px solid #eee;}
.back-btn{background:none;border:none;cursor:pointer;color:#888;font-size:20px;padding:2px 8px;line-height:1;border-radius:8px;}
.top-title{font-size:17px;font-weight:600;color:#111;flex:1;}
.header-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #f0f0f0;}
.my-record{font-family:-apple-system,sans-serif;font-size:12px;color:#555;}
.my-record b{color:#7c5cff;font-size:14px;}
.create-btn{font-family:-apple-system,sans-serif;font-weight:700;font-size:12px;padding:8px 14px;border-radius:16px;background:#ff5e3a;color:#fff;cursor:pointer;}
.room-list{padding:0.5rem 1rem;}
.room-item{border:1px solid #eee;border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.room-top{display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.room-host{font-weight:700;font-size:14px;color:#111;}
.room-sub{font-size:11px;color:#999;margin-top:2px;}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;}
.badge-wait{background:#f4f1ff;color:#7c5cff;}
.badge-play{background:#e6f9ee;color:#0f9e75;}
.room-action{margin-top:8px;display:flex;justify-content:flex-end;}
.action-btn{font-family:-apple-system,sans-serif;font-weight:700;font-size:12px;padding:7px 14px;border-radius:14px;background:#7c5cff;color:#fff;cursor:pointer;}
.action-btn.disabled{background:#e2e2e2;color:#999;}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:14px;}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <button class="back-btn" onclick="location.href='index.html'">←</button>
    <span class="top-title">원카드 - 실시간대전</span>
  </div>
  <div class="header-row">
    <div class="my-record" id="myRecord">전적 불러오는 중...</div>
    <div style="display:flex;gap:6px;">
      <div class="create-btn" id="rulesBtnRooms" style="background:#eef1f5;color:#555;">📖 규칙</div>
      <div class="create-btn" id="designBtn" style="background:#eef1f5;color:#555;">🎨 카드 디자인</div>
      <div class="create-btn" id="createBtn">방 만들기</div>
    </div>
  </div>
  <div class="room-list" id="roomList"><div class="empty">불러오는 중...</div></div>
</div>
<script>
const SUPABASE_URL='https://pampoyeyhwwdpzcaubdm.supabase.co';
const SUPABASE_KEY='sb_publishable_xWRbj6jRwR_sojPBYCLfEg_DylayGH5';
const PCOLORS=['#7c5cff','#e53935','#0f9e75','#f5a623','#378ADD','#d4537e'];
let currentUser=null;
try{currentUser=JSON.parse(localStorage.getItem('puzzle_user')||'null');}catch(e){}
let selectedId=null;
let rooms=[];

function headers(){ return {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function jheaders(){ return {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function esc(str){ return String(str??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }

async function loadMyRecord(){
  const el=document.getElementById('myRecord');
  if(!currentUser){ el.textContent='로그인하면 전적이 표시돼요'; return; }
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/onecard_elo?user_id=eq.${currentUser.id}&select=rating,wins,losses`,{headers:headers()});
    const data=await r.json();
    if(data.length){
      const d=data[0];
      const total=d.wins+d.losses;
      const winrate=total>0?Math.round(d.wins/total*100):0;
      el.innerHTML=`<b>${d.rating}</b>점 · ${d.wins}승 ${d.losses}패 (${winrate}%)`;
    } else {
      el.innerHTML=`<b>1000</b>점 · 0승 0패`;
    }
  }catch(e){ el.textContent='전적을 불러올 수 없어요'; }
}

async function loadRooms(){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/onecard_rooms?status=neq.finished&select=*&order=created_at.desc&limit=50`,{headers:headers()});
    rooms=await r.json();
    renderRooms();
  }catch(e){}
}

function renderRooms(){
  const el=document.getElementById('roomList');
  if(!rooms.length){ el.innerHTML='<div class="empty">열린 방이 없어요. 방을 만들어보세요!</div>'; return; }
  el.innerHTML='';
  rooms.forEach(room=>{
    const div=document.createElement('div');
    div.className='room-item';
    const badgeClass=room.status==='playing'?'badge-play':'badge-wait';
    const badgeText=room.status==='playing'?'게임중':'대기중';
    const players=room.players||[];

    let actionHtml='';
    if(selectedId===room.id){
      const isIn=currentUser&&players.some(p=>String(p.user_id)===String(currentUser.id));
      let label='',enabled=true;
      if(isIn){ label='이어하기'; }
      else if(room.status==='playing'){ label='관람하기'; }
      else if(players.length<6){ label='입장하기'; }
      else { label='정원마감'; enabled=false; }
      actionHtml=`<div class="room-action"><div class="action-btn ${enabled?'':'disabled'}" id="joinBtn">${label}</div></div>`;
    }

    div.innerHTML=`
      <div class="room-top">
        <div>
          <div class="room-host">${esc(room.host_username)} 님의 방</div>
          <div class="room-sub">${players.length}/6명 참가중</div>
        </div>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
      ${actionHtml}
    `;
    div.querySelector('.room-top').addEventListener('click',()=>{
      selectedId=selectedId===room.id?null:room.id;
      renderRooms();
    });
    if(selectedId===room.id){
      const btn=div.querySelector('#joinBtn');
      if(btn&&!btn.classList.contains('disabled')){
        btn.addEventListener('click',async(e)=>{
          e.stopPropagation();
          await joinOrEnter(room);
        });
      }
    }
    el.appendChild(div);
  });
}

async function joinOrEnter(room){
  if(!currentUser){ alert('로그인 후 이용해주세요.'); return; }
  const players=room.players||[];
  const isIn=players.some(p=>String(p.user_id)===String(currentUser.id));
  if(isIn||room.status==='playing'){
    location.href='onecard_room.html?id='+room.id;
    return;
  }
  if(players.length<6){
    const newPlayers=players.concat([{user_id:currentUser.id,username:currentUser.username,color:PCOLORS[players.length],ready:false,seat:players.length}]);
    try{
      const res=await fetch(`${SUPABASE_URL}/rest/v1/onecard_rooms?id=eq.${room.id}&move_count=eq.${room.move_count}`,{
        method:'PATCH',headers:{...jheaders(),'Prefer':'return=representation'},
        body:JSON.stringify({players:newPlayers,move_count:room.move_count+1})
      });
      const data=await res.json();
      if(!data||!data.length){ alert('다른 사람이 방금 입장했어요. 다시 시도해주세요.'); loadRooms(); return; }
      location.href='onecard_room.html?id='+room.id;
    }catch(e){ alert('입장에 실패했어요.'); }
  }
}

function showRules(){
  if(document.getElementById('rulesOverlay')) return;
  const box=document.createElement('div');
  box.id='rulesOverlay';
  box.style.cssText='position:fixed;inset:0;background:rgba(20,18,30,0.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px;';
  box.innerHTML=`<div style="background:#fff;border-radius:16px;padding:20px;max-height:85vh;overflow-y:auto;font-family:-apple-system,sans-serif;font-size:13px;line-height:1.8;color:#333;">
    <div style="font-weight:800;font-size:16px;color:#1a1a2e;margin-bottom:10px;">📖 원카드 규칙</div>
    <b>기본 진행</b><br/>
    카드 52장+조커 2장(흑백/컬러)으로 시작하며, 각자 7장씩 나눠 가져요. 자기 차례에 버림패의 맨 위 카드와 <b>같은 무늬 또는 같은 숫자</b>인 카드를 낼 수 있어요. 낼 카드가 없으면 "카드 가져오기"로 한 장 뽑고 턴이 넘어가요.<br/><br/>
    <b>특수카드</b><br/>
    · <b>J</b> : 다음 사람 턴을 건너뜀<br/>
    · <b>Q</b> : 순서가 반대로 바뀜<br/>
    · <b>K</b> : 턴이 안 넘어가고 한 장 더 낼 수 있음<br/>
    · <b>7</b> : 원하는 무늬를 자유롭게 선언 (선언 후 턴 넘어감)<br/><br/>
    <b>공격카드</b><br/>
    · <b>2</b> : 다음 사람이 2장 드로우<br/>
    · <b>A</b> : 3장 드로우 (♠A는 5장)<br/>
    · <b>흑백조커</b> : 5장 드로우<br/>
    · <b>컬러조커</b> : 7장 드로우 (방어 불가)<br/><br/>
    <b>공격 얹기(스택)</b><br/>
    공격을 받으면 <b>2 → A → 흑백조커 → 컬러조커</b> 순서로만(같은 종류는 자유롭게) 더 강한 공격을 얹어서 다음 사람에게 넘길 수 있어요. ♠A는 특별히 흑백조커 위에도 얹을 수 있어요. 아무도 못 얹으면 그 시점 사람이 누적된 만큼 전부 드로우해요.<br/><br/>
    <b>방어</b><br/>
    <b>3</b>만 방어카드예요. 2 또는 A(♠A 제외) 공격을 완전히 무효화시켜요. 조커 단계 공격은 방어할 수 없어요.<br/><br/>
    <b>ONE CARD</b><br/>
    손에 카드가 1장 남으면 화면에 버튼이 랜덤한 위치에 떠요. 본인이 먼저 누르면 안전, 0.5초 뒤부터는 다른 사람이 "캐치"할 수 있어요. 5초 안에 아무도 안 누르면 자동으로 벌칙 드로우예요.<br/><br/>
    <b>턴 제한시간</b><br/>
    자기 차례에 10초 안에 행동하지 않으면 자동으로 카드를 뽑고 턴이 넘어가요.<br/><br/>
    <b>승리와 순위</b><br/>
    손패를 가장 먼저 다 낸 사람이 1등, 나머지는 남은 카드 수가 적을수록 높은 순위예요. 게임 도중 나가면 몰수패 처리되며, <b>먼저 나간 사람일수록 더 낮은 순위</b>로 기록돼요.<br/><br/>
    <b>점수(레이팅)</b><br/>
    순위 차이에 비례해서 점수를 주고받아요 (상대적으로 낮은 순위를 이기면 더 많이 얻어요).
    <div id="rulesCloseBtn" style="margin-top:16px;text-align:center;font-weight:700;color:#fff;background:#7c5cff;padding:10px;border-radius:12px;cursor:pointer;">닫기</div>
  </div>`;
  document.body.appendChild(box);
  box.addEventListener('click',(e)=>{ if(e.target===box) box.remove(); });
  document.getElementById('rulesCloseBtn').addEventListener('click',()=>box.remove());
}
document.getElementById('rulesBtnRooms').addEventListener('click',showRules);

document.getElementById('designBtn').addEventListener('click',()=>{ location.href='onecard_cardback.html'; });

document.getElementById('createBtn').addEventListener('click',async()=>{
  if(!currentUser){ alert('로그인 후 이용해주세요.'); return; }
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/onecard_rooms`,{
      method:'POST',
      headers:{...jheaders(),'Prefer':'return=representation'},
      body:JSON.stringify({
        host_user_id:currentUser.id,
        host_username:currentUser.username,
        status:'waiting',
        players:[{user_id:currentUser.id,username:currentUser.username,color:PCOLORS[0],ready:false,seat:0}],
        move_count:0
      })
    });
    const data=await res.json();
    if(data&&data[0]){ location.href='onecard_room.html?id='+data[0].id; }
  }catch(e){ alert('방 생성에 실패했어요.'); }
});

loadMyRecord();
loadRooms();
setInterval(loadRooms,1000);
</script>
</body>
</html>
