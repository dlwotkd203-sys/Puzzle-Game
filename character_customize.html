<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>내 캐릭터 꾸미기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;}
#app{max-width:430px;margin:0 auto;background:#fff;min-height:100vh;}
.top-bar{display:flex;align-items:center;gap:10px;padding:1rem 1rem 0.75rem;border-bottom:1px solid #eee;}
.back-btn{background:none;border:none;cursor:pointer;color:#888;font-size:20px;padding:2px 8px;border-radius:8px;}
.top-title{font-size:16px;font-weight:700;color:#111;flex:1;}
.center-msg{text-align:center;padding:3rem 1.5rem;color:#8a8a9a;font-size:14px;line-height:1.8;}
#previewWrap{background:linear-gradient(#dceeff,#f3f9ff);display:flex;align-items:center;justify-content:center;padding:16px;}
#previewCanvas{border-radius:12px;}
.part-tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 14px;border-bottom:1px solid #f0f0f0;}
.part-tab{flex-shrink:0;padding:8px 12px;border-radius:12px;background:#f0f0f0;font-weight:700;font-size:12px;color:#555;cursor:pointer;}
.part-tab.sel{background:#9c4dff;color:#fff;}
.item-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px;}
.item-card{border:2px solid #eee;border-radius:12px;padding:8px;text-align:center;cursor:pointer;background:repeating-conic-gradient(#fafafa 0% 25%, #fff 0% 50%) 50%/16px 16px;}
.item-card.sel{border-color:#9c4dff;box-shadow:0 0 0 2px rgba(156,77,255,0.25);}
.item-card img{width:100%;height:52px;object-fit:contain;}
.item-card .iname{font-size:10px;color:#555;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-card.empty-slot{display:flex;align-items:center;justify-content:center;height:78px;color:#999;font-size:20px;background:#f7f7f7;}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <button class="back-btn" onclick="location.href='index.html'">←</button>
    <span class="top-title">🧑 내 캐릭터 꾸미기</span>
    <span id="adminLink" style="display:none;background:#f0f0f0;color:#555;font-size:11px;font-weight:700;padding:5px 10px;border-radius:10px;cursor:pointer;">🎨 아이템관리</span>
  </div>
  <div id="content"><div class="center-msg">불러오는 중...</div></div>
</div>
<script>
const SUPABASE_URL='https://pampoyeyhwwdpzcaubdm.supabase.co';
const SUPABASE_KEY='sb_publishable_xWRbj6jRwR_sojPBYCLfEg_DylayGH5';
let currentUser=null;
try{currentUser=JSON.parse(localStorage.getItem('puzzle_user')||'null');}catch(e){}
function headers(){ return {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function jheaders(){ return {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function esc(str){ return String(str??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }

let parts=[], items=[], equipped={};
const imgCache={};
function getImg(url){ if(!imgCache[url]){ const img=new Image(); img.src=url; imgCache[url]=img; } return imgCache[url]; }
function partByKey(k){ return parts.find(p=>p.key===k); }
function childrenOf(parentKey){ return parts.filter(p=>(p.parent_key||null)===(parentKey||null)).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0)); }
function itemById(id){ return items.find(i=>i.id===id); }
function baseItemFor(key){ return items.find(i=>i.part_key===key&&i.is_base); }
function wardrobeFor(key){ return items.filter(i=>i.part_key===key&&!i.is_base); }

async function init(){
  const content=document.getElementById('content');
  if(!currentUser){ content.innerHTML='<div class="center-msg">로그인 후 이용해주세요.</div>'; return; }
  if(['이재상'].includes(currentUser.username)){
    const link=document.getElementById('adminLink');
    link.style.display='inline-block';
    link.addEventListener('click',()=>location.href='character_admin.html');
  }
  content.innerHTML=`
    <div id="previewWrap"><canvas id="previewCanvas" width="220" height="260"></canvas></div>
    <div class="part-tabs" id="partTabs"></div>
    <div class="item-grid" id="itemGrid"></div>
  `;
  await loadAll();
  currentPart=(parts[0]||{}).key||null;
  renderTabs();
  renderGrid();
  startPreviewLoop();
}

let animConfig={states:{}};
async function loadAll(){
  const [pr,ir,ur,ar]=await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/character_parts?select=*`,{headers:headers()}),
    fetch(`${SUPABASE_URL}/rest/v1/character_items?select=*&order=created_at.asc`,{headers:headers()}),
    fetch(`${SUPABASE_URL}/rest/v1/user_characters?user_id=eq.${currentUser.id}&select=*`,{headers:headers()}),
    fetch(`${SUPABASE_URL}/rest/v1/character_anim_config?id=eq.1&select=config`,{headers:headers()})
  ]);
  parts=await pr.json();
  items=await ir.json();
  const ud=await ur.json();
  equipped=(ud&&ud[0]&&ud[0].equipped)?ud[0].equipped:{};
  const ad=await ar.json();
  animConfig=(ad&&ad[0]&&ad[0].config)?ad[0].config:{states:{}};
}

let currentPart=null;
function renderTabs(){
  const tabsEl=document.getElementById('partTabs');
  function flat(parentKey,depth){
    return childrenOf(parentKey).flatMap(p=>[{...p,depth}, ...flat(p.key,depth+1)]);
  }
  const list=flat(null,0);
  tabsEl.innerHTML=list.map(p=>`<div class="part-tab ${currentPart===p.key?'sel':''}" data-p="${p.key}">${'　'.repeat(p.depth)}${esc(p.label)}${equipped[p.key]?' ✓':''}</div>`).join('');
  tabsEl.querySelectorAll('.part-tab').forEach(el=>{
    el.addEventListener('click',()=>{ currentPart=el.dataset.p; renderTabs(); renderGrid(); });
  });
}

function renderGrid(){
  const grid=document.getElementById('itemGrid');
  if(!currentPart){ grid.innerHTML='<div class="center-msg">아직 등록된 부위가 없어요</div>'; return; }
  const list=wardrobeFor(currentPart);
  let html=`<div class="item-card empty-slot ${!equipped[currentPart]?'sel':''}" data-empty="1">🚫<br>기본만</div>`;
  list.forEach(it=>{
    html+=`<div class="item-card ${equipped[currentPart]===it.id?'sel':''}" data-id="${it.id}"><img src="${esc(it.url)}"><div class="iname">${esc(it.name)}</div></div>`;
  });
  grid.innerHTML=html;
  if(!list.length){
    grid.innerHTML+='<div style="grid-column:1/-1;color:#bbb;font-size:12px;text-align:center;padding:10px;">아직 이 부위에 입힐 아이템이 없어요</div>';
  }
  grid.querySelectorAll('.item-card').forEach(el=>{
    el.addEventListener('click',()=>{
      if(el.dataset.empty){ equipItem(currentPart,null); }
      else { equipItem(currentPart,parseInt(el.dataset.id)); }
    });
  });
}

async function equipItem(partKey,itemId){
  equipped={...equipped, [partKey]: itemId};
  if(itemId===null) delete equipped[partKey];
  renderTabs();
  renderGrid();
  try{
    const check=await fetch(`${SUPABASE_URL}/rest/v1/user_characters?user_id=eq.${currentUser.id}&select=user_id`,{headers:headers()});
    const exists=(await check.json()).length>0;
    if(exists){
      await fetch(`${SUPABASE_URL}/rest/v1/user_characters?user_id=eq.${currentUser.id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({equipped,username:currentUser.username,updated_at:new Date().toISOString()})});
    } else {
      await fetch(`${SUPABASE_URL}/rest/v1/user_characters`,{method:'POST',headers:jheaders(),body:JSON.stringify({user_id:currentUser.id,username:currentUser.username,equipped})});
    }
  }catch(e){ console.error('저장 실패:',e); }
}

// ---- 미리보기: 트리를 재귀적으로 따라가며 그리기 (관절 회전이 자식(장식 포함)에게 자동으로 전달돼요) ----
function getAngleAtFrame(partKey,frame){
  const st=animConfig.states&&animConfig.states.idle;
  if(!st||!st.keyframes) return 0;
  const kfNums=Object.keys(st.keyframes).map(Number).filter(f=>st.keyframes[f][partKey]&&st.keyframes[f][partKey].angle!==undefined).sort((a,b)=>a-b);
  if(!kfNums.length) return 0;
  let prev=null,next=null;
  kfNums.forEach(f=>{ if(f<=frame) prev=f; if(f>=frame&&next===null) next=f; });
  if(prev===null) prev=next;
  if(next===null) next=prev;
  if(prev===next) return st.keyframes[prev][partKey].angle;
  const t=(frame-prev)/(next-prev);
  const a=st.keyframes[prev][partKey].angle, b=st.keyframes[next][partKey].angle;
  return (a+(b-a)*t)*Math.PI/180;
}
function getItemIdAtFrame(partKey,frame){
  const st=animConfig.states&&animConfig.states.idle;
  if(!st||!st.keyframes) return undefined;
  const kfNums=Object.keys(st.keyframes).map(Number).filter(f=>st.keyframes[f][partKey]&&st.keyframes[f][partKey].itemId!==undefined).sort((a,b)=>a-b);
  if(!kfNums.length) return undefined;
  let chosen=null;
  kfNums.forEach(f=>{ if(f<=frame) chosen=f; });
  if(chosen===null) chosen=kfNums[kfNums.length-1];
  return st.keyframes[chosen][partKey].itemId;
}
function imgInfoFor(key,frame){
  const equippedId=equipped[key];
  if(equippedId){
    const it=itemById(equippedId);
    if(it) return { url:it.url, anchorX:it.anchor_x??0.5, anchorY:it.anchor_y??0.5, offsetX:it.offset_x??0.5, offsetY:it.offset_y??0.5 };
  }
  // 장착한 스킨이 없으면 기본 캐릭터의 애니메이션(눈깜빡임 등 이미지 전환)을 그대로 보여줘요
  const frameItemId=frame!==undefined?getItemIdAtFrame(key,frame):undefined;
  const it=frameItemId?itemById(frameItemId):baseItemFor(key);
  if(!it) return null;
  return { url:it.url, anchorX:it.anchor_x??0.5, anchorY:it.anchor_y??0.5, offsetX:it.offset_x??0.5, offsetY:it.offset_y??0.5 };
}
function computeEndLocal(h,anchorY){
  return anchorY<0.5 ? h*(1-anchorY) : -h*anchorY;
}

function drawJointImageAtOrigin(ctx,key,h,frame){
  const info=imgInfoFor(key,frame);
  if(!info) return {w:h,h,anchorX:0.5,anchorY:0.05};
  const img=getImg(info.url);
  if(!img.complete||!img.naturalWidth) return {w:h,h,anchorX:info.anchorX,anchorY:info.anchorY};
  const w=h*(img.naturalWidth/img.naturalHeight);
  ctx.drawImage(img,-w*info.anchorX,-h*info.anchorY,w,h);
  return {w,h,anchorX:info.anchorX,anchorY:info.anchorY};
}
function drawAttachmentAtParentLocal(ctx,key,parentInfo,frame){
  const info=imgInfoFor(key,frame);
  if(!info) return;
  const img=getImg(info.url);
  if(!img.complete||!img.naturalWidth) return;
  const localX=parentInfo.w*(info.offsetX-parentInfo.anchorX);
  const localY=parentInfo.h*(info.offsetY-parentInfo.anchorY);
  const fh=parentInfo.h*0.32;
  const fw=fh*(img.naturalWidth/img.naturalHeight);
  ctx.drawImage(img,localX-fw/2,localY-fh/2,fw,fh);
  return {localX,localY};
}

function renderNode(ctx,key,frame,facing){
  const part=partByKey(key);
  if(!part) return;
  if(part.node_type==='attachment'){
    // 장식은 별도 회전 없이 부모 좌표계 그대로 사용 (renderJointChildren에서 위치까지 처리해서 호출함)
    return;
  }
  const angle=getAngleAtFrame(key,frame);
  ctx.save();
  ctx.rotate(angle);
  const info=drawJointImageAtOrigin(ctx,key,part.default_length||16,frame);
  const endLocalY=computeEndLocal(info.h,info.anchorY);
  childrenOf(key).forEach(child=>{
    if(child.node_type==='joint'){
      ctx.save();
      const atEnd=child.attach_end!==false;
      ctx.translate(0, atEnd?endLocalY:0);
      renderNode(ctx,child.key,frame,facing);
      ctx.restore();
    } else {
      const atEnd=child.attach_end!==false;
      ctx.save();
      ctx.translate(0, atEnd?endLocalY:0);
      drawAttachmentAtParentLocal(ctx,child.key,info,frame);
      // 장식에도 자식(예: 귀->귀고리)이 있을 수 있음 - 같은 좌표계에서 이어서 처리
      childrenOf(child.key).forEach(grand=>{
        if(grand.node_type==='attachment') drawAttachmentAtParentLocal(ctx,grand.key,info,frame);
      });
      ctx.restore();
    }
  });
  ctx.restore();
}

function drawPreviewRig(ctx,cw,ch,frame){
  ctx.clearRect(0,0,cw,ch);
  const groundY=ch-30;
  ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(20,groundY); ctx.lineTo(cw-20,groundY); ctx.stroke();

  const x=cw/2, facing=1;
  // 최상위(부모 없는) 부위들을 전부 같은 기준점(대략 골반 높이)에서 시작
  const roots=childrenOf(null);
  const hipY=groundY-60;

  ctx.save();
  ctx.translate(x,hipY);
  ctx.scale(facing,1);
  roots.forEach(r=>{
    ctx.save();
    renderNode(ctx,r.key,frame,facing);
    ctx.restore();
  });
  ctx.restore();

  if(!parts.length){
    ctx.fillStyle='#999'; ctx.font='11px sans-serif'; ctx.textAlign='center';
    ctx.fillText('관리자가 부위를 먼저 만들어야',cw/2,ch/2-8);
    ctx.fillText('여기서 캐릭터가 보여요',cw/2,ch/2+8);
  }
}
let previewFrame=0, previewRafId=null, previewLastTime=0;
function startPreviewLoop(){
  const canvas=document.getElementById('previewCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  function loop(ts){
    const idleState=(animConfig.states&&animConfig.states.idle)||{frameCount:60,loop:true};
    if(!previewLastTime) previewLastTime=ts||0;
    if((ts||0)-previewLastTime>1000/24){
      previewLastTime=ts||0;
      previewFrame++;
      if(previewFrame>=idleState.frameCount) previewFrame=idleState.loop?0:idleState.frameCount-1;
    }
    drawPreviewRig(ctx,canvas.width,canvas.height,previewFrame);
    previewRafId=requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

init();
</script>
</body>
</html>
