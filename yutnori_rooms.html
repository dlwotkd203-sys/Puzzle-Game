<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>윷놀이 - 방목록</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;}
#app{max-width:430px;margin:0 auto;background:#fff;min-height:100vh;}
.top-bar{display:flex;align-items:center;gap:10px;padding:1rem 1rem 0.75rem;border-bottom:1px solid #eee;}
.back-btn{background:none;border:none;cursor:pointer;color:#888;font-size:20px;padding:2px 8px;border-radius:8px;}
.top-title{font-size:17px;font-weight:600;color:#111;flex:1;}
.header-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #f0f0f0;}
.my-record{font-family:-apple-system,sans-serif;font-size:12px;color:#555;}
.my-record b{color:#a9531c;font-size:15px;}
.create-btn{font-family:-apple-system,sans-serif;font-weight:700;font-size:12px;padding:8px 14px;border-radius:16px;background:#a9531c;color:#fff;cursor:pointer;}
.room-list{padding:0.5rem 1rem;}
.room-item{border:1px solid #eee;border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.room-top{display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.room-host{font-weight:700;font-size:14px;color:#111;}
.room-sub{font-size:11px;color:#999;margin-top:2px;}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;}
.badge-wait{background:#fdf0e4;color:#a9531c;}
.badge-play{background:#e6f9ee;color:#0f9e75;}
.mode-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;background:#e8f0ff;color:#2f4fa8;margin-left:6px;}
.room-action{margin-top:8px;display:flex;justify-content:flex-end;}
.action-btn{font-family:-apple-system,sans-serif;font-weight:700;font-size:12px;padding:7px 14px;border-radius:14px;background:#a9531c;color:#fff;cursor:pointer;}
.action-btn.disabled{background:#e2e2e2;color:#999;}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:14px;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(20,18,30,0.5);align-items:center;justify-content:center;z-index:100;}
.modal{background:#fff;border-radius:16px;padding:20px;width:80%;max-width:280px;display:flex;flex-direction:column;gap:12px;}
.opt-row{display:flex;gap:8px;flex-wrap:wrap;}
.opt-row div{flex:1;text-align:center;padding:12px 6px;border-radius:12px;background:#f0f0f0;font-family:-apple-system,sans-serif;font-weight:700;font-size:13px;cursor:pointer;color:#555;}
.opt-row div.sel{background:#a9531c;color:#fff;}
.check-row{display:flex;align-items:center;gap:8px;font-family:-apple-system,sans-serif;font-size:12px;color:#555;}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <button class="back-btn" onclick="location.href='index.html'">←</button>
    <span class="top-title">🪵 윷놀이</span>
    <span class="create-btn" id="topCustomizeBtn" style="background:#5a7a5a;">🎨 커스터마이징</span>
  </div>
  <div class="header-row">
    <div class="my-record" id="myRecord">포인트 불러오는 중...</div>
    <div class="create-btn" id="createBtn">방 만들기</div>
  </div>
  <div class="room-list" id="roomList"><div class="empty">불러오는 중...</div></div>
</div>
<div class="modal-bg" id="customizeModal">
  <div class="modal">
    <div style="font-family:-apple-system,sans-serif;font-weight:800;font-size:15px;">내 말 색상</div>
    <div id="pieceColorRow" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;"></div>
    <div style="font-family:-apple-system,sans-serif;font-weight:800;font-size:15px;margin-top:6px;">윷 스킨</div>
    <div id="yutSkinRow" style="display:flex;flex-direction:column;gap:6px;"></div>
    <div class="action-btn" id="closeCustomizeModalBtn" style="background:#eee;color:#888;text-align:center;">닫기</div>
  </div>
</div>

<div class="modal-bg" id="createModal">
  <div class="modal">
    <div style="font-family:-apple-system,sans-serif;font-weight:800;font-size:15px;">인원 수</div>
    <div class="opt-row" id="playerCountRow">
      <div class="sel" data-n="2">2명</div>
      <div data-n="3">3명</div>
      <div data-n="4">4명</div>
    </div>
    <div style="font-family:-apple-system,sans-serif;font-weight:800;font-size:15px;margin-top:6px;">상대</div>
    <div class="opt-row" id="oppRow">
      <div class="sel" data-o="human">사람과 대전</div>
      <div data-o="com">컴퓨터 채우기</div>
    </div>
    <div style="font-family:-apple-system,sans-serif;font-weight:800;font-size:15px;margin-top:6px;">말 개수</div>
    <div class="opt-row" id="pieceCountRow">
      <div data-p="2">2개</div>
      <div data-p="3">3개</div>
      <div class="sel" data-p="4">4개</div>
    </div>
    <div class="check-row"><input type="checkbox" id="upgiChk" checked> 업기 허용 (내 말끼리 합쳐서 이동)</div>
    <div style="display:flex;gap:8px;">
      <div class="action-btn" id="confirmCreateBtn" style="flex:1;text-align:center;">만들기</div>
      <div class="action-btn" id="cancelCreateBtn" style="flex:1;text-align:center;background:#eee;color:#888;">취소</div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://pampoyeyhwwdpzcaubdm.supabase.co';
const SUPABASE_KEY='sb_publishable_xWRbj6jRwR_sojPBYCLfEg_DylayGH5';
const STARTING_POINTS=10000;
let currentUser=null;
try{currentUser=JSON.parse(localStorage.getItem('puzzle_user')||'null');}catch(e){}
let selectedId=null, rooms=[];

function headers(){ return {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function jheaders(){ return {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function esc(str){ return String(str??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }

async function ensurePoints(){
  if(!currentUser) return null;
  const r=await fetch(`${SUPABASE_URL}/rest/v1/yutnori_points?user_id=eq.${currentUser.id}&select=*`,{headers:headers()});
  const data=await r.json();
  if(!data.length){
    const created={user_id:currentUser.id,username:currentUser.username,points:STARTING_POINTS};
    await fetch(`${SUPABASE_URL}/rest/v1/yutnori_points`,{method:'POST',headers:jheaders(),body:JSON.stringify(created)});
    return created;
  }
  return data[0];
}
async function claimRecharge(){
  if(!confirm('이 게임을 만들어주신 이재상님에게 감사를 표합니다')) return;
  const p=await ensurePoints();
  if(p.points>=5000){ alert('이미 5,000P 이상 보유하고 있어요!'); return; }
  await fetch(`${SUPABASE_URL}/rest/v1/yutnori_points?user_id=eq.${currentUser.id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({points:p.points+5000})});
  await loadMyRecord();
}
async function loadMyRecord(){
  const el=document.getElementById('myRecord');
  if(!currentUser){ el.textContent='로그인하면 포인트가 표시돼요'; return; }
  const p=await ensurePoints();
  const ptsHtml = p.points<=0 ? `<span style="color:#c0392b;">0P</span>` : `보유 <b>${p.points.toLocaleString()}</b>P`;
  el.innerHTML=`${ptsHtml} (${p.wins||0}승 ${p.losses||0}패) <span id="rechargeBtn" style="display:inline-block;margin-left:6px;font-weight:700;font-size:11px;padding:5px 10px;border-radius:12px;background:#ff5e3a;color:#fff;cursor:pointer;">🎁 무료충전 +5000P</span>`;
  document.getElementById('rechargeBtn').addEventListener('click',claimRecharge);
}

async function loadRooms(){
  try{
    const staleBefore=new Date(Date.now()-10*60*1000).toISOString();
    const r=await fetch(`${SUPABASE_URL}/rest/v1/yutnori_rooms?status=neq.finished&last_active_at=gt.${staleBefore}&select=*&order=created_at.desc&limit=50`,{headers:headers()});
    rooms=(await r.json()).filter(room=>(room.players||[]).length>0);
    renderRooms();
  }catch(e){}
}
function renderRooms(){
  const el=document.getElementById('roomList');
  if(!rooms.length){ el.innerHTML='<div class="empty">열린 방이 없어요. 방을 만들어보세요!</div>'; return; }
  el.innerHTML='';
  rooms.forEach(room=>{
    const div=document.createElement('div');
    div.className='room-item';
    const badgeClass=room.status==='playing'?'badge-play':'badge-wait';
    const badgeText=room.status==='playing'?'게임중':'대기중';
    const players=room.players||[];
    let actionHtml='';
    if(selectedId===room.id){
      const isIn=currentUser&&players.some(p=>String(p.user_id)===String(currentUser.id));
      let label='',enabled=true;
      if(isIn) label='이어하기';
      else if(room.status==='playing') label='관람하기';
      else if(players.length<room.max_players) label='입장하기';
      else { label='정원마감'; enabled=false; }
      actionHtml=`<div class="room-action"><div class="action-btn ${enabled?'':'disabled'}" id="joinBtn">${label}</div></div>`;
    }
    div.innerHTML=`
      <div class="room-top">
        <div>
          <div class="room-host">${esc(room.host_username)} 님의 방<span class="mode-badge">${room.max_players}인</span>${room.vs_com?'<span class="mode-badge">🤖 COM포함</span>':''}</div>
          <div class="room-sub">${players.length}/${room.max_players}명 참가중</div>
        </div>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
      ${actionHtml}
    `;
    div.querySelector('.room-top').addEventListener('click',()=>{ selectedId=selectedId===room.id?null:room.id; renderRooms(); });
    if(selectedId===room.id){
      const btn=div.querySelector('#joinBtn');
      if(btn&&!btn.classList.contains('disabled')){
        btn.addEventListener('click',async(e)=>{ e.stopPropagation(); await joinOrEnter(room); });
      }
    }
    el.appendChild(div);
  });
}

async function joinOrEnter(room){
  if(!currentUser){ alert('로그인 후 이용해주세요.'); return; }
  const players=room.players||[];
  const isIn=players.some(p=>String(p.user_id)===String(currentUser.id));
  if(isIn||room.status==='playing'){ location.href='yutnori_room.html?id='+room.id; return; }
  await ensurePoints();
  if(players.length<room.max_players){
    const newPlayers=players.concat([{user_id:currentUser.id,username:currentUser.username,ready:false,seat:players.length}]);
    const res=await fetch(`${SUPABASE_URL}/rest/v1/yutnori_rooms?id=eq.${room.id}&move_count=eq.${room.move_count}`,{
      method:'PATCH',headers:{...jheaders(),'Prefer':'return=representation'},
      body:JSON.stringify({players:newPlayers,move_count:room.move_count+1})
    });
    const data=await res.json();
    if(!data||!data.length){ alert('다른 사람이 방금 입장했어요. 다시 시도해주세요.'); loadRooms(); return; }
    location.href='yutnori_room.html?id='+room.id;
  }
}

document.getElementById('createBtn').addEventListener('click',()=>{
  if(!currentUser){ alert('로그인 후 이용해주세요.'); return; }
  document.getElementById('createModal').style.display='flex';
});
document.getElementById('cancelCreateBtn').addEventListener('click',()=>{ document.getElementById('createModal').style.display='none'; });
let selectedCount=2, selectedOpp='human', selectedPieceCount=4;
document.querySelectorAll('#playerCountRow div').forEach(el=>{
  el.addEventListener('click',()=>{
    selectedCount=parseInt(el.dataset.n);
    document.querySelectorAll('#playerCountRow div').forEach(o=>o.classList.toggle('sel',o===el));
  });
});
document.querySelectorAll('#oppRow div').forEach(el=>{
  el.addEventListener('click',()=>{
    selectedOpp=el.dataset.o;
    document.querySelectorAll('#oppRow div').forEach(o=>o.classList.toggle('sel',o===el));
  });
});
document.querySelectorAll('#pieceCountRow div').forEach(el=>{
  el.addEventListener('click',()=>{
    selectedPieceCount=parseInt(el.dataset.p);
    document.querySelectorAll('#pieceCountRow div').forEach(o=>o.classList.toggle('sel',o===el));
  });
});
document.getElementById('confirmCreateBtn').addEventListener('click',async()=>{
  try{
    await ensurePoints();
    const vsCom=selectedOpp==='com';
    const upgi=document.getElementById('upgiChk').checked;
    const players=[{user_id:currentUser.id,username:currentUser.username,ready:false,seat:0}];
    if(vsCom){
      for(let i=1;i<selectedCount;i++){
        players.push({user_id:'COM_'+i,username:'컴퓨터'+(i>1?i:''),ready:true,seat:i,isCom:true});
      }
    }
    const res=await fetch(`${SUPABASE_URL}/rest/v1/yutnori_rooms`,{
      method:'POST',headers:{...jheaders(),'Prefer':'return=representation'},
      body:JSON.stringify({
        host_user_id:currentUser.id, host_username:currentUser.username,
        status:'waiting', vs_com:vsCom, max_players:selectedCount, upgi_allowed:upgi, piece_count:selectedPieceCount,
        players, move_count:0, last_active_at:new Date().toISOString()
      })
    });
    if(!res.ok){
      const errText=await res.text();
      alert('방 만들기 실패했어요:\n'+errText+'\n\n(SQL로 yutnori_rooms 테이블을 만드셨는지 확인해주세요)');
      return;
    }
    const data=await res.json();
    if(data&&data[0]){ location.href='yutnori_room.html?id='+data[0].id; }
    else { alert('방 만들기 응답이 비어있어요. 다시 시도해주세요.'); }
  }catch(e){
    alert('방 만들기 중 오류가 발생했어요: '+(e.message||e));
  }
});

// ================= 커스터마이징 (영구 저장 - 어느 방에서나 동일하게 적용) =================
const PIECE_COLOR_OPTS=['#e63946','#2f6fed','#2a9d34','#c084fc','#ff9f4a','#4adfd0','#ff6fb5','#1a1a1a'];
const YUT_SKIN_OPTS=[
  {name:'전통 원목',flatColor:'#3a2c18',roundColor:'#e8d3a0'},
  {name:'하양',flatColor:'#222222',roundColor:'#f5f5f5'},
  {name:'붉은 옻칠',flatColor:'#f5e6c8',roundColor:'#7a1c1c'},
  {name:'푸른빛',flatColor:'#f5f5f5',roundColor:'#2f4fa8'}
];
async function loadMyCustomization(){
  if(!currentUser) return {pieceColor:PIECE_COLOR_OPTS[0],yutSkin:YUT_SKIN_OPTS[0]};
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/yutnori_customization?user_id=eq.${currentUser.id}&select=*`,{headers:headers()});
    const data=await r.json();
    if(data.length) return {pieceColor:data[0].piece_color||PIECE_COLOR_OPTS[0], yutSkin:data[0].yut_skin||YUT_SKIN_OPTS[0]};
  }catch(e){}
  return {pieceColor:PIECE_COLOR_OPTS[0],yutSkin:YUT_SKIN_OPTS[0]};
}
async function saveMyCustomization(patch){
  const check=await fetch(`${SUPABASE_URL}/rest/v1/yutnori_customization?user_id=eq.${currentUser.id}&select=user_id`,{headers:headers()});
  const exists=(await check.json()).length>0;
  const body={user_id:currentUser.id, username:currentUser.username, ...patch};
  if(exists){
    await fetch(`${SUPABASE_URL}/rest/v1/yutnori_customization?user_id=eq.${currentUser.id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify(patch)});
  } else {
    await fetch(`${SUPABASE_URL}/rest/v1/yutnori_customization`,{method:'POST',headers:jheaders(),body:JSON.stringify(body)});
  }
}
async function openCustomizeModal(){
  if(!currentUser){ alert('로그인 후 이용해주세요.'); return; }
  const cur=await loadMyCustomization();
  const colorRow=document.getElementById('pieceColorRow');
  colorRow.innerHTML=PIECE_COLOR_OPTS.map(c=>`<div class="pcOpt" data-c="${c}" style="width:30px;height:30px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${cur.pieceColor===c?'#a9531c':'transparent'};"></div>`).join('');
  colorRow.querySelectorAll('.pcOpt').forEach(el=>{
    el.addEventListener('click',async()=>{ await saveMyCustomization({piece_color:el.dataset.c}); openCustomizeModal(); });
  });
  const skinRow=document.getElementById('yutSkinRow');
  skinRow.innerHTML=YUT_SKIN_OPTS.map((s,i)=>`<div class="ysOpt" data-i="${i}" style="padding:10px;border-radius:10px;cursor:pointer;font-family:-apple-system,sans-serif;font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px;background:${JSON.stringify(cur.yutSkin)===JSON.stringify(s)?'#ffe9c4':'#f0f0f0'};color:${JSON.stringify(cur.yutSkin)===JSON.stringify(s)?'#a9531c':'#555'};"><span style="width:16px;height:16px;border-radius:4px;background:${s.flatColor};border:2px solid ${s.roundColor};"></span>${s.name}</div>`).join('');
  skinRow.querySelectorAll('.ysOpt').forEach(el=>{
    el.addEventListener('click',async()=>{ await saveMyCustomization({yut_skin:YUT_SKIN_OPTS[parseInt(el.dataset.i)]}); openCustomizeModal(); });
  });
  document.getElementById('customizeModal').style.display='flex';
}
document.getElementById('topCustomizeBtn').addEventListener('click',openCustomizeModal);
document.getElementById('closeCustomizeModalBtn').addEventListener('click',()=>{ document.getElementById('customizeModal').style.display='none'; });

loadMyRecord();
loadRooms();
setInterval(loadRooms,1000);
</script>
</body>
</html>
