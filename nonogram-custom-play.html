<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>노노그램</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;}
#app{max-width:430px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column;}
.top-bar{display:flex;align-items:center;gap:10px;padding:0.75rem 1rem;border-bottom:1px solid #eee;flex-shrink:0;}
.back-btn{background:none;border:none;cursor:pointer;color:#888;font-size:20px;padding:2px 8px;line-height:1;border-radius:8px;}
.top-title{font-size:16px;font-weight:600;color:#111;flex:1;}
.top-info{font-size:12px;font-weight:600;color:#aaa;}
.game-body{flex:1;display:flex;flex-direction:column;padding:0.5rem 0.75rem;gap:0.5rem;align-items:center;overflow:hidden;}

.mode-bar{display:flex;gap:8px;width:100%;}
.mode-btn{flex:1;padding:7px;border-radius:10px;border:1.5px solid #ddd;background:#fff;font-size:13px;font-weight:600;color:#888;cursor:pointer;transition:all 0.1s;}
.mode-btn.fill-active{border-color:#333;background:#333;color:#fff;}
.mode-btn.cross-active{border-color:#E24B4A;background:#FFF5F5;color:#E24B4A;}

.nonogram-wrap{display:flex;justify-content:center;width:100%;overflow:auto;}
.nonogram{display:inline-flex;flex-direction:column;flex-shrink:0;}
.grid{border:2px solid #333;display:flex;flex-direction:column;}
.grid-row{display:flex;}
.cell{display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;-webkit-tap-highlight-color:transparent;background:#fff;border:0.5px solid #ccc;}
.cell.hl{box-shadow:inset 0 0 0 999px rgba(55,138,221,0.14);}
.hint-cell.hl{background:rgba(55,138,221,0.14);border-radius:4px;}
.hint-num{transition:color .15s;}
.hint-num.done{color:#c3c3c3 !important;}
.drag-count{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(55,138,221,0.92);color:#fff;font-weight:800;border-radius:50%;display:none;align-items:center;justify-content:center;pointer-events:none;z-index:6;}

.clear-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;display:none;}
.clear-overlay.show{display:flex;}
.clear-title{font-size:28px;font-weight:800;color:#fff;}
.clear-canvas{border-radius:8px;image-rendering:pixelated;}
.clear-btns{display:flex;gap:10px;}
.clear-btn{padding:12px 24px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;}
.clear-btn.home{background:#fff;color:#333;}

.game-msg{text-align:center;font-size:13px;font-weight:600;min-height:18px;color:#1D9E75;}
.btn-row{display:flex;gap:8px;justify-content:center;width:100%;}
.gbtn{font-family:inherit;font-size:13px;cursor:pointer;border-radius:8px;border:1px solid #ddd;padding:7px 16px;background:#fff;color:#111;font-weight:500;}
.loading{text-align:center;padding:60px 0;font-size:13px;color:#aaa;}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <button class="back-btn" onclick="location.href='nonogram-custom.html'">←</button>
    <span class="top-title" id="stage-title">불러오는 중...</span>
    <span class="top-info" id="creator-info"></span>
  </div>
  <div class="game-body" id="gameBody">
    <div class="loading">문제를 불러오는 중...</div>
  </div>
</div>

<div class="clear-overlay" id="clear-overlay">
  <div class="clear-title" id="clear-name">🎉 완성!</div>
  <canvas id="clear-canvas" class="clear-canvas"></canvas>
  <div class="clear-btns">
    <button class="clear-btn home" onclick="location.href='nonogram-custom.html'">목록으로</button>
  </div>
</div>

<script>
const SUPABASE_URL='https://pampoyeyhwwdpzcaubdm.supabase.co';
const SUPABASE_KEY='sb_publishable_xWRbj6jRwR_sojPBYCLfEg_DylayGH5';
const params=new URLSearchParams(location.search);
const puzzleId=params.get('id');

let puzzle=null, N=0, solution=null, userBoard=[], mode='fill', dragging=false, dragVal=1, cellSize=0, gridEl=null;

function loadProgress(){
  try{
    const raw=localStorage.getItem('nonogram_progress_custom_'+puzzleId);
    if(raw){
      const arr=JSON.parse(raw);
      if(arr && arr.length===N && arr[0] && arr[0].length===N) return arr;
    }
  }catch(e){}
  return Array.from({length:N},()=>new Array(N).fill(0));
}
function saveProgress(){
  try{ localStorage.setItem('nonogram_progress_custom_'+puzzleId, JSON.stringify(userBoard)); }catch(e){}
}

async function load(){
  if(!puzzleId){document.getElementById('gameBody').innerHTML='<div class="loading">잘못된 접근이에요</div>';return;}
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/nonogram_custom?id=eq.${puzzleId}&select=*`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    const rows=await res.json();
    if(!rows || !rows[0]){document.getElementById('gameBody').innerHTML='<div class="loading">문제를 찾을 수 없어요</div>';return;}
    puzzle=rows[0];
    N=puzzle.size;
    solution=puzzle.solution;
    userBoard=loadProgress();
    document.getElementById('stage-title').textContent=puzzle.name;
    if(puzzle.creator)document.getElementById('creator-info').textContent='by '+puzzle.creator;
    buildUI();
    buildBoard();
  }catch(e){
    document.getElementById('gameBody').innerHTML='<div class="loading">불러오기에 실패했어요</div>';
  }
}

function buildUI(){
  document.getElementById('gameBody').innerHTML=`
    <div class="mode-bar">
      <button class="mode-btn fill-active" id="mode-fill" onclick="setMode('fill')">■ 채우기</button>
      <button class="mode-btn" id="mode-cross" onclick="setMode('cross')">✕ 표시</button>
    </div>
    <div class="nonogram-wrap" id="nonogram-wrap"></div>
    <div class="game-msg" id="game-msg"></div>
    <div class="btn-row">
      <button class="gbtn" onclick="resetPuzzle()">초기화</button>
    </div>
  `;
}

function calcHints(line){
  const h=[];let cnt=0;
  for(const v of line){if(v)cnt++;else if(cnt){h.push(cnt);cnt=0;}}
  if(cnt)h.push(cnt);
  return h.length?h:[0];
}

let rowHintWraps=[], colHintWraps=[];
let rowHintSpans=[], colHintSpans=[];

function buildBoard(){
  const wrap=document.getElementById('nonogram-wrap');
  wrap.innerHTML='';
  const maxW=Math.min(window.innerWidth-16,414);
  let maxRowHints=0;
  for(let r=0;r<N;r++){const h=calcHints(solution[r]);if(h.length>maxRowHints)maxRowHints=h.length;}
  let maxColHints=0;
  for(let c=0;c<N;c++){const col=solution.map(r=>r[c]);const h=calcHints(col);if(h.length>maxColHints)maxColHints=h.length;}

  const fs=N<=5?11:N<=10?10:N<=20?8:7;
  const hintCellW=N<=5?22:N<=10?19:N<=20?14:12;
  const hintCellH=N<=5?18:N<=10?16:N<=20?12:10;
  const hintW=maxRowHints*hintCellW+6;
  const hintH=maxColHints*hintCellH+4;
  cellSize=Math.max(Math.floor((maxW-hintW)/N), N<=5?28:N<=10?20:N<=20?12:8);
  cellSize=Math.min(cellSize, N<=5?48:N<=10?36:N<=20?20:14);

  const nano=document.createElement('div');
  nano.className='nonogram';

  rowHintWraps=[];colHintWraps=[];rowHintSpans=[];colHintSpans=[];

  const top=document.createElement('div');
  top.style.display='flex';
  const corner=document.createElement('div');
  corner.style.cssText=`width:${hintW}px;height:${hintH}px;flex-shrink:0;`;
  top.appendChild(corner);
  const colHWrap=document.createElement('div');
  colHWrap.style.display='flex';
  for(let c=0;c<N;c++){
    const col=solution.map(r=>r[c]);
    const hints=calcHints(col);
    const ch=document.createElement('div');
    ch.className='hint-cell';
    ch.style.cssText=`width:${cellSize}px;height:${hintH}px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;font-size:${fs}px;font-weight:700;color:#333;padding-bottom:2px;gap:2px;`;
    const spans=[];
    hints.forEach(h=>{const sp=document.createElement('span');sp.className='hint-num';sp.textContent=h;sp.style.lineHeight='1.1';ch.appendChild(sp);spans.push(sp);});
    colHWrap.appendChild(ch);
    colHintWraps.push(ch);
    colHintSpans.push(spans);
  }
  top.appendChild(colHWrap);
  nano.appendChild(top);

  const body=document.createElement('div');
  body.style.display='flex';
  const rowHWrap=document.createElement('div');
  rowHWrap.style.cssText=`width:${hintW}px;flex-shrink:0;display:flex;flex-direction:column;`;
  for(let r=0;r<N;r++){
    const hints=calcHints(solution[r]);
    const rh=document.createElement('div');
    rh.className='hint-cell';
    rh.style.cssText=`height:${cellSize}px;display:flex;align-items:center;justify-content:flex-end;padding-right:4px;gap:${Math.max(4,Math.round(cellSize*0.18))}px;font-size:${fs}px;font-weight:700;color:#333;`;
    const spans=[];
    hints.forEach(h=>{const sp=document.createElement('span');sp.className='hint-num';sp.textContent=h;rh.appendChild(sp);spans.push(sp);});
    rowHWrap.appendChild(rh);
    rowHintWraps.push(rh);
    rowHintSpans.push(spans);
  }
  body.appendChild(rowHWrap);

  const grid=document.createElement('div');
  grid.className='grid';
  grid.id='grid';
  for(let r=0;r<N;r++){
    const row=document.createElement('div');
    row.className='grid-row';
    for(let c=0;c<N;c++){
      const cell=document.createElement('div');
      cell.className='cell';
      const borderR=(c+1)%5===0&&c!==N-1?'2px solid #888':'0.5px solid #ccc';
      const borderB=(r+1)%5===0&&r!==N-1?'2px solid #888':'0.5px solid #ccc';
      cell.style.cssText=`width:${cellSize}px;height:${cellSize}px;border-right:${borderR};border-bottom:${borderB};`;
      if(c===N-1)cell.style.borderRight='none';
      if(r===N-1)cell.style.borderBottom='none';
      cell.id=`c-${r}-${c}`;
      const xspan=document.createElement('span');
      xspan.style.cssText=`display:none;color:#E24B4A;font-weight:700;font-size:${Math.max(8,cellSize*0.55)}px;`;
      xspan.textContent='✕';xspan.id=`x-${r}-${c}`;
      cell.appendChild(xspan);
      const cnt=document.createElement('span');
      cnt.className='drag-count';
      cnt.id=`n-${r}-${c}`;
      const badgeSize=Math.max(14,Math.round(cellSize*0.72));
      cnt.style.cssText=`width:${badgeSize}px;height:${badgeSize}px;font-size:${Math.max(9,Math.round(badgeSize*0.5))}px;`;
      cell.appendChild(cnt);
      row.appendChild(cell);
    }
    grid.appendChild(row);
  }
  grid.style.touchAction='none';
  gridEl=grid;
  grid.addEventListener('pointerdown',e=>{
    e.preventDefault();
    const pos=cellFromEvent(e);
    if(pos){setHighlight(pos.r,pos.c);startDrag(pos.r,pos.c);showDragCount(pos.r,pos.c);}
  });
  grid.addEventListener('pointermove',e=>{
    const pos=cellFromEvent(e);
    if(pos)setHighlight(pos.r,pos.c);
    if(!dragging)return;
    e.preventDefault();
    if(pos){doDrag(pos.r,pos.c);showDragCount(pos.r,pos.c);}
  });
  grid.addEventListener('pointerleave',()=>{ if(!dragging) clearHighlight(); });
  window.addEventListener('pointerup',()=>{dragging=false;clearHighlight();hideDragCount();});
  body.appendChild(grid);
  nano.appendChild(body);
  wrap.appendChild(nano);
  renderCells();
}

function cellFromEvent(e){
  const rect=gridEl.getBoundingClientRect();
  const x=e.clientX-rect.left, y=e.clientY-rect.top;
  const c=Math.floor(x/cellSize), r=Math.floor(y/cellSize);
  if(r<0||r>=N||c<0||c>=N)return null;
  return {r,c};
}

let hlR=-1, hlC=-1;
function setHighlight(r,c){
  if(hlR===r && hlC===c)return;
  clearHighlight();
  hlR=r;hlC=c;
  for(let i=0;i<N;i++){
    const rc=document.getElementById(`c-${r}-${i}`); if(rc)rc.classList.add('hl');
    const cc=document.getElementById(`c-${i}-${c}`); if(cc)cc.classList.add('hl');
  }
  if(rowHintWraps[r])rowHintWraps[r].classList.add('hl');
  if(colHintWraps[c])colHintWraps[c].classList.add('hl');
}
function clearHighlight(){
  if(hlR>=0){
    for(let i=0;i<N;i++){
      const rc=document.getElementById(`c-${hlR}-${i}`); if(rc)rc.classList.remove('hl');
      const cc=document.getElementById(`c-${i}-${hlC}`); if(cc)cc.classList.remove('hl');
    }
    if(rowHintWraps[hlR])rowHintWraps[hlR].classList.remove('hl');
    if(colHintWraps[hlC])colHintWraps[hlC].classList.remove('hl');
  }
  hlR=-1;hlC=-1;
}

function lineSegments(line){
  const segs=[];let start=-1;
  for(let i=0;i<line.length;i++){
    if(line[i]===1){ if(start===-1)start=i; }
    else { if(start!==-1){ segs.push({start,len:i-start}); start=-1; } }
  }
  if(start!==-1) segs.push({start,len:line.length-start});
  return segs;
}
function updateHintMarks(){
  for(let r=0;r<N;r++){
    const solSegs=lineSegments(solution[r]);
    const usrLine=userBoard[r].map(v=>v===1?1:0);
    const usrSegs=lineSegments(usrLine);
    const spans=rowHintSpans[r]||[];
    spans.forEach((sp,i)=>{
      const s=solSegs[i], u=usrSegs[i];
      const match = s && u && s.start===u.start && s.len===u.len;
      sp.classList.toggle('done', !!match || (solSegs.length===0 && usrSegs.length===0));
    });
  }
  for(let c=0;c<N;c++){
    const solCol=solution.map(row=>row[c]);
    const usrCol=userBoard.map(row=>row[c]===1?1:0);
    const solSegs=lineSegments(solCol);
    const usrSegs=lineSegments(usrCol);
    const spans=colHintSpans[c]||[];
    spans.forEach((sp,i)=>{
      const s=solSegs[i], u=usrSegs[i];
      const match = s && u && s.start===u.start && s.len===u.len;
      sp.classList.toggle('done', !!match || (solSegs.length===0 && usrSegs.length===0));
    });
  }
}

// ---- 드래그 중 몇 칸째인지 표시 ----
let dragPathSet=new Set(), dragPathLen=0, curCountCell=null;
function showDragCount(r,c){
  const key=r+'-'+c;
  if(!dragPathSet.has(key)){ dragPathSet.add(key); dragPathLen++; }
  if(curCountCell){ const prev=document.getElementById('n-'+curCountCell); if(prev)prev.style.display='none'; }
  const el=document.getElementById('n-'+key);
  if(el){ el.textContent=dragPathLen; el.style.display='flex'; }
  curCountCell=key;
}
function hideDragCount(){
  if(curCountCell){ const prev=document.getElementById('n-'+curCountCell); if(prev)prev.style.display='none'; }
  curCountCell=null; dragPathSet=new Set(); dragPathLen=0;
}

function renderCells(){
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const cell=document.getElementById(`c-${r}-${c}`);
    const xspan=document.getElementById(`x-${r}-${c}`);
    if(!cell)continue;
    const v=userBoard[r][c];
    cell.style.background=v===1?(puzzle.color||'#333'):'#fff';
    if(xspan)xspan.style.display=v===2?'block':'none';
  }
  updateHintMarks();
  saveProgress();
}

function setMode(m){
  mode=m;
  document.getElementById('mode-fill').className='mode-btn '+(m==='fill'?'fill-active':'');
  document.getElementById('mode-cross').className='mode-btn '+(m==='cross'?'cross-active':'');
}

function startDrag(r,c){
  dragging=true;
  const fillVal=mode==='fill'?1:2;
  dragVal=userBoard[r][c]===fillVal?0:fillVal;
  userBoard[r][c]=dragVal;
  renderCells();autoCheck();
}
function doDrag(r,c){
  if(!dragging)return;
  userBoard[r][c]=dragVal;
  renderCells();autoCheck();
}

function resetPuzzle(){
  userBoard=Array.from({length:N},()=>new Array(N).fill(0));
  document.getElementById('game-msg').textContent='';
  renderCells();
}

function autoCheck(){
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    if(userBoard[r][c]===1&&solution[r][c]===0)return;
    if(solution[r][c]===1&&userBoard[r][c]!==1)return;
  }
  onClear();
}

function onClear(){
  showClearOverlay();
}

function showClearOverlay(){
  const overlay=document.getElementById('clear-overlay');
  document.getElementById('clear-name').textContent='🎉 '+puzzle.name+' 완성!';
  const canvas=document.getElementById('clear-canvas');
  const maxPx=Math.min(window.innerWidth*0.8,300);
  const px=Math.floor(maxPx/N);
  canvas.width=N*px;canvas.height=N*px;
  canvas.style.width=(N*px)+'px';canvas.style.height=(N*px)+'px';
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#f5f5f5';ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    if(solution[r][c]===1){
      ctx.fillStyle=puzzle.color||'#333';
      ctx.fillRect(c*px,r*px,px,px);
    }
  }
  overlay.classList.add('show');
}

load();
</script>
</body>
</html>
