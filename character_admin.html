<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>대표 캐릭터 - 아이템 관리자</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;height:100vh;overflow:hidden;}
.topbar{position:fixed;top:0;left:0;right:0;height:52px;background:#1a1a2e;color:#fff;display:flex;align-items:center;padding:0 18px;gap:12px;z-index:10;}
.topbar .back{cursor:pointer;font-size:18px;color:#ccc;}
.topbar .title{font-weight:800;font-size:15px;flex:1;}
.topbar .addPartBtn{background:#9c4dff;color:#fff;font-weight:700;font-size:12px;padding:8px 14px;border-radius:10px;cursor:pointer;}
.topbar .modeTabBtn{background:rgba(255,255,255,0.08);color:#ccc;font-weight:700;font-size:12px;padding:8px 14px;border-radius:10px;cursor:pointer;}
.topbar .modeTabBtn.sel{background:#fff;color:#1a1a2e;}
.layout{display:flex;height:100vh;padding-top:52px;}
.sidebar{width:280px;flex-shrink:0;background:#fff;border-right:1px solid #e5e5ea;overflow-y:auto;}
.sidebar .part-row{padding:9px 14px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center;color:#333;white-space:nowrap;}
.sidebar .part-row:hover{background:#f7f7f9;}
.sidebar .part-row.sel{background:#f0e8ff;color:#6a2fc9;font-weight:700;}
.sidebar .part-badge{font-size:10px;color:#999;flex-shrink:0;margin-left:6px;}
.mainpanel{flex:1;overflow-y:auto;padding:26px 36px;}
.center-msg{text-align:center;padding:4rem;color:#8a8a9a;font-size:14px;}
.panel-title{font-size:20px;font-weight:800;color:#1a1a2e;margin-bottom:2px;}
.panel-sub{font-size:12px;color:#999;margin-bottom:18px;}
.two-col{display:flex;gap:28px;align-items:flex-start;}
.col{flex:1;min-width:0;}
.card{background:#fff;border:1px solid #eee;border-radius:14px;padding:18px;margin-bottom:18px;}
.field-label{font-weight:700;font-size:12px;color:#555;margin:0 0 6px;}
.field-input{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:10px;font-size:13px;font-family:inherit;margin-bottom:12px;}
.field-select{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:10px;font-size:13px;font-family:inherit;background:#fff;margin-bottom:12px;}
.opt-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.opt-row div{padding:8px 13px;border-radius:10px;background:#f0f0f0;font-weight:700;font-size:12px;cursor:pointer;color:#555;}
.opt-row div.sel{background:#9c4dff;color:#fff;}
.file-btn{text-align:center;font-weight:700;font-size:12px;padding:11px;border-radius:12px;background:#9c4dff;color:#fff;cursor:pointer;position:relative;overflow:hidden;margin-bottom:8px;}
.file-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.action-btn{text-align:center;font-weight:700;font-size:12px;padding:10px;border-radius:12px;background:#9c4dff;color:#fff;cursor:pointer;display:inline-block;}
.status-txt{font-size:11px;margin-top:8px;min-height:14px;}
.check-row{display:flex;align-items:center;gap:8px;font-size:12px;color:#555;margin-bottom:12px;}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px;}
.item-card{border:1px solid #eee;border-radius:12px;padding:8px;text-align:center;position:relative;background:repeating-conic-gradient(#fafafa 0% 25%,#fff 0% 50%) 50%/16px 16px;}
.item-card img{width:100%;height:64px;object-fit:contain;}
.item-card .iname{font-size:10px;color:#333;font-weight:700;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-card .idel{position:absolute;top:4px;right:4px;background:rgba(230,57,70,0.9);color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;line-height:18px;cursor:pointer;}
.item-card .ibtn{margin-top:5px;font-size:9px;font-weight:700;padding:4px 6px;border-radius:8px;cursor:pointer;}
#posStage{position:relative;width:260px;height:260px;background:linear-gradient(#dceeff,#f3f9ff);border-radius:14px;overflow:hidden;border:1px solid #ddd;}
#posStage img.base-parent{position:absolute;pointer-events:none;left:0;top:0;width:100%;height:100%;object-fit:contain;}
#posStage .drag-item{position:absolute;cursor:grab;touch-action:none;}
#posStage .drag-item.dragging{cursor:grabbing;}
.pixel-canvas-wrap{margin-top:10px;overflow:auto;max-width:100%;border:1px solid #eee;border-radius:10px;padding:8px;text-align:center;}
.edit-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.edit-row label{font-size:11px;color:#666;width:80px;flex-shrink:0;}
.edit-row input{flex:1;padding:6px 8px;border:1px solid #ddd;border-radius:8px;font-size:12px;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(20,18,30,0.5);align-items:center;justify-content:center;z-index:100;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:16px;padding:22px;width:360px;}
</style>
</head>
<body>
<div class="topbar">
  <span class="back" onclick="location.href='index.html'">←</span>
  <span class="title">🧑‍🎨 대표 캐릭터 아이템 관리자</span>
  <span class="modeTabBtn sel" id="modeItemsBtn" data-mode="items">아이템 관리</span>
  <span class="modeTabBtn" id="modeLayoutBtn" data-mode="layout">전체 배치</span>
  <span class="modeTabBtn" id="modeAnimBtn" data-mode="anim">동작 설정</span>
  <span class="addPartBtn" id="openAddPartBtn">＋ 새 부위 추가</span>
</div>
<div class="layout" id="itemsLayout">
  <div class="sidebar" id="sidebar"></div>
  <div class="mainpanel" id="mainpanel"><div class="center-msg">불러오는 중...</div></div>
</div>
<div class="layout" id="layoutLayout" style="display:none;">
  <div class="sidebar" id="layoutSidebar"></div>
  <div class="mainpanel" id="layoutMainpanel"></div>
</div>
<div class="layout" id="animLayout" style="display:none;">
  <div class="sidebar" id="animStateSidebar"></div>
  <div class="mainpanel" id="animMainpanel"></div>
</div>

<div class="modal-bg" id="addPartModal">
  <div class="modal">
    <div class="panel-title" style="font-size:16px;margin-bottom:14px;">새 부위 추가</div>
    <div class="field-label">이름</div>
    <input class="field-input" id="newPartLabel" placeholder="예: 귀, 손목(왼쪽), 귀고리, 벨트">
    <div class="field-label">상위 부위 (어디에 붙는지)</div>
    <select class="field-select" id="newPartParent"></select>
    <div class="field-label">종류</div>
    <div class="opt-row">
      <div class="typeOpt sel" data-t="joint">🦴 관절 (스스로 회전하며 몸을 구성함 - 팔, 다리, 귀 등)</div>
      <div class="typeOpt" data-t="attachment">🔗 장식 (부모 위 정해진 위치에 그냥 붙음 - 귀고리, 흉터, 장식 등)</div>
    </div>
    <div id="jointOnlyFields">
      <div class="field-label">기본 길이</div>
      <input class="field-input" id="newPartLength" type="number" value="16">
      <div class="field-label">이 부위가 부모의 시작점(관절축) / 끝점 중 어디에 붙나요?</div>
      <div class="opt-row">
        <div class="attachOpt" data-a="start">시작점 (예: 목/팔이 몸통 어깨 쪽에 붙듯)</div>
        <div class="attachOpt sel" data-a="end">끝점 (예: 종아리가 허벅지 끝에 붙듯)</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <div class="action-btn" id="confirmAddPartBtn" style="flex:1;">추가하기</div>
      <div class="action-btn" id="cancelAddPartBtn" style="background:#f0f0f0;color:#555;">취소</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://pampoyeyhwwdpzcaubdm.supabase.co';
const SUPABASE_KEY='sb_publishable_xWRbj6jRwR_sojPBYCLfEg_DylayGH5';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const ADMIN_USERNAMES=['이재상'];

let currentUser=null;
try{currentUser=JSON.parse(localStorage.getItem('puzzle_user')||'null');}catch(e){}
function headers(){ return {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function jheaders(){ return {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function esc(str){ return String(str??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }

let parts=[];   // character_parts 행들 (트리)
let items=[];   // character_items 행들
let pickedPart=null;
let makeMode='image';
let makeAsBase=false;
let positioningItem=null;

function partByKey(k){ return parts.find(p=>p.key===k); }
function childrenOf(parentKey){ return parts.filter(p=>(p.parent_key||null)===(parentKey||null)).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0)); }
function itemsForPart(key){ return items.filter(i=>i.part_key===key); }
function baseItemFor(key){ return items.find(i=>i.part_key===key&&i.is_base); }
function flattenParts(){ return parts.slice().sort((a,b)=>(a.sort_order||0)-(b.sort_order||0)); }

async function init(){
  const mp=document.getElementById('mainpanel');
  if(!currentUser){ mp.innerHTML='<div class="center-msg">로그인 후 이용해주세요.</div>'; return; }
  if(!ADMIN_USERNAMES.includes(currentUser.username)){ mp.innerHTML='<div class="center-msg">관리자만 접근할 수 있는 페이지예요.</div>'; return; }
  await loadAll();
  await loadAnimConfig();
  if(!pickedPart&&parts.length) pickedPart=parts[0].key;
  renderSidebar();
  renderMain();
  document.getElementById('modeItemsBtn').addEventListener('click',()=>switchMode('items'));
  document.getElementById('modeLayoutBtn').addEventListener('click',()=>switchMode('layout'));
  document.getElementById('modeAnimBtn').addEventListener('click',()=>switchMode('anim'));
}
function switchMode(mode){
  topMode=mode;
  document.getElementById('itemsLayout').style.display=mode==='items'?'flex':'none';
  document.getElementById('layoutLayout').style.display=mode==='layout'?'flex':'none';
  document.getElementById('animLayout').style.display=mode==='anim'?'flex':'none';
  document.getElementById('openAddPartBtn').style.display=mode==='items'?'inline-block':'none';
  document.querySelectorAll('.modeTabBtn').forEach(b=>b.classList.toggle('sel',b.dataset.mode===mode));
  if(mode==='layout'){ renderLayoutSidebar(); renderLayoutMain(); }
  if(mode==='anim'){ renderAnimStateSidebar(); renderAnimMain(); }
}
let topMode='items';

async function loadAll(){
  const [pr,ir]=await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/character_parts?select=*`,{headers:headers()}),
    fetch(`${SUPABASE_URL}/rest/v1/character_items?select=*&order=created_at.asc`,{headers:headers()})
  ]);
  parts=await pr.json();
  items=await ir.json();
}

function renderSidebar(){
  const sbEl=document.getElementById('sidebar');
  function renderLevel(parentKey,depth){
    return childrenOf(parentKey).map(p=>{
      const cnt=itemsForPart(p.key).length;
      let badge='';
      if(p.node_type==='joint'){
        const hasBase=items.some(i=>i.part_key===p.key&&i.is_base);
        badge=p.needs_base===false?'':(hasBase?'✅':'⚠️');
      } else { badge='🔗'; }
      return `<div class="part-row ${pickedPart===p.key?'sel':''}" data-p="${p.key}" style="padding-left:${14+depth*16}px;"><span>${badge?badge+' ':''}${esc(p.label)}</span><span style="display:flex;align-items:center;gap:6px;"><span class="part-badge">${cnt}</span><span class="part-del" data-delpart="${p.key}" style="color:#e63946;font-weight:800;cursor:pointer;padding:0 4px;">×</span></span></div>`
        + renderLevel(p.key,depth+1);
    }).join('');
  }
  sbEl.innerHTML=renderLevel(null,0)||'<div class="center-msg">부위가 없어요.<br>위에서 새 부위를 추가해보세요.</div>';
  sbEl.querySelectorAll('.part-row').forEach(el=>{
    el.addEventListener('click',()=>{ pickedPart=el.dataset.p; positioningItem=null; renderSidebar(); renderMain(); });
  });
  sbEl.querySelectorAll('[data-delpart]').forEach(el=>{
    el.addEventListener('click',e=>{ e.stopPropagation(); deletePart(el.dataset.delpart); });
  });
}

function descendantKeys(key){
  const kids=childrenOf(key);
  let result=[key];
  kids.forEach(k=>{ result=result.concat(descendantKeys(k.key)); });
  return result;
}
async function deletePart(key){
  const part=partByKey(key);
  if(!part) return;
  const affected=descendantKeys(key);
  const affectedItemCount=items.filter(i=>affected.includes(i.part_key)).length;
  const msg=affected.length>1
    ? `"${part.label}" 부위를 삭제하면 하위 부위 ${affected.length-1}개와 등록된 아이템 ${affectedItemCount}개도 같이 삭제돼요. 계속할까요?`
    : `"${part.label}" 부위를 삭제할까요? 등록된 아이템 ${affectedItemCount}개도 같이 삭제돼요.`;
  if(!confirm(msg)) return;
  try{
    // 부위(및 하위부위)에 딸린 아이템들 먼저 정리
    await Promise.all(affected.map(k=>
      fetch(`${SUPABASE_URL}/rest/v1/character_items?part_key=eq.${encodeURIComponent(k)}`,{method:'DELETE',headers:headers()})
    ));
    // 부위 자체 삭제 (하위부위는 on delete cascade로 같이 삭제됨)
    const res=await fetch(`${SUPABASE_URL}/rest/v1/character_parts?key=eq.${encodeURIComponent(key)}`,{method:'DELETE',headers:{...headers(),'Prefer':'return=representation'}});
    if(!res.ok){ const t=await res.text(); alert('삭제 실패: '+t); return; }
    if(pickedPart&&affected.includes(pickedPart)) pickedPart=null;
    positioningItem=null;
    await loadAll();
    if(!pickedPart&&parts.length) pickedPart=parts[0].key;
    renderSidebar();
    renderMain();
  }catch(e){
    console.error(e);
    alert('삭제 중 오류가 발생했어요: '+(e.message||e));
  }
}

// ---- 새 부위 추가 모달 ----
let newPartType='joint';
let newPartAttachEnd=true;
document.getElementById('openAddPartBtn').addEventListener('click',()=>{
  const sel=document.getElementById('newPartParent');
  sel.innerHTML='<option value="">(최상위 - 몸통처럼 아무데도 안 붙음)</option>'+
    flattenParts().map(p=>`<option value="${esc(p.key)}">${esc(p.label)}</option>`).join('');
  document.getElementById('addPartModal').classList.add('show');
});
document.getElementById('cancelAddPartBtn').addEventListener('click',()=>{
  document.getElementById('addPartModal').classList.remove('show');
});
document.querySelectorAll('.typeOpt').forEach(el=>{
  el.addEventListener('click',()=>{
    newPartType=el.dataset.t;
    document.querySelectorAll('.typeOpt').forEach(o=>o.classList.remove('sel'));
    el.classList.add('sel');
    document.getElementById('jointOnlyFields').style.display=newPartType==='joint'?'block':'none';
  });
});
document.querySelectorAll('.attachOpt').forEach(el=>{
  el.addEventListener('click',()=>{
    newPartAttachEnd=el.dataset.a==='end';
    document.querySelectorAll('.attachOpt').forEach(o=>o.classList.remove('sel'));
    el.classList.add('sel');
  });
});
document.getElementById('confirmAddPartBtn').addEventListener('click',async()=>{
  const label=document.getElementById('newPartLabel').value.trim();
  if(!label){ alert('이름을 입력해주세요.'); return; }
  const parentKey=document.getElementById('newPartParent').value||null;
  const length=parseFloat(document.getElementById('newPartLength').value)||16;
  const key='p'+Date.now()+Math.random().toString(36).slice(2,6);
  const body={
    key, label, parent_key:parentKey, node_type:newPartType,
    default_length:newPartType==='joint'?length:0,
    needs_base:newPartType==='joint',
    attach_end:newPartAttachEnd,
    sort_order:parts.length
  };
  const res=await fetch(`${SUPABASE_URL}/rest/v1/character_parts`,{method:'POST',headers:{...jheaders(),'Prefer':'return=representation'},body:JSON.stringify(body)});
  if(!res.ok){ const t=await res.text(); alert('추가 실패: '+t); return; }
  document.getElementById('addPartModal').classList.remove('show');
  document.getElementById('newPartLabel').value='';
  await loadAll();
  pickedPart=key;
  renderSidebar();
  renderMain();
});

// ---- 메인 패널 ----
function renderMain(){
  const mp=document.getElementById('mainpanel');
  const part=partByKey(pickedPart);
  if(!part){ mp.innerHTML='<div class="center-msg">왼쪽에서 부위를 선택하거나, 위에서 새 부위를 추가해보세요.</div>'; return; }
  const parentLabel=part.parent_key?(partByKey(part.parent_key)||{}).label:'최상위(안 붙음)';
  mp.innerHTML=`
    <div class="panel-title">${esc(part.label)}</div>
    <div class="panel-sub">${part.node_type==='joint'?'🦴 관절':'🔗 장식'} · 상위 부위: ${esc(parentLabel)}</div>
    <div class="two-col">
      <div class="col" style="max-width:360px;">
        <div class="card" id="createCard"></div>
      </div>
      <div class="col">
        <div class="field-label">등록된 아이템 (${itemsForPart(pickedPart).length}개)</div>
        <div class="item-grid" id="itemGrid"></div>
      </div>
    </div>
  `;
  if(part.node_type==='joint') renderJointCreate(part); else renderAttachmentCreate(part);
  renderItemGrid(part);
}

function renderItemGrid(part){
  const grid=document.getElementById('itemGrid');
  const list=itemsForPart(pickedPart);
  if(!list.length){ grid.innerHTML='<div style="color:#bbb;font-size:12px;">아직 없어요</div>'; return; }
  grid.innerHTML=list.map(it=>`
    <div class="item-card">
      <div class="idel" data-del="${it.id}">×</div>
      <img src="${esc(it.url)}">
      <div class="iname">${it.is_base?'⭐ ':''}${esc(it.name)}</div>
      ${part.node_type==='joint'
        ?`<div class="ibtn" data-setbase="${it.id}" style="background:${it.is_base?'#9c4dff':'#f0f0f0'};color:${it.is_base?'#fff':'#555'};">${it.is_base?'기본✓':'기본지정'}</div>`
        :`<div class="ibtn" data-reposition="${it.id}" style="background:#f0f0f0;color:#555;">위치수정</div>`}
    </div>
  `).join('');
  grid.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click',()=>deleteItem(parseInt(el.dataset.del))));
  grid.querySelectorAll('[data-setbase]').forEach(el=>el.addEventListener('click',()=>toggleBase(parseInt(el.dataset.setbase))));
  grid.querySelectorAll('[data-reposition]').forEach(el=>el.addEventListener('click',()=>{
    positioningItem=items.find(i=>i.id===parseInt(el.dataset.reposition));
    renderMain();
  }));
}

async function toggleBase(id){
  const it=items.find(i=>i.id===id);
  if(!it) return;
  if(it.is_base){
    await fetch(`${SUPABASE_URL}/rest/v1/character_items?id=eq.${id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({is_base:false})});
  } else {
    const others=items.filter(i=>i.part_key===it.part_key&&i.is_base);
    await Promise.all(others.map(o=>fetch(`${SUPABASE_URL}/rest/v1/character_items?id=eq.${o.id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({is_base:false})})));
    await fetch(`${SUPABASE_URL}/rest/v1/character_items?id=eq.${id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({is_base:true})});
  }
  await loadAll();
  renderSidebar();
  renderMain();
}

async function deleteItem(id){
  if(!confirm('이 아이템을 삭제할까요?')) return;
  await fetch(`${SUPABASE_URL}/rest/v1/character_items?id=eq.${id}`,{method:'DELETE',headers:headers()});
  await loadAll();
  renderSidebar();
  renderMain();
}

// ---- 관절 타입 아이템 생성 ----
let jointAnchorX=0.5, jointAnchorY=0.05;
function renderJointCreate(part){
  const card=document.getElementById('createCard');
  const baseItem=baseItemFor(pickedPart);
  card.innerHTML=`
    ${baseItem?`<div style="background:#f0e8ff;border-radius:10px;padding:8px 10px;font-size:11px;color:#6a2fc9;margin-bottom:12px;">현재 기본(베이스): <b>${esc(baseItem.name)}</b></div>`:''}
    <div class="field-label">이름</div>
    <input class="field-input" id="itemName" placeholder="예: 갈색 단발머리, 하늘색 후드티">
    <div class="check-row"><input type="checkbox" id="asBaseChk" ${makeAsBase?'checked':''}> 이건 <b>기본(베이스)</b>이에요</div>
    <div class="field-label">만드는 방식</div>
    <div class="opt-row">
      <div class="modeOpt ${makeMode==='image'?'sel':''}" data-m="image">이미지 업로드</div>
      <div class="modeOpt ${makeMode==='pixel'?'sel':''}" data-m="pixel">도트로 그리기</div>
    </div>
    <div id="makeModeBody"></div>
    <div class="status-txt" id="makeStatus"></div>
  `;
  document.getElementById('asBaseChk').addEventListener('change',e=>{ makeAsBase=e.target.checked; });
  card.querySelectorAll('.modeOpt').forEach(el=>{
    el.addEventListener('click',()=>{ makeMode=el.dataset.m; renderJointCreate(part); });
  });

let pixelColor='#1a1a1a';
let pixelTool='draw';
let pixelAnchor={x:8,y:1};

function resetPixelData(){

function pixelCellSize(){ return Math.max(6,Math.min(24,Math.floor(280/Math.max(pixelGridW,pixelGridH)))); }

function setupPixelCanvas(){
  const canvas=document.getElementById('pixelCanvas');
  const cell=pixelCellSize();
  canvas.width=pixelGridW*cell; canvas.height=pixelGridH*cell;
  let painting=false;
  function paintAt(e){
    const r=canvas.getBoundingClientRect();
    const cx=Math.floor((e.clientX-r.left)/cell), cy=Math.floor((e.clientY-r.top)/cell);
    if(cx<0||cy<0||cx>=pixelGridW||cy>=pixelGridH) return;
    if(pixelTool==='anchor'){ pixelAnchor={x:cx,y:cy}; drawPixelCanvas(); return; }
    const idx=cy*pixelGridW+cx;
    pixelData[idx]=pixelTool==='erase'?null:pixelColor;
    drawPixelCanvas();
  }
  canvas.onpointerdown=e=>{ painting=true; paintAt(e); };
  canvas.onpointermove=e=>{ if(painting&&pixelTool!=='anchor') paintAt(e); };
  window.addEventListener('pointerup',()=>{ painting=false; });
}

function drawPixelCanvas(){
  const canvas=document.getElementById('pixelCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const cell=pixelCellSize();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<pixelGridH;y++){
    for(let x=0;x<pixelGridW;x++){
      ctx.fillStyle=((x+y)%2===0)?'#f2f2f2':'#fafafa';
      ctx.fillRect(x*cell,y*cell,cell,cell);
      const c=pixelData[y*pixelGridW+x];
      if(c){ ctx.fillStyle=c; ctx.fillRect(x*cell,y*cell,cell,cell); }
    }
  }
  ctx.strokeStyle='rgba(0,0,0,0.08)';
  for(let x=0;x<=pixelGridW;x++){ ctx.beginPath(); ctx.moveTo(x*cell,0); ctx.lineTo(x*cell,canvas.height); ctx.stroke(); }
  for(let y=0;y<=pixelGridH;y++){ ctx.beginPath(); ctx.moveTo(0,y*cell); ctx.lineTo(canvas.width,y*cell); ctx.stroke(); }
  if(pixelEditorHasAnchor){
    const ax=pixelAnchor.x*cell+cell/2, ay=pixelAnchor.y*cell+cell/2;
    ctx.strokeStyle='#e63946'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(ax-cell/2,ay); ctx.lineTo(ax+cell/2,ay); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ax,ay-cell/2); ctx.lineTo(ax,ay+cell/2); ctx.stroke();
    ctx.beginPath(); ctx.arc(ax,ay,3,0,Math.PI*2); ctx.fillStyle='#e63946'; ctx.fill();
  }
}

function rasterizePixelData(){
  const raster=document.createElement('canvas');
  raster.width=pixelGridW; raster.height=pixelGridH;
  const rctx=raster.getContext('2d');
  for(let y=0;y<pixelGridH;y++){
    for(let x=0;x<pixelGridW;x++){
      const c=pixelData[y*pixelGridW+x];
      if(c){ rctx.fillStyle=c; rctx.fillRect(x,y,1,1); }
    }
  }
  return raster;
}

function renderPositioner(parentRep,item){
  const card=document.getElementById('createCard');
  card.innerHTML=`
    <div class="field-label">위치 잡기 - ${esc(item.name)}</div>
    <div id="posStage">
      <img class="base-parent" id="posParentImg" src="${esc(parentRep.url)}">

    </div>

    <div style="display:flex;gap:8px;margin-top:10px;">
      <div class="action-btn" id="savePosBtn" style="flex:1;">위치 저장</div>
      <div class="action-btn" id="cancelPosBtn" style="background:#f0f0f0;color:#555;">취소</div>
    </div>
  `;
  const stage=document.getElementById('posStage');
  const dragItem=document.getElementById('posDragItem');
  let curX=(item.offset_x??0.5), curY=(item.offset_y??0.5);
  const itemSize=40;
  function updateDragPos(){
    dragItem.style.width=itemSize+'px';
    dragItem.style.left=(curX*stage.clientWidth-itemSize/2)+'px';
    dragItem.style.top=(curY*stage.clientHeight-itemSize/2)+'px';
  }
  dragItem.onload=updateDragPos; if(dragItem.complete) updateDragPos();
  updateDragPos();

  let dragging=false;
  dragItem.addEventListener('pointerdown',e=>{ dragging=true; dragItem.classList.add('dragging'); dragItem.setPointerCapture(e.pointerId); });
  dragItem.addEventListener('pointermove',e=>{
    if(!dragging) return;
    const rect=stage.getBoundingClientRect();
    curX=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
    curY=Math.max(0,Math.min(1,(e.clientY-rect.top)/rect.height));
    updateDragPos();
  });
  dragItem.addEventListener('pointerup',()=>{ dragging=false; dragItem.classList.remove('dragging'); });

  document.getElementById('savePosBtn').addEventListener('click',async()=>{
    await fetch(`${SUPABASE_URL}/rest/v1/character_items?id=eq.${item.id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({offset_x:curX,offset_y:curY})});
    positioningItem=null;
    await loadAll();
    renderSidebar();
    renderMain();
  });
  document.getElementById('cancelPosBtn').addEventListener('click',()=>{
    positioningItem=null;
    renderMain();
  });
}

// ---- 줌/팬 공용 유틸 (마우스 휠 확대축소, 빈 곳 드래그로 이동) ----
function setupZoomPan(canvasId,viewState,redrawFn){
  const canvas=document.getElementById(canvasId);
  if(!canvas||canvas.__zoomPanReady) return;
  canvas.__zoomPanReady=true;
  canvas.addEventListener('wheel',e=>{
    e.preventDefault();
    const factor=e.deltaY<0?1.12:0.89;
    viewState.zoom=Math.max(0.4,Math.min(5,viewState.zoom*factor));
    redrawFn();
  },{passive:false});
  let panning=false, panStart=null;
  canvas.addEventListener('pointerdown',e=>{
    if(canvas.__onHandleDown&&canvas.__onHandleDown(e)) return; // 핸들을 눌렀으면 팬 시작 안 함
    panning=true;
    panStart={x:e.clientX,y:e.clientY,panX:viewState.panX,panY:viewState.panY};
    canvas.setPointerCapture(e.pointerId);
    canvas.style.cursor='grabbing';
  });
  canvas.addEventListener('pointermove',e=>{
    if(!panning) return;
    viewState.panX=panStart.panX+(e.clientX-panStart.x);
    viewState.panY=panStart.panY+(e.clientY-panStart.y);
    redrawFn();
  });
  function endPan(){ panning=false; canvas.style.cursor='grab'; }
  canvas.addEventListener('pointerup',endPan);
  canvas.addEventListener('pointercancel',endPan);
  canvas.addEventListener('pointerleave',()=>{ if(!panning) return; });
}
function bindZoomButtons(prefixSelector,viewState,redrawFn){
  document.querySelectorAll(prefixSelector+' .zoomBtn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(btn.dataset.z==='in') viewState.zoom=Math.min(5,viewState.zoom*1.25);
      else if(btn.dataset.z==='out') viewState.zoom=Math.max(0.4,viewState.zoom*0.8);
      else { viewState.zoom=1; viewState.panX=0; viewState.panY=0; }
      redrawFn();
    });
  });
}
let layoutView={zoom:1,panX:0,panY:0};
function baseInfoForLayout(key){
  const it=items.find(i=>i.part_key===key&&i.is_base);
  if(!it) return null;
  const part=partByKey(key);
  if(key===layoutSelectedPart&&part.node_type==='joint'){
    return {url:it.url, anchorX:layoutTemp.anchorX, anchorY:layoutTemp.anchorY, offsetX:it.offset_x??0.5, offsetY:it.offset_y??0.5};
  }
  if(key===layoutSelectedPart&&part.node_type==='attachment'){
    return {url:it.url, anchorX:it.anchor_x??0.5, anchorY:it.anchor_y??0.5, offsetX:layoutTemp.offsetX, offsetY:layoutTemp.offsetY};
  }
  return {url:it.url, anchorX:it.anchor_x??0.5, anchorY:it.anchor_y??0.5, offsetX:it.offset_x??0.5, offsetY:it.offset_y??0.5};
}
function partLengthForLayout(key){
  const part=partByKey(key);
  if(key===layoutSelectedPart&&part.node_type==='joint') return layoutTemp.length;
  return (part&&part.default_length)||16;
}
function drawJointStatic(ctx,key,highlightKey){
  const part=partByKey(key);
  if(!part) return;
  ctx.save();
  const h=partLengthForLayout(key);
  const info=baseInfoForLayout(key);
  let w=h, anchorX=0.5, anchorY=0.05;
  if(info){
    const img=getAnimImg(info.url);
    if(img.complete&&img.naturalWidth){
      w=h*(img.naturalWidth/img.naturalHeight);
      ctx.drawImage(img,-w*info.anchorX,-h*info.anchorY,w,h);
      anchorX=info.anchorX; anchorY=info.anchorY;
    }
  }
  if(key===highlightKey){
    ctx.strokeStyle='#9c4dff'; ctx.lineWidth=1.5;
    ctx.strokeRect(-w*anchorX,-h*anchorY,w,h);
    ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fillStyle='#9c4dff'; ctx.fill();
  }
  const endLocalY=computeEndLocalAnim(h,anchorY);
  childrenOf(key).forEach(child=>{
    const atEnd=child.attach_end!==false;
    if(child.node_type==='joint'){
      ctx.save();
      ctx.translate(0,atEnd?endLocalY:0);
      drawJointStatic(ctx,child.key,highlightKey);
      ctx.restore();
    } else {
      ctx.save();
      ctx.translate(0,atEnd?endLocalY:0);
      drawAttachmentStatic(ctx,child.key,{w,h,anchorX,anchorY},highlightKey);
      ctx.restore();
    }
  });
  ctx.restore();
}
function drawAttachmentStatic(ctx,key,parentInfo,highlightKey){
  const info=baseInfoForLayout(key);
  if(!info) return;
  const img=getAnimImg(info.url);
  if(!img.complete||!img.naturalWidth) return;
  const localX=parentInfo.w*(info.offsetX-parentInfo.anchorX);
  const localY=parentInfo.h*(info.offsetY-parentInfo.anchorY);
  const fh=parentInfo.h*0.32;
  const fw=fh*(img.naturalWidth/img.naturalHeight);
  ctx.drawImage(img,localX-fw/2,localY-fh/2,fw,fh);
  if(key===highlightKey){
    ctx.strokeStyle='#9c4dff'; ctx.lineWidth=1.5;
    ctx.strokeRect(localX-fw/2,localY-fh/2,fw,fh);
  }
}
function drawLayoutPreviewWrap(){
  const canvas=document.getElementById('layoutPreviewCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(canvas.width/2+layoutView.panX,canvas.height/2+layoutView.panY);
  ctx.scale(layoutView.zoom,layoutView.zoom);
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1/layoutView.zoom;
  const groundY=canvas.height/2-40;
  ctx.beginPath(); ctx.moveTo(-canvas.width/2+20,groundY); ctx.lineTo(canvas.width/2-20,groundY); ctx.stroke();
  ctx.save();
  ctx.translate(0,groundY-80);
  childrenOf(null).forEach(r=>{ ctx.save(); drawJointStatic(ctx,r.key,layoutSelectedPart); ctx.restore(); });
  ctx.restore();
  ctx.restore();
}

// ---- 프레임별 값 조회 (각도는 보간, 이미지는 계단식 유지) ----
function getAngleAtFrame(partKey,frame){
  const st=curStateConfig();
  const kfNums=Object.keys(st.keyframes).map(Number).filter(f=>st.keyframes[f][partKey]&&st.keyframes[f][partKey].angle!==undefined).sort((a,b)=>a-b);
  if(!kfNums.length) return 0;
  let prev=null,next=null;
  kfNums.forEach(f=>{ if(f<=frame) prev=f; if(f>=frame&&next===null) next=f; });
  if(prev===null) prev=next;
  if(next===null) next=prev;
  if(prev===next) return st.keyframes[prev][partKey].angle;
  const t=(frame-prev)/(next-prev);
  const a=st.keyframes[prev][partKey].angle, b=st.keyframes[next][partKey].angle;
  return a+(b-a)*t;
}
function getItemIdAtFrame(partKey,frame){
  const st=curStateConfig();
  const kfNums=Object.keys(st.keyframes).map(Number).filter(f=>st.keyframes[f][partKey]&&st.keyframes[f][partKey].itemId!==undefined).sort((a,b)=>a-b);
  if(!kfNums.length) return undefined;
  let chosen=null;
  kfNums.forEach(f=>{ if(f<=frame) chosen=f; });
  if(chosen===null) chosen=kfNums[kfNums.length-1];
  return st.keyframes[chosen][partKey].itemId;
}
function frameKeyframeList(partKey,field){
  const st=curStateConfig();
  return Object.keys(st.keyframes).map(Number).filter(f=>st.keyframes[f][partKey]&&st.keyframes[f][partKey][field]!==undefined).sort((a,b)=>a-b);
}

  list.querySelectorAll('.delKfBtn').forEach(el=>{
    el.addEventListener('click',()=>{
      const key=el.dataset.key;
      const st2=curStateConfig();
      if(st2.keyframes[animCurrentFrame]&&st2.keyframes[animCurrentFrame][key]){
        delete st2.keyframes[animCurrentFrame][key].angle;
      }
      renderAnimPartsList();
      drawAnimPreviewAtFrame();
    });
  });
  list.querySelectorAll('.setKfItemBtn').forEach(el=>{
    el.addEventListener('click',()=>{
      const key=el.dataset.key;
      const sel=list.querySelector(`.attachItemSelect[data-key="${key}"]`);
      const val=sel.value?parseInt(sel.value):null;
      const st2=curStateConfig();
      if(!st2.keyframes[animCurrentFrame]) st2.keyframes[animCurrentFrame]={};
      st2.keyframes[animCurrentFrame][key]={...st2.keyframes[animCurrentFrame][key],itemId:val};
      renderAnimPartsList();
      drawAnimPreviewAtFrame();
    });
  });
  list.querySelectorAll('.delKfItemBtn').forEach(el=>{
    el.addEventListener('click',()=>{
      const key=el.dataset.key;
      const st2=curStateConfig();
      if(st2.keyframes[animCurrentFrame]&&st2.keyframes[animCurrentFrame][key]){
        delete st2.keyframes[animCurrentFrame][key].itemId;
      }
      renderAnimPartsList();
      drawAnimPreviewAtFrame();
    });
  });
  list.querySelectorAll('.setKfPosBtn').forEach(el=>{
    el.addEventListener('click',()=>{
      const key=el.dataset.key;
      const xInput=list.querySelector(`.attachOffsetXInput[data-key="${key}"]`);
      const yInput=list.querySelector(`.attachOffsetYInput[data-key="${key}"]`);
      setOffsetKeyframe(key,parseFloat(xInput.value)||0,parseFloat(yInput.value)||0);
      renderAnimPartsList();
      drawAnimPreviewAtFrame();
    });
  });
  list.querySelectorAll('.delKfPosBtn').forEach(el=>{
    el.addEventListener('click',()=>{
      const key=el.dataset.key;
      const st2=curStateConfig();
      if(st2.keyframes[animCurrentFrame]&&st2.keyframes[animCurrentFrame][key]){
        delete st2.keyframes[animCurrentFrame][key].offsetX;
        delete st2.keyframes[animCurrentFrame][key].offsetY;
      }
      renderAnimPartsList();
      drawAnimPreviewAtFrame();
    });
  });
}
function setAngleKeyframe(key,val){
  const st2=curStateConfig();
  if(!st2.keyframes[animCurrentFrame]) st2.keyframes[animCurrentFrame]={};
  st2.keyframes[animCurrentFrame][key]={...st2.keyframes[animCurrentFrame][key],angle:val};
}
function setOffsetKeyframe(key,x,y){
  const st2=curStateConfig();
  if(!st2.keyframes[animCurrentFrame]) st2.keyframes[animCurrentFrame]={};
  st2.keyframes[animCurrentFrame][key]={...st2.keyframes[animCurrentFrame][key],offsetX:x,offsetY:y};
}
// 프레임 기준 오프셋(위치) 조회 - 키프레임에 있으면 그걸, 없으면 현재 표시중인 아이템의 기본 오프셋을 보간 없이 사용
function getOffsetAtFrame(partKey,frame){
  const st=curStateConfig();
  const kfNums=Object.keys(st.keyframes).map(Number).filter(f=>st.keyframes[f][partKey]&&st.keyframes[f][partKey].offsetX!==undefined).sort((a,b)=>a-b);
  if(kfNums.length){
    let chosen=null;
    kfNums.forEach(f=>{ if(f<=frame) chosen=f; });
    if(chosen===null) chosen=kfNums[kfNums.length-1];
    return {x:st.keyframes[chosen][partKey].offsetX, y:st.keyframes[chosen][partKey].offsetY};
  }
  const itemId=getItemIdAtFrame(partKey,frame);
  const it=itemId?items.find(i=>i.id===itemId):items.find(i=>i.part_key===partKey&&i.is_base);
  return {x:(it&&it.offset_x)??0.5, y:(it&&it.offset_y)??0.5};
}


function toggleAnimPlay(){
  animPlaying=!animPlaying;
  const btn=document.getElementById('playAnimBtn');
  if(btn) btn.textContent=animPlaying?'⏸ 정지':'▶ 재생';
  if(animPlaying){ animPlayLastTime=0; animPlayRaf=requestAnimationFrame(animPlayLoop); }
  else if(animPlayRaf){ cancelAnimationFrame(animPlayRaf); animPlayRaf=null; }
}
function stopAnimPlay(){
  if(animPlaying){ animPlaying=false; if(animPlayRaf){ cancelAnimationFrame(animPlayRaf); animPlayRaf=null; } }
}
function animPlayLoop(ts){
  if(!animPlaying) return;
  const st=curStateConfig();
  if(!animPlayLastTime) animPlayLastTime=ts;
  if(ts-animPlayLastTime>1000/24){
    animPlayLastTime=ts;
    animCurrentFrame++;
    if(animCurrentFrame>=st.frameCount){
      if(st.loop) animCurrentFrame=0;
      else { animCurrentFrame=st.frameCount-1; animPlaying=false; const btn=document.getElementById('playAnimBtn'); if(btn) btn.textContent='▶ 재생'; }
    }
    const scrubber=document.getElementById('frameScrubber');
    if(scrubber){ scrubber.value=animCurrentFrame; }
    const counterLabel=document.getElementById('frameCounterLabel');
    if(counterLabel) counterLabel.textContent=animCurrentFrame+'/'+(st.frameCount-1);
    drawAnimPreviewAtFrame();
  }
  if(animPlaying) animPlayRaf=requestAnimationFrame(animPlayLoop);
}

// ---- 프레임 기준 렌더링 (기본(베이스) 캐릭터, 트리를 재귀적으로 따라가며 그림) ----
const animImgCache={};
function getAnimImg(url){ if(!animImgCache[url]){ const img=new Image(); img.src=url; animImgCache[url]=img; } return animImgCache[url]; }
function computeEndLocalAnim(h,anchorY){ return anchorY<0.5?h*(1-anchorY):-h*anchorY; }
function frameInfoFor(key,frame){
  const itemId=getItemIdAtFrame(key,frame);
  const it = itemId ? items.find(i=>i.id===itemId) : items.find(i=>i.part_key===key&&i.is_base);
  if(!it) return null;
  const off=getOffsetAtFrame(key,frame);
  return {url:it.url, anchorX:it.anchor_x??0.5, anchorY:it.anchor_y??0.5, offsetX:off.x, offsetY:off.y};
}
let selectedPivotTransform=null; // 선택된 관절의 "회전 전" 피벗 변환행렬(각도 드래그 계산용)
let selectedTipTransform=null;   // 선택된 관절의 뼈 끝(회전 손잡이) 변환행렬
let selectedAttachTransform=null; // 선택된 장식의 위치 변환행렬
let selectedAttachParentTransform=null; // 선택된 장식의 부모 변환행렬(오프셋 드래그 계산용)
let selectedAttachParentInfo=null; // 선택된 장식의 부모 정보(오프셋 계산용)
function drawJointFrame(ctx,key,frame,selectedKey){
  const part=partByKey(key);
  if(!part) return;
  ctx.save();
  if(key===selectedKey) selectedPivotTransform=ctx.getTransform();
  ctx.rotate(getAngleAtFrame(key,frame)*Math.PI/180);
  const h=part.default_length||16;
  const info=frameInfoFor(key,frame);
  let w=h, anchorX=0.5, anchorY=0.05;
  if(info){
    const img=getAnimImg(info.url);
    if(img.complete&&img.naturalWidth){
      w=h*(img.naturalWidth/img.naturalHeight);
      ctx.drawImage(img,-w*info.anchorX,-h*info.anchorY,w,h);
      anchorX=info.anchorX; anchorY=info.anchorY;
    }
  }
  const endLocalY=computeEndLocalAnim(h,anchorY);
  if(key===selectedKey){
    ctx.save(); ctx.translate(0,endLocalY); selectedTipTransform=ctx.getTransform(); ctx.restore();
  }
  childrenOf(key).forEach(child=>{
    const atEnd=child.attach_end!==false;
    if(child.node_type==='joint'){
      ctx.save(); ctx.translate(0,atEnd?endLocalY:0); drawJointFrame(ctx,child.key,frame,selectedKey); ctx.restore();
    } else {
      ctx.save(); ctx.translate(0,atEnd?endLocalY:0);
      if(child.key===selectedKey) selectedAttachParentTransform=ctx.getTransform();
      drawAttachmentFrame(ctx,child.key,{w,h,anchorX,anchorY},frame,selectedKey);
      ctx.restore();
    }
  });
  ctx.restore();
}
function drawAttachmentFrame(ctx,key,parentInfo,frame,selectedKey){
  const info=frameInfoFor(key,frame);
  if(!info) return;
  const img=getAnimImg(info.url);
  const localX=parentInfo.w*(info.offsetX-parentInfo.anchorX);
  const localY=parentInfo.h*(info.offsetY-parentInfo.anchorY);
  if(key===selectedKey){
    ctx.save(); ctx.translate(localX,localY); selectedAttachTransform=ctx.getTransform(); ctx.restore();
    selectedAttachParentInfo=parentInfo;
  }
  if(!img.complete||!img.naturalWidth) return;
  const fh=parentInfo.h*0.32;
  const fw=fh*(img.naturalWidth/img.naturalHeight);
  ctx.drawImage(img,localX-fw/2,localY-fh/2,fw,fh);
}
function drawAnimPreviewAtFrame(){
  const canvas=document.getElementById('animPreviewCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  selectedPivotTransform=null; selectedTipTransform=null; selectedAttachTransform=null; selectedAttachParentTransform=null; selectedAttachParentInfo=null;
  ctx.save();
  ctx.translate(canvas.width/2+animView.panX,canvas.height/2+animView.panY);
  ctx.scale(animView.zoom,animView.zoom);
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1/animView.zoom;
  const groundY=canvas.height/2-60;
  ctx.beginPath(); ctx.moveTo(-canvas.width/2+20,groundY); ctx.lineTo(canvas.width/2-20,groundY); ctx.stroke();
  ctx.save();
  ctx.translate(0,groundY-60);
  childrenOf(null).forEach(r=>{ ctx.save(); drawJointFrame(ctx,r.key,animCurrentFrame,animSelectedPart); ctx.restore(); });
  ctx.restore();
  ctx.restore();
  if(!parts.some(p=>p.node_type==='joint')){
    ctx.fillStyle='#999'; ctx.font='11px sans-serif'; ctx.textAlign='center';
    ctx.fillText('부위를 먼저 만들어주세요',canvas.width/2,canvas.height/2);
    return;
  }
  // 선택된 부위 손잡이 그리기 (raw 캔버스 좌표계, 변환행렬로 이미 위치 계산됨)
  ctx.setTransform(1,0,0,1,0,0);
  if(selectedTipTransform){
    const pt=selectedTipTransform.transformPoint(new DOMPoint(0,0));
    ctx.beginPath(); ctx.arc(pt.x,pt.y,7,0,Math.PI*2);
    ctx.fillStyle='#9c4dff'; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
  }
  if(selectedAttachTransform){
    const pt=selectedAttachTransform.transformPoint(new DOMPoint(0,0));
    ctx.beginPath(); ctx.arc(pt.x,pt.y,7,0,Math.PI*2);
    ctx.fillStyle='#ff9f4a'; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
  }
}


// ---- 캔버스에서 직접 조작 (회전 손잡이 드래그 / 장식 드래그) ----
function updateJointAngleInputLive(deg){
  const el=document.querySelector(`.jointAngleInput[data-key="${animSelectedPart}"]`);
  if(el) el.value=deg.toFixed(1);
}
function updateOffsetInputsLive(x,y){
  const xEl=document.querySelector(`.attachOffsetXInput[data-key="${animSelectedPart}"]`);
  const yEl=document.querySelector(`.attachOffsetYInput[data-key="${animSelectedPart}"]`);
  if(xEl) xEl.value=x.toFixed(2);
  if(yEl) yEl.value=y.toFixed(2);
}
function setupAnimDrag(){
  const canvas=document.getElementById('animPreviewCanvas');
  if(!canvas) return;
  let dragMode=null, dragPointerId=null;

  canvas.__onHandleDown=(e)=>{
    if(!animSelectedPart) return false;
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
    const cx=(e.clientX-rect.left)*scaleX, cy=(e.clientY-rect.top)*scaleY;
    if(selectedTipTransform){
      const pt=selectedTipTransform.transformPoint(new DOMPoint(0,0));
      if(Math.hypot(cx-pt.x,cy-pt.y)<16){
        dragMode='rotate'; dragPointerId=e.pointerId;
        canvas.setPointerCapture(e.pointerId);
        return true;
      }
    }
    if(selectedAttachTransform){
      const pt=selectedAttachTransform.transformPoint(new DOMPoint(0,0));
      if(Math.hypot(cx-pt.x,cy-pt.y)<18){
        dragMode='move'; dragPointerId=e.pointerId;
        canvas.setPointerCapture(e.pointerId);
        return true;
      }
    }
    return false;
  };
  canvas.addEventListener('pointermove',e=>{
    if(!dragMode||e.pointerId!==dragPointerId) return;
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
    const cx=(e.clientX-rect.left)*scaleX, cy=(e.clientY-rect.top)*scaleY;
    if(dragMode==='rotate'&&selectedPivotTransform&&animSelectedPart){
      const local=selectedPivotTransform.inverse().transformPoint(new DOMPoint(cx,cy));
      const angleRad=Math.atan2(-local.x,local.y);
      const deg=angleRad*180/Math.PI;
      setAngleKeyframe(animSelectedPart,deg);
      updateJointAngleInputLive(deg);
      drawAnimPreviewAtFrame();
    } else if(dragMode==='move'&&selectedAttachParentTransform&&selectedAttachParentInfo&&animSelectedPart){
      const local=selectedAttachParentTransform.inverse().transformPoint(new DOMPoint(cx,cy));
      const pInfo=selectedAttachParentInfo;
      const offX=local.x/pInfo.w+pInfo.anchorX;
      const offY=local.y/pInfo.h+pInfo.anchorY;
      setOffsetKeyframe(animSelectedPart,offX,offY);
      updateOffsetInputsLive(offX,offY);
      drawAnimPreviewAtFrame();
    }
  });
  function endDrag(){
    if(dragMode){ dragMode=null; renderAnimPartsList(); }
  }
  canvas.addEventListener('pointerup',endDrag);
  canvas.addEventListener('pointercancel',endDrag);
}
</script>
