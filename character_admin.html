<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>대표 캐릭터 - 아이템 관리자</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;height:100vh;overflow:hidden;}
.topbar{position:fixed;top:0;left:0;right:0;height:52px;background:#1a1a2e;color:#fff;display:flex;align-items:center;padding:0 18px;gap:12px;z-index:10;}
.topbar .back{cursor:pointer;font-size:18px;color:#ccc;}
.topbar .title{font-weight:800;font-size:15px;flex:1;}
.topbar .addPartBtn{background:#9c4dff;color:#fff;font-weight:700;font-size:12px;padding:8px 14px;border-radius:10px;cursor:pointer;}
.topbar .modeTabBtn{background:rgba(255,255,255,0.08);color:#ccc;font-weight:700;font-size:12px;padding:8px 14px;border-radius:10px;cursor:pointer;}
.topbar .modeTabBtn.sel{background:#fff;color:#1a1a2e;}
.layout{display:flex;height:100vh;padding-top:52px;}
.sidebar{width:270px;flex-shrink:0;background:#fff;border-right:1px solid #e5e5ea;overflow-y:auto;}
.sidebar .group-title{padding:14px 16px 6px;font-size:11px;font-weight:800;color:#999;letter-spacing:0.03em;}
.sidebar .part-row{padding:9px 14px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center;color:#333;white-space:nowrap;}
.sidebar .part-row:hover{background:#f7f7f9;}
.sidebar .part-row.sel{background:#f0e8ff;color:#6a2fc9;font-weight:700;}
.sidebar .part-badge{font-size:10px;color:#999;flex-shrink:0;margin-left:6px;}
.mainpanel{flex:1;overflow-y:auto;padding:26px 36px;}
.center-msg{text-align:center;padding:4rem;color:#8a8a9a;font-size:14px;}
.panel-title{font-size:20px;font-weight:800;color:#1a1a2e;margin-bottom:2px;}
.panel-sub{font-size:12px;color:#999;margin-bottom:18px;}
.two-col{display:flex;gap:28px;align-items:flex-start;}
.col{flex:1;min-width:0;}
.card{background:#fff;border:1px solid #eee;border-radius:14px;padding:18px;margin-bottom:18px;}
.field-label{font-weight:700;font-size:12px;color:#555;margin:0 0 6px;}
.field-input{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:10px;font-size:13px;font-family:inherit;margin-bottom:12px;}
.field-select{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:10px;font-size:13px;font-family:inherit;background:#fff;margin-bottom:12px;}
.opt-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.opt-row div{padding:8px 13px;border-radius:10px;background:#f0f0f0;font-weight:700;font-size:12px;cursor:pointer;color:#555;}
.opt-row div.sel{background:#9c4dff;color:#fff;}
.file-btn{text-align:center;font-weight:700;font-size:12px;padding:11px;border-radius:12px;background:#9c4dff;color:#fff;cursor:pointer;position:relative;overflow:hidden;margin-bottom:8px;}
.file-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.action-btn{text-align:center;font-weight:700;font-size:12px;padding:10px;border-radius:12px;background:#9c4dff;color:#fff;cursor:pointer;display:inline-block;}
.status-txt{font-size:11px;margin-top:8px;min-height:14px;}
.check-row{display:flex;align-items:center;gap:8px;font-size:12px;color:#555;margin-bottom:12px;}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px;}
.item-card{border:1px solid #eee;border-radius:12px;padding:8px;text-align:center;position:relative;background:repeating-conic-gradient(#fafafa 0% 25%,#fff 0% 50%) 50%/16px 16px;}
.item-card img{width:100%;height:64px;object-fit:contain;}
.item-card .iname{font-size:10px;color:#333;font-weight:700;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-card .idel{position:absolute;top:4px;right:4px;background:rgba(230,57,70,0.9);color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;line-height:18px;cursor:pointer;}
.item-card .ibtn{margin-top:5px;font-size:9px;font-weight:700;padding:4px 6px;border-radius:8px;cursor:pointer;}
.pixel-canvas-wrap{margin-top:10px;overflow:auto;max-width:100%;border:1px solid #eee;border-radius:10px;padding:8px;text-align:center;}
.edit-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
.edit-row label{font-size:11px;color:#666;width:80px;flex-shrink:0;}
.edit-row input{flex:1;padding:6px 8px;border:1px solid #ddd;border-radius:8px;font-size:12px;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(20,18,30,0.5);align-items:center;justify-content:center;z-index:100;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:16px;padding:22px;width:360px;}
.ibtn{cursor:pointer;}
</style>
</head>
<body>
<div class="topbar">
  <span class="back" onclick="location.href='index.html'">←</span>
  <span class="title">🧑‍🎨 대표 캐릭터 아이템 관리자</span>
  <span class="modeTabBtn sel" id="modeItemsBtn" data-mode="items">아이템 관리</span>
  <span class="modeTabBtn" id="modeLayoutBtn" data-mode="layout">전체 배치</span>
  <span class="modeTabBtn" id="modeAnimBtn" data-mode="anim">동작 설정</span>
  <span class="addPartBtn" id="openAddPartBtn">＋ 새 부위 추가</span>
</div>
<div class="layout" id="itemsLayout">
  <div class="sidebar" id="sidebar"></div>
  <div class="mainpanel" id="mainpanel"><div class="center-msg">불러오는 중...</div></div>
</div>
<div class="layout" id="layoutLayout" style="display:none;">
  <div class="sidebar" id="layoutSidebar"></div>
  <div class="mainpanel" id="layoutMainpanel"></div>
</div>
<div class="layout" id="animLayout" style="display:none;">
  <div class="sidebar" id="animStateSidebar"></div>
  <div class="mainpanel" id="animMainpanel"></div>
</div>

<div class="modal-bg" id="addPartModal">
  <div class="modal">
    <div class="panel-title" style="font-size:16px;margin-bottom:14px;">새 부위 추가</div>
    <div class="field-label">이름</div>
    <input class="field-input" id="newPartLabel" placeholder="예: 귀, 손목(왼쪽), 귀고리, 벨트">
    <div class="field-label">상위 부위 (어디에 붙는지)</div>
    <select class="field-select" id="newPartParent"></select>
    <div class="check-row"><input type="checkbox" id="newPartNeedsBase" checked> 기본(베이스) 이미지가 꼭 필요해요 (몸통/팔다리처럼 항상 보여야 하는 부위)</div>
    <div class="field-label">그리는 순서</div>
    <div class="opt-row">
      <div class="layerOpt sel" data-l="front">부모보다 앞</div>
      <div class="layerOpt" data-l="back">부모보다 뒤</div>
    </div>
    <div style="font-size:10px;color:#999;margin-bottom:10px;">예: "뒷머리"는 머리보다 뒤, "앞머리"는 머리보다 앞으로 설정해요.</div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <div class="action-btn" id="confirmAddPartBtn" style="flex:1;">추가하기</div>
      <div class="action-btn" id="cancelAddPartBtn" style="background:#f0f0f0;color:#555;">취소</div>
    </div>
  </div>
</div>

<div class="modal-bg" id="editItemModal">
  <div class="modal">
    <div class="panel-title" style="font-size:16px;margin-bottom:14px;">아이템 수정</div>
    <div style="text-align:center;margin-bottom:12px;">
      <img id="editItemPreview" style="max-width:100px;max-height:100px;background:repeating-conic-gradient(#fafafa 0% 25%,#fff 0% 50%) 50%/16px 16px;border-radius:8px;">
    </div>
    <div class="file-btn" style="margin-bottom:12px;">이미지 교체(선택)<input type="file" accept="image/*" id="editItemFile"></div>
    <div class="field-label">이름</div>
    <input class="field-input" id="editItemName">
    <div class="edit-row"><label>기준점 X (0~1)</label><input type="number" id="editItemAnchorX" step="0.02" min="0" max="1"></div>
    <div class="edit-row"><label>기준점 Y (0~1)</label><input type="number" id="editItemAnchorY" step="0.02" min="0" max="1"></div>
    <div class="status-txt" id="editItemStatus"></div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <div class="action-btn" id="confirmEditItemBtn" style="flex:1;">저장</div>
      <div class="action-btn" id="cancelEditItemBtn" style="background:#f0f0f0;color:#555;">취소</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://pampoyeyhwwdpzcaubdm.supabase.co';
const SUPABASE_KEY='sb_publishable_xWRbj6jRwR_sojPBYCLfEg_DylayGH5';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const ADMIN_USERNAMES=['이재상'];

let currentUser=null;
try{currentUser=JSON.parse(localStorage.getItem('puzzle_user')||'null');}catch(e){}
function headers(){ return {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function jheaders(){ return {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function esc(str){ return String(str??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }

let parts=[];   // character_parts 행들 (트리)
let items=[];   // character_items 행들
let pickedPart=null;
let makeMode='image';
let makeAsBase=false;
let topMode='items';

function partByKey(k){ return parts.find(p=>p.key===k); }
function childrenOf(parentKey){ return parts.filter(p=>(p.parent_key||null)===(parentKey||null)).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0)); }
function itemsForPart(key){ return items.filter(i=>i.part_key===key); }
function baseItemFor(key){ return items.find(i=>i.part_key===key&&i.is_base); }
function flattenParts(){ return parts.slice().sort((a,b)=>(a.sort_order||0)-(b.sort_order||0)); }
function flattenTree(parentKey,depth){
  return childrenOf(parentKey).flatMap(p=>[{...p,depth}].concat(flattenTree(p.key,depth+1)));
}

// ---- 이미지 캐시 (공용) ----
const imgCache={};
function getImg(url){ if(!imgCache[url]){ const img=new Image(); img.src=url; imgCache[url]=img; } return imgCache[url]; }

async function init(){
  const mp=document.getElementById('mainpanel');
  if(!currentUser){ mp.innerHTML='<div class="center-msg">로그인 후 이용해주세요.</div>'; return; }
  if(!ADMIN_USERNAMES.includes(currentUser.username)){ mp.innerHTML='<div class="center-msg">관리자만 접근할 수 있는 페이지예요.</div>'; return; }
  await loadAll();
  await loadAnimConfig();
  if(!pickedPart&&parts.length) pickedPart=parts[0].key;
  renderSidebar();
  renderMain();
  document.getElementById('modeItemsBtn').addEventListener('click',()=>switchMode('items'));
  document.getElementById('modeLayoutBtn').addEventListener('click',()=>switchMode('layout'));
  document.getElementById('modeAnimBtn').addEventListener('click',()=>switchMode('anim'));
}
function switchMode(mode){
  topMode=mode;
  document.getElementById('itemsLayout').style.display=mode==='items'?'flex':'none';
  document.getElementById('layoutLayout').style.display=mode==='layout'?'flex':'none';
  document.getElementById('animLayout').style.display=mode==='anim'?'flex':'none';
  document.getElementById('openAddPartBtn').style.display=mode==='items'?'inline-block':'none';
  document.querySelectorAll('.modeTabBtn').forEach(b=>b.classList.toggle('sel',b.dataset.mode===mode));
  if(mode==='layout'){ renderLayoutSidebar(); renderLayoutMain(); }
  if(mode==='anim'){ renderAnimStateSidebar(); renderAnimMain(); }
}

async function loadAll(){
  const [pr,ir]=await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/character_parts?select=*`,{headers:headers()}),
    fetch(`${SUPABASE_URL}/rest/v1/character_items?select=*&order=created_at.asc`,{headers:headers()})
  ]);
  parts=await pr.json();
  items=await ir.json();
}

function renderSidebar(){
  const sbEl=document.getElementById('sidebar');
  function renderLevel(parentKey,depth){
    return childrenOf(parentKey).map(p=>{
      const cnt=itemsForPart(p.key).length;
      const hasBase=items.some(i=>i.part_key===p.key&&i.is_base);
      const badge=p.needs_base===false?'':(hasBase?'✅':'⚠️');
      const isBack=p.layer_mode==='back';
      return `<div class="part-row ${pickedPart===p.key?'sel':''}" data-p="${p.key}" style="padding-left:${14+depth*16}px;"><span>${badge?badge+' ':''}${esc(p.label)}</span><span style="display:flex;align-items:center;gap:5px;"><span class="layerToggle" data-lk="${p.key}" title="부모보다 앞/뒤 그리기 전환" style="font-size:9px;font-weight:800;padding:2px 6px;border-radius:6px;cursor:pointer;background:${isBack?'#e0d0ff':'#f0f0f0'};color:${isBack?'#6a2fc9':'#888'};">${isBack?'뒤':'앞'}</span><span class="part-badge">${cnt}</span></span></div>`
        + renderLevel(p.key,depth+1);
    }).join('');
  }
  sbEl.innerHTML=renderLevel(null,0)||'<div class="center-msg">부위가 없어요.<br>위에서 새 부위를 추가해보세요.</div>';
  sbEl.querySelectorAll('.part-row').forEach(el=>{
    el.addEventListener('click',()=>{ pickedPart=el.dataset.p; renderSidebar(); renderMain(); });
  });
  sbEl.querySelectorAll('.layerToggle').forEach(el=>{
    el.addEventListener('click',async(e)=>{
      e.stopPropagation();
      const key=el.dataset.lk;
      const part=partByKey(key);
      const newMode=part.layer_mode==='back'?'front':'back';
      await fetch(`${SUPABASE_URL}/rest/v1/character_parts?key=eq.${encodeURIComponent(key)}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({layer_mode:newMode})});
      await loadAll();
      renderSidebar();
      renderMain();
    });
  });
}

// ---- 새 부위 추가 모달 ----
let newPartLayer='front';
document.getElementById('openAddPartBtn').addEventListener('click',()=>{
  const sel=document.getElementById('newPartParent');
  sel.innerHTML='<option value="">(최상위 - 몸통처럼 아무데도 안 붙음)</option>'+
    flattenParts().map(p=>`<option value="${esc(p.key)}">${esc(p.label)}</option>`).join('');
  newPartLayer='front';
  document.querySelectorAll('.layerOpt').forEach(o=>o.classList.toggle('sel',o.dataset.l==='front'));
  document.getElementById('addPartModal').classList.add('show');
});
document.querySelectorAll('.layerOpt').forEach(el=>{
  el.addEventListener('click',()=>{
    newPartLayer=el.dataset.l;
    document.querySelectorAll('.layerOpt').forEach(o=>o.classList.toggle('sel',o===el));
  });
});
document.getElementById('cancelAddPartBtn').addEventListener('click',()=>{
  document.getElementById('addPartModal').classList.remove('show');
});
document.getElementById('confirmAddPartBtn').addEventListener('click',async()=>{
  const label=document.getElementById('newPartLabel').value.trim();
  if(!label){ alert('이름을 입력해주세요.'); return; }
  const parentKey=document.getElementById('newPartParent').value||null;
  const needsBase=document.getElementById('newPartNeedsBase').checked;
  const key='p'+Date.now()+Math.random().toString(36).slice(2,6);
  const body={
    key, label, parent_key:parentKey, needs_base:needsBase, layer_mode:newPartLayer,
    default_dx:0, default_dy: parentKey?40:0, default_angle:0, display_height:20,
    sort_order:parts.length
  };
  const res=await fetch(`${SUPABASE_URL}/rest/v1/character_parts`,{method:'POST',headers:{...jheaders(),'Prefer':'return=representation'},body:JSON.stringify(body)});
  if(!res.ok){ const t=await res.text(); alert('추가 실패: '+t); return; }
  document.getElementById('addPartModal').classList.remove('show');
  document.getElementById('newPartLabel').value='';
  await loadAll();
  pickedPart=key;
  renderSidebar();
  renderMain();
});

function descendantKeys(key){
  const kids=childrenOf(key);
  let result=[key];
  kids.forEach(k=>{ result=result.concat(descendantKeys(k.key)); });
  return result;
}
async function deletePart(key){
  const part=partByKey(key);
  if(!part) return;
  const affected=descendantKeys(key);
  const affectedItemCount=items.filter(i=>affected.includes(i.part_key)).length;
  const msg=affected.length>1
    ? `"${part.label}" 부위를 삭제하면 하위 부위 ${affected.length-1}개와 등록된 아이템 ${affectedItemCount}개도 같이 삭제돼요. 계속할까요?`
    : `"${part.label}" 부위를 삭제할까요? 등록된 아이템 ${affectedItemCount}개도 같이 삭제돼요.`;
  if(!confirm(msg)) return;
  try{
    await Promise.all(affected.map(k=>
      fetch(`${SUPABASE_URL}/rest/v1/character_items?part_key=eq.${encodeURIComponent(k)}`,{method:'DELETE',headers:headers()})
    ));
    const res=await fetch(`${SUPABASE_URL}/rest/v1/character_parts?key=eq.${encodeURIComponent(key)}`,{method:'DELETE',headers:{...headers(),'Prefer':'return=representation'}});
    if(!res.ok){ const t=await res.text(); alert('삭제 실패: '+t); return; }
    if(pickedPart&&affected.includes(pickedPart)) pickedPart=null;
    await loadAll();
    if(!pickedPart&&parts.length) pickedPart=parts[0].key;
    renderSidebar();
    renderMain();
  }catch(e){
    console.error(e);
    alert('삭제 중 오류가 발생했어요: '+(e.message||e));
  }
}

// ================= 아이템 관리 (부위별 이미지 등록 - 관절/장식 구분 없이 통일) =================
function renderMain(){
  const mp=document.getElementById('mainpanel');
  const part=pickedPart?partByKey(pickedPart):null;
  if(!part){ mp.innerHTML='<div class="center-msg">왼쪽에서 부위를 선택하거나, 위에서 새 부위를 추가해보세요.</div>'; return; }
  const parentLabel=part.parent_key?(partByKey(part.parent_key)||{}).label:'최상위(안 붙음)';
  const baseItem=baseItemFor(part.key);
  mp.innerHTML=`
    <div class="panel-title">${esc(part.label)}</div>
    <div class="panel-sub">상위 부위: ${esc(parentLabel)} · 위치/각도는 "전체 배치"·"동작 설정"에서 잡아요</div>
    <div class="two-col">
      <div class="col" style="max-width:360px;">
        <div class="card" id="createCard">
          ${baseItem?`<div style="background:#f0e8ff;border-radius:10px;padding:8px 10px;font-size:11px;color:#6a2fc9;margin-bottom:12px;">현재 기본(베이스): <b>${esc(baseItem.name)}</b></div>`:''}
          <div class="field-label">이름</div>
          <input class="field-input" id="itemName" placeholder="예: 갈색 단발머리, 하늘색 후드티, 눈-뜬">
          <div class="check-row"><input type="checkbox" id="asBaseChk" ${makeAsBase?'checked':''}> 이건 <b>기본(베이스)</b>이에요</div>
          <div class="field-label">기준점 (이미지 안에서 회전/이동 중심이 될 지점)</div>
          <div class="edit-row"><label>기준점 X (0~1)</label><input type="number" id="anchorXInput" value="0.5" step="0.02" min="0" max="1"></div>
          <div class="edit-row"><label>기준점 Y (0~1)</label><input type="number" id="anchorYInput" value="0.5" step="0.02" min="0" max="1"></div>
          <div style="font-size:10px;color:#999;margin-bottom:10px;">잘 모르겠으면 0.5 / 0.5 (이미지 정중앙)로 두고, "전체 배치"에서 위치를 맞춰도 돼요.</div>
          <div class="field-label">만드는 방식</div>
          <div class="opt-row">
            <div class="modeOpt ${makeMode==='image'?'sel':''}" data-m="image">이미지 업로드</div>
            <div class="modeOpt ${makeMode==='pixel'?'sel':''}" data-m="pixel">도트로 그리기</div>
          </div>
          <div id="makeModeBody"></div>
          <div class="status-txt" id="makeStatus"></div>
        </div>
      </div>
      <div class="col">
        <div class="field-label">등록된 아이템 (${itemsForPart(part.key).length}개)</div>
        <div class="item-grid" id="itemGrid"></div>
      </div>
    </div>
  `;
  document.getElementById('asBaseChk').addEventListener('change',e=>{ makeAsBase=e.target.checked; });
  document.querySelectorAll('.modeOpt').forEach(el=>{
    el.addEventListener('click',()=>{ makeMode=el.dataset.m; renderMain(); });
  });
  if(makeMode==='image') renderImageMode(); else renderPixelMode();
  renderItemGrid(part);
}

function renderImageMode(){
  const holder=document.getElementById('makeModeBody');
  holder.innerHTML='<div class="file-btn">이미지 선택해서 등록<input type="file" accept="image/*" id="itemFile"></div>';
  document.getElementById('itemFile').addEventListener('change',e=>{
    if(e.target.files&&e.target.files[0]){
      const ax=parseFloat(document.getElementById('anchorXInput').value)||0.5;
      const ay=parseFloat(document.getElementById('anchorYInput').value)||0.5;
      createItem(e.target.files[0],ax,ay);
    }
  });
}

async function createItem(blobOrFile,anchorX,anchorY){
  const nameInput=document.getElementById('itemName');
  const name=nameInput.value.trim()||'이름없음';
  const status=document.getElementById('makeStatus');
  status.style.color='#9c4dff'; status.textContent='업로드 중...';
  try{
    if(makeAsBase){

function selectPixelColor(c){
  pixelColor=c;

function pixelCellSize(){ return Math.max(6,Math.min(24,Math.floor(280/Math.max(pixelGridW,pixelGridH)))); }

function setupPixelCanvas(){
  const canvas=document.getElementById('pixelCanvas');
  const cell=pixelCellSize();
  canvas.width=pixelGridW*cell; canvas.height=pixelGridH*cell;
  let painting=false;
  function paintAt(e){
    const r=canvas.getBoundingClientRect();
    const cx=Math.floor((e.clientX-r.left)/cell), cy=Math.floor((e.clientY-r.top)/cell);
    if(cx<0||cy<0||cx>=pixelGridW||cy>=pixelGridH) return;
    if(pixelTool==='anchor'){ pixelAnchor={x:cx,y:cy}; drawPixelCanvas(); return; }
    const idx=cy*pixelGridW+cx;
    pixelData[idx]=pixelTool==='erase'?null:pixelColor;
    drawPixelCanvas();
  }
  canvas.onpointerdown=e=>{ painting=true; paintAt(e); };
  canvas.onpointermove=e=>{ if(painting&&pixelTool!=='anchor') paintAt(e); };
  window.addEventListener('pointerup',()=>{ painting=false; });
}

function drawPixelCanvas(){
  const canvas=document.getElementById('pixelCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const cell=pixelCellSize();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let y=0;y<pixelGridH;y++){
    for(let x=0;x<pixelGridW;x++){
      ctx.fillStyle=((x+y)%2===0)?'#f2f2f2':'#fafafa';
      ctx.fillRect(x*cell,y*cell,cell,cell);
      const c=pixelData[y*pixelGridW+x];
      if(c){ ctx.fillStyle=c; ctx.fillRect(x*cell,y*cell,cell,cell); }
    }
  }
  ctx.strokeStyle='rgba(0,0,0,0.08)';
  for(let x=0;x<=pixelGridW;x++){ ctx.beginPath(); ctx.moveTo(x*cell,0); ctx.lineTo(x*cell,canvas.height); ctx.stroke(); }
  for(let y=0;y<=pixelGridH;y++){ ctx.beginPath(); ctx.moveTo(0,y*cell); ctx.lineTo(canvas.width,y*cell); ctx.stroke(); }
  const ax=pixelAnchor.x*cell+cell/2, ay=pixelAnchor.y*cell+cell/2;
  ctx.strokeStyle='#e63946'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(ax-cell/2,ay); ctx.lineTo(ax+cell/2,ay); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ax,ay-cell/2); ctx.lineTo(ax,ay+cell/2); ctx.stroke();
  ctx.beginPath(); ctx.arc(ax,ay,3,0,Math.PI*2); ctx.fillStyle='#e63946'; ctx.fill();
}

function rasterizePixelData(){
  const raster=document.createElement('canvas');
  raster.width=pixelGridW; raster.height=pixelGridH;
  const rctx=raster.getContext('2d');
  for(let y=0;y<pixelGridH;y++){
    for(let x=0;x<pixelGridW;x++){
      const c=pixelData[y*pixelGridW+x];
      if(c){ rctx.fillStyle=c; rctx.fillRect(x,y,1,1); }
    }
  }
  return raster;
}

// ================= 공용: 부위 트리 재귀 렌더러 + 줌/팬 유틸 =================
// transformFn(key) -> {dx,dy,angle} : 이 부위가 부모 원점 기준으로 얼마나 이동/회전하는지
// imageItemIdFn(key) -> itemId(숫자) 또는 null(기본 사용)
function drawPartRecursive(ctx,key,transformFn,imageItemIdFn,selectedKey,handles){
  const part=partByKey(key);
  if(!part) return;
  if(key===selectedKey&&handles) handles.parentFrame=ctx.getTransform(); // 부모 좌표계(이 부위의 dx,dy,angle 적용 전) - 이동 드래그 계산용
  const t=transformFn(key)||{dx:0,dy:0,angle:0};
  ctx.save();
  ctx.translate(t.dx,t.dy);
  ctx.rotate((t.angle||0)*Math.PI/180);
  if(key===selectedKey&&handles) handles.pivot=ctx.getTransform();
  const children=childrenOf(key);
  const backChildren=children.filter(c=>c.layer_mode==='back');
  const frontChildren=children.filter(c=>c.layer_mode!=='back');
  // 뒤 레이어 자식들(예: 뒷머리)은 이 부위 이미지보다 먼저 그려서 뒤에 깔리게 함
  backChildren.forEach(child=>{ drawPartRecursive(ctx,child.key,transformFn,imageItemIdFn,selectedKey,handles); });
  const itemId=imageItemIdFn(key);
  const it=itemId?items.find(i=>i.id===itemId):baseItemFor(key);
  const h=part.display_height||part.default_length||20;
  if(it){
    const img=getImg(it.url);
    if(img.complete&&img.naturalWidth){
      const w=h*(img.naturalWidth/img.naturalHeight);
      const ax=it.anchor_x??0.5, ay=it.anchor_y??0.5;
      ctx.drawImage(img,-w*ax,-h*ay,w,h);
    }
  }
  if(key===selectedKey&&handles){
    ctx.save(); ctx.translate(0,Math.max(24,h*0.9)); handles.rotate=ctx.getTransform(); ctx.restore();
  }
  // 앞 레이어 자식들(기본값, 예: 앞머리)은 이 부위 이미지보다 나중에 그려서 앞에 덮이게 함
  frontChildren.forEach(child=>{ drawPartRecursive(ctx,child.key,transformFn,imageItemIdFn,selectedKey,handles); });
  ctx.restore();
}
function drawHandles(ctx,handles){
  ctx.setTransform(1,0,0,1,0,0);
  if(handles.rotate){
    const pv=handles.pivot.transformPoint(new DOMPoint(0,0));
    const rt=handles.rotate.transformPoint(new DOMPoint(0,0));
    ctx.strokeStyle='rgba(255,159,74,0.7)'; ctx.lineWidth=1.5; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(pv.x,pv.y); ctx.lineTo(rt.x,rt.y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(rt.x,rt.y,7,0,Math.PI*2);
    ctx.fillStyle='#ff9f4a'; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
  }
  if(handles.pivot){
    const pv=handles.pivot.transformPoint(new DOMPoint(0,0));
    ctx.beginPath(); ctx.arc(pv.x,pv.y,7,0,Math.PI*2);
    ctx.fillStyle='#9c4dff'; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
  }
}

// ---- 줌/팬 공용 유틸 ----
function setupZoomPan(canvasId,viewState,redrawFn){
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;
  canvas.addEventListener('wheel',e=>{
    e.preventDefault();
    const factor=e.deltaY<0?1.12:0.89;
    viewState.zoom=Math.max(0.4,Math.min(5,viewState.zoom*factor));
    redrawFn();
  },{passive:false});
  let panning=false, panStart=null;
  canvas.addEventListener('pointerdown',e=>{
    if(canvas.__onHandleDown&&canvas.__onHandleDown(e)) return;
    panning=true;
    panStart={x:e.clientX,y:e.clientY,panX:viewState.panX,panY:viewState.panY};
    canvas.setPointerCapture(e.pointerId);
    canvas.style.cursor='grabbing';
  });
  canvas.addEventListener('pointermove',e=>{
    if(!panning) return;
    viewState.panX=panStart.panX+(e.clientX-panStart.x);
    viewState.panY=panStart.panY+(e.clientY-panStart.y);
    redrawFn();
  });
  function endPan(){ panning=false; canvas.style.cursor='grab'; }
  canvas.addEventListener('pointerup',endPan);
  canvas.addEventListener('pointercancel',endPan);
}
function bindZoomButtons(prefixSelector,viewState,redrawFn){
  document.querySelectorAll(prefixSelector+' .zoomBtn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(btn.dataset.z==='in') viewState.zoom=Math.min(5,viewState.zoom*1.25);
      else if(btn.dataset.z==='out') viewState.zoom=Math.max(0.4,viewState.zoom*0.8);
      else { viewState.zoom=1; viewState.panX=0; viewState.panY=0; }
      redrawFn();
    });
  });
}

function layoutTransformFn(key){

}
function layoutHeightOverride(key){
  const part=partByKey(key);
  if(key===layoutSelectedPart) return layoutTemp.h;
  return part.display_height||part.default_length||20;
}
function drawLayoutCanvas(){
  const canvas=document.getElementById('layoutPreviewCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  layoutHandles={};
  ctx.save();
  ctx.translate(canvas.width/2+layoutView.panX,canvas.height/2+layoutView.panY);
  ctx.scale(layoutView.zoom*layoutFacing,layoutView.zoom);
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1/layoutView.zoom;
  ctx.beginPath(); ctx.moveTo(-canvas.width/2+20,60); ctx.lineTo(canvas.width/2-20,60); ctx.stroke();
  childrenOf(null).forEach(r=>{ ctx.save(); drawPartRecursive(ctx,r.key,layoutTransformFnH,()=>null,layoutSelectedPart,layoutHandles); ctx.restore(); });
  ctx.restore();
  if(layoutHandles.pivot||layoutHandles.rotate) drawHandles(ctx,layoutHandles);
  if(!parts.length){
    ctx.fillStyle='#999'; ctx.font='11px sans-serif'; ctx.textAlign='center';
    ctx.fillText('부위를 먼저 만들어주세요',canvas.width/2,canvas.height/2);
  }
}
let layoutFacing=1;
function layoutTransformFnH(key){ return layoutTransformFn(key); }

function setupLayoutDrag(){
  const canvas=document.getElementById('layoutPreviewCanvas');
  if(!canvas) return;
  let dragMode=null, dragPointerId=null;
  canvas.__onHandleDown=(e)=>{
    if(!layoutSelectedPart) return false;
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
    const cx=(e.clientX-rect.left)*scaleX, cy=(e.clientY-rect.top)*scaleY;
    if(layoutHandles.rotate){
      const pt=layoutHandles.rotate.transformPoint(new DOMPoint(0,0));
      if(Math.hypot(cx-pt.x,cy-pt.y)<16){ dragMode='rotate'; dragPointerId=e.pointerId; canvas.setPointerCapture(e.pointerId); return true; }
    }
    if(layoutHandles.pivot){
      const pt=layoutHandles.pivot.transformPoint(new DOMPoint(0,0));
      if(Math.hypot(cx-pt.x,cy-pt.y)<16){ dragMode='move'; dragPointerId=e.pointerId; canvas.setPointerCapture(e.pointerId); return true; }
    }
    return false;
  };
  canvas.addEventListener('pointermove',e=>{
    if(!dragMode||e.pointerId!==dragPointerId) return;
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
    const cx=(e.clientX-rect.left)*scaleX, cy=(e.clientY-rect.top)*scaleY;
    if(dragMode==='rotate'&&layoutHandles.pivot){
      const local=layoutHandles.pivot.inverse().transformPoint(new DOMPoint(cx,cy));
      const deg=Math.atan2(-local.x,local.y)*180/Math.PI;
      layoutTemp.angle=deg;
      const el=document.getElementById('layAngle'); if(el) el.value=deg.toFixed(1);
      drawLayoutCanvas();
    } else if(dragMode==='move'&&layoutHandles.parentFrame){
      const local=layoutHandles.parentFrame.inverse().transformPoint(new DOMPoint(cx,cy));
      layoutTemp.dx=local.x; layoutTemp.dy=local.y;
      const dxEl=document.getElementById('layDx'), dyEl=document.getElementById('layDy');
      if(dxEl) dxEl.value=layoutTemp.dx.toFixed(1);
      if(dyEl) dyEl.value=layoutTemp.dy.toFixed(1);
      drawLayoutCanvas();
    }
  });
  function endDrag(){ dragMode=null; }
  canvas.addEventListener('pointerup',endDrag);
  canvas.addEventListener('pointercancel',endDrag);
}

// ---- 프레임별 값 조회 (dx,dy,angle은 보간, itemId는 계단식) - 임의의 state 설정을 받아서 계산 ----
function interpFieldIn(st,partKey,field,frame,fallback){
  if(!st||!st.keyframes) return fallback;
  const kfNums=Object.keys(st.keyframes).map(Number).filter(f=>st.keyframes[f][partKey]&&st.keyframes[f][partKey][field]!==undefined).sort((a,b)=>a-b);
  if(!kfNums.length) return fallback;
  let prev=null,next=null;
  kfNums.forEach(f=>{ if(f<=frame) prev=f; if(f>=frame&&next===null) next=f; });
  if(prev===null) prev=next;
  if(next===null) next=prev;
  if(prev===next) return st.keyframes[prev][partKey][field];
  const t=(frame-prev)/(next-prev);
  const a=st.keyframes[prev][partKey][field], b=st.keyframes[next][partKey][field];
  return a+(b-a)*t;
}
function fieldHasKf(st,partKey,field){
  if(!st||!st.keyframes) return false;
  return Object.values(st.keyframes).some(kf=>kf[partKey]&&kf[partKey][field]!==undefined);
}
function itemIdIn(st,partKey,frame){
  if(!st||!st.keyframes) return undefined;
  const kfNums=Object.keys(st.keyframes).map(Number).filter(f=>st.keyframes[f][partKey]&&st.keyframes[f][partKey].itemId!==undefined).sort((a,b)=>a-b);
  if(!kfNums.length) return undefined;
  let chosen=null;
  kfNums.forEach(f=>{ if(f<=frame) chosen=f; });
  if(chosen===null) chosen=kfNums[kfNums.length-1];
  return st.keyframes[chosen][partKey].itemId;
}
// 현재 "편집중인" 트랙 기준 값 (부위 목록 입력창 표시용)
function interpField(partKey,field,frame,fallback){ return interpFieldIn(curStateConfig(),partKey,field,frame,fallback); }
function getItemIdAtFrame(partKey,frame){ return itemIdIn(curStateConfig(),partKey,frame); }
// 모션+표정 두 트랙을 합쳐서 최종 렌더값 계산 (표정 트랙에 값이 있으면 그걸 우선 쓰고, 없으면 모션 트랙, 그것도 없으면 기본값)
function animTransformFn(key){
  const part=partByKey(key);
  const mSt=animConfig.motion[motionCurState], eSt=animConfig.expression[exprCurState];
  function pick(field,fallback){
    if(fieldHasKf(eSt,key,field)) return interpFieldIn(eSt,key,field,exprCurFrame,fallback);
    if(fieldHasKf(mSt,key,field)) return interpFieldIn(mSt,key,field,motionCurFrame,fallback);
    return fallback;
  }
  return {
    dx:pick('dx',part.default_dx||0),
    dy:pick('dy',part.default_dy||0),
    angle:pick('angle',part.default_angle||0)
  };
}
function animImageItemIdFn(key){
  const mSt=animConfig.motion[motionCurState], eSt=animConfig.expression[exprCurState];
  if(fieldHasKf(eSt,key,'itemId')){ const id=itemIdIn(eSt,key,exprCurFrame); return id===undefined?null:id; }
  if(fieldHasKf(mSt,key,'itemId')){ const id=itemIdIn(mSt,key,motionCurFrame); return id===undefined?null:id; }
  return null;
}
function frameKeyframeList(partKey,field){
  const st=curStateConfig();
  return Object.keys(st.keyframes).map(Number).filter(f=>st.keyframes[f][partKey]&&st.keyframes[f][partKey][field]!==undefined).sort((a,b)=>a-b);
}
function setKeyframeField(key,field,val){
  const st=curStateConfig();
  const frame=curTrackFrame();
  if(!st.keyframes[frame]) st.keyframes[frame]={};
  st.keyframes[frame][key]={...st.keyframes[frame][key],[field]:val};
}

    const options=itemsForPart(p.key);
    return `<div class="card" style="padding:10px 14px;margin-bottom:8px;${sel?'border-color:#9c4dff;box-shadow:0 0 0 2px rgba(156,77,255,0.2);':''}">
      <div class="partSelectTitle" data-key="${p.key}" style="font-weight:800;font-size:12px;margin-bottom:6px;cursor:pointer;">${indent}${esc(p.label)} ${sel?'<span style="color:#9c4dff;">◀선택됨</span>':''} ${(hasDx||hasAngle||hasItem)?'<span style="color:#9c4dff;">● 키프레임</span>':''}</div>
      <div class="edit-row"><label>가로(dx)</label><input type="number" class="dxInput" data-key="${p.key}" value="${curDx.toFixed(1)}" step="1"></div>
      <div class="edit-row"><label>세로(dy)</label><input type="number" class="dyInput" data-key="${p.key}" value="${curDy.toFixed(1)}" step="1"></div>
      <div class="edit-row"><label>각도</label><input type="number" class="angleInput" data-key="${p.key}" value="${curAngle.toFixed(1)}" step="1"></div>
      <div style="display:flex;gap:6px;margin-bottom:8px;">
        <div class="ibtn setKfPosBtn" data-key="${p.key}" style="flex:1;text-align:center;padding:7px;border-radius:8px;background:#9c4dff;color:#fff;cursor:pointer;font-size:11px;font-weight:700;">위치·각도 키프레임 추가</div>
        ${(hasDx||hasAngle)?`<div class="ibtn delKfPosBtn" data-key="${p.key}" style="padding:7px 12px;border-radius:8px;background:#f5f5f5;color:#e63946;cursor:pointer;font-size:11px;font-weight:700;">삭제</div>`:''}
      </div>
      ${options.length?`
      <select class="itemSelect" data-key="${p.key}" style="width:100%;padding:7px;border-radius:8px;border:1px solid #ddd;margin-bottom:6px;font-size:12px;">
        <option value="">기본(베이스)</option>
        ${options.map(o=>`<option value="${o.id}" ${curItemId===o.id?'selected':''}>${esc(o.name)}${o.is_base?' (기본)':''}</option>`).join('')}
      </select>
      <div style="display:flex;gap:6px;">
        <div class="ibtn setKfItemBtn" data-key="${p.key}" style="flex:1;text-align:center;padding:7px;border-radius:8px;background:#9c4dff;color:#fff;cursor:pointer;font-size:11px;font-weight:700;">이미지 키프레임 추가</div>
        ${hasItem?`<div class="ibtn delKfItemBtn" data-key="${p.key}" style="padding:7px 12px;border-radius:8px;background:#f5f5f5;color:#e63946;cursor:pointer;font-size:11px;font-weight:700;">삭제</div>`:''}
      </div>`:''}
      ${sel?'<div style="font-size:10px;color:#9c4dff;margin-top:6px;">💡 화면에서 보라(이동)/주황(회전) 손잡이를 드래그하면 바로 반영돼요</div>':''}
    </div>`;
  }).join('');

  list.querySelectorAll('.partSelectTitle').forEach(el=>{
    el.addEventListener('click',()=>{
      animSelectedPart=animSelectedPart===el.dataset.key?null:el.dataset.key;
      renderAnimPartsList();
      drawAnimCanvas();
    });
  });
  list.querySelectorAll('.setKfPosBtn').forEach(el=>{
    el.addEventListener('click',()=>{
      const key=el.dataset.key;
      const dx=parseFloat(list.querySelector(`.dxInput[data-key="${key}"]`).value)||0;
      const dy=parseFloat(list.querySelector(`.dyInput[data-key="${key}"]`).value)||0;
      const angle=parseFloat(list.querySelector(`.angleInput[data-key="${key}"]`).value)||0;
      setKeyframeField(key,'dx',dx); setKeyframeField(key,'dy',dy); setKeyframeField(key,'angle',angle);
      renderAnimPartsList(); drawAnimCanvas();
    });
  });
  list.querySelectorAll('.delKfPosBtn').forEach(el=>{
    el.addEventListener('click',()=>{
      const key=el.dataset.key, st2=curStateConfig(), frame2=curTrackFrame();
      if(st2.keyframes[frame2]&&st2.keyframes[frame2][key]){
        delete st2.keyframes[frame2][key].dx;
        delete st2.keyframes[frame2][key].dy;
        delete st2.keyframes[frame2][key].angle;
      }
      renderAnimPartsList(); drawAnimCanvas();
    });
  });
  list.querySelectorAll('.setKfItemBtn').forEach(el=>{
    el.addEventListener('click',()=>{
      const key=el.dataset.key;
      const sel2=list.querySelector(`.itemSelect[data-key="${key}"]`);
      setKeyframeField(key,'itemId',sel2.value?parseInt(sel2.value):null);
      renderAnimPartsList(); drawAnimCanvas();
    });
  });
  list.querySelectorAll('.delKfItemBtn').forEach(el=>{
    el.addEventListener('click',()=>{
      const key=el.dataset.key, st2=curStateConfig(), frame2=curTrackFrame();
      if(st2.keyframes[frame2]&&st2.keyframes[frame2][key]) delete st2.keyframes[frame2][key].itemId;
      renderAnimPartsList(); drawAnimCanvas();
    });
  });
}

function drawAnimCanvas(){
  const canvas=document.getElementById('animPreviewCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  animHandles={};
  ctx.save();
  ctx.translate(canvas.width/2+animView.panX,canvas.height/2+animView.panY);
  ctx.scale(animView.zoom*animFacing,animView.zoom);
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1/animView.zoom;
  ctx.beginPath(); ctx.moveTo(-canvas.width/2+20,60); ctx.lineTo(canvas.width/2-20,60); ctx.stroke();
  childrenOf(null).forEach(r=>{ ctx.save(); drawPartRecursive(ctx,r.key,animTransformFn,animImageItemIdFn,animSelectedPart,animHandles); ctx.restore(); });
  ctx.restore();
  if(animHandles.pivot||animHandles.rotate) drawHandles(ctx,animHandles);
  if(!parts.some(()=>true)){
    ctx.fillStyle='#999'; ctx.font='11px sans-serif'; ctx.textAlign='center';
    ctx.fillText('부위를 먼저 만들어주세요',canvas.width/2,canvas.height/2);
  }
}

function setupAnimDrag(){
  const canvas=document.getElementById('animPreviewCanvas');
  if(!canvas) return;
  let dragMode=null, dragPointerId=null;
  canvas.__onHandleDown=(e)=>{
    if(!animSelectedPart) return false;
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
    const cx=(e.clientX-rect.left)*scaleX, cy=(e.clientY-rect.top)*scaleY;
    if(animHandles.rotate){
      const pt=animHandles.rotate.transformPoint(new DOMPoint(0,0));
      if(Math.hypot(cx-pt.x,cy-pt.y)<16){ dragMode='rotate'; dragPointerId=e.pointerId; canvas.setPointerCapture(e.pointerId); return true; }
    }
    if(animHandles.pivot){
      const pt=animHandles.pivot.transformPoint(new DOMPoint(0,0));
      if(Math.hypot(cx-pt.x,cy-pt.y)<16){ dragMode='move'; dragPointerId=e.pointerId; canvas.setPointerCapture(e.pointerId); return true; }
    }
    return false;
  };
  canvas.addEventListener('pointermove',e=>{
    if(!dragMode||e.pointerId!==dragPointerId) return;
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
    const cx=(e.clientX-rect.left)*scaleX, cy=(e.clientY-rect.top)*scaleY;
    if(dragMode==='rotate'&&animHandles.pivot&&animSelectedPart){
      const local=animHandles.pivot.inverse().transformPoint(new DOMPoint(cx,cy));
      const deg=Math.atan2(-local.x,local.y)*180/Math.PI;
      setKeyframeField(animSelectedPart,'angle',deg);
      const el=document.querySelector(`.angleInput[data-key="${animSelectedPart}"]`); if(el) el.value=deg.toFixed(1);
      drawAnimCanvas();
    } else if(dragMode==='move'&&animHandles.parentFrame&&animSelectedPart){
      const local=animHandles.parentFrame.inverse().transformPoint(new DOMPoint(cx,cy));
      setKeyframeField(animSelectedPart,'dx',local.x);
      setKeyframeField(animSelectedPart,'dy',local.y);
      const dxEl=document.querySelector(`.dxInput[data-key="${animSelectedPart}"]`);
      const dyEl=document.querySelector(`.dyInput[data-key="${animSelectedPart}"]`);
      if(dxEl) dxEl.value=local.x.toFixed(1);
      if(dyEl) dyEl.value=local.y.toFixed(1);
      drawAnimCanvas();
    }
  });
  function endDrag(){
    if(dragMode){ dragMode=null; renderAnimPartsList(); }
  }
  canvas.addEventListener('pointerup',endDrag);
  canvas.addEventListener('pointercancel',endDrag);
}

function toggleAnimPlay(){
  combinedPlaying=!combinedPlaying;
  const btn=document.getElementById('playAnimBtn');
  if(btn) btn.textContent=combinedPlaying?'⏸ 정지':'▶ 재생(둘다)';
  if(combinedPlaying){ combinedPlayLastTime=0; combinedPlayRaf=requestAnimationFrame(combinedPlayLoop); }
  else if(combinedPlayRaf){ cancelAnimationFrame(combinedPlayRaf); combinedPlayRaf=null; }
}
function stopAnimPlay(){
  if(combinedPlaying){
    combinedPlaying=false;
    if(combinedPlayRaf){ cancelAnimationFrame(combinedPlayRaf); combinedPlayRaf=null; }
    const btn=document.getElementById('playAnimBtn'); if(btn) btn.textContent='▶ 재생(둘다)';
  }
}
function combinedPlayLoop(ts){
  if(!combinedPlaying) return;
  if(!combinedPlayLastTime) combinedPlayLastTime=ts;
  if(ts-combinedPlayLastTime>1000/24){
    combinedPlayLastTime=ts;
    const mSt=animConfig.motion[motionCurState];
    motionCurFrame++;
    if(motionCurFrame>=mSt.frameCount) motionCurFrame=mSt.loop?0:mSt.frameCount-1;
    const eSt=animConfig.expression[exprCurState];
    exprCurFrame++;
    if(exprCurFrame>=eSt.frameCount) exprCurFrame=eSt.loop?0:eSt.frameCount-1;
    const curSt=curStateConfig(), curFrame=curTrackFrame();
    const scrubber=document.getElementById('frameScrubber');
    if(scrubber) scrubber.value=curFrame;
    const counterLabel=document.getElementById('frameCounterLabel');
    if(counterLabel) counterLabel.textContent=curFrame+'/'+(curSt.frameCount-1);
    drawAnimCanvas();
  }
  if(combinedPlaying) combinedPlayRaf=requestAnimationFrame(combinedPlayLoop);
}

init();
</script>
</body>
</html>
