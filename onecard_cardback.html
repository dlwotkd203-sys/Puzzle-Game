<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>카드 뒷면 디자인</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;}
#app{max-width:430px;margin:0 auto;background:#fff;min-height:100vh;}
.top-bar{display:flex;align-items:center;gap:10px;padding:1rem 1rem 0.75rem;border-bottom:1px solid #eee;}
.back-btn{background:none;border:none;cursor:pointer;color:#888;font-size:20px;padding:2px 8px;line-height:1;border-radius:8px;}
.top-title{font-size:17px;font-weight:600;color:#111;flex:1;}
.tabs{display:flex;border-bottom:1px solid #eee;}
.tabbtn{flex:1;text-align:center;padding:12px 0;font-family:-apple-system,sans-serif;font-weight:700;font-size:13px;color:#999;cursor:pointer;border-bottom:2px solid transparent;}
.tabbtn.active{color:#7c5cff;border-bottom-color:#7c5cff;}
.panel{display:none;padding:16px;}
.panel.active{display:block;}
.preview-wrap{display:flex;justify-content:center;margin-bottom:16px;}
#presetPreview{width:110px;height:154px;border-radius:10px;border:1px solid #ccc;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.section-label{font-family:-apple-system,sans-serif;font-weight:700;font-size:12px;color:#666;margin:14px 0 8px;}
.swatch-row{display:flex;gap:8px;flex-wrap:wrap;}
.swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;}
.swatch.sel{border-color:#1a1a2e;}
.pattern-row{display:flex;gap:8px;flex-wrap:wrap;}
.patbtn{padding:8px 14px;border-radius:10px;background:#f0f0f0;font-family:-apple-system,sans-serif;font-weight:700;font-size:12px;cursor:pointer;color:#555;}
.patbtn.sel{background:#7c5cff;color:#fff;}
.save-btn{width:100%;margin-top:20px;font-family:-apple-system,sans-serif;font-weight:700;font-size:14px;padding:12px;border-radius:14px;background:#ff5e3a;color:#fff;cursor:pointer;text-align:center;}
#drawCanvas{border-radius:10px;border:1px solid #ccc;box-shadow:0 2px 8px rgba(0,0,0,0.15);touch-action:none;display:block;margin:0 auto;}
.toolrow{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:12px;}
.toolbtn{padding:8px 12px;border-radius:10px;background:#f0f0f0;font-family:-apple-system,sans-serif;font-weight:700;font-size:12px;cursor:pointer;color:#555;}
.toolbtn.sel{background:#7c5cff;color:#fff;}
.thickrow{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:10px;}
.thickdot{border-radius:50%;background:#555;cursor:pointer;border:2px solid transparent;}
.thickdot.sel{border-color:#7c5cff;}
#colorPicker{width:44px;height:34px;border:none;border-radius:8px;cursor:pointer;}
.login-hint{font-family:-apple-system,sans-serif;font-size:11px;color:#aaa;text-align:center;margin-top:10px;}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <button class="back-btn" onclick="location.href='onecard_rooms.html'">←</button>
    <span class="top-title">카드 뒷면 디자인</span>
  </div>
  <div class="tabs">
    <div class="tabbtn active" data-tab="preset" onclick="switchTab('preset')">색상+무늬 조합</div>
    <div class="tabbtn" data-tab="draw" onclick="switchTab('draw')">직접 그리기</div>
  </div>

  <div class="panel active" id="panel-preset">
    <div class="preview-wrap"><div id="presetPreview"></div></div>
    <div class="section-label">색상</div>
    <div class="swatch-row" id="colorRow"></div>
    <div class="section-label">무늬</div>
    <div class="pattern-row" id="patternRow"></div>
    <div class="save-btn" id="savePresetBtn">이 디자인 저장하기</div>
    <div class="login-hint" id="hint1"></div>
  </div>

  <div class="panel" id="panel-draw">
    <canvas id="drawCanvas" width="200" height="280"></canvas>
    <div class="toolrow" id="toolRow"></div>
    <div class="thickrow" id="thickRow"></div>
    <div class="thickrow" style="margin-top:10px;">
      <input type="color" id="colorPicker" value="#7c5cff"/>
      <div class="toolbtn" id="clearBtn">전체 지우기</div>
    </div>
    <div class="save-btn" id="saveDrawBtn">이 그림 저장하기</div>
    <div class="login-hint" id="hint2"></div>
  </div>
</div>
<script>
const SUPABASE_URL='https://pampoyeyhwwdpzcaubdm.supabase.co';
const SUPABASE_KEY='sb_publishable_xWRbj6jRwR_sojPBYCLfEg_DylayGH5';
let currentUser=null;
try{currentUser=JSON.parse(localStorage.getItem('puzzle_user')||'null');}catch(e){}
function headers(){ return {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function jheaders(){ return {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
if(!currentUser){
  document.getElementById('hint1').textContent='로그인 후 저장할 수 있어요';
  document.getElementById('hint2').textContent='로그인 후 저장할 수 있어요';
}

function switchTab(t){
  document.querySelectorAll('.tabbtn').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));
  document.getElementById('panel-preset').classList.toggle('active',t==='preset');
  document.getElementById('panel-draw').classList.toggle('active',t==='draw');
}

// ---- 프리셋 (색상+무늬) ----
const COLORS=['#7c5cff','#e53935','#0f9e75','#f5a623','#378ADD','#d4537e','#333333','#ff8fab','#2ec4b6','#6a4ce0'];
const PATTERNS=[{id:'solid',label:'단색'},{id:'stripe',label:'줄무늬'},{id:'dots',label:'물방울'},{id:'grid',label:'격자'}];
let selColor=COLORS[0], selPattern='stripe';

function bgForPattern(color,pattern){
  if(pattern==='solid') return color;
  if(pattern==='stripe') return `repeating-linear-gradient(45deg,${color},${color} 8px,${shade(color,-18)} 8px,${shade(color,-18)} 16px)`;
  if(pattern==='dots') return `radial-gradient(${shade(color,-15)} 22%,transparent 23%) 0 0/16px 16px, ${color}`;
  if(pattern==='grid') return `repeating-linear-gradient(0deg,${shade(color,-15)},${shade(color,-15)} 2px,transparent 2px,transparent 14px),repeating-linear-gradient(90deg,${shade(color,-15)},${shade(color,-15)} 2px,transparent 2px,transparent 14px),${color}`;
  return color;
}
function shade(hex,amt){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+(r<<16|g<<8|b).toString(16).padStart(6,'0');
}
function renderPresetPreview(){
  document.getElementById('presetPreview').style.background=bgForPattern(selColor,selPattern);
  document.getElementById('presetPreview').style.backgroundColor=selColor;
}
const colorRow=document.getElementById('colorRow');
COLORS.forEach(c=>{
  const el=document.createElement('div');
  el.className='swatch'+(c===selColor?' sel':'');
  el.style.background=c;
  el.addEventListener('click',()=>{ selColor=c; document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('sel')); el.classList.add('sel'); renderPresetPreview(); });
  colorRow.appendChild(el);
});
const patternRow=document.getElementById('patternRow');
PATTERNS.forEach(p=>{
  const el=document.createElement('div');
  el.className='patbtn'+(p.id===selPattern?' sel':'');
  el.textContent=p.label;
  el.addEventListener('click',()=>{ selPattern=p.id; document.querySelectorAll('.patbtn').forEach(s=>s.classList.remove('sel')); el.classList.add('sel'); renderPresetPreview(); });
  patternRow.appendChild(el);
});
renderPresetPreview();

async function upsertCardback(body){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/onecard_cardbacks?user_id=eq.${currentUser.id}&select=user_id`,{headers:headers()});
  const ex=await r.json();
  if(ex.length){
    await fetch(`${SUPABASE_URL}/rest/v1/onecard_cardbacks?user_id=eq.${currentUser.id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify(body)});
  } else {
    await fetch(`${SUPABASE_URL}/rest/v1/onecard_cardbacks`,{method:'POST',headers:jheaders(),body:JSON.stringify({user_id:currentUser.id,username:currentUser.username,...body})});
  }
}
document.getElementById('savePresetBtn').addEventListener('click',async()=>{
  if(!currentUser){ alert('로그인 후 이용해주세요.'); return; }
  await upsertCardback({bg_color:selColor,pattern:selPattern,custom_image:null});
  alert('저장했어요!');
});

// ---- 직접 그리기 ----
const canvas=document.getElementById('drawCanvas');
const ctx=canvas.getContext('2d');
ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.lineCap='round'; ctx.lineJoin='round';

const TOOLS=[{id:'pen',label:'펜'},{id:'line',label:'직선'},{id:'rect',label:'사각형'},{id:'circle',label:'원'},{id:'fill',label:'채우기'},{id:'eraser',label:'지우개'}];
let curTool='pen';
const toolRow=document.getElementById('toolRow');
TOOLS.forEach(t=>{
  const el=document.createElement('div');
  el.className='toolbtn'+(t.id===curTool?' sel':'');
  el.textContent=t.label;
  el.addEventListener('click',()=>{ curTool=t.id; document.querySelectorAll('#toolRow .toolbtn').forEach(s=>s.classList.remove('sel')); el.classList.add('sel'); });
  toolRow.appendChild(el);
});

const THICKS=[3,6,12,20];
let curThick=6;
const thickRow=document.getElementById('thickRow');
THICKS.forEach(sz=>{
  const el=document.createElement('div');
  el.className='thickdot'+(sz===curThick?' sel':'');
  el.style.width=(sz+8)+'px'; el.style.height=(sz+8)+'px';
  el.addEventListener('click',()=>{ curThick=sz; document.querySelectorAll('.thickdot').forEach(s=>s.classList.remove('sel')); el.classList.add('sel'); });
  thickRow.appendChild(el);
});

const colorPicker=document.getElementById('colorPicker');

let drawing=false,startPt=null,snapshot=null,lastPt=null;
function getPos(e){
  const r=canvas.getBoundingClientRect();
  return {x:(e.clientX-r.left)*(canvas.width/r.width), y:(e.clientY-r.top)*(canvas.height/r.height)};
}
function floodFill(x,y,fillColor){
  x=Math.round(x); y=Math.round(y);
  const w=canvas.width,h=canvas.height;
  const img=ctx.getImageData(0,0,w,h);
  const data=img.data;
  const idx0=(y*w+x)*4;
  const target=[data[idx0],data[idx0+1],data[idx0+2],data[idx0+3]];
  const fr=parseInt(fillColor.slice(1,3),16),fg=parseInt(fillColor.slice(3,5),16),fb=parseInt(fillColor.slice(5,7),16);
  if(target[0]===fr&&target[1]===fg&&target[2]===fb) return;
  const tol=32;
  function match(i){
    return Math.abs(data[i]-target[0])<=tol&&Math.abs(data[i+1]-target[1])<=tol&&Math.abs(data[i+2]-target[2])<=tol;
  }
  const stack=[[x,y]];
  const visited=new Uint8Array(w*h);
  while(stack.length){
    const [cx,cy]=stack.pop();
    if(cx<0||cy<0||cx>=w||cy>=h) continue;
    const vIdx=cy*w+cx;
    if(visited[vIdx]) continue;
    const i=vIdx*4;
    if(!match(i)) continue;
    visited[vIdx]=1;
    data[i]=fr; data[i+1]=fg; data[i+2]=fb; data[i+3]=255;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  ctx.putImageData(img,0,0);
}

canvas.addEventListener('pointerdown',e=>{
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  const p=getPos(e);
  if(curTool==='fill'){ floodFill(p.x,p.y,colorPicker.value); return; }
  drawing=true; startPt=p; lastPt=p;
  if(curTool==='pen'||curTool==='eraser'){
    ctx.beginPath(); ctx.moveTo(p.x,p.y);
  } else {
    snapshot=ctx.getImageData(0,0,canvas.width,canvas.height);
  }
});
canvas.addEventListener('pointermove',e=>{
  if(!drawing) return;
  const p=getPos(e);
  ctx.lineWidth=curThick;
  ctx.strokeStyle=curTool==='eraser'?'#ffffff':colorPicker.value;
  ctx.fillStyle=colorPicker.value;
  if(curTool==='pen'||curTool==='eraser'){
    ctx.lineTo(p.x,p.y); ctx.stroke();
    lastPt=p;
  } else if(curTool==='line'){
    ctx.putImageData(snapshot,0,0);
    ctx.beginPath(); ctx.moveTo(startPt.x,startPt.y); ctx.lineTo(p.x,p.y); ctx.stroke();
  } else if(curTool==='rect'){
    ctx.putImageData(snapshot,0,0);
    ctx.strokeRect(Math.min(startPt.x,p.x),Math.min(startPt.y,p.y),Math.abs(p.x-startPt.x),Math.abs(p.y-startPt.y));
  } else if(curTool==='circle'){
    ctx.putImageData(snapshot,0,0);
    const rx=Math.abs(p.x-startPt.x)/2, ry=Math.abs(p.y-startPt.y)/2;
    const cx=(startPt.x+p.x)/2, cy=(startPt.y+p.y)/2;
    ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.stroke();
  }
});
function endStroke(e){
  if(!drawing) return;
  drawing=false; snapshot=null;
}
canvas.addEventListener('pointerup',endStroke);
canvas.addEventListener('pointercancel',endStroke);

document.getElementById('clearBtn').addEventListener('click',()=>{
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
});
document.getElementById('saveDrawBtn').addEventListener('click',async()=>{
  if(!currentUser){ alert('로그인 후 이용해주세요.'); return; }
  const dataUrl=canvas.toDataURL('image/png');
  await upsertCardback({custom_image:dataUrl,bg_color:null,pattern:null});
  alert('저장했어요!');
});

// 기존 저장된 디자인 불러와서 초기 화면에 반영
async function loadExisting(){
  if(!currentUser) return;
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/onecard_cardbacks?user_id=eq.${currentUser.id}&select=*`,{headers:headers()});
    const data=await r.json();
    if(!data.length) return;
    const d=data[0];
    if(d.custom_image){
      const img=new Image();
      img.onload=()=>{ ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0,canvas.width,canvas.height); };
      img.src=d.custom_image;
      switchTab('draw');
    } else if(d.bg_color){
      selColor=d.bg_color; selPattern=d.pattern||'stripe';
      document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('sel',s.style.background===selColor||rgbToHex(s.style.background)===selColor));
      document.querySelectorAll('.patbtn').forEach(s=>s.classList.toggle('sel',PATTERNS.find(p=>p.label===s.textContent)?.id===selPattern));
      renderPresetPreview();
    }
  }catch(e){}
}
function rgbToHex(rgb){
  const m=rgb.match(/\d+/g); if(!m) return rgb;
  return '#'+m.slice(0,3).map(x=>(+x).toString(16).padStart(2,'0')).join('');
}
loadExisting();
</script>
</body>
</html>
