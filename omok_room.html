<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>오목 대국방</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;}
#app{max-width:430px;margin:0 auto;background:#fff;min-height:100vh;}
.top-bar{display:flex;align-items:center;gap:10px;padding:1rem 1rem 0.75rem;border-bottom:1px solid #eee;}
.back-btn{background:none;border:none;cursor:pointer;color:#888;font-size:20px;padding:2px 8px;line-height:1;border-radius:8px;}
.top-title{font-size:15px;font-weight:600;color:#111;flex:1;}
.stats-row{display:flex;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #f0f0f0;}
.stat-box{text-align:center;flex:1;}
.stat-name{font-size:12px;font-weight:700;color:#111;}
.stat-detail{font-size:11px;color:#999;margin-top:2px;}
.vs{font-size:12px;color:#ccc;padding:0 8px;align-self:center;}
.wrap{padding:14px;display:flex;flex-direction:column;align-items:center;gap:10px;}
#statusTxt{font-family:-apple-system,sans-serif;font-weight:700;font-size:14px;color:#1a1a2e;}
.actionBtn{font-family:-apple-system,sans-serif;font-weight:700;font-size:12px;padding:8px 14px;border-radius:18px;cursor:pointer;}
.center-msg{text-align:center;padding:2rem 1rem;color:#8a8a9a;font-size:13px;line-height:1.8;}
.big-btn{font-family:-apple-system,sans-serif;font-weight:700;font-size:14px;padding:12px 26px;border-radius:22px;cursor:pointer;}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <button class="back-btn" id="leaveBtn">←</button>
    <span class="top-title" id="roomTitle">오목 대국방</span>
  </div>
  <div class="stats-row" id="statsRow" style="display:none;">
    <div class="stat-box"><div class="stat-name" id="hostName">-</div><div class="stat-detail" id="hostStat">-</div></div>
    <div class="vs">VS</div>
    <div class="stat-box"><div class="stat-name" id="guestName">-</div><div class="stat-detail" id="guestStat">-</div></div>
  </div>
  <div class="wrap" id="wrap">
    <div class="center-msg">불러오는 중...</div>
  </div>
</div>
<script>
const SUPABASE_URL='https://pampoyeyhwwdpzcaubdm.supabase.co';
const SUPABASE_KEY='sb_publishable_xWRbj6jRwR_sojPBYCLfEg_DylayGH5';
let currentUser=null;
try{currentUser=JSON.parse(localStorage.getItem('puzzle_user')||'null');}catch(e){}
const roomId=new URLSearchParams(location.search).get('id');
function headers(){ return {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function jheaders(){ return {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }

document.getElementById('leaveBtn').addEventListener('click',leaveRoom);

let room=null,role='spectator',myColor=0;
let N=15,CELL=18,PAD=14,SIZE=PAD*2+CELL*(N-1);
let canvas=null,ctx=null,preview=null,winLine=null,applyingResult=false;
let pollTimer=null;

async function fetchRoom(){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/omok_rooms?id=eq.${roomId}&select=*`,{headers:headers()});
    const data=await r.json();
    if(!data.length){ document.getElementById('wrap').innerHTML='<div class="center-msg">방을 찾을 수 없어요.</div>'; clearInterval(pollTimer); return; }
    room=data[0];
    role = currentUser&&room.host_user_id===currentUser.id ? 'host' : (currentUser&&room.guest_user_id===currentUser.id?'guest':'spectator');
    myColor = role==='host'?1:(role==='guest'?2:0);
    render();
  }catch(e){}
}

async function loadEloFor(username,userId,elId,elDetailId){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/omok_elo?user_id=eq.${userId}&select=rating,wins,losses`,{headers:headers()});
    const data=await r.json();
    document.getElementById(elId).textContent=username;
    if(data.length){
      const d=data[0];
      const total=d.wins+d.losses;
      const wr=total>0?Math.round(d.wins/total*100):0;
      document.getElementById(elDetailId).textContent=`${d.rating}점 · ${d.wins}승${d.losses}패(${wr}%)`;
    } else {
      document.getElementById(elDetailId).textContent='1000점 · 0승0패';
    }
  }catch(e){}
}

function render(){
  document.getElementById('roomTitle').textContent=room.host_username+'님의 방';
  if(room.guest_user_id){
    document.getElementById('statsRow').style.display='flex';
    loadEloFor(room.host_username,room.host_user_id,'hostName','hostStat');
    loadEloFor(room.guest_username,room.guest_user_id,'guestName','guestStat');
  }

  const wrap=document.getElementById('wrap');

  if(room.status==='waiting'||room.status==='ready'){
    renderLobby(wrap);
    return;
  }
  if(room.status==='playing'){
    renderGame(wrap);
    return;
  }
  if(room.status==='finished'){
    renderFinished(wrap);
    return;
  }
}

function renderLobby(wrap){
  if(!room.guest_user_id){
    wrap.innerHTML='<div class="center-msg">상대를 기다리는 중...<br/>방 목록에서 다른 유저가 입장하면 시작할 수 있어요.</div>';
    return;
  }
  const guestReady=!!room.guest_ready;
  let html=`<div class="center-msg">${room.host_username}(흑) vs ${room.guest_username}(백)<br/>${guestReady?'상대가 준비를 마쳤어요!':'상대의 준비를 기다리는 중...'}</div>`;
  if(role==='guest'){
    html+=`<div class="big-btn" id="readyBtn" style="background:${guestReady?'#ffd166':'#378ADD'};color:${guestReady?'#1a1a2e':'#fff'};">${guestReady?'준비 취소':'게임 준비'}</div>`;
  } else if(role==='host'){
    html+=`<div class="big-btn" id="startBtn" style="background:${guestReady?'#ff5e3a':'#e2e2e2'};color:${guestReady?'#fff':'#999'};">게임 시작</div>`;
  } else {
    html+='<div class="center-msg">대국 시작을 기다리는 중이에요.</div>';
  }
  wrap.innerHTML=html;
  if(role==='guest'){
    document.getElementById('readyBtn').addEventListener('click',async()=>{
      await fetch(`${SUPABASE_URL}/rest/v1/omok_rooms?id=eq.${room.id}`,{method:'PATCH',headers:jheaders(),
        body:JSON.stringify({guest_ready:!guestReady,status:!guestReady?'ready':'waiting'})});
      fetchRoom();
    });
  } else if(role==='host'&&guestReady){
    document.getElementById('startBtn').addEventListener('click',async()=>{
      await fetch(`${SUPABASE_URL}/rest/v1/omok_rooms?id=eq.${room.id}`,{method:'PATCH',headers:jheaders(),
        body:JSON.stringify({status:'playing',turn:1,move_count:0,board:JSON.stringify(Array.from({length:15},()=>new Array(15).fill(0)))})});
      fetchRoom();
    });
  }
}

function boardFromRoom(){ return JSON.parse(room.board); }
function inB(x,y){ return x>=0&&x<N&&y>=0&&y<N; }
function runInfo(bd,x,y,dx,dy,color){
  let len=1,cx=x+dx,cy=y+dy;
  while(inB(cx,cy)&&bd[cx][cy]===color){len++;cx+=dx;cy+=dy;}
  const rightOpen=inB(cx,cy)&&bd[cx][cy]===0;
  let cx2=x-dx,cy2=y-dy;
  while(inB(cx2,cy2)&&bd[cx2][cy2]===color){len++;cx2-=dx;cy2-=dy;}
  const leftOpen=inB(cx2,cy2)&&bd[cx2][cy2]===0;
  return {len,leftOpen,rightOpen};
}
const DIRS=[[1,0],[0,1],[1,1],[1,-1]];
function checkWin(bd,x,y,color){
  for(const d of DIRS){ const info=runInfo(bd,x,y,d[0],d[1],color); if(info.len>=5) return {win:true,dir:d}; }
  return {win:false};
}
function getWinLine(bd,x,y,color,dir){
  const pts=[[x,y]];
  let cx=x+dir[0],cy=y+dir[1];
  while(inB(cx,cy)&&bd[cx][cy]===color){pts.push([cx,cy]);cx+=dir[0];cy+=dir[1];}
  cx=x-dir[0];cy=y-dir[1];
  while(inB(cx,cy)&&bd[cx][cy]===color){pts.unshift([cx,cy]);cx-=dir[0];cy-=dir[1];}
  return pts;
}
function isDoubleThree(bd,x,y,color){
  bd[x][y]=color; let cnt=0;
  for(const d of DIRS){ const info=runInfo(bd,x,y,d[0],d[1],color); if(info.len===3&&info.leftOpen&&info.rightOpen) cnt++; }
  bd[x][y]=0;
  return cnt>=2;
}

function renderGame(wrap){
  if(!canvas){
    wrap.innerHTML='<div id="statusTxt"></div><canvas id="board" style="touch-action:none;"></canvas>'
      +'<div style="display:flex;gap:8px;">'
      +'<div id="confirmBtn" class="actionBtn" style="background:#378ADD;color:#fff;opacity:0.4;">착수</div>'
      +'<div id="undoBtn" class="actionBtn" style="background:#ffd166;color:#1a1a2e;">무르기</div>'
      +'<div id="resignBtn" class="actionBtn" style="background:#f0f0f0;color:#888;">기권</div>'
      +'</div>';
    canvas=document.getElementById('board');
    canvas.width=SIZE;canvas.height=SIZE;
    canvas.style.width=SIZE+'px';canvas.style.height=SIZE+'px';
    ctx=canvas.getContext('2d');
    canvas.addEventListener('pointerdown',onBoardTap);
    document.getElementById('confirmBtn').addEventListener('pointerdown',onConfirm);
    document.getElementById('undoBtn').addEventListener('pointerdown',onUndo);
    document.getElementById('resignBtn').addEventListener('pointerdown',onResign);
  }
  const myTurn=role!=='spectator'&&room.turn===myColor;
  document.getElementById('statusTxt').textContent = role==='spectator'
    ? (room.turn===1?room.host_username+'(흑) 차례':room.guest_username+'(백) 차례')
    : (myTurn?'내 차례 ('+(myColor===1?'흑':'백')+')':'상대 차례');
  const undoBtn=document.getElementById('undoBtn');
  const canUndo = role!=='spectator' && room.turn!==myColor && room.move_count>0;
  undoBtn.style.opacity = canUndo?'1':'0.4';
  document.getElementById('resignBtn').style.display = role==='spectator'?'none':'block';
  drawBoard();
}

async function onBoardTap(e){
  if(!room||room.status!=='playing') return;
  const myTurn=role!=='spectator'&&room.turn===myColor;
  if(!myTurn) return;
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const gx=Math.round((mx-PAD)/CELL),gy=Math.round((my-PAD)/CELL);
  const bd=boardFromRoom();
  if(!inB(gx,gy)||bd[gx][gy]!==0) return;
  preview={x:gx,y:gy};
  document.getElementById('confirmBtn').style.opacity='1';
  drawBoard();
}

async function onConfirm(){
  if(!preview||!room||room.status!=='playing') return;
  const myTurn=role!=='spectator'&&room.turn===myColor;
  if(!myTurn) return;
  const bd=boardFromRoom();
  if(myColor===1&&isDoubleThree(bd,preview.x,preview.y,1)){
    document.getElementById('statusTxt').textContent='33 금지! 다른 자리를 선택하세요';
    setTimeout(()=>renderGame(document.getElementById('wrap')),1200);
    return;
  }
  bd[preview.x][preview.y]=myColor;
  const wr=checkWin(bd,preview.x,preview.y,myColor);
  const nextTurn=myColor===1?2:1;
  const newMoveCount=room.move_count+1;
  const patchBody={board:JSON.stringify(bd),turn:nextTurn,move_count:newMoveCount};
  if(wr.win){ patchBody.winner=myColor; patchBody.status='finished'; }

  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/omok_rooms?id=eq.${room.id}&move_count=eq.${room.move_count}`,{
      method:'PATCH',headers:Object.assign({},jheaders(),{'Prefer':'return=representation'}),body:JSON.stringify(patchBody)
    });
    const data=await res.json();
    if(!data||!data.length){
      alert('동기화 오류가 발생했어요. 다시 시도해주세요.');
      preview=null; fetchRoom(); return;
    }
    fetch(`${SUPABASE_URL}/rest/v1/omok_moves`,{method:'POST',headers:jheaders(),
      body:JSON.stringify({room_id:room.id,move_index:newMoveCount-1,x:preview.x,y:preview.y,color:myColor})}).catch(()=>{});
    preview=null;
    room=data[0];
    if(wr.win){ await applyEloResult(myColor); }
    render();
  }catch(e){}
}

async function onUndo(){
  if(!room||room.status!=='playing') return;
  const canUndo = role!=='spectator' && room.turn!==myColor && room.move_count>0;
  if(!canUndo) return;
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/omok_moves?room_id=eq.${room.id}&order=move_index.desc&limit=1`,{headers:headers()});
    const last=await r.json();
    if(!last.length) return;
    const bd=boardFromRoom();
    bd[last[0].x][last[0].y]=0;
    await fetch(`${SUPABASE_URL}/rest/v1/omok_rooms?id=eq.${room.id}&move_count=eq.${room.move_count}`,{
      method:'PATCH',headers:jheaders(),
      body:JSON.stringify({board:JSON.stringify(bd),turn:myColor,move_count:room.move_count-1})
    });
    fetchRoom();
  }catch(e){}
}

async function onResign(){
  if(!room||role==='spectator'||room.status!=='playing') return;
  if(!confirm('정말 기권할까요?')) return;
  const oppColor=myColor===1?2:1;
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/omok_rooms?id=eq.${room.id}&status=eq.playing`,{
      method:'PATCH',headers:Object.assign({},jheaders(),{'Prefer':'return=representation'}),
      body:JSON.stringify({status:'finished',winner:oppColor})
    });
    const data=await res.json();
    if(data&&data.length){ room=data[0]; await applyEloResult(oppColor); render(); }
  }catch(e){}
}

async function getOrCreateElo(userId,username){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/omok_elo?user_id=eq.${userId}&select=*`,{headers:headers()});
  const data=await r.json();
  if(data.length) return data[0];
  const created={user_id:userId,username:username,rating:1000,wins:0,losses:0};
  await fetch(`${SUPABASE_URL}/rest/v1/omok_elo`,{method:'POST',headers:jheaders(),body:JSON.stringify(created)});
  return created;
}
async function applyEloResult(winnerColor){
  if(applyingResult) return;
  applyingResult=true;
  try{
    const hostElo=await getOrCreateElo(room.host_user_id,room.host_username);
    const guestElo=await getOrCreateElo(room.guest_user_id,room.guest_username);
    const hostWon=winnerColor===1;
    const expHost=1/(1+Math.pow(10,(guestElo.rating-hostElo.rating)/400));
    const expGuest=1-expHost;
    const K=32;
    const newHostRating=Math.round(hostElo.rating+K*((hostWon?1:0)-expHost));
    const newGuestRating=Math.round(guestElo.rating+K*((hostWon?0:1)-expGuest));
    await fetch(`${SUPABASE_URL}/rest/v1/omok_elo?user_id=eq.${room.host_user_id}`,{method:'PATCH',headers:jheaders(),
      body:JSON.stringify({rating:newHostRating,wins:hostElo.wins+(hostWon?1:0),losses:hostElo.losses+(hostWon?0:1)})});
    await fetch(`${SUPABASE_URL}/rest/v1/omok_elo?user_id=eq.${room.guest_user_id}`,{method:'PATCH',headers:jheaders(),
      body:JSON.stringify({rating:newGuestRating,wins:guestElo.wins+(hostWon?0:1),losses:guestElo.losses+(hostWon?1:0)})});
  }catch(e){}
  applyingResult=false;
}

function renderFinished(wrap){
  const winner=room.winner;
  let txt;
  if(winner===0||winner==null){ txt='게임이 종료되었어요.'; }
  else { txt=(winner===1?room.host_username+'(흑)':room.guest_username+'(백)')+' 승리! 🎉'; }
  wrap.innerHTML='<div class="center-msg">'+txt+'</div><div class="big-btn" id="backBtn" style="background:#378ADD;color:#fff;">방 목록으로</div>';
  document.getElementById('backBtn').addEventListener('click',()=>location.href='omok_rooms.html');
  drawFinalBoardIfAny(wrap);
}
function drawFinalBoardIfAny(wrap){
  if(!room.board) return;
  const c=document.createElement('canvas');
  c.width=SIZE;c.height=SIZE;c.style.width=SIZE+'px';c.style.height=SIZE+'px';
  c.style.marginTop='10px';
  wrap.insertBefore(c,wrap.firstChild.nextSibling);
  const cx2=c.getContext('2d');
  const bd=boardFromRoom();
  drawBoardTo(cx2,bd,null,null);
}

async function leaveRoom(){
  if(room&&room.status!=='playing'){
    if(role==='host'){
      await fetch(`${SUPABASE_URL}/rest/v1/omok_rooms?id=eq.${room.id}`,{method:'DELETE',headers:headers()});
    } else if(role==='guest'){
      await fetch(`${SUPABASE_URL}/rest/v1/omok_rooms?id=eq.${room.id}`,{method:'PATCH',headers:jheaders(),
        body:JSON.stringify({guest_user_id:null,guest_username:null,guest_ready:false,status:'waiting'})});
    }
  }
  location.href='omok_rooms.html';
}

function drawBoard(){
  if(!ctx||!room) return;
  const bd=boardFromRoom();
  let wl=null;
  if(room.status==='finished'&&room.winner){
    for(let x=0;x<N;x++)for(let y=0;y<N;y++){
      if(bd[x][y]===room.winner){
        const wr=checkWin(bd,x,y,room.winner);
        if(wr.win){ wl=getWinLine(bd,x,y,room.winner,wr.dir); }
      }
    }
  }
  drawBoardTo(ctx,bd,preview,wl);
}
function drawBoardTo(c,bd,prev,wl){
  c.fillStyle='#e8c48a'; c.fillRect(0,0,SIZE,SIZE);
  c.strokeStyle='rgba(90,60,20,0.6)'; c.lineWidth=1;
  for(let i=0;i<N;i++){
    c.beginPath();c.moveTo(PAD,PAD+i*CELL);c.lineTo(PAD+(N-1)*CELL,PAD+i*CELL);c.stroke();
    c.beginPath();c.moveTo(PAD+i*CELL,PAD);c.lineTo(PAD+i*CELL,PAD+(N-1)*CELL);c.stroke();
  }
  [3,7,11].forEach(ix=>{ [3,7,11].forEach(iy=>{
    c.fillStyle='rgba(90,60,20,0.6)';
    c.beginPath();c.arc(PAD+ix*CELL,PAD+iy*CELL,2.2,0,Math.PI*2);c.fill();
  }); });
  for(let x=0;x<N;x++)for(let y=0;y<N;y++){ if(bd[x][y]!==0) drawStoneTo(c,x,y,bd[x][y],1); }
  if(prev){ drawStoneTo(c,prev.x,prev.y,myColor,0.45); }
  if(wl){
    c.strokeStyle='rgba(224,66,42,0.85)'; c.lineWidth=3;
    c.beginPath();
    c.moveTo(PAD+wl[0][0]*CELL,PAD+wl[0][1]*CELL);
    const last=wl[wl.length-1];
    c.lineTo(PAD+last[0]*CELL,PAD+last[1]*CELL);
    c.stroke();
  }
}
function drawStoneTo(c,x,y,color,alpha){
  const cx=PAD+x*CELL,cy=PAD+y*CELL;
  c.globalAlpha=alpha;
  const g=c.createRadialGradient(cx-2.5,cy-2.5,1,cx,cy,CELL*0.42);
  if(color===1){ g.addColorStop(0,'#5a5a5a'); g.addColorStop(1,'#0a0a0a'); }
  else { g.addColorStop(0,'#ffffff'); g.addColorStop(1,'#c9c9c9'); }
  c.fillStyle=g;
  c.beginPath();c.arc(cx,cy,CELL*0.42,0,Math.PI*2);c.fill();
  c.globalAlpha=1;
}

if(!currentUser){
  document.getElementById('wrap').innerHTML='<div class="center-msg">로그인 후 이용해주세요.</div>';
} else if(!roomId){
  document.getElementById('wrap').innerHTML='<div class="center-msg">잘못된 접근이에요.</div>';
} else {
  fetchRoom();
  pollTimer=setInterval(fetchRoom,1000);
}
</script>
</body>
</html>
