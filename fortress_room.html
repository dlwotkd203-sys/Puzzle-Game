<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>포트탱크</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%; height:100dvh;
  overflow:hidden; overscroll-behavior:none;
  position:fixed; width:100%;
  touch-action:none;
  background:#0b1220;
}
#app{max-width:430px;margin:0 auto;height:100%;height:100dvh;display:flex;flex-direction:column;position:relative;box-shadow:0 0 0 1px rgba(255,255,255,0.06);}

.hud{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;background:rgba(10,14,22,0.95);
  border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;z-index:10;
}
.back-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.4);font-size:18px;padding:2px 6px;line-height:1;}
.turn-chip{display:flex;align-items:center;gap:6px;font-family:-apple-system,sans-serif;font-size:12px;font-weight:800;color:#fff;background:rgba(255,255,255,0.08);padding:5px 10px;border-radius:999px;flex-shrink:0;}
.turn-dot{width:9px;height:9px;border-radius:50%;}
.hp-row{flex:1;display:flex;gap:4px;overflow-x:auto;}
.hp-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;opacity:0.5;}
.hp-chip.active{opacity:1;}
.hp-dot{width:10px;height:10px;border-radius:50%;}
.hp-bar-mini{width:24px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);overflow:hidden;}
.hp-bar-mini-fill{height:100%;background:#4ade80;border-radius:2px;}

.wind-box{display:flex;flex-direction:column;align-items:center;flex-shrink:0;min-width:44px;}
.wind-label{font-family:-apple-system,sans-serif;font-size:8px;color:rgba(255,255,255,0.4);font-weight:700;letter-spacing:0.5px;}
.wind-chevrons{font-size:15px;font-weight:900;line-height:1;transition:color .2s,transform .2s;}

.canvas-wrap{position:relative;flex:1;}
#canvas{display:block;width:100%;height:100%;}
#minimap{position:absolute;top:8px;right:8px;width:110px;height:56px;border-radius:8px;border:1px solid rgba(255,255,255,0.3);background:rgba(6,10,18,0.55);z-index:5;}

.controls{background:rgba(10,14,22,0.95);border-top:1px solid rgba(255,255,255,0.06);padding:8px 12px 10px;flex-shrink:0;display:flex;flex-direction:column;gap:7px;}
.ctrl-row{display:flex;align-items:center;gap:8px;}
.ctrl-btn{
  width:44px;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06);color:#fff;font-size:17px;font-weight:700;
  display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;flex-shrink:0;
}
.ctrl-btn:active{background:rgba(255,255,255,0.18);}
.fuel-wrap{flex:1;height:9px;border-radius:5px;background:rgba(255,255,255,0.1);overflow:hidden;}
.fuel-fill{height:100%;background:linear-gradient(90deg,#60a5fa,#38bdf8);transition:width .1s linear;}
.angle-val{flex:1;text-align:center;font-family:-apple-system,sans-serif;font-weight:800;color:#fff;font-size:14px;font-variant-numeric:tabular-nums;}
.weapon-row{display:flex;gap:6px;}
.weapon-btn{
  flex:1;padding:6px 2px;border-radius:9px;border:1.5px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.6);text-align:center;cursor:pointer;
}
.weapon-btn.sel{border-color:#fff;background:rgba(255,255,255,0.14);color:#fff;}
.weapon-emoji{font-size:15px;}
.weapon-label{font-family:-apple-system,sans-serif;font-size:9px;font-weight:700;margin-top:1px;}
.weapon-stats{font-family:-apple-system,sans-serif;font-size:7.5px;font-weight:600;color:rgba(255,255,255,0.55);margin-top:1px;}
.fire-btn{
  height:52px;border-radius:14px;border:none;position:relative;overflow:hidden;
  background:#3a1518;cursor:pointer;
}
.fire-fill{position:absolute;left:0;top:0;bottom:0;width:0%;background:linear-gradient(90deg,#f97316,#ef4444);transition:width .05s linear;}
.fire-marker{position:absolute;top:0;bottom:0;width:3px;background:#fff;z-index:3;box-shadow:0 0 6px rgba(255,255,255,0.85);}
.fire-marker::after{content:'▼';position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:9px;color:#fff;}
.fire-label{position:relative;z-index:2;font-family:-apple-system,sans-serif;font-weight:900;color:#fff;font-size:15px;letter-spacing:1px;display:flex;align-items:center;justify-content:center;height:100%;text-shadow:0 1px 3px rgba(0,0,0,0.5);}

.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;background:rgba(6,10,16,0.7);}
.popup-card{display:flex;flex-direction:column;align-items:center;gap:12px;background:#151b28;border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:26px 24px;box-shadow:0 20px 50px rgba(0,0,0,0.5);max-width:88%;}
.ov-title{font-size:24px;font-weight:800;color:#fff;}
.ov-sub{font-size:13px;color:rgba(255,255,255,0.4);text-align:center;line-height:1.5;}
.player-count-row{display:flex;gap:8px;}
.pc-btn{width:42px;height:42px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#fff;font-weight:800;font-size:16px;cursor:pointer;}
.pc-btn.sel{border-color:#60a5fa;background:rgba(96,165,250,0.2);}
.ov-btn{margin-top:4px;padding:12px 40px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;background:#fff;color:#0d0d0d;}
.ov-divider{width:40px;height:1px;background:rgba(255,255,255,0.1);}
.winner-name{font-size:19px;font-weight:800;}

.dmg-pop{position:absolute;left:0;top:0;pointer-events:none;z-index:25;font-family:-apple-system,sans-serif;font-weight:900;color:#ff5c5c;text-shadow:0 2px 4px rgba(0,0,0,0.5);transform:translate(-50%,-50%) scale(0.5);opacity:0;transition:transform .45s cubic-bezier(.2,.8,.3,1.3),opacity .45s ease,top .45s ease;}
.fall-pop{position:absolute;left:0;top:0;pointer-events:none;z-index:25;font-family:-apple-system,sans-serif;font-weight:900;color:#fbbf24;text-shadow:0 2px 4px rgba(0,0,0,0.5);transform:translate(-50%,-50%) scale(0.5);opacity:0;transition:transform .5s cubic-bezier(.2,.8,.3,1.3),opacity .5s ease;white-space:nowrap;}
.lobby-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.05);border-radius:10px;width:100%;}
.lobby-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.lobby-name{flex:1;font-family:-apple-system,sans-serif;font-size:13px;color:#fff;font-weight:600;}
.lobby-team{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);}
.tank-card{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,0.05);border-radius:12px;border:1.5px solid transparent;cursor:pointer;text-align:left;}
.tank-card.sel{border-color:#60a5fa;background:rgba(96,165,250,0.15);}
.tank-card-emoji{font-size:22px;flex-shrink:0;width:32px;text-align:center;}
.tank-card-canvas{background:rgba(255,255,255,0.06);border-radius:8px;}
.tank-card-name{font-family:-apple-system,sans-serif;font-weight:800;color:#fff;font-size:13px;}
.tank-card-desc{font-family:-apple-system,sans-serif;font-size:10.5px;color:rgba(255,255,255,0.45);margin:2px 0 5px;line-height:1.35;}
.tank-stat-row{display:flex;gap:6px;flex-wrap:wrap;}
.tank-stat{font-family:-apple-system,sans-serif;font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:5px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8);}
</style>
</head>
<body>
<div id="app">
  <div class="hud">
    <button class="back-btn" onclick="leaveRoom()" style="font-size:12px;font-weight:800;white-space:nowrap;">← 나가기</button>

  </div>

<div class="overlay" id="ov-start">

</div>

<div class="overlay" id="ov-lobby" style="display:none">
  <div class="popup-card" style="min-width:260px;">
    <div class="ov-title" style="font-size:20px;">대기실</div>
    <div class="ov-sub" id="lobbyMeta"></div>
    <div class="ov-divider"></div>
    <div id="lobbyPlayers" style="width:100%;display:flex;flex-direction:column;gap:8px;"></div>

  </div>
</div>

<div class="overlay" id="ov-tankpicker" style="display:none;z-index:40;">
  <div class="popup-card" style="min-width:280px;max-height:80vh;overflow-y:auto;">
    <div class="ov-title" style="font-size:18px;">탱크 선택</div>
    <div id="tankPickerList" style="width:100%;display:flex;flex-direction:column;gap:8px;"></div>

</div>

<div class="overlay" id="ov-win" style="display:none">

    <button class="ov-btn" style="background:rgba(255,255,255,0.1);color:#fff;margin-top:8px;" onclick="location.href='fortress_rooms.html'">방 목록으로</button>
  </div>
</div>

<script>
const canvas=document.getElementById('canvas');
let ctx=canvas.getContext('2d');
const minimap=document.getElementById('minimap');
const mctx=minimap.getContext('2d');

// 온라인 동기화를 위해 기기와 무관하게 항상 같은 논리 해상도 사용 (화면에는 CSS로 늘려서 표시)
const W=390, H=560;
const WORLD_W=1900;

const SUPABASE_URL='https://pampoyeyhwwdpzcaubdm.supabase.co';
const SUPABASE_KEY='sb_publishable_xWRbj6jRwR_sojPBYCLfEg_DylayGH5';
function headers(){ return {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function jheaders(){ return {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
const roomId=new URLSearchParams(location.search).get('id');
let currentUser=null;
try{currentUser=JSON.parse(localStorage.getItem('puzzle_user')||'null');}catch(e){}
let room=null;
let mySeat=-1;
let appliedEventCount=0; // 지금까지 반영한 크레이터 이벤트 수 (증분 재생용)
let allEvents=[]; // 지금까지의 크레이터 이벤트 전체 목록 (서버에 보낼 때 사용)
let pollTimer=null;
let pendingShotCommit=null;
let myTurnInProgress=false; // 내가 쏜 뒤 결과 커밋까지, 폴링으로 상태가 덮어써지지 않도록
let lastMoveSentTs=0;
let lastSeenMoveTs=0;

// 시드 기반 결정론적 난수 - 모든 클라이언트가 같은 지형/링 위치를 만들도록
let rng=Math.random;
function mulberry32(seed){
  return function(){
    seed|=0; seed=seed+0x6D2B79F5|0;
    let t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}
function seedRng(seed){ rng=mulberry32(seed); }
function srand(a,b){ return a+rng()*(b-a); }

const PCOLORS=['#e53935','#378ADD','#0f9e75','#f5a623','#7c5cff','#d4537e'];
const TANK_CLASSES=[
  {id:'standard', name:'표준형',  emoji:'⚙️', color:'#8a93a3', hpMul:1.0, dmgMul:1.0,  radiusMul:1.0, rangeMul:1.0,  turretLen:22, bodyW:30, wheelR:7, desc:'모든 능력치가 무난한 기본형'},
  {id:'assault',  name:'강습형',  emoji:'🔥', color:'#e53935', hpMul:1.0, dmgMul:1.3,  radiusMul:0.9, rangeMul:0.85, turretLen:17, bodyW:32, wheelR:7, desc:'데미지는 세지만 사거리가 짧아요'},
  {id:'howitzer', name:'곡사형',  emoji:'🌙', color:'#0f9e75', hpMul:1.0, dmgMul:0.85, radiusMul:1.0, rangeMul:1.35, turretLen:30, bodyW:26, wheelR:7, desc:'사거리가 아주 길지만 데미지가 약해요'},
  {id:'blast',    name:'광역형',  emoji:'💥', color:'#f5a623', hpMul:1.0, dmgMul:0.78, radiusMul:1.5, rangeMul:0.92, turretLen:19, bodyW:33, wheelR:7, desc:'폭발 범위가 아주 넓지만 데미지가 약해요'},
  {id:'sniper',   name:'저격형',  emoji:'🎯', color:'#7c5cff', hpMul:0.85,dmgMul:1.5,  radiusMul:0.6, rangeMul:1.5,  turretLen:34, bodyW:24, wheelR:6, desc:'사거리·데미지가 뛰어나지만 범위가 좁고 맷집이 약해요'},
  {id:'heavy',    name:'중장갑형',emoji:'🛡️', color:'#b8860b', hpMul:1.35,dmgMul:0.95, radiusMul:1.05,rangeMul:0.8,  turretLen:20, bodyW:37, wheelR:9, desc:'체력이 아주 높지만 사거리가 짧아요'},
];
function tankClassById(id){ return TANK_CLASSES.find(c=>c.id===id)||TANK_CLASSES[0]; }
const GRAVITY=560;
const WEAPONS=[
  {id:'basic',  name:'기본포', emoji:'💣', dmg:34, radius:34, speedMul:1.1,  arcBoost:1.0},
  {id:'shotgun',name:'산탄포', emoji:'☄️', dmg:20, radius:52, speedMul:0.935,arcBoost:1.0},
  {id:'sniper', name:'저격포', emoji:'🎯', dmg:56, radius:19, speedMul:1.35, arcBoost:1.0},
  {id:'arc',    name:'곡사포', emoji:'🌙', dmg:24, radius:30, speedMul:0.8,  arcBoost:1.55},
];
const MOVE_SPEED=75;
const TURN_FUEL=165;
let TURN_TIME=20; // 방 설정(time_limit)으로 덮어써짐
let turnStartTs=0;
const WHEEL_R=7;
const CELL=6; // 지형 격자 한 칸 크기(px)

let gridCols=0,gridRows=0,solid=null;
let deathY=0;
let groundSurface=null;
let terrainCanvas=null, terrainCtx=null;
let tanks=[];
let turnIdx=0;
let turnCount=0; // 전체 턴 수(개인별) - 이걸로 "N TURN"(라운드)을 계산함
let pendingHazardBanner=null;
let lastSeenHazardKey=null;
let wind=0;
let phase='loading'; // loading | lobby | intro | aim | flying | resolving | over
let fuelLeft=TURN_FUEL;
let curAngle=45;
let curWeapon=0;
let charging=false, chargeStart=0, chargePower=0;
let projectile=null;
let ghostProjectile=null; // 남의 발사를 내 화면에서 재생할 때 쓰는 연출용 포탄(판정에는 영향 없음)
let lastSeenShotKey=null;
let particles=[];
let ambient=[];
let camX=0;
let dragging=false, dragLastX=0, lastDragTs=0;
let lastImpact=null;
let rings=[];
let usedRingIds=[];
let running=false;
let keyState={left:false,right:false};
let winnerSeat=null, winnerTeam=null;

function rand(a,b){ return a+Math.random()*(b-a); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function mixColor(c1,c2,t){
  const a=parseInt(c1.slice(1),16), b=parseInt(c2.slice(1),16);
  const ar=(a>>16)&255,ag=(a>>8)&255,ab=a&255;
  const br=(b>>16)&255,bg=(b>>8)&255,bb=b&255;
  const r=Math.round(ar+(br-ar)*t),g=Math.round(ag+(bg-ag)*t),bl=Math.round(ab+(bb-ab)*t);
  return '#'+((1<<24)+(r<<16)+(g<<8)+bl).toString(16).slice(1);
}
function shade(hex,amt){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;
  r=clamp(r,0,255);g=clamp(g,0,255);b=clamp(b,0,255);
  return '#'+(r<<16|g<<8|b).toString(16).padStart(6,'0');
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// ---------------- 격자 지형 생성 (언덕 + 공중 플랫폼 + 유한 두께) ----------------
function gidx(gx,gy){ return gy*gridCols+gx; }
let mapType='hills';
let spawnZones=[]; // [{x0,x1}] - 탱크가 랜덤으로 스폰될 수 있는 구간들

function fillGroundBand(x0,x1,surfaceFn,thickPx){
  const gx0=Math.max(0,Math.floor(x0/CELL)), gx1=Math.min(gridCols-1,Math.floor(x1/CELL));
  for(let gx=gx0;gx<=gx1;gx++){
    const wx=Math.min(WORLD_W-1,gx*CELL+CELL/2);
    const sY=surfaceFn(wx);
    const bottomY=Math.min(deathY-2,sY+thickPx);
    const gy0=Math.max(0,Math.floor(sY/CELL));
    const gy1=Math.min(gridRows-1,Math.floor(bottomY/CELL));
    for(let gy=gy0;gy<=gy1;gy++) solid[gidx(gx,gy)]=1;
  }
}
function fillBlock(x0,y0,x1,y1){
  const gx0=Math.max(0,Math.floor(x0/CELL)), gx1=Math.min(gridCols-1,Math.floor(x1/CELL));
  const gy0=Math.max(0,Math.floor(y0/CELL)), gy1=Math.min(gridRows-1,Math.floor(y1/CELL));
  for(let gx=gx0;gx<=gx1;gx++)for(let gy=gy0;gy<=gy1;gy++) solid[gidx(gx,gy)]=1;
}

function generateTerrain(){
  gridCols=Math.ceil(WORLD_W/CELL);
  gridRows=Math.ceil(H/CELL);
  solid=new Uint8Array(gridCols*gridRows);
  deathY=H*0.84; // 이보다 아래로 떨어지면 낙사 처리
  spawnZones=[];

  const roll=rng(); // 맵 타입도 시드로 결정 -> 모든 클라이언트가 같은 맵 타입을 그림
  mapType = roll<0.42 ? 'hills' : roll<0.75 ? 'towers' : 'islands';

  if(mapType==='hills') generateTerrainHills();
  else if(mapType==='towers') generateTerrainTowers();
  else generateTerrainIslands();

  renderTerrainBuffer();
}

// ---- 타입 1: 완만한 언덕 + 공중 플랫폼 몇 개 (기존 방식) ----
function generateTerrainHills(){
  const baseY=H*0.50, amp=H*0.085;
  const freqs=[{f:0.0022,a:1},{f:0.006,a:0.5},{f:0.017,a:0.2}];
  const phases=freqs.map(()=>rng()*Math.PI*2);
  groundSurface=new Float32Array(WORLD_W);
  for(let x=0;x<WORLD_W;x++){
    let y=baseY;
    freqs.forEach((fr,i)=>{ y+=Math.sin(x*fr.f+phases[i])*amp*fr.a; });
    groundSurface[x]=y;
  }
  fillGroundBand(0,WORLD_W-1,x=>groundSurface[Math.round(x)],H*0.16);
  spawnZones.push({x0:WORLD_W*0.05,x1:WORLD_W*0.95});

  const platCount=4+Math.floor(rng()*3);
  for(let i=0;i<platCount;i++){
    const pw=srand(70,150), ph=srand(20,28);
    const px=srand(WORLD_W*0.1,WORLD_W*0.9-pw);
    const py=srand(H*0.16,H*0.4);
    fillBlock(px,py,px+pw,py+ph);
    spawnZones.push({x0:px,x1:px+pw});
  }
}

// ---- 타입 2: 여러 층으로 나뉜 타워형 (스케치처럼 층층이 떠 있는 구조 + 바닥) ----
function generateTerrainTowers(){
  const baseY=H*0.74, amp=H*0.025;
  const phase=rng()*Math.PI*2;
  groundSurface=new Float32Array(WORLD_W);
  for(let x=0;x<WORLD_W;x++){ groundSurface[x]=baseY+Math.sin(x*0.003+phase)*amp; }
  fillGroundBand(0,WORLD_W-1,x=>groundSurface[Math.round(x)],H*0.13);
  spawnZones.push({x0:WORLD_W*0.04,x1:WORLD_W*0.96});

  const floorCount=4+Math.floor(rng()*2); // 4~5개 층
  for(let i=0;i<floorCount;i++){
    const fw=srand(WORLD_W*0.14,WORLD_W*0.32);
    const fx=srand(WORLD_W*0.04,WORLD_W*0.96-fw);
    const fy=srand(H*0.1,H*0.6);
    const fh=srand(14,22);
    fillBlock(fx,fy,fx+fw,fy+fh);
    spawnZones.push({x0:fx,x1:fx+fw});
  }
}

// ---- 타입 3: 공중에 떠 있는 섬들 (바닥이 아예 없음, 낙사 위험 큼) ----
function generateTerrainIslands(){
  groundSurface=new Float32Array(WORLD_W).fill(deathY+40); // 이 맵엔 이어진 지면이 없음(표시용 더미값)
  const islandCount=6+Math.floor(rng()*3); // 6~8개
  for(let i=0;i<islandCount;i++){
    const iw=srand(WORLD_W*0.09,WORLD_W*0.2);
    const ix=srand(WORLD_W*0.04,WORLD_W*0.96-iw);
    const iy=srand(H*0.22,H*0.62);
    const ih=srand(18,30);
    fillBlock(ix,iy,ix+iw,iy+ih);
    spawnZones.push({x0:ix,x1:ix+iw});
  }
}

function isSurfaceCell(gx,gy){
  return solid[gidx(gx,gy)]===1 && (gy===0 || solid[gidx(gx,gy-1)]===0);
}
function getSurfaceY(worldX){
  const gx=Math.floor(worldX/CELL);
  if(gx<0||gx>=gridCols) return null;
  for(let gy=0;gy<gridRows;gy++){
    if(solid[gidx(gx,gy)]){
      const wy=gy*CELL;
      if(wy>deathY) return null;
      return wy;
    }
  }
  return null;
}
function carveCrater(cx,cy,r){
  const gx0=Math.max(0,Math.floor((cx-r)/CELL)), gx1=Math.min(gridCols-1,Math.floor((cx+r)/CELL));
  const gy0=Math.max(0,Math.floor((cy-r)/CELL)), gy1=Math.min(gridRows-1,Math.floor((cy+r)/CELL));
  for(let gx=gx0;gx<=gx1;gx++){
    for(let gy=gy0;gy<=gy1;gy++){
      const wx=gx*CELL+CELL/2, wy=gy*CELL+CELL/2;
      if((wx-cx)*(wx-cx)+(wy-cy)*(wy-cy)<=r*r) solid[gidx(gx,gy)]=0;
    }
  }
  renderTerrainBuffer();
}
// 3번: 지형 전체를 그리드 몇 칸만큼 가라앉힘 - 바닥 아래(낙사선 너머)로 밀려난 부분은 완전히 사라짐
function sinkTerrain(rows){
  const newSolid=new Uint8Array(gridCols*gridRows);
  const deathRow=Math.floor(deathY/CELL);
  for(let gx=0;gx<gridCols;gx++){
    for(let gy=0;gy<gridRows;gy++){
      const srcGy=gy-rows;
      if(srcGy>=0 && solid[gidx(gx,srcGy)] && gy<=deathRow){
        newSolid[gidx(gx,gy)]=1;
      }
    }
  }
  solid=newSolid;
  renderTerrainBuffer();
}
// 이벤트 재생 공용 처리 (크레이터 폭발 / 지형 가라앉음 두 종류 모두 지원)
function applyTerrainEvent(e){
  if(e.type==='sink') sinkTerrain(e.rows);
  else carveCrater(e.x,e.y,e.r);
}
function renderTerrainBuffer(){
  if(!terrainCanvas){ terrainCanvas=document.createElement('canvas'); terrainCtx=terrainCanvas.getContext('2d'); }
  terrainCanvas.width=WORLD_W; terrainCanvas.height=H;
  const tctx=terrainCtx;
  tctx.clearRect(0,0,WORLD_W,H);
  for(let gx=0;gx<gridCols;gx++){
    for(let gy=0;gy<gridRows;gy++){
      if(!solid[gidx(gx,gy)]) continue;
      const wx=gx*CELL, wy=gy*CELL;
      if(isSurfaceCell(gx,gy)){
        tctx.fillStyle='#5fb757';
        tctx.fillRect(wx,wy,CELL+1,3);
        tctx.fillStyle='#6b4f2e';
        tctx.fillRect(wx,wy+3,CELL+1,CELL-2);
      } else {
        const depth=Math.min(1,gy/(gridRows*0.42));
        tctx.fillStyle=mixColor('#6b4f2e','#2a1d10',depth);
        tctx.fillRect(wx,wy,CELL+1,CELL+1);
      }
    }
  }
  renderMinimapTerrainCache();
}

// 미니맵용 지형 캐시 - 매 프레임 다시 그리지 않고, 지형이 바뀔 때만(위 renderTerrainBuffer 호출시) 갱신
const MM_W=220, MM_H=112;
let minimapTerrainCache=null;
function renderMinimapTerrainCache(){
  if(!gridCols||!gridRows) return;
  if(!minimapTerrainCache){ minimapTerrainCache=document.createElement('canvas'); minimapTerrainCache.width=MM_W; minimapTerrainCache.height=MM_H; }
  const c2=minimapTerrainCache.getContext('2d');
  c2.clearRect(0,0,MM_W,MM_H);
  c2.fillStyle='rgba(140,100,60,0.95)';
  for(let mx=0;mx<MM_W;mx++){
    const gx=Math.min(gridCols-1,Math.floor(mx/MM_W*gridCols));
    for(let gy=0;gy<gridRows;gy++){
      if(solid[gidx(gx,gy)]){
        const my=Math.floor(gy/gridRows*MM_H);
        c2.fillRect(mx,my,1,1);
      }
    }
  }
}

// ---------------- 배경 ----------------
let bgClouds=[];
function drawBackground(){
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#2a4d7a');
  sky.addColorStop(0.55,'#6fa3c9');
  sky.addColorStop(1,'#bcd9e8');
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,W,H);

  drawMountainLayer(H*0.5,H*0.09,'rgba(60,80,110,0.32)',camX*0.15);
  drawMountainLayer(H*0.54,H*0.07,'rgba(50,70,100,0.42)',camX*0.28);

  ctx.fillStyle='rgba(255,255,255,0.55)';
  bgClouds.forEach(c=>{
    const sx=((c.x-camX*0.4)%(W+120)+(W+120))%(W+120)-60;
    drawCloud(sx,c.y,c.s);
  });
}
function drawMountainLayer(baseY,amp,color,offset){
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=10){
    const wx=x+offset;
    const y=baseY-Math.abs(Math.sin(wx*0.006))*amp-Math.sin(wx*0.014)*amp*0.3;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H);
  ctx.closePath();
  ctx.fill();
}
function drawCloud(x,y,s){
  ctx.beginPath();
  ctx.ellipse(x,y,22*s,10*s,0,0,Math.PI*2);
  ctx.ellipse(x+16*s,y-5*s,16*s,9*s,0,0,Math.PI*2);
  ctx.ellipse(x-16*s,y-3*s,14*s,8*s,0,0,Math.PI*2);
  ctx.fill();
}

// ---------------- 환경 파티클(꽃잎/나뭇잎) - 바람 방향/세기 표시 ----------------
function initAmbient(){
  ambient=[];
  const n=18;
  for(let i=0;i<n;i++) ambient.push(makeAmbientParticle(true));
}
function makeAmbientParticle(randomX){
  const type=Math.random()<0.55?'petal':'leaf';
  return{
    type,
    x: randomX? rand(0,W): (wind>=0? -20 : W+20),
    y: rand(H*0.05,H*0.75),
    size: rand(4,8),
    rot: rand(0,Math.PI*2),
    spin: rand(-2,2),
    bob: rand(0,Math.PI*2),
  };
}
function updateAmbient(dt){
  const speed=40+Math.abs(wind)*160;
  ambient.forEach(p=>{
    p.x += (wind>=0?1:-1)*speed*dt;
    p.bob += dt*2.2;
    p.y += Math.sin(p.bob)*10*dt;
    p.rot += p.spin*dt;
  });
  ambient=ambient.filter(p=> wind>=0? p.x<W+30 : p.x>-30);
  while(ambient.length<18) ambient.push(makeAmbientParticle(false));
}
function drawAmbient(){
  ambient.forEach(p=>{
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha=0.55;
    if(p.type==='petal'){
      ctx.fillStyle='#ff9ec7';
      ctx.beginPath();ctx.ellipse(0,0,p.size,p.size*0.55,0,0,Math.PI*2);ctx.fill();
    } else {
      ctx.fillStyle='#8fd07a';
      ctx.beginPath();ctx.ellipse(0,0,p.size*0.8,p.size*0.5,0.3,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });
  ctx.globalAlpha=1;
}

// ---------------- 탱크 (바퀴/몸통/포신 분리) ----------------
function classSkin(cls){
  const color=cls.color, wheelR=cls.wheelR, bodyW=cls.bodyW, turretLen=cls.turretLen;
  const wheelPositions = bodyW>=35 ? [-13,0,13] : [-9,9]; // 중장갑형은 바퀴가 3쌍
  return {
    drawWheels(cx,gy,facing,wheelRot){
      const wy=gy-wheelR;
      wheelPositions.forEach(ox=>{
        const wx=cx+ox;
        ctx.fillStyle='#1c1c1c';
        ctx.beginPath();ctx.arc(wx,wy,wheelR,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#444';ctx.lineWidth=1.5;ctx.stroke();
        ctx.save();
        ctx.translate(wx,wy);ctx.rotate(wheelRot);
        ctx.strokeStyle='#777';ctx.lineWidth=1.4;
        ctx.beginPath();ctx.moveTo(-wheelR+1,0);ctx.lineTo(wheelR-1,0);
        ctx.moveTo(0,-wheelR+1);ctx.lineTo(0,wheelR-1);
        ctx.stroke();
        ctx.restore();
      });
      ctx.fillStyle='#141414';
      roundRect(cx-bodyW/2,wy-3,bodyW,7,3);ctx.fill();
    },
    drawBody(cx,gy,facing,color){
      const by=gy-wheelR*2-9;
      ctx.fillStyle=shade(color,-25);
      roundRect(cx-bodyW/2,by-1,bodyW,13,4);ctx.fill();
      ctx.fillStyle=color;
      roundRect(cx-bodyW/2+1,by-9,bodyW-2,11,4);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.28)';
      roundRect(cx-bodyW/2+3,by-8,bodyW-6,3,2);ctx.fill();
    },
    drawTurret(cx,gy,facing,angle,color){
      const ty=gy-wheelR*2-13;
      ctx.fillStyle=shade(color,-15);
      ctx.beginPath();ctx.arc(cx,ty,7.5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=1;ctx.stroke();
      ctx.save();
      ctx.translate(cx,ty);
      ctx.rotate(facing>0? -angle*Math.PI/180 : Math.PI+angle*Math.PI/180);
      ctx.fillStyle='#2b2b2b';
      const turretWid = cls.id==='blast'?8.5:5.2;
      roundRect(-2.6,-turretWid/2,turretLen,turretWid,2);ctx.fill();
      if(cls.id==='blast'){ ctx.fillStyle=shade(color,10); ctx.beginPath();ctx.arc(turretLen-5,0,5.5,0,Math.PI*2);ctx.fill(); }
      ctx.restore();
    }
  };
}

// ---- 커스텀(픽셀아트) 탱크 스킨 ----
const CUSTOM_CELL_PX=2.4;
function gridToCanvas(grid,cellPx){
  if(!grid||!grid.length||!grid[0]||!grid[0].length){
    const c=document.createElement('canvas'); c.width=4;c.height=4; return c;
  }
  const h=grid.length, w=grid[0].length;
  const c=document.createElement('canvas');
  c.width=Math.max(1,Math.round(w*cellPx)); c.height=Math.max(1,Math.round(h*cellPx));
  const cctx=c.getContext('2d');
  for(let r=0;r<h;r++)for(let cI=0;cI<w;cI++){
    const col=grid[r][cI];
    if(col){ cctx.fillStyle=col; cctx.fillRect(cI*cellPx,r*cellPx,cellPx+0.6,cellPx+0.6); }
  }
  return c;
}
function customSkin(custom){
  const bodyImg=gridToCanvas(custom.body_px,CUSTOM_CELL_PX);
  const turretImg=gridToCanvas(custom.turret_px,CUSTOM_CELL_PX);
  const wheelImg=gridToCanvas(custom.wheel_px,CUSTOM_CELL_PX);
  return {
    drawWheels(cx,gy,facing){
      ctx.save();
      if(facing<0){ ctx.translate(cx,0); ctx.scale(-1,1); ctx.translate(-cx,0); }
      ctx.drawImage(wheelImg, cx-wheelImg.width/2, gy-wheelImg.height, wheelImg.width, wheelImg.height);
      ctx.restore();
    },
    drawBody(cx,gy,facing){
      ctx.save();
      if(facing<0){ ctx.translate(cx,0); ctx.scale(-1,1); ctx.translate(-cx,0); }
      ctx.drawImage(bodyImg, cx-bodyImg.width/2, gy-wheelImg.height-bodyImg.height, bodyImg.width, bodyImg.height);
      ctx.restore();
    },
    drawTurret(cx,gy,facing,angle){
      const pivotY=gy-wheelImg.height-bodyImg.height*0.4;
      ctx.save();
      ctx.translate(cx,pivotY);
      ctx.rotate(facing>0? -angle*Math.PI/180 : Math.PI+angle*Math.PI/180);
      ctx.drawImage(turretImg,-4,-turretImg.height/2,turretImg.width,turretImg.height);
      ctx.restore();
    },
    _bodyImg:bodyImg,_turretImg:turretImg,_wheelImg:wheelImg
  };
}

function turretTip(t){
  const cx=t.x, gy=t.groundY;
  const tilt=t.tilt||0;
  const pivotOffset = t.turretPivotOffset!=null? t.turretPivotOffset : (t.wheelR||WHEEL_R)*2+13;
  const turretLen=t.turretLen||22;
  const dy=(gy-pivotOffset)-gy; // 기울기 회전축(접지점) 기준 포신 피벗의 상대 y오프셋
  const baseX=cx-dy*Math.sin(tilt);
  const baseY=gy+dy*Math.cos(tilt);
  const localRot=(t.facing>0? -t.angle*Math.PI/180 : Math.PI+t.angle*Math.PI/180);
  const totalRot=tilt+localRot; // 몸체 기울기 + 조준각을 합친 실제(절대) 발사각
  return {x:baseX+Math.cos(totalRot)*turretLen, y:baseY+Math.sin(totalRot)*turretLen, baseX, baseY, totalRot};
}

function getTiltAngle(x){
  const y1=getSurfaceY(clamp(x-10,0,WORLD_W-1));
  const y2=getSurfaceY(clamp(x+10,0,WORLD_W-1));
  if(y1===null||y2===null) return 0;
  return clamp(Math.atan2(y2-y1,20),-0.7,0.7); // 라디안, 최대 ±40도 정도로 제한
}

function drawTank(t){
  if(!t.alive) return;
  const cx=t.x, gy=t.groundY;
  const pivotOffset = t.turretPivotOffset!=null? t.turretPivotOffset : (t.wheelR||WHEEL_R)*2+13;
  const clearance = pivotOffset + (t.turretLen||22) + 6; // 포신을 위로 쳐들어도 이름/HP바를 안 가리도록 충분히 띄움
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();ctx.ellipse(cx,gy+2,17,4,0,0,Math.PI*2);ctx.fill();

  // 몸통+바퀴+포신 전부 지형 경사에 맞춰 같이 기울어짐 (포신 각도도 실제로 영향받음 -> 물리에도 반영됨)
  ctx.save();
  ctx.translate(cx,gy);
  ctx.rotate(t.tilt||0);
  ctx.translate(-cx,-gy);
  t.skin.drawWheels(cx,gy,t.facing,t.wheelRot);
  t.skin.drawBody(cx,gy,t.facing,t.color);
  t.skin.drawTurret(cx,gy,t.facing,t.angle,t.color);
  ctx.restore();

  ctx.font='700 9px -apple-system,sans-serif';
  ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.fillText(t.name,cx,gy-clearance-13);
  // 7번: 머리 위 HP바 더 잘 보이게(두껍게+테두리)
  const bw=32,bh=6;
  const by=gy-clearance-9;
  ctx.fillStyle='rgba(0,0,0,0.55)';
  roundRect(cx-bw/2-1.5,by-1.5,bw+3,bh+3,3);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.15)';
  roundRect(cx-bw/2,by,bw,bh,2);ctx.fill();
  const hpRatio=t.hp/(t.maxHp||100);
  ctx.fillStyle=hpRatio>0.5?'#4ade80':hpRatio>0.25?'#facc15':'#ef4444';
  roundRect(cx-bw/2,by,bw*hpRatio,bh,2);ctx.fill();
  ctx.textAlign='start';
}
function drawAimGuide(t){
  const tip=turretTip(t);
  const rad=tip.totalRot;
  ctx.save();
  ctx.setLineDash([5,5]);
  ctx.strokeStyle='rgba(255,255,255,0.75)';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(tip.x,tip.y);
  ctx.lineTo(tip.x+Math.cos(rad)*46,tip.y+Math.sin(rad)*46);
  ctx.stroke();
  ctx.setLineDash([]);
  // 화살촉
  const ex=tip.x+Math.cos(rad)*46, ey=tip.y+Math.sin(rad)*46;
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.moveTo(ex,ey);
  ctx.lineTo(ex-Math.cos(rad-0.4)*8,ey-Math.sin(rad-0.4)*8);
  ctx.lineTo(ex-Math.cos(rad+0.4)*8,ey-Math.sin(rad+0.4)*8);
  ctx.closePath();ctx.fill();
  ctx.restore();
}

function pickSpawnX(placedX,minGap){
  const zones = spawnZones.length? spawnZones : [{x0:WORLD_W*0.1,x1:WORLD_W*0.9}];
  for(let attempt=0;attempt<30;attempt++){
    const zone=zones[Math.floor(rng()*zones.length)];
    const lo=zone.x0+8, hi=Math.max(lo+1,zone.x1-8);
    const cand=srand(lo,hi);
    if(getSurfaceY(cand)===null) continue; // 그 자리에 실제 지형이 없으면 다시 뽑음
    if(placedX.every(px=>Math.abs(px-cand)>=minGap)) return cand;
  }
  // 그래도 못 찾으면 아무 구역에서나 하나 받아들임(인원이 아주 많을 때 대비)
  const zone=zones[Math.floor(rng()*zones.length)];
  return srand(zone.x0+8,Math.max(zone.x0+9,zone.x1-8));
}
function spawnTanks(players,customMap){
  customMap=customMap||{};
  tanks=[];
  const n=players.length;
  const minGap=Math.max(50,WORLD_W/(n*4));
  const placedX=[];
  players.forEach((p,i)=>{
    const x = pickSpawnX(placedX,minGap);
    placedX.push(x);
    const gy=getSurfaceY(x) ?? groundSurface[Math.round(x)];
    const custom = p.customTankId? customMap[p.customTankId] : null;
    let skin,color,hpMul,dmgMul,radiusMul,rangeMul,turretPivotOffset,turretLen,wheelR,classId,className;
    if(custom){
      skin=customSkin(custom);
      color=custom.body_color||'#8a93a3';
      hpMul=custom.hp_mul; dmgMul=custom.dmg_mul; radiusMul=custom.radius_mul; rangeMul=custom.range_mul;
      turretPivotOffset=skin._wheelImg.height+skin._bodyImg.height*0.4;
      turretLen=skin._turretImg.width;
      wheelR=skin._wheelImg.height/2;
      classId='custom'; className=custom.name;
    } else {
      const cls=tankClassById(p.tankClass);
      skin=classSkin(cls);
      color=cls.color;
      hpMul=cls.hpMul; dmgMul=cls.dmgMul; radiusMul=cls.radiusMul; rangeMul=cls.rangeMul;
      turretPivotOffset=cls.wheelR*2+13;
      turretLen=cls.turretLen;
      wheelR=cls.wheelR;
      classId=cls.id; className=cls.name;
    }
    const maxHp=Math.round(100*hpMul);
    tanks.push({
      id:i,seat:i,name:p.username,userId:p.user_id,team:p.team||null,color,
      x, groundY:gy,
      hp:maxHp, maxHp, alive:true,
      angle:45, facing: x<WORLD_W/2?1:-1,
      wheelRot:0, falling:false, fallTarget:0, tilt:0, lastPower:null,
      wheelR, turretLen, turretPivotOffset,
      dmgMul, radiusMul, rangeMul,
      classId, className,
      skin
    });
  });
}

// ---------------- 턴 진행 ----------------
function startTurn(){
  fuelLeft=TURN_FUEL;
  wind=clamp(wind+rand(-0.6,0.6),-1,1);
  const t=tanks[turnIdx];
  curAngle=t.angle;
  phase='aim';
  lastDragTs=0; // 새 턴이 시작되면 자동 카메라 복귀
  turnStartTs=Date.now(); // 기기마다 시계가 달라도 얼추 맞도록 Date.now() 사용 (온라인 동기화용)
  const marker=document.getElementById('fireMarker');
  if(t.lastPower!=null){ marker.style.display='block'; marker.style.left=(t.lastPower*100)+'%'; }
  else { marker.style.display='none'; }
  updateHUD();
}
function nextTurn(){
  turnCount++;
  do{ turnIdx=(turnIdx+1)%tanks.length; }while(!tanks[turnIdx].alive);
  // 3번: 한 바퀴(라운드)가 새로 시작될 때, 10라운드를 넘겼으면 서든데스 발동
  if(turnCount%tanks.length===0){
    const newRound=Math.floor(turnCount/tanks.length)+1;
    if(newRound>10) applySuddenDeathHazard();
  }
  startTurn();
}
function roundNumber(){ return Math.floor(turnCount/Math.max(1,tanks.length))+1; }
function aliveCount(){ return tanks.filter(t=>t.alive).length; }
function evaluateWin(){
  const aliveTanks=tanks.filter(t=>t.alive);
  if(room&&room.mode==='team'){
    const teams=[...new Set(aliveTanks.map(t=>t.team))];
    if(teams.length<=1) return {over:true,winnerSeat:null,winnerTeam:teams[0]||null};
    return {over:false};
  }
  if(aliveTanks.length<=1) return {over:true,winnerSeat:aliveTanks[0]?aliveTanks[0].seat:null,winnerTeam:null};
  return {over:false};
}
function showWinPopup(){
  let text;
  if(winnerTeam) text='팀 '+winnerTeam+' 승리!';
  else if(winnerSeat!=null){ const w=tanks.find(t=>t.seat===winnerSeat); text=(w?w.name:'???')+' 승리!'; }
  else text='무승부';
  document.getElementById('winnerName').textContent=text;
  document.getElementById('ov-win').style.display='flex';
}

function doFire(power){
  if(phase!=='aim'||mySeat!==turnIdx) return;
  phase='flying';
  myTurnInProgress=true;
  lastDragTs=0;
  const t=tanks[turnIdx];
  t.lastPower=power;
  const w=WEAPONS[curWeapon];
  const speed=(320+power*1050)*0.7*w.speedMul*(t.rangeMul||1); // 탱크 종류의 사거리 배율 적용
  const tip=turretTip(t); // 몸체 기울기 + 조준각이 합쳐진 실제 발사 방향
  const vx=Math.cos(tip.totalRot)*speed;
  const vy=Math.sin(tip.totalRot)*speed*w.arcBoost;
  // 탱크 종류의 데미지/범위 배율을 미리 적용한 '실효 무기'로 발사 (링 파워업이 여기에 추가로 곱해짐)
  const effW={...w, dmg:Math.round(w.dmg*(t.dmgMul||1)), radius:Math.round(w.radius*(t.radiusMul||1))};
  projectile={x:tip.x,y:tip.y,vx,vy,weapon:effW,trail:[]};
  pendingShotCommit=commitShotFired(tip.x,tip.y,vx,vy,w.id); // 다른 사람들에게 "지금 쐈다"를 먼저 알림 (실시간 궤적 재생용)
}
async function commitShotFired(x,y,vx,vy,weaponId){
  if(!room) return;
  const shot={seat:turnIdx,x,y,vx,vy,weaponId,wind,startedAt:Date.now()};
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/fortress_rooms?id=eq.${roomId}&move_count=eq.${room.move_count}`,{
      method:'PATCH',
      headers:{...jheaders(),'Prefer':'return=representation'},
      body:JSON.stringify({ state:{...room.state, lastShot:shot}, move_count:room.move_count+1, updated_at:new Date().toISOString() })
    });
    const data=await res.json();
    if(data&&data[0]) room=data[0];
  }catch(e){ console.error('발사 알림 실패',e); }
}
let moveCommitBusy=false;
async function commitMoveUpdate(t){
  if(!room||moveCommitBusy) return;
  const now=Date.now();
  if(now-lastMoveSentTs<220) return; // 너무 자주 보내지 않게 쓰로틀링
  lastMoveSentTs=now;
  moveCommitBusy=true;
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/fortress_rooms?id=eq.${roomId}&move_count=eq.${room.move_count}`,{
      method:'PATCH',
      headers:{...jheaders(),'Prefer':'return=representation'},
      body:JSON.stringify({
        state:{...room.state, moveUpdate:{seat:turnIdx,x:t.x,groundY:t.groundY,facing:t.facing,wheelRot:t.wheelRot,ts:now}},
        move_count:room.move_count+1,
        updated_at:new Date().toISOString()
      })
    });
    const data=await res.json();
    if(data&&data[0]) room=data[0];
  }catch(e){ /* 이동 브로드캐스트는 실패해도 무시(다음 이동때 다시 시도됨) */ }
  moveCommitBusy=false;
}

// ---------------- 물리/충돌 ----------------
// 다른 사람이 쏜 포탄을 내 화면에서도 똑같은 물리로 재생 (순수 연출용, 판정은 그 사람 쪽에서 이미 확정됨)
let ghostAnimating=false;
let pendingRemoteState=null;
function playGhostShot(shot){
  ghostAnimating=true;
  dragging=false;
  lastDragTs=0; // 5번: 딴 곳을 보고 있었어도 발사 장면으로 카메라가 즉시 이동하도록
  const w=WEAPONS.find(x=>x.id===shot.weaponId)||WEAPONS[0];
  const g={x:shot.x,y:shot.y,vx:shot.vx,vy:shot.vy,trail:[]};
  const useWind=shot.wind||0;
  function finish(){
    ghostAnimating=false;
    if(pendingRemoteState){ const st=pendingRemoteState; pendingRemoteState=null; applyRemoteState(st); }
  }
  function step(){
    const dt=1/60;
    g.trail.push({x:g.x,y:g.y});
    if(g.trail.length>18) g.trail.shift();
    g.vx+=useWind*26*dt;
    g.vy+=GRAVITY*dt;
    g.x+=g.vx*dt;
    g.y+=g.vy*dt;
    ghostProjectile=g;
    if(g.y>H+80||g.x<-40||g.x>WORLD_W+40){ ghostProjectile=null; finish(); return; }
    // 탱크 직격도 감지해서 자연스럽게 멈추게(정확한 판정은 이미 쏜 사람 쪽에서 끝났고, 여긴 연출용)
    for(const t of tanks){
      if(!t.alive) continue;
      const cy=t.groundY-20;
      if(Math.hypot(g.x-t.x,g.y-cy)<12){ spawnBurst(g.x,g.y,w.radius); ghostProjectile=null; finish(); return; }
    }
    const xi=Math.floor(g.x/CELL), yi=Math.floor(g.y/CELL);
    if(xi>=0&&xi<gridCols&&yi>=0&&yi<gridRows&&solid[gidx(xi,yi)]){
      spawnBurst(g.x,g.y,w.radius);
      ghostProjectile=null;
      finish();
      return;
    }
    requestAnimationFrame(step);
  }
  step();
}

function updateProjectile(dt){
  if(!projectile) return;
  const p=projectile;
  p.trail.push({x:p.x,y:p.y});
  if(p.trail.length>18)p.trail.shift();
  p.vx+=wind*26*dt;
  p.vy+=GRAVITY*dt;
  p.x+=p.vx*dt;
  p.y+=p.vy*dt;

  // 4번: 파워업 링 통과 체크 (온라인에서는 한번 쓰면 그 판 끝까지 사라짐 - 재생성 시 동기화가 꼬이는 것 방지)
  rings.forEach(ring=>{
    if(!ring.active) return;
    if(Math.hypot(p.x-ring.x,p.y-ring.y)<ring.r+4){
      ring.active=false;
      usedRingIds.push(ring.id);
      p.weapon={...p.weapon,dmg:Math.round(p.weapon.dmg*1.5),radius:Math.round(p.weapon.radius*1.5),boosted:true};
      spawnBurst(ring.x,ring.y,ring.r*1.2);
      showPop(ring.x,ring.y-6,'파워업!','fall-pop');
    }
  });

  if(p.x<-40||p.x>WORLD_W+40||p.y>H+80){ projectile=null; endResolving(); return; }

  for(const t of tanks){
    if(!t.alive) continue;
    const cy=t.groundY-20;
    if(Math.hypot(p.x-t.x,p.y-cy)<12){ resolveHit(p.x,p.y,p.weapon); return; }
  }
  if(p.y<deathY){
    const gx=Math.floor(p.x/CELL), gy=Math.floor(p.y/CELL);
    if(gx>=0&&gx<gridCols&&gy>=0&&gy<gridRows&&solid[gidx(gx,gy)]){ resolveHit(p.x,p.y,p.weapon); return; }
  }
}
function makeRing(id){
  return { id, x:srand(WORLD_W*0.12,WORLD_W*0.88), y:srand(H*0.12,H*0.32), r:15, active:true, spin:0 };
}
function initRings(){
  rings=[];
  for(let i=0;i<3;i++) rings.push(makeRing(i));
}
// 7번: 폭발이 몇 번 쌓일 때마다(=한동안 지나면) 새 파워업 링이 하늘에 추가로 등장
const RING_BONUS_EVERY=3;
function bonusRingAt(idx){
  const baseSeed=(room&&room.state&&room.state.seed)||0;
  const lrng=mulberry32(baseSeed+(idx+1)*7919);
  return { id:'bonus'+idx, x:lrng()*(WORLD_W*0.76)+WORLD_W*0.12, y:lrng()*(H*0.2)+H*0.12, r:15, active:true, spin:0 };
}
function maybeSpawnBonusRings(){
  const earned=Math.floor(allEvents.length/RING_BONUS_EVERY);
  const have=rings.filter(r=>String(r.id).indexOf('bonus')===0).length;
  for(let i=have;i<earned;i++){
    const ring=bonusRingAt(i);
    ring.active=!usedRingIds.includes(ring.id);
    rings.push(ring);
  }
}
function updateRings(dt){
  rings.forEach(r=>{ if(r.active) r.spin+=dt*1.3; });
}
function drawRings(){
  rings.forEach(ring=>{
    if(!ring.active) return;
    ctx.save();
    ctx.translate(ring.x,ring.y);
    const squash=0.42+Math.sin(ring.spin)*0.15;
    const grad=ctx.createLinearGradient(-ring.r,0,ring.r,0);
    grad.addColorStop(0,'#ffd166');
    grad.addColorStop(0.5,'#fff7d6');
    grad.addColorStop(1,'#ffd166');
    ctx.strokeStyle=grad;
    ctx.lineWidth=5;
    ctx.shadowColor='rgba(255,209,102,0.7)';
    ctx.shadowBlur=8;
    ctx.beginPath();ctx.ellipse(0,0,ring.r,ring.r*squash,0,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  });
}
function resolveHit(x,y,weapon){
  projectile=null;
  phase='resolving';
  lastImpact={x,y};
  // 9번: 몸통에 맞아 y가 지면보다 높은 위치라도, 크레이터는 항상 지면 기준 전체 반경만큼 파이게
  const groundYAtX=getSurfaceY(x);
  const craterY = groundYAtX!==null? Math.max(y,groundYAtX) : y;
  carveCrater(x,craterY,weapon.radius);
  allEvents.push({x,y:craterY,r:weapon.radius}); // 온라인 동기화용 이벤트 기록
  appliedEventCount=allEvents.length;
  maybeSpawnBonusRings();
  spawnBurst(x,y,weapon.radius);
  tanks.forEach(t=>{
    if(!t.alive) return;
    const cy=t.groundY-20;
    const dist=Math.hypot(t.x-x,cy-y);
    const falloff=weapon.radius+16;
    if(dist<falloff){
      const dmg=Math.round(weapon.dmg*(1-dist/falloff));
      if(dmg>0){
        t.hp=Math.max(0,t.hp-dmg);
        showPop(t.x,t.groundY-40,'-'+dmg,'dmg-pop',dmg);
        if(t.hp<=0) t.alive=false;
      }
    }
  });
  settleTanks();
  updateHUD();
  setTimeout(()=>{ lastImpact=null; endResolving(); },1500); // 8번: 결과 확인할 시간을 충분히 줌
}
function settleTanks(){
  tanks.forEach(t=>{
    if(!t.alive) return;
    const gy=getSurfaceY(t.x);
    if(gy===null){
      // 발밑이 완전히 뚫려서 그대로 낙사
      t.alive=false;
      showPop(t.x,t.groundY-30,'추락!','fall-pop');
      return;
    }
    if(gy>t.groundY+1.5){
      const dist=gy-t.groundY;
      t.fallTarget=gy;
      t.falling=true;
      if(dist>70){
        const dmg=Math.round((dist-70)*0.35);
        if(dmg>0){
          t.hp=Math.max(0,t.hp-dmg);
          showPop(t.x,t.groundY-40,'-'+dmg,'dmg-pop',dmg);
          if(t.hp<=0) t.alive=false;
        }
      }
    }
  });
}
function showBanner(text){
  const el=document.createElement('div');
  el.style.cssText='position:absolute;left:50%;top:38%;transform:translate(-50%,-50%) scale(0.5);z-index:60;font-family:-apple-system,sans-serif;font-weight:900;font-size:19px;color:#fff;text-shadow:0 3px 10px rgba(0,0,0,0.7);opacity:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s ease;pointer-events:none;white-space:nowrap;';
  el.textContent=text;
  document.getElementById('app').appendChild(el);
  requestAnimationFrame(()=>{ el.style.opacity='1'; el.style.transform='translate(-50%,-50%) scale(1)'; });
  setTimeout(()=>{ el.style.opacity='0'; },1700);
  setTimeout(()=>el.remove(),2000);
}
// 3번: 10라운드가 넘으면 매 라운드 시작마다 지형이 가라앉거나 운석이 랜덤으로 떨어짐 (빠른 결판을 위함)
function applySuddenDeathHazard(){
  const useMeteor=Math.random()<0.5;
  if(useMeteor){
    const n=2+Math.floor(Math.random()*3); // 2~4개
    for(let i=0;i<n;i++){
      const x=rand(WORLD_W*0.06,WORLD_W*0.94);
      const groundYAtX=getSurfaceY(x);
      const impactY=groundYAtX!==null? groundYAtX : deathY-5;
      const r=rand(26,40);
      carveCrater(x,impactY,r);
      allEvents.push({x,y:impactY,r});
      spawnBurst(x,impactY,r);
      tanks.forEach(t=>{
        if(!t.alive) return;
        const cy=t.groundY-20;
        const dist=Math.hypot(t.x-x,cy-impactY);
        const falloff=r+16;
        if(dist<falloff){
          const dmg=Math.round(28*(1-dist/falloff));
          if(dmg>0){ t.hp=Math.max(0,t.hp-dmg); showPop(t.x,t.groundY-40,'-'+dmg,'dmg-pop',dmg); if(t.hp<=0) t.alive=false; }
        }
      });
    }
    settleTanks();
    pendingHazardBanner={text:'☄️ 운석이 떨어졌다!',key:'hz_'+turnCount};
    showBanner('☄️ 운석이 떨어졌다!');
  } else {
    const rows=3+Math.floor(Math.random()*3); // 3~5칸(=18~30px 상당) 가라앉음
    sinkTerrain(rows);
    allEvents.push({type:'sink',rows});
    settleTanks();
    pendingHazardBanner={text:'🌊 지형이 가라앉는다!',key:'hz_'+turnCount};
    showBanner('🌊 지형이 가라앉는다!');
  }
  appliedEventCount=allEvents.length;
}

async function skipTurn(){
  if(mySeat!==turnIdx) return;
  myTurnInProgress=true;
  nextTurn();
  await commitState();
  myTurnInProgress=false;
}
async function endResolving(){
  const info=evaluateWin();
  if(info.over){
    phase='over';
    winnerSeat=info.winnerSeat;
    winnerTeam=info.winnerTeam;
    showWinPopup();
  } else {
    nextTurn();
  }
  await commitState(); // 온라인: 내가 진행한 결과를 서버에 반영 (로컬 단독플레이 파일이면 room이 null이라 내부에서 조용히 무시됨)
  myTurnInProgress=false;
}

// ---------------- 온라인 동기화 ----------------
async function commitState(){
  if(!room) return;
  if(pendingShotCommit){ try{ await pendingShotCommit; }catch(e){} pendingShotCommit=null; }
  const payload={
    seed: room.state.seed,
    events: allEvents,
    tanks: tanks.map(t=>({x:t.x,groundY:t.groundY,hp:t.hp,alive:t.alive,angle:t.angle,facing:t.facing,lastPower:t.lastPower})),
    turnIdx, turnCount, wind, turnStartedAt: turnStartTs,
    winnerSeat, winnerTeam, usedRingIds, hazardBanner:pendingHazardBanner
  };
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/fortress_rooms?id=eq.${roomId}&move_count=eq.${room.move_count}`,{
      method:'PATCH',
      headers:{...jheaders(),'Prefer':'return=representation'},
      body:JSON.stringify({ state:payload, move_count:room.move_count+1, status:(winnerSeat!=null||winnerTeam!=null)?'finished':'playing', updated_at:new Date().toISOString() })
    });
    const data=await res.json();
    if(data&&data[0]){ room=data[0]; }
    else { console.error('상태 저장 충돌 - 다시 동기화가 필요할 수 있어요'); }
    if(winnerSeat!=null||winnerTeam!=null){ await applyEloResults(); }
  }catch(e){ console.error('상태 저장 실패',e); }
}
async function applyEloResults(){
  const winners = winnerTeam!=null ? tanks.filter(x=>x.team===winnerTeam) : tanks.filter(x=>x.seat===winnerSeat);
  const losers = tanks.filter(x=>!winners.includes(x));
  async function updateOne(tank,isWin){
    if(!tank.userId) return;
    try{
      const r=await fetch(`${SUPABASE_URL}/rest/v1/fortress_elo?user_id=eq.${tank.userId}&select=*`,{headers:headers()});
      const ex=await r.json();
      if(ex.length){
        const cur=ex[0];
        const newRating=Math.max(0,cur.rating+(isWin?15:-8));
        await fetch(`${SUPABASE_URL}/rest/v1/fortress_elo?user_id=eq.${tank.userId}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({rating:newRating,wins:cur.wins+(isWin?1:0),losses:cur.losses+(isWin?0:1)})});
      } else {
        await fetch(`${SUPABASE_URL}/rest/v1/fortress_elo`,{method:'POST',headers:jheaders(),body:JSON.stringify({user_id:tank.userId,username:tank.name,rating:1000+(isWin?15:-8),wins:isWin?1:0,losses:isWin?0:1})});
      }
    }catch(e){}
  }
  for(const w of winners) await updateOne(w,true);
  for(const l of losers) await updateOne(l,false);
}

// ---------------- 파티클/팝업 ----------------
function spawnBurst(x,y,r){
  for(let i=0;i<16;i++){
    const ang=Math.random()*Math.PI*2;
    const dist=10+Math.random()*r*0.9;
    particles.push({x,y,dx:Math.cos(ang)*dist,dy:Math.sin(ang)*dist,life:1,color:Math.random()<0.5?'#ff8a3d':'#5a4632'});
  }
}
function updateParticles(dt){ particles.forEach(p=>p.life-=dt*1.8); particles=particles.filter(p=>p.life>0); }
function drawParticles(){
  particles.forEach(p=>{
    const t=1-p.life;
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x+p.dx*t,p.y+p.dy*t,3.5*p.life,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}
function showPop(worldX,worldY,text,cls,dmg){
  const el=document.createElement('div');
  el.className=cls;
  el.textContent=text;
  if(cls==='fall-pop'){
    el.style.fontSize='20px';
  } else {
    // 6번: 데미지 클수록 글자도 더 크게 (임팩트 강조)
    const fs=26+Math.min(30,(dmg||20)*0.55);
    el.style.fontSize=fs+'px';
    el.style.color = (dmg||0)>=45?'#ff2b2b':(dmg||0)>=25?'#ff5c5c':'#ffb4b4';
  }
  document.getElementById('app').appendChild(el);
  const canvasRect=canvas.getBoundingClientRect();
  const appRect=document.getElementById('app').getBoundingClientRect();
  const sx=canvasRect.left-appRect.left+(worldX-camX);
  const sy=canvasRect.top-appRect.top+worldY;
  el.style.left=sx+'px'; el.style.top=sy+'px';
  requestAnimationFrame(()=>{ el.style.opacity='1'; el.style.transform='translate(-50%,-50%) scale(1.25)'; el.style.top=(sy-38)+'px'; });
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translate(-50%,-50%) scale(1)'; },700);
  setTimeout(()=>el.remove(),950);
}

function drawMinimap(){
  if(!groundSurface) return;
  if(minimap.width!==MM_W) minimap.width=MM_W;
  if(minimap.height!==MM_H) minimap.height=MM_H;
  mctx.clearRect(0,0,MM_W,MM_H);
  if(minimapTerrainCache) mctx.drawImage(minimapTerrainCache,0,0);
  const scaleX=MM_W/WORLD_W, scaleY=MM_H/H;
  tanks.forEach(t=>{
    if(!t.alive) return;
    mctx.fillStyle=t.color;
    mctx.beginPath();
    mctx.arc(t.x*scaleX,t.groundY*scaleY,3.2,0,Math.PI*2);
    mctx.fill();
  });
  mctx.strokeStyle='rgba(255,255,255,0.8)';
  mctx.lineWidth=1.5;
  mctx.strokeRect(camX*scaleX,0,W*scaleX,MM_H);
}

// ---------------- 메인 루프 ----------------
let lastTs=0;
function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,0.05);
  lastTs=ts;
  if(running) update(dt);
  draw();
  requestAnimationFrame(loop);
}
function update(dt){
  if(phase==='aim'){
    const remain=Math.max(0,TURN_TIME-(Date.now()-turnStartTs)/1000);
    const timerEl=document.getElementById('timerVal');
    timerEl.textContent=Math.ceil(remain);
    timerEl.parentElement.style.color = remain<=5?'#ef4444':'#fff';
    if(remain<=0 && mySeat===turnIdx){
      if(charging){ charging=false; doFire(chargePower); }
      else { skipTurn(); }
    }
  }
  if(phase==='aim' && fuelLeft>0 && mySeat===turnIdx){
    const t=tanks[turnIdx];
    let moved=0;
    if(keyState.left) moved=-MOVE_SPEED*dt;
    else if(keyState.right) moved=MOVE_SPEED*dt;
    if(moved!==0){
      const dir=moved<0?-1:1;
      const lookX=clamp(t.x+dir*3,0,WORLD_W-1);
      const y0=getSurfaceY(t.x), y1=getSurfaceY(lookX);
      let blocked=false;
      if(y0!==null&&y1!==null){
        const rise=y0-y1; // 양수면 이동방향이 더 높음(오르막)
        const slopeAngle=Math.atan2(rise,3)*180/Math.PI;
        if(slopeAngle>70) blocked=true; // 2번: 70도 넘는 급경사는 못 올라감
      }
      if(!blocked){
        const nx=clamp(t.x+moved,6,WORLD_W-6);
        t.x=nx;
        t.facing=dir;
        const gy=getSurfaceY(t.x);
        if(gy!==null) t.groundY=gy;
        t.wheelRot+=moved/WHEEL_R;
        fuelLeft=Math.max(0,fuelLeft-Math.abs(moved));
        document.getElementById('fuelFill').style.width=Math.max(0,(fuelLeft/TURN_FUEL)*100)+'%';
        commitMoveUpdate(t); // 1번: 이동도 실시간으로 다른 사람에게 (쓰로틀링해서 전송)
      }
    }
  }
  tanks.forEach(t=>{ if(t.alive) t.tilt=getTiltAngle(t.x); });
  tanks.forEach(t=>{
    if(t.falling){
      t.groundY+=240*dt;
      if(t.groundY>=t.fallTarget){ t.groundY=t.fallTarget; t.falling=false; }
    }
  });
  if(charging){
    const el=(performance.now()-chargeStart)/1000;
    chargePower=Math.min(1,el/1.1);
    document.getElementById('fireFill').style.width=(chargePower*100)+'%';
  } else {
    document.getElementById('fireFill').style.width='0%';
  }

  // 카메라: 포탄이 날아가는 중이면 포탄을, 폭발 직후엔 폭발지점을, 그 외엔 현재 턴 탱크를 따라감
  // 단, 사용자가 드래그해서 직접 화면을 보고 있는 중이거나 직후(1.1초)엔 자동추적을 쉼
  if(phase!=='intro' && !dragging && performance.now()-lastDragTs>1100){
    const followX = projectile? projectile.x : ghostProjectile? ghostProjectile.x : (phase==='resolving'&&lastImpact? lastImpact.x : tanks[turnIdx].x);
    const targetCam=clamp(followX-W/2,0,Math.max(0,WORLD_W-W));
    camX+=(targetCam-camX)*Math.min(1,6*dt);
  }

  updateProjectile(dt);
  updateParticles(dt);
  updateAmbient(dt);
  updateRings(dt);
}
function draw(){
  drawBackground();
  drawAmbient();
  ctx.save();
  ctx.translate(-camX,0);
  if(terrainCanvas) ctx.drawImage(terrainCanvas,0,0);
  drawRings();
  tanks.forEach(drawTank);
  if(phase==='aim'&&tanks[turnIdx]&&tanks[turnIdx].alive) drawAimGuide(tanks[turnIdx]);
  drawParticles();
  if(projectile){
    ctx.strokeStyle='rgba(255,255,255,0.35)';
    ctx.lineWidth=2;
    ctx.beginPath();
    projectile.trail.forEach((p,i)=>{ i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); });
    ctx.stroke();
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(projectile.x,projectile.y,4.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,150,50,0.55)';
    ctx.beginPath();ctx.arc(projectile.x,projectile.y,7,0,Math.PI*2);ctx.fill();
  }
  if(ghostProjectile){
    ctx.strokeStyle='rgba(255,255,255,0.35)';
    ctx.lineWidth=2;
    ctx.beginPath();
    ghostProjectile.trail.forEach((p,i)=>{ i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); });
    ctx.stroke();
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(ghostProjectile.x,ghostProjectile.y,4.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,150,50,0.55)';
    ctx.beginPath();ctx.arc(ghostProjectile.x,ghostProjectile.y,7,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  drawMinimap();
}

// ---------------- 인트로 ----------------
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }
function easeOutCubic(x){ return 1-Math.pow(1-x,3); }
async function introTour(){
  phase='intro';
  for(const t of tanks){
    const targetCam=clamp(t.x-W/2,0,Math.max(0,WORLD_W-W));
    const startCam=camX;
    const dur=750;
    const t0=performance.now();
    await new Promise(res=>{
      function step(){
        const p=Math.min(1,(performance.now()-t0)/dur);
        camX=startCam+(targetCam-startCam)*easeOutCubic(p);
        if(p<1) requestAnimationFrame(step); else res();
      }
      step();
    });
    showIntroLabel(t);
    await wait(950);
  }
}
function showIntroLabel(t){
  const el=document.createElement('div');
  el.className='fall-pop';
  el.textContent=t.name;
  el.style.color=t.color;
  el.style.fontSize='19px';
  document.getElementById('app').appendChild(el);
  const canvasRect=canvas.getBoundingClientRect();
  const appRect=document.getElementById('app').getBoundingClientRect();
  const sx=canvasRect.left-appRect.left+(t.x-camX);
  const sy=canvasRect.top-appRect.top+t.groundY-70;
  el.style.left=sx+'px'; el.style.top=sy+'px';
  requestAnimationFrame(()=>{ el.style.opacity='1'; el.style.transform='translate(-50%,-50%) scale(1.15)'; });
  setTimeout(()=>{ el.style.opacity='0'; },850);
  setTimeout(()=>el.remove(),1050);
}

// 4번: 드래그로 화면 자유롭게 둘러보기
canvas.addEventListener('pointerdown',e=>{ dragging=true; dragLastX=e.clientX; });
window.addEventListener('pointermove',e=>{
  if(!dragging) return;
  const dx=e.clientX-dragLastX;
  dragLastX=e.clientX;
  camX=clamp(camX-dx,0,Math.max(0,WORLD_W-W));
  lastDragTs=performance.now();
});
window.addEventListener('pointerup',()=>{ dragging=false; });
window.addEventListener('pointercancel',()=>{ dragging=false; });

// 5번: 키보드 조작 (방향키 이동/각도, 스페이스바 파워충전)
window.addEventListener('keydown',e=>{
  if(phase!=='aim'||mySeat!==turnIdx){ if(e.code==='Space') e.preventDefault(); return; }
  if(e.key==='ArrowLeft'){ keyState.left=true; }
  if(e.key==='ArrowRight'){ keyState.right=true; }
  if(e.key==='ArrowUp'){ if(!angleHold) startAngleHold(1); e.preventDefault(); }
  if(e.key==='ArrowDown'){ if(!angleHold) startAngleHold(-1); e.preventDefault(); }
  if(e.code==='Space'){
    e.preventDefault();
    if(!charging){ charging=true; chargeStart=performance.now(); }
  }
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft') keyState.left=false;
  if(e.key==='ArrowRight') keyState.right=false;
  if(e.key==='ArrowUp'||e.key==='ArrowDown') stopAngleHold();
  if(e.code==='Space'){
    if(charging){ charging=false; doFire(chargePower); }
  }
});

function showFatal(msg){
  document.getElementById('loadingText').textContent=msg;
}

async function enterRoom(){
  if(!currentUser){ showFatal('로그인 후 이용해주세요.'); return; }
  if(!roomId){ showFatal('잘못된 접근이에요.'); return; }
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/fortress_rooms?id=eq.${roomId}&select=*`,{headers:headers()});
    const data=await r.json();
    if(!data||!data[0]){ showFatal('방을 찾을 수 없어요.'); return; }
    room=data[0];
  }catch(e){ showFatal('방 정보를 불러오지 못했어요.'); return; }

  mySeat=(room.players||[]).findIndex(p=>String(p.user_id)===String(currentUser.id));
  TURN_TIME=room.time_limit||20;

  if(room.status==='waiting'){
    phase='lobby';
    document.getElementById('ov-start').style.display='none';
    renderLobby();
    return;
  }
  await enterGameFromState(room.state, room.players);
}

function renderLobby(){
  document.getElementById('ov-start').style.display='none';
  document.getElementById('ov-lobby').style.display='flex';
  const players=room.players||[];
  document.getElementById('lobbyMeta').textContent=`⏱ ${room.time_limit||20}초 · ${room.mode==='team'?'팀전':'개인전'} · ${players.length}/6명`;
  const wrap=document.getElementById('lobbyPlayers');
  wrap.innerHTML='';
  players.forEach(p=>{
    const row=document.createElement('div');
    row.className='lobby-row';
    const tankLabel = p.customTankId? '🛠️ 커스텀' : (()=>{ const c=tankClassById(p.tankClass); return c.emoji+' '+c.name; })();
    row.innerHTML=`<span class="lobby-dot" style="background:${p.color}"></span><span class="lobby-name">${p.username} <span style="opacity:0.6;">${tankLabel}</span></span>${p.team?`<span class="lobby-team">${p.team}팀</span>`:''}<span class="lobby-team" style="background:${p.ready?'rgba(74,222,128,0.25)':'rgba(255,255,255,0.08)'};color:${p.ready?'#4ade80':'rgba(255,255,255,0.5)'};">${p.ready?'준비완료':'대기중'}</span>`;
    wrap.appendChild(row);
  });
  const myEntry=players.find(p=>currentUser&&String(p.user_id)===String(currentUser.id));
  const readyBtn=document.getElementById('lobbyReadyBtn');
  if(myEntry){
    readyBtn.style.display='block';
    readyBtn.textContent=myEntry.ready?'준비 취소':'준비완료';
    readyBtn.style.background=myEntry.ready?'#94a3b8':'#4ade80';
  } else {
    readyBtn.style.display='none';
  }
  const isHost=currentUser&&String(room.host_user_id)===String(currentUser.id);
  const startBtn=document.getElementById('lobbyStartBtn');
  const hint=document.getElementById('lobbyHint');
  if(isHost){
    startBtn.style.display='block';
    startBtn.disabled=players.length<2;
    startBtn.style.opacity=players.length<2?0.5:1;
    hint.textContent=players.length<2?'2명 이상 모이면 시작할 수 있어요':'';
  } else {
    startBtn.style.display='none';
    hint.textContent='방장이 시작하길 기다리는 중...';
  }
}

function renderTankPreview(canvasEl,cls){
  const pctx=canvasEl.getContext('2d');
  const prevCtx=ctx;
  ctx=pctx;
  pctx.clearRect(0,0,canvasEl.width,canvasEl.height);
  const skin=classSkin(cls);
  const cx=canvasEl.width/2, gy=canvasEl.height-12;
  skin.drawWheels(cx,gy,1,0.4);
  skin.drawBody(cx,gy,1,cls.color);
  skin.drawTurret(cx,gy,1,50,cls.color);
  ctx=prevCtx;
}
function renderCustomTankPreview(canvasEl,custom){
  const pctx=canvasEl.getContext('2d');
  const prevCtx=ctx;
  ctx=pctx;
  pctx.clearRect(0,0,canvasEl.width,canvasEl.height);
  const skin=customSkin(custom);
  const cx=canvasEl.width/2, gy=canvasEl.height-10;
  skin.drawWheels(cx,gy,1);
  skin.drawBody(cx,gy,1);
  skin.drawTurret(cx,gy,1,50);
  ctx=prevCtx;
}

async function selectCustomTank(customId){
  if(!room||!currentUser) return;
  const players=(room.players||[]).map(p=>String(p.user_id)===String(currentUser.id)?{...p,customTankId:customId}:p);
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/fortress_rooms?id=eq.${roomId}&move_count=eq.${room.move_count}`,{
      method:'PATCH',
      headers:{...jheaders(),'Prefer':'return=representation'},
      body:JSON.stringify({players,move_count:room.move_count+1,updated_at:new Date().toISOString()})
    });
    const data=await res.json();
    if(data&&data[0]){ room=data[0]; document.getElementById('ov-tankpicker').style.display='none'; renderLobby(); }
    else { alert('다른 변경사항과 겹쳤어요, 다시 시도해주세요.'); }
  }catch(e){ alert('탱크 선택에 실패했어요.'); }
}
async function selectTankClass(classId){
  if(!room||!currentUser) return;
  const players=(room.players||[]).map(p=>String(p.user_id)===String(currentUser.id)?{...p,tankClass:classId,customTankId:null,color:tankClassById(classId).color}:p);
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/fortress_rooms?id=eq.${roomId}&move_count=eq.${room.move_count}`,{
      method:'PATCH',
      headers:{...jheaders(),'Prefer':'return=representation'},
      body:JSON.stringify({players,move_count:room.move_count+1,updated_at:new Date().toISOString()})
    });
    const data=await res.json();
    if(data&&data[0]){ room=data[0]; document.getElementById('ov-tankpicker').style.display='none'; renderLobby(); }
    else { alert('다른 변경사항과 겹쳤어요, 다시 시도해주세요.'); }
  }catch(e){ alert('탱크 선택에 실패했어요.'); }
}

async function returnToLobby(){
  if(!room) return;
  try{
    // 나갔던(left) 사람은 정리하고, 나머지는 준비상태 초기화해서 다시 대기실로
    const cleanPlayers=(room.players||[]).filter(p=>!p.left).map(p=>({...p,ready:false}));
    const res=await fetch(`${SUPABASE_URL}/rest/v1/fortress_rooms?id=eq.${roomId}&move_count=eq.${room.move_count}`,{
      method:'PATCH',
      headers:{...jheaders(),'Prefer':'return=representation'},
      body:JSON.stringify({status:'waiting',state:null,players:cleanPlayers,move_count:room.move_count+1,updated_at:new Date().toISOString()})
    });
    const data=await res.json();
    if(data&&data[0]){
      room=data[0];
      document.getElementById('ov-win').style.display='none';
      introShown=false;
      lastSeenShotKey=null; lastSeenMoveTs=0; lastSeenHazardKey=null; turnCount=0;
      mySeat=(room.players||[]).findIndex(p=>currentUser&&String(p.user_id)===String(currentUser.id));
      phase='lobby';
      renderLobby();
    } else {
      alert('다른 변경사항과 겹쳤어요, 새로고침 해주세요.');
    }
  }catch(e){ alert('방으로 돌아가지 못했어요.'); }
}
async function leaveRoom(){
  if(!room||!currentUser){ location.href='fortress_rooms.html'; return; }
  const msg = room.status==='playing'? '게임 중이에요. 나가면 기권 처리돼요. 나가시겠어요?' : '방에서 나가시겠어요?';
  if(!confirm(msg)) return;
  try{
    if(room.status==='waiting'){
      const newPlayers=(room.players||[]).filter(p=>String(p.user_id)!==String(currentUser.id));
      if(newPlayers.length===0){
        await fetch(`${SUPABASE_URL}/rest/v1/fortress_rooms?id=eq.${roomId}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({status:'finished'})});
      } else {
        await fetch(`${SUPABASE_URL}/rest/v1/fortress_rooms?id=eq.${roomId}&move_count=eq.${room.move_count}`,{
          method:'PATCH',headers:{...jheaders(),'Prefer':'return=representation'},
          body:JSON.stringify({players:newPlayers,move_count:room.move_count+1,updated_at:new Date().toISOString()})
        });
      }
    } else if(room.status==='playing' && room.state){
      // 게임 중엔 좌석(seat) 배열 순서가 깨지면 안되므로 목록에서 지우지 않고 '나감' 표시만 하고, 탱크는 기권(死) 처리
      const newPlayers=(room.players||[]).map(p=>String(p.user_id)===String(currentUser.id)?{...p,left:true}:p);
      let st={...room.state};
      if(st.tanks && mySeat>=0 && st.tanks[mySeat]){
        st.tanks=st.tanks.map((t,i)=>i===mySeat?{...t,alive:false,hp:0}:t);
        if(st.turnIdx===mySeat){
          let next=mySeat;
          for(let k=0;k<st.tanks.length;k++){ next=(next+1)%st.tanks.length; if(st.tanks[next].alive) break; }
          st.turnIdx=next;
          st.turnStartedAt=Date.now();
        }
        const aliveTanks=st.tanks.filter(t=>t.alive);
        if(room.mode==='team'){
          const teams=[...new Set(aliveTanks.map(t=>t.team))];
          if(teams.length<=1){ st.winnerTeam=teams[0]||null; st.winnerSeat=null; }
        } else if(aliveTanks.length<=1){
          st.winnerSeat=aliveTanks[0]?aliveTanks[0].seat:null;
        }
      }
      const patch={players:newPlayers,state:st,move_count:room.move_count+1,updated_at:new Date().toISOString()};
      if(st.winnerSeat!=null||st.winnerTeam!=null) patch.status='finished';
      await fetch(`${SUPABASE_URL}/rest/v1/fortress_rooms?id=eq.${roomId}&move_count=eq.${room.move_count}`,{
        method:'PATCH',headers:{...jheaders(),'Prefer':'return=representation'},
        body:JSON.stringify(patch)
      });
    }
  }catch(e){}
  location.href='fortress_rooms.html';
}

async function toggleReady(){
  if(!room||!currentUser) return;
  const players=(room.players||[]).map(p=>String(p.user_id)===String(currentUser.id)?{...p,ready:!p.ready}:p);
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/fortress_rooms?id=eq.${roomId}&move_count=eq.${room.move_count}`,{
      method:'PATCH',
      headers:{...jheaders(),'Prefer':'return=representation'},
      body:JSON.stringify({players,move_count:room.move_count+1,updated_at:new Date().toISOString()})
    });
    const data=await res.json();
    if(data&&data[0]){ room=data[0]; renderLobby(); }
    else { alert('다른 변경사항과 겹쳤어요, 다시 시도해주세요.'); }
  }catch(e){ alert('준비 상태 변경에 실패했어요.'); }
}

async function fetchCustomTanksFor(players){
  const ids=[...new Set((players||[]).filter(p=>p.customTankId).map(p=>p.customTankId))];
  if(!ids.length) return {};
  try{
    const idList=ids.map(id=>`"${id}"`).join(',');
    const r=await fetch(`${SUPABASE_URL}/rest/v1/fortress_custom_tanks?id=in.(${idList})&select=*`,{headers:headers()});
    const data=await r.json();
    const map={};
    data.forEach(d=>{ map[d.id]=d; });
    return map;
  }catch(e){ return {}; }
}
async function hostStartGame(){
  if(!room||String(room.host_user_id)!==String(currentUser.id)) return;
  if((room.players||[]).length<2) return;
  const seed=Math.floor(Math.random()*1e9);
  seedRng(seed);
  generateTerrain();
  const customMap=await fetchCustomTanksFor(room.players);
  spawnTanks(room.players,customMap);
  initRings();
  allEvents=[]; appliedEventCount=0; usedRingIds=[];
  const initState={
    seed, events:[],
    tanks: tanks.map(t=>({x:t.x,groundY:t.groundY,hp:t.hp,alive:t.alive,angle:t.angle,facing:t.facing,lastPower:t.lastPower})),
    turnIdx:0, turnCount:0, wind:0, turnStartedAt:Date.now(),
    winnerSeat:null, winnerTeam:null, usedRingIds:[], hazardBanner:null
  };
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/fortress_rooms?id=eq.${roomId}&move_count=eq.${room.move_count}`,{
      method:'PATCH',
      headers:{...jheaders(),'Prefer':'return=representation'},
      body:JSON.stringify({status:'playing',state:initState,move_count:room.move_count+1,updated_at:new Date().toISOString()})
    });
    const data=await res.json();
    if(data&&data[0]){ room=data[0]; await enterGameFromState(room.state,room.players); }
    else { alert('다른 변경사항과 충돌했어요. 다시 시도해주세요.'); }
  }catch(e){ alert('게임 시작에 실패했어요.'); }
}

async function enterGameFromState(state,players){
  document.getElementById('ov-start').style.display='none';
  document.getElementById('ov-lobby').style.display='none';
  bgClouds=[{x:W*0.2,y:H*0.16,s:1},{x:W*0.6,y:H*0.1,s:0.7},{x:W*0.85,y:H*0.22,s:0.9},{x:W*1.3,y:H*0.14,s:0.8}];
  seedRng(state.seed);
  generateTerrain();
  const customMap=await fetchCustomTanksFor(players);
  spawnTanks(players,customMap);
  initRings();

  allEvents=[]; appliedEventCount=0;
  for(const e of (state.events||[])) applyTerrainEvent(e);
  allEvents=(state.events||[]).slice();
  appliedEventCount=allEvents.length;

  (state.tanks||[]).forEach((st,i)=>{
    const t=tanks[i]; if(!t) return;
    t.x=st.x; t.groundY=st.groundY; t.hp=st.hp; t.alive=st.alive;
    t.angle=st.angle; t.facing=st.facing; t.lastPower=st.lastPower;
    t.tilt=getTiltAngle(t.x);
  });
  turnIdx=state.turnIdx||0;
  turnCount=state.turnCount||0;
  wind=state.wind||0;
  usedRingIds=state.usedRingIds||[];
  maybeSpawnBonusRings();
  rings.forEach(r=>{ if(usedRingIds.includes(r.id)) r.active=false; });
  winnerSeat=state.winnerSeat??null;
  winnerTeam=state.winnerTeam??null;
  if(state.hazardBanner) lastSeenHazardKey=state.hazardBanner.key; // 처음 들어올 때는 이미 지난 발동이므로 배너 재생하지 않음

  particles=[];projectile=null;
  initAmbient();
  camX=clamp((tanks[turnIdx]?tanks[turnIdx].x:0)-W/2,0,Math.max(0,WORLD_W-W));
  running=true;

  if(winnerSeat!=null||winnerTeam!=null){ phase='over'; showWinPopup(); return; }

  if(!introShown){
    introShown=true;
    await introTour();
  }
  adoptTurnState(state);
}
function adoptTurnState(state){
  phase='aim';
  turnStartTs=state.turnStartedAt;
  fuelLeft=TURN_FUEL;
  lastDragTs=0;
  const marker=document.getElementById('fireMarker');
  const t=tanks[turnIdx];
  if(t&&t.lastPower!=null){ marker.style.display='block'; marker.style.left=(t.lastPower*100)+'%'; }
  else if(marker){ marker.style.display='none'; }
  updateHUD();
}
function applyRemoteState(state){
  const events=state.events||[];
  const newCraters=[];
  for(let i=appliedEventCount;i<events.length;i++){ const e=events[i]; applyTerrainEvent(e); if(e.type!=='sink') newCraters.push(e); }
  appliedEventCount=events.length;
  allEvents=events.slice();
  // 새로 생긴 크레이터마다 폭발 이펙트를 보여줘서 "뭔가 터졌다"는 게 확실히 보이게
  newCraters.forEach(e=>spawnBurst(e.x,e.y,e.r));

  (state.tanks||[]).forEach((st,i)=>{
    const t=tanks[i]; if(!t) return;
    const oldHp=t.hp, wasAlive=t.alive, oldGY=t.groundY;
    t.x=st.x; t.groundY=st.groundY; t.hp=st.hp; t.alive=st.alive;
    t.angle=st.angle; t.facing=st.facing; t.lastPower=st.lastPower;
    t.tilt=getTiltAngle(t.x);
    // 체력이 줄었으면 데미지 팝업을, 체력 그대로인데 죽었으면(=낙사) 추락 팝업을 확실히 띄움
    if(st.hp<oldHp){ showPop(t.x,oldGY-40,'-'+(oldHp-st.hp),'dmg-pop',oldHp-st.hp); }
    else if(wasAlive&&!st.alive){ showPop(t.x,oldGY-30,'추락!','fall-pop'); }
  });
  turnIdx=state.turnIdx;
  turnCount=state.turnCount||0;
  wind=state.wind;
  usedRingIds=state.usedRingIds||[];
  maybeSpawnBonusRings();
  rings.forEach(r=>{ if(usedRingIds.includes(r.id)) r.active=false; });
  if(state.hazardBanner && state.hazardBanner.key!==lastSeenHazardKey){
    lastSeenHazardKey=state.hazardBanner.key;
    showBanner(state.hazardBanner.text);
  }
  winnerSeat=state.winnerSeat??null;
  winnerTeam=state.winnerTeam??null;

  if(winnerSeat!=null||winnerTeam!=null){ phase='over'; showWinPopup(); return; }
  adoptTurnState(state);
}

async function pollRoom(){
  if(!roomId||!currentUser) return;
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/fortress_rooms?id=eq.${roomId}&select=*`,{headers:headers()});
    const data=await r.json();
    if(!data||!data[0]) return;
    const newRoom=data[0];
    if(phase==='lobby'){
      room=newRoom;
      if(newRoom.status==='playing'){ await enterGameFromState(newRoom.state,newRoom.players); }
      else { renderLobby(); }
      return;
    }
    if(newRoom.status==='waiting' && phase!=='lobby'){
      // 누군가 "이 방에서 다시하기"를 눌러서 방이 대기실로 리셋된 경우, 나도 따라서 로비로 전환
      room=newRoom;
      document.getElementById('ov-win').style.display='none';
      introShown=false;
      lastSeenShotKey=null; lastSeenMoveTs=0; lastSeenHazardKey=null; turnCount=0;
      mySeat=(room.players||[]).findIndex(p=>currentUser&&String(p.user_id)===String(currentUser.id));
      phase='lobby';
      renderLobby();
      return;
    }
    const changed=!room||newRoom.move_count!==room.move_count;
    room=newRoom;
    if(changed && newRoom.state && phase!=='intro' && phase!=='loading' && phase!=='lobby' && !myTurnInProgress){
      const shot=newRoom.state.lastShot;
      if(shot){
        const key=shot.startedAt+'_'+shot.seat;
        if(key!==lastSeenShotKey && mySeat!==newRoom.state.turnIdx){
          lastSeenShotKey=key;
          playGhostShot(shot); // 이 안에서 ghostAnimating=true로 즉시 설정됨
        } else if(lastSeenShotKey===null){
          lastSeenShotKey=key; // 처음 들어왔을 때는 이미 지난 발사이므로 재생하지 않고 표시만 해둠
        }
      }
      if(ghostAnimating){
        // 4번: 포탄이 아직 날아가는 중이면 최종 결과는 착탄하는 순간까지 잠깐 들고 있음 (미리 스냅되지 않도록)
        pendingRemoteState=newRoom.state;
      } else {
        applyRemoteState(newRoom.state);
      }

      // 1번: 남이 이동중인 위치도 실시간 반영 (전체 상태 적용 뒤에 덮어써서 최신 위치가 우선되게)
      const mv=newRoom.state.moveUpdate;
      if(mv && mv.ts!==lastSeenMoveTs && mv.seat!==mySeat){
        lastSeenMoveTs=mv.ts;
        const t=tanks[mv.seat];
        if(t && t.alive){
          t.x=mv.x; t.groundY=mv.groundY; t.facing=mv.facing; t.wheelRot=mv.wheelRot;
          t.tilt=getTiltAngle(t.x);
        }
      }
    }
  }catch(e){ console.error('방 폴링 실패',e); }
}

enterRoom();
pollTimer=setInterval(pollRoom,900);
requestAnimationFrame(loop);
