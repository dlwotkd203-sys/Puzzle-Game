/* ===== 전체 랭킹 위젯 ===== */

<script>
function mkRng(seed){let s=seed|0;return()=>{s=(Math.imul(1664525,s)+1013904223)|0;return(s>>>0)/4294967296;};}
function generateShikaku(n,seed,maxArea){
  const minArea=2,grid=new Array(n*n).fill(-1),rects=[];
  function canPlace(r,c,h,w){if(r+h>n||c+w>n)return false;for(let rr=r;rr<r+h;rr++)for(let cc=c;cc<c+w;cc++)if(grid[rr*n+cc]!==-1)return false;return true;}
  function fill(r,c,h,w,id){for(let rr=r;rr<r+h;rr++)for(let cc=c;cc<c+w;cc++)grid[rr*n+cc]=id;}
  function unfill(r,c,h,w){for(let rr=r;rr<r+h;rr++)for(let cc=c;cc<c+w;cc++)grid[rr*n+cc]=-1;}
  function nextEmpty(){for(let i=0;i<n*n;i++)if(grid[i]===-1)return[Math.floor(i/n),i%n];return null;}
  function attempt(rngFn,maxA){
    grid.fill(-1);rects.length=0;
    function solve(id){
      const pos=nextEmpty();if(!pos)return true;
      const[sr,sc]=pos,cands=[];
      for(let h=1;h<=n-sr;h++)for(let w=1;w<=n-sc;w++){const a=h*w;if(a<minArea||a>maxA)continue;if(canPlace(sr,sc,h,w))cands.push([h,w]);}
      for(let i=cands.length-1;i>0;i--){const j=Math.floor(rngFn()*(i+1));[cands[i],cands[j]]=[cands[j],cands[i]];}
      for(const[h,w]of cands){fill(sr,sc,h,w,id);rects.push({r:sr,c:sc,h,w,area:h*w});if(solve(id+1))return true;unfill(sr,sc,h,w);rects.pop();}
      return false;
    }
    return solve(0);
  }
  const rng=mkRng(seed);
  if(!attempt(rng,maxArea)){const rng2=mkRng(seed^0xDEAD);attempt(rng2,n*n);}
  const rng3=mkRng(seed^0xABCD);
  const clues=rects.map(rect=>{
    const cells=[];for(let r=rect.r;r<rect.r+rect.h;r++)for(let c=rect.c;c<rect.c+rect.w;c++)cells.push([r,c]);
    const[pr,pc]=cells[Math.floor(rng3()*cells.length)];return[pr,pc,rect.area];
  });
  return{n,clues,rects};
}
const RECT_COLORS=[
  {bg:'rgba(55,138,221,0.2)',border:'#378ADD'},{bg:'rgba(29,158,117,0.2)',border:'#1D9E75'},

  {bg:'rgba(239,159,39,0.2)',border:'#EF9F27'},{bg:'rgba(93,202,165,0.2)',border:'#5DCAA5'},
  {bg:'rgba(240,153,123,0.2)',border:'#F0997B'},{bg:'rgba(237,147,177,0.2)',border:'#ED93B1'},
];
function getRectColor(i){return RECT_COLORS[i%RECT_COLORS.length];}

function getDiff(s){return DIFFS.find(d=>s>=d.range[0]&&s<=d.range[1]);}

const SUPABASE_URL='https://pampoyeyhwwdpzcaubdm.supabase.co';
const SUPABASE_KEY='sb_publishable_xWRbj6jRwR_sojPBYCLfEg_DylayGH5';
// XSS 방지: 사용자가 입력한 값(닉네임 등)을 HTML에 넣기 전에 특수문자를 이스케이프
function esc(str){
  return String(str??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
const SCORE_GAMES=['2048','dodge','memory','sorter','minesweeper','breakout','rps','reaction','olla','snake','colormatch','numrush'];
const STAGE_GAMES=['shikaku','sudoku','nonogram','flow'];
const RANK_POINTS=[3,2,1];

// 게임별 1~3위에게 3/2/1점을 주고 합산하는 종합 랭킹 (ranking.html의 '전체' 탭과 동일한 방식)
async function computeTotalRanking(){
  const points={},gameCount={};
  function award(username,idx){
    points[username]=(points[username]||0)+RANK_POINTS[idx];
    gameCount[username]=(gameCount[username]||0)+1;
  }
  const headers={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};
  await Promise.all(SCORE_GAMES.map(async game=>{
    try{
      const res=await fetch(`${SUPABASE_URL}/rest/v1/scores?game=eq.${game}&select=username,score&order=score.desc&limit=3`,{headers});
      const data=await res.json();
      data.forEach((row,idx)=>award(row.username,idx));
    }catch(e){}
  }));
  await Promise.all(STAGE_GAMES.map(async game=>{
    try{
      const res=await fetch(`${SUPABASE_URL}/rest/v1/clears?game=eq.${game}&select=username`,{headers});
      const data=await res.json();
      const map={};
      data.forEach(r=>{map[r.username]=(map[r.username]||0)+1;});
      Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,3).forEach(([name],idx)=>award(name,idx));
    }catch(e){}
  }));
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/omok_elo?select=username,rating&order=rating.desc&limit=3`,{headers});
    const data=await res.json();
    data.forEach((row,idx)=>award(row.username,idx));
  }catch(e){}
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/onecard_elo?select=username,rating&order=rating.desc&limit=3`,{headers});
    const data=await res.json();
    data.forEach((row,idx)=>award(row.username,idx));
  }catch(e){}
  return Object.entries(points)
    .sort((a,b)=>b[1]-a[1]||gameCount[b[0]]-gameCount[a[0]])
    .map(([username,pts])=>({username,points:pts}));
}

async function renderLeaderboardWidget(){
  const listEl=document.getElementById('lb-list');
  try{
    const ranked=await computeTotalRanking();
    if(!ranked.length){listEl.innerHTML='<div class="lb-empty">아직 기록이 없어요!</div>';return;}
    listEl.innerHTML='';
    ranked.slice(0,5).forEach((row,idx)=>{
      const rk=idx+1;
      const rkClass=rk<=3?' rk'+rk:'';
      const sparkles=rk===1?'<span class="sparkle s1">✨</span><span class="sparkle s2">✨</span><span class="sparkle s3">✨</span><span class="sparkle s4">✨</span>':'';
      const crown=rk===3?'👑 ':'';
      const div=document.createElement('div');
      div.className='lb-item'+rkClass;
      div.innerHTML=`${sparkles}<div class="lb-rank">TOP ${rk}</div><div class="lb-name">${crown}${esc(row.username)}</div><div class="lb-pts">${row.points}pt</div>`;
      listEl.appendChild(div);
    });
  }catch(e){
    listEl.innerHTML='<div class="lb-empty">불러올 수 없어요.</div>';
  }
}

async function getTop1(gameId){
  try{
    if(gameId==='omok'||gameId==='onecard'){
      const table=gameId==='omok'?'omok_elo':'onecard_elo';
      const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=username,rating&order=rating.desc&limit=1`,{
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
      });
      const data=await res.json();
      return data.length?data[0].username:null;
    }
    if(SCORE_GAMES.includes(gameId)){
      const res=await fetch(`${SUPABASE_URL}/rest/v1/scores?game=eq.${gameId}&select=username,score&order=score.desc&limit=1`,{
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
      });
      const data=await res.json();
      return data.length?data[0].username:null;
    } else {
      const res=await fetch(`${SUPABASE_URL}/rest/v1/clears?game=eq.${gameId}&select=username`,{
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
      });
      const data=await res.json();
      if(!data.length)return null;
      const map={};
      data.forEach(r=>{map[r.username]=(map[r.username]||0)+1;});
      const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]);
      return sorted.length?sorted[0][0]:null;
    }
  }catch(e){return null;}
}

const TITLES={
  shikaku:'식하쿠', sudoku:'수독후', nonogram:'픽셀장인', '2048':'16384',
  dodge:'공이 나를 피한다', memory:'타짜', sorter:'왼쪽 오른쪽', minesweeper:'지뢰탐지견',
  breakout:'파괴본능', flow:'뭘로하지', rps:'눈보다 빠른 손', reaction:'빠른 시냅스',
  olla:'어디까지 올라가', snake:'뱀~신', colormatch:'매직아이', omok:'흑돌의 지배자', numrush:'가우스의 재림', onecard:'카드의 제왕'
};
let gameEnabledMap={};

async function loadSettingsAndNotice(){
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/settings?select=*`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    const data=await res.json();
    const map={};
    data.forEach(row=>{map[row.key]=row.value;});

    // 공지사항 표시
    if(map.notice_enabled==='true'&&map.notice){
      document.getElementById('notice-track').textContent='📢 '+map.notice;
      document.getElementById('notice-banner').classList.add('show');
    }

    // 게임별 활성화 상태 저장
    gameEnabledMap={};
    GAMES.forEach(g=>{
      const key='game_'+g.id+'_enabled';
      gameEnabledMap[g.id]=map[key]!=='false';
    });
  }catch(e){}
}

function renderHome(){
const u=JSON.parse(localStorage.getItem('puzzle_user')||'null');
const lb=document.getElementById('login-btn');
if(lb) lb.textContent=u?'👤 '+u.username:'로그인';
  const g=document.getElementById('game-grid');g.innerHTML='';
  GAMES.forEach(game=>{
    const isMaintenance=game.available&&gameEnabledMap[game.id]===false;
    const div=document.createElement('div');
    div.className='game-card'+((game.available&&!isMaintenance)?'':' coming');
    const hasClear=game.id==='shikaku'&&cleared.size>0;
    if(isMaintenance){
      div.innerHTML=`<div class="g-icon">${game.icon}</div><div class="g-name">${game.name}</div><div class="g-sub">점검중</div>`;
    } else {
      div.innerHTML=`${hasClear?'<div class="cleared-dot"></div>':''}<div class="g-icon">${game.icon}</div><div class="g-name">${game.name}</div>${!game.available?'<div class="g-sub">준비중</div>':'<div class="g-top1" id="top1-'+game.id+'"></div>'}`;
    }
if(game.available&&!isMaintenance){
  div.onclick=()=>openGame(game);
  getTop1(game.id).then(name=>{
    const el=document.getElementById('top1-'+game.id);
    if(!el)return;
    if(!name){el.innerHTML='';return;}
    const title=TITLES[game.id];
    el.innerHTML=(title?`<div class="g-top1-title">👑 ${title}</div>`:'')+`<div class="g-top1-name">🥇<b>${esc(name)}</b></div>`;
  });
}
    g.appendChild(div);
  });
}
function goHome(){renderHome();showScreen('home');}
function openGame(game){
  if(game.id==='onecard'){ location.href='onecard_rooms.html'; return; }
  if(game.id==='sudoku'){ location.href='sudoku_stages.html'; return; }
  if(game.id==='shikaku'){ location.href='shikaku_stages.html'; return; }
if(game.id==='2048'){ location.href='2048.html'; return; }
if(game.id==='nonogram'){ location.href='nonogram-home.html'; return; }
  if(game.id==='breakout'){ location.href='breakout.html'; return; }
  if(game.id==='flow'){ location.href='flow_stages.html'; return; }
  if(game.id==='rps'){ location.href='rps.html'; return; }
  if(game.id==='reaction'){ location.href='reaction.html'; return; }
  if(game.id==='olla'){ location.href='olla.html'; return; }
  if(game.id==='snake'){ location.href='snake.html'; return; }
  if(game.id==='colormatch'){ location.href='colormatch.html'; return; }
  if(game.id==='omok'){ location.href='omok.html'; return; }
  if(game.id==='numrush'){ location.href='numrush.html'; return; }
  if(game.id==='memory'){ location.href='memory.html'; return; }
if(game.id==='sorter'){ location.href='sorter.html'; return; }
if(game.id==='minesweeper'){ location.href='minesweeper.html'; return; }
if(game.id==='dodge'){ location.href='dodge.html'; return; }
  document.getElementById('sel-title').textContent=game.name;
  renderDiffs();showScreen('stage-select');
}
function renderDiffs(){
  const wrap=document.getElementById('diff-sections');wrap.innerHTML='';
  DIFFS.forEach(diff=>{
    const sec=document.createElement('div');sec.className='diff-section';
    sec.innerHTML=`<div class="diff-label"><span class="diff-dot" style="background:${diff.color}"></span>${diff.label} · 스테이지 ${diff.range[0]}~${diff.range[1]} · ${diff.n}×${diff.n}</div>`;
    const row=document.createElement('div');row.className='stage-row';
    for(let i=diff.range[0];i<=diff.range[1];i++){
      const isCleared=cleared.has(i),isOpen=i===1||cleared.has(i-1);
      const tile=document.createElement('div');
      tile.className=`stage-tile diff-${diff.id}`+(isCleared?' cleared':'')+(isOpen?'':' locked');
      tile.innerHTML=`<div class="s-num">${i}</div>${isCleared?'<div class="s-check">✓</div>':''}`;
      if(isOpen)tile.onclick=()=>startStage(i);
      row.appendChild(tile);
    }
    sec.appendChild(row);wrap.appendChild(sec);
  });
}
function goStageSelect(){
  try{const s=localStorage.getItem('shikaku_v5');if(s)cleared=new Set(JSON.parse(s).map(Number));}catch(e){}
  renderDiffs();showScreen('stage-select');
  document.getElementById('next-btn').style.display='none';
}
function startStage(stageNum){
  curStage=stageNum;const diff=getDiff(stageNum);N=diff.n;
  if(diff.id==='medium'){const p=(stageNum-diff.range[0])/(diff.range[1]-diff.range[0]);N=p<0.5?6:7;}
  if(diff.id==='hard'){const p=(stageNum-diff.range[0])/(diff.range[1]-diff.range[0]);N=p<0.5?8:9;}
  const maxW=Math.min(window.innerWidth-32,380);
  CELL=Math.floor(maxW/N);
  puzzle=generateShikaku(N,stageNum,diff.maxArea);
  userRects=[];dragging=false;dragStart=null;dragEnd=null;
  document.getElementById('game-title-bar').textContent='스테이지 '+stageNum;
  document.getElementById('grid-size-lbl').textContent=N+'×'+N;
  document.getElementById('diff-lbl').textContent=diff.label;
  document.getElementById('diff-lbl').style.color=diff.color;
  showMsg('드래그로 영역을 선택하세요','info');
  document.getElementById('next-btn').style.display='none';
  updateProgress();renderGrid();showScreen('game-screen');
}
function renderGrid(){
  gridEl=document.getElementById('grid');gridEl.innerHTML='';
  gridEl.style.gridTemplateColumns=`repeat(${N},${CELL}px)`;
  gridEl.style.gridTemplateRows=`repeat(${N},${CELL}px)`;
  gridEl.style.width=(CELL*N)+'px';gridEl.style.height=(CELL*N)+'px';
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const cell=document.createElement('div');cell.className='cell';
    if(r===N-1)cell.style.borderBottom='none';if(c===N-1)cell.style.borderRight='none';
    const clue=puzzle.clues.find(cl=>cl[0]===r&&cl[1]===c);
    if(clue){cell.textContent=clue[2];cell.classList.add('numbered');}
    gridEl.appendChild(cell);
  }
  gridEl.onmousedown=startDrag;gridEl.onmousemove=moveDrag;gridEl.onmouseup=endDrag;
  gridEl.ontouchstart=e=>{e.preventDefault();startDrag(e.touches[0]);};
  gridEl.ontouchmove=e=>{e.preventDefault();moveDrag(e.touches[0]);};
  gridEl.ontouchend=e=>{e.preventDefault();endDrag(e.changedTouches[0]);};
  redrawAll();
}
function getCellFromPoint(x,y){
  const r0=gridEl.getBoundingClientRect();
  const c=Math.floor((x-r0.left)/CELL),r=Math.floor((y-r0.top)/CELL);
  if(r<0||r>=N||c<0||c>=N)return null;return{r,c};
}
function startDrag(e){
  const pos=getCellFromPoint(e.clientX,e.clientY);if(!pos)return;
  const idx=userRects.findIndex(rect=>pos.r>=rect.r&&pos.r<rect.r+rect.h&&pos.c>=rect.c&&pos.c<rect.c+rect.w);
  if(idx!==-1){userRects.splice(idx,1);redrawAll();updateProgress();return;}
  dragging=true;dragStart=pos;dragEnd=pos;redrawAll();
}
function moveDrag(e){if(!dragging)return;const pos=getCellFromPoint(e.clientX,e.clientY);if(pos){dragEnd=pos;redrawAll();}}
function endDrag(e){
  if(!dragging)return;dragging=false;
  const pos=getCellFromPoint(e.clientX,e.clientY)||dragEnd;
  if(dragStart&&pos){
    const r=Math.min(dragStart.r,pos.r),c=Math.min(dragStart.c,pos.c);
    const h=Math.abs(pos.r-dragStart.r)+1,w=Math.abs(pos.c-dragStart.c)+1,area=h*w;
    const matchingClues=puzzle.clues.filter(cl=>cl[0]>=r&&cl[0]<r+h&&cl[1]>=c&&cl[1]<c+w);
    const isValid=matchingClues.length===1&&matchingClues[0][2]===area;
    const noOverlap=!userRects.some(ur=>!(r+h<=ur.r||ur.r+ur.h<=r||c+w<=ur.c||ur.c+ur.w<=c));
    if(isValid&&noOverlap)userRects.push({r,c,h,w});
  }
  dragStart=null;dragEnd=null;redrawAll();updateProgress();autoCheck();
}
function redrawAll(){
  gridEl.querySelectorAll('.cell').forEach(c=>c.style.background='');
  userRects.forEach((rect,idx)=>{
    const col=getRectColor(idx);
    for(let r=rect.r;r<rect.r+rect.h;r++)for(let c=rect.c;c<rect.c+rect.w;c++){const cellEl=gridEl.children[r*N+c];if(cellEl)cellEl.style.background=col.bg;}
  });
  gridEl.querySelectorAll('.rect-overlay').forEach(el=>el.remove());
  userRects.forEach((rect,idx)=>{
    const col=getRectColor(idx);
    const div=document.createElement('div');div.className='rect-overlay';
    div.style.cssText=`left:${rect.c*CELL+1}px;top:${rect.r*CELL+1}px;width:${rect.w*CELL-2}px;height:${rect.h*CELL-2}px;border-color:${col.border};`;
    gridEl.appendChild(div);
  });
  if(dragging&&dragStart&&dragEnd){
    const r=Math.min(dragStart.r,dragEnd.r),c=Math.min(dragStart.c,dragEnd.c);
    const h=Math.abs(dragEnd.r-dragStart.r)+1,w=Math.abs(dragEnd.c-dragStart.c)+1;
    const div=document.createElement('div');div.className='rect-overlay preview';
    div.style.cssText=`left:${c*CELL+1}px;top:${r*CELL+1}px;width:${w*CELL-2}px;height:${h*CELL-2}px;`;
    gridEl.appendChild(div);
  }
}
function updateProgress(){document.getElementById('progress-lbl').textContent=userRects.length+'/'+puzzle.clues.length;}
async function saveToSupabase(game,stage){
  try{
    const user=JSON.parse(localStorage.getItem('puzzle_user')||'null');
    if(!user)return;
    await fetch(`${SUPABASE_URL}/rest/v1/clears`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'resolution=ignore-duplicates'},
      body:JSON.stringify({user_id:user.id,username:user.username,game,stage})
    });
  }catch(e){}
}
function autoCheck(){
  const covered=new Array(N*N).fill(0);
  userRects.forEach(rect=>{for(let r=rect.r;r<rect.r+rect.h;r++)for(let c=rect.c;c<rect.c+rect.w;c++)covered[r*N+c]++;});
  if(userRects.length===puzzle.clues.length&&covered.every(v=>v===1)){
    showMsg('🎉 정답! 훌륭해요!','success');
    cleared.add(curStage);saveCleared();
    if(curStage<100)document.getElementById('next-btn').style.display='';
    renderDiffs();
    saveToSupabase('shikaku',curStage);
  }
}
function showMsg(txt,type){const el=document.getElementById('game-msg');el.textContent=txt;el.className='game-msg '+(type||'info');}
function resetPuzzle(){userRects=[];dragStart=null;dragEnd=null;dragging=false;showMsg('드래그로 영역을 선택하세요','info');document.getElementById('next-btn').style.display='none';updateProgress();redrawAll();}
function goNextStage(){startStage(curStage+1);}
// URL에서 시카쿠 스테이지 직접 실행
const _sp = new URLSearchParams(location.search);
const _sn = parseInt(_sp.get('shikaku')||'0');
loadSettingsAndNotice().then(()=>{
  if(_sn > 0){
    try{const s=localStorage.getItem('shikaku_v5');if(s)cleared=new Set(JSON.parse(s).map(Number));}catch(e){}
    startStage(_sn);
  } else {
    renderHome();
    document.getElementById('leaderboard-widget').classList.add('show');
    renderLeaderboardWidget();
  }
});
</script>
