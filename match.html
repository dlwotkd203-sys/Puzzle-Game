<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>후르츠팡</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#fff3e0;}
#app{max-width:430px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative;box-shadow:0 0 0 1px rgba(0,0,0,0.05);}

.hud{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:#fff;
  border-bottom:1px solid rgba(0,0,0,0.06);flex-shrink:0;z-index:10;
}
.back-btn{background:none;border:none;cursor:pointer;color:rgba(0,0,0,0.35);font-size:18px;padding:4px 6px;line-height:1;border-radius:6px;}
.back-btn:hover{color:rgba(0,0,0,0.7);}
.hud-time{font-size:22px;font-weight:800;color:#e0554c;font-variant-numeric:tabular-nums;}
.hud-label{font-size:10px;color:rgba(0,0,0,0.35);margin-top:2px;letter-spacing:0.5px;text-transform:uppercase;text-align:center;}
.hud-center{text-align:center;}
.hud-right{text-align:right;}
.hud-score-val{font-size:18px;font-weight:800;color:#333;font-variant-numeric:tabular-nums;}

.game-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:12px;}
#board{position:relative;background:linear-gradient(160deg,#4a5a7a,#39445e);border-radius:18px;box-shadow:inset 0 2px 10px rgba(0,0,0,0.3);}
.tile{
  position:absolute;display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;touch-action:none;
  filter:drop-shadow(0 2px 3px rgba(0,0,0,0.4));
  transition:top .2s cubic-bezier(.32,1.4,.6,1),left .2s cubic-bezier(.32,1.4,.6,1),transform .15s ease,opacity .15s ease,filter .15s ease;
}
.tile::before{
  content:'';position:absolute;inset:8%;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,0.16),transparent 70%);
  opacity:0;transition:opacity .15s ease;
}
.tile.selected{transform:scale(1.15);z-index:5;filter:drop-shadow(0 0 10px rgba(255,255,255,0.9)) drop-shadow(0 2px 3px rgba(0,0,0,0.4));}
.tile.selected::before{opacity:1;background:radial-gradient(circle,rgba(96,165,250,0.55),transparent 70%);}
.tile.clearing{transform:scale(0.15) rotate(20deg);opacity:0;}

.score-pop{
  position:absolute;left:0;top:0;pointer-events:none;z-index:40;
  font-weight:900;color:#fff;white-space:nowrap;
  text-shadow:0 2px 4px rgba(0,0,0,0.45),0 0 10px rgba(255,180,60,0.7);
  transform:translate(-50%,-50%) scale(0.4);opacity:0;
  transition:transform .5s cubic-bezier(.2,.8,.3,1.4),opacity .5s ease,top .5s ease;
}
.burst-particle{
  position:absolute;left:0;top:0;width:9px;height:9px;border-radius:50%;
  pointer-events:none;z-index:38;transform:translate(-50%,-50%) scale(1);opacity:1;
  transition:transform .5s cubic-bezier(.15,.7,.3,1),opacity .5s ease;
  box-shadow:0 0 6px rgba(255,255,255,0.6);
}
.board-flash{
  position:absolute;inset:0;border-radius:18px;opacity:0;pointer-events:none;z-index:15;
  transition:opacity .12s ease;mix-blend-mode:screen;
}
.big-combo{
  position:absolute;left:50%;top:40%;z-index:50;pointer-events:none;white-space:nowrap;
  font-weight:900;font-style:italic;letter-spacing:1px;
  text-shadow:0 3px 10px rgba(0,0,0,0.55),0 0 18px currentColor;
  transform:translate(-50%,-50%) scale(0.3) rotate(-5deg);opacity:0;
  transition:transform .32s cubic-bezier(.34,1.56,.64,1),opacity .32s ease;
}
@keyframes boardShake{
  0%{transform:translate(0,0);}
  20%{transform:translate(-7px,4px);}
  40%{transform:translate(6px,-5px);}
  60%{transform:translate(-5px,3px);}
  80%{transform:translate(4px,-2px);}
  100%{transform:translate(0,0);}
}
#board.shake{animation:boardShake .35s ease;}

.overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:20;background:rgba(20,14,10,0.5);
}
.popup-card{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  background:#fffaf3;border:1px solid rgba(0,0,0,0.06);
  border-radius:20px;padding:28px 26px;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
  max-width:88%;
}
.ov-title{font-size:26px;font-weight:800;color:#333;letter-spacing:-0.5px;}
.ov-sub{font-size:13px;color:rgba(0,0,0,0.45);letter-spacing:0.3px;text-align:center;}
.ov-score{font-size:22px;font-weight:800;color:#e0554c;font-variant-numeric:tabular-nums;}
.ov-record{font-size:13px;color:rgba(0,0,0,0.45);}
.ov-new{font-size:13px;color:#378ADD;font-weight:600;}
.ov-btn{
  margin-top:4px;padding:12px 40px;border-radius:10px;border:none;
  font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  background:#e0554c;color:#fff;
}
.ov-btn:hover{opacity:0.9;}
.ov-divider{width:40px;height:1px;background:rgba(0,0,0,0.1);}
</style>
</head>
<body>
<div id="app">
  <div class="hud">
    <button class="back-btn" onclick="location.href='index.html'">←</button>
    <div class="hud-center">
      <div class="hud-time" id="hud-time">60</div>
      <div class="hud-label">초</div>
    </div>
    <div class="hud-right">
      <div class="hud-score-val" id="hud-score">0</div>
      <div class="hud-label">점수</div>
    </div>
  </div>

  <div class="game-body">
    <div id="board"></div>
  </div>
</div>

<div class="overlay" id="ov-start">
  <div class="popup-card">
    <div class="ov-title">🍓 후르츠팡</div>
    <div class="ov-sub">같은 과일 3개 이상을 이어서 스와이프!<br/>60초 안에 최대한 많이 매치하세요</div>
    <div class="ov-divider"></div>
    <button class="ov-btn" onclick="startGame()">시작</button>
  </div>
</div>

<div class="overlay" id="ov-dead" style="display:none">
  <div class="popup-card">
    <div class="ov-title">타임 오버!</div>
    <div class="ov-score" id="ov-score-val"></div>
    <div class="ov-record" id="ov-record"></div>
    <div class="ov-new" id="ov-new" style="display:none">새 최고 기록</div>
    <div class="ov-divider"></div>
    <button class="ov-btn" onclick="startGame()">다시 시작</button>
  </div>
</div>

<script>
const SUPABASE_URL='https://pampoyeyhwwdpzcaubdm.supabase.co';
const SUPABASE_KEY='sb_publishable_xWRbj6jRwR_sojPBYCLfEg_DylayGH5';

const GRID_SIZE=8;
const TYPES=['🍎','🍋','🍇','🥝','🍑']; // 빨강/노랑/보라/초록/분홍 - 색상환에서 서로 멀리 떨어진 색만 선택 (겹치는 계열 없음)
const TIME_LIMIT=60;

const board=document.getElementById('board');
let cellSize=0;
let grid=[]; // grid[row][col] = tileId | null
let tiles={}; // id -> {id,type,row,col,el}
let nextTileId=0;

let running=false,locked=false,score=0,best=0;
let startTs=0,pausedAt=0,pauseAccum=0,timerInt=null;
let selected=null; // {row,col}
let dragStart=null; // {row,col,x,y}

function wait(ms){ return new Promise(res=>setTimeout(res,ms)); }
function loadBest(){ try{return parseInt(localStorage.getItem('match3_best')||'0');}catch(e){return 0;} }
function saveBest(v){ try{localStorage.setItem('match3_best',String(v));}catch(e){} }
function updateHUD(){ document.getElementById('hud-score').textContent=score; }

async function saveScore(sc){
  try{
    const user=JSON.parse(localStorage.getItem('puzzle_user')||'null');
    if(!user)return;
    const r=await fetch(`${SUPABASE_URL}/rest/v1/scores?user_id=eq.${user.id}&game=eq.match3&select=id,score`,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    const ex=await r.json();
    if(ex.length>0){
      if(sc>ex[0].score)await fetch(`${SUPABASE_URL}/rest/v1/scores?id=eq.${ex[0].id}`,{method:'PATCH',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},body:JSON.stringify({score:sc})});
    }else{
      await fetch(`${SUPABASE_URL}/rest/v1/scores`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},body:JSON.stringify({user_id:user.id,username:user.username,game:'match3',score:sc})});
    }
  }catch(e){}
}

// ---- 보드 크기 계산 ----
function sizeBoard(){
  const maxW=Math.min(window.innerWidth-24,document.querySelector('.game-body').clientHeight-24,380);
  cellSize=Math.floor(maxW/GRID_SIZE);
  const size=cellSize*GRID_SIZE;
  board.style.width=size+'px';
  board.style.height=size+'px';
}

// ---- 타입 그리드 유틸 (매치 판정, 무브 존재 확인, 리셔플에 공용 사용) ----
function cloneGrid(g){ return g.map(row=>row.slice()); }
function swapCell(g,r1,c1,r2,c2){ const t=g[r1][c1]; g[r1][c1]=g[r2][c2]; g[r2][c2]=t; }

function findMatchesInGrid(g){
  const matched=new Set();
  for(let r=0;r<GRID_SIZE;r++){
    let runStart=0;
    for(let c=1;c<=GRID_SIZE;c++){
      if(c<GRID_SIZE && g[r][c]!=null && g[r][c]===g[r][runStart]){ continue; }
      if(c-runStart>=3){ for(let k=runStart;k<c;k++) matched.add(r+'_'+k); }
      runStart=c;
    }
  }
  for(let c=0;c<GRID_SIZE;c++){
    let runStart=0;
    for(let r=1;r<=GRID_SIZE;r++){
      if(r<GRID_SIZE && g[r][c]!=null && g[r][c]===g[runStart][c]){ continue; }
      if(r-runStart>=3){ for(let k=runStart;k<r;k++) matched.add(k+'_'+c); }
      runStart=r;
    }
  }
  return matched;
}
function hasMoveInTypesGrid(g){
  for(let r=0;r<GRID_SIZE;r++)for(let c=0;c<GRID_SIZE;c++){
    if(c<GRID_SIZE-1){ const g2=cloneGrid(g); swapCell(g2,r,c,r,c+1); if(findMatchesInGrid(g2).size>0) return true; }
    if(r<GRID_SIZE-1){ const g2=cloneGrid(g); swapCell(g2,r,c,r+1,c); if(findMatchesInGrid(g2).size>0) return true; }
  }
  return false;
}
function randomTypeNoMatchForGrid(g,r,c){
  let t,tries=0;
  do{
    t=TYPES[Math.floor(Math.random()*TYPES.length)];
    tries++;
  } while(tries<20 && (
    (c>=2 && g[r][c-1]===t && g[r][c-2]===t) ||
    (r>=2 && g[r-1][c]===t && g[r-2][c]===t)
  ));
  return t;
}
function liveTypesGrid(){
  const g=[];
  for(let r=0;r<GRID_SIZE;r++){ g.push([]); for(let c=0;c<GRID_SIZE;c++){ const id=grid[r][c]; g[r].push(id!=null?tiles[id].type:null); } }
  return g;
}

// ---- 타일 생성/배치 ----
function positionTile(tile){
  tile.el.style.top=(tile.row*cellSize)+'px';
  tile.el.style.left=(tile.col*cellSize)+'px';
}
function createTile(row,col,type,startRow){
  const id=nextTileId++;
  const el=document.createElement('div');
  el.className='tile';
  el.textContent=type;
  el.style.width=cellSize+'px';
  el.style.height=cellSize+'px';
  el.style.fontSize=Math.round(cellSize*0.72)+'px';
  el.style.left=(col*cellSize)+'px';
  el.style.top=((startRow!=null?startRow:row)*cellSize)+'px';
  board.appendChild(el);
  const tile={id,type,row,col,el};
  tiles[id]=tile;
  attachTileEvents(tile);
  if(startRow!=null && startRow!==row){
    requestAnimationFrame(()=>{ el.style.top=(row*cellSize)+'px'; });
  }
  return id;
}

function initBoard(){
  board.innerHTML='';
  tiles={};grid=[];nextTileId=0;
  let g;
  do{
    g=[];
    for(let r=0;r<GRID_SIZE;r++){ g.push([]); for(let c=0;c<GRID_SIZE;c++){ g[r].push(randomTypeNoMatchForGrid(g,r,c)); } }
  } while(!hasMoveInTypesGrid(g));
  for(let r=0;r<GRID_SIZE;r++){
    grid.push([]);
    for(let c=0;c<GRID_SIZE;c++){
      const id=createTile(r,c,g[r][c],r-GRID_SIZE); // 처음엔 위에서 쏟아지듯 등장
      grid[r].push(id);
    }
  }
}

async function reshuffleBoard(){
  let g;
  do{
    g=[];
    for(let r=0;r<GRID_SIZE;r++){ g.push([]); for(let c=0;c<GRID_SIZE;c++){ g[r].push(randomTypeNoMatchForGrid(g,r,c)); } }
  } while(!hasMoveInTypesGrid(g));
  for(let r=0;r<GRID_SIZE;r++)for(let c=0;c<GRID_SIZE;c++){
    const id=grid[r][c];
    tiles[id].type=g[r][c];
    tiles[id].el.textContent=g[r][c];
    tiles[id].el.style.transform='scale(0.7)';
  }
  await wait(60);
  for(const id in tiles) tiles[id].el.style.transform='';
  await wait(150);
}

// ---- 스왑/매치/낙하 ----
function swapTiles(r1,c1,r2,c2){
  const id1=grid[r1][c1], id2=grid[r2][c2];
  grid[r1][c1]=id2; grid[r2][c2]=id1;
  tiles[id1].row=r2;tiles[id1].col=c2;
  tiles[id2].row=r1;tiles[id2].col=c1;
  positionTile(tiles[id1]);
  positionTile(tiles[id2]);
}

function clusterMatches(matched){
  const cellSet=new Set(matched);
  const visited=new Set();
  const clusters=[];
  matched.forEach(key=>{
    if(visited.has(key)) return;
    const [r0,c0]=key.split('_').map(Number);
    const stack=[[r0,c0]];
    const cluster=[];
    visited.add(key);
    while(stack.length){
      const [cr,cc]=stack.pop();
      cluster.push([cr,cc]);
      [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr,dc])=>{
        const nr=cr+dr,nc=cc+dc,nk=nr+'_'+nc;
        if(cellSet.has(nk)&&!visited.has(nk)){ visited.add(nk); stack.push([nr,nc]); }
      });
    }
    clusters.push(cluster);
  });
  return clusters;
}

function spawnParticles(row,col,color,count){
  const x=(col+0.5)*cellSize, y=(row+0.5)*cellSize;
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='burst-particle';
    p.style.background=color;
    p.style.left=x+'px'; p.style.top=y+'px';
    board.appendChild(p);
    const ang=Math.random()*Math.PI*2;
    const dist=28+Math.random()*46;
    const dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist;
    requestAnimationFrame(()=>{
      p.style.transform=`translate(${dx-4.5}px,${dy-4.5}px) scale(0)`;
      p.style.opacity='0';
    });
    setTimeout(()=>p.remove(),520);
  }
}
function shakeBoard(){
  board.classList.remove('shake');
  void board.offsetWidth; // 리플로우 강제 -> 애니메이션 재시작 가능하게
  board.classList.add('shake');
}
function flashBoard(color){
  const f=document.createElement('div');
  f.className='board-flash';
  f.style.background=color;
  board.appendChild(f);
  requestAnimationFrame(()=>{ f.style.opacity='0.5'; });
  setTimeout(()=>{ f.style.opacity='0'; },130);
  setTimeout(()=>f.remove(),400);
}
const COMBO_TIERS={
  3:{text:'GREAT!',color:'#ff9f4a'},
  4:{text:'AWESOME!',color:'#ff5c5c'},
  5:{text:'AMAZING!!',color:'#c77dff'},
};
function comboTier(combo){
  if(combo>=6) return {text:'INCREDIBLE!!!',color:'#ffd166'};
  return COMBO_TIERS[combo]||null;
}
function showBigCombo(text,color){
  const el=document.createElement('div');
  el.className='big-combo';
  el.textContent=text;
  el.style.color=color;
  const fs=26+Math.min(14,text.length);
  el.style.fontSize=fs+'px';
  board.appendChild(el);
  requestAnimationFrame(()=>{
    el.style.transform='translate(-50%,-50%) scale(1) rotate(-5deg)';
    el.style.opacity='1';
  });
  setTimeout(()=>{
    el.style.transform='translate(-50%,-50%) scale(1.35) rotate(-5deg)';
    el.style.opacity='0';
  },480);
  setTimeout(()=>el.remove(),820);
}
function celebrateCombo(combo,clusters){
  const tier=comboTier(combo);
  if(!tier) return;
  shakeBoard();
  flashBoard(tier.color);
  clusters.forEach(cluster=>{
    const avgR=cluster.reduce((s,cc)=>s+cc[0],0)/cluster.length;
    const avgC=cluster.reduce((s,cc)=>s+cc[1],0)/cluster.length;
    spawnParticles(avgR,avgC,tier.color,10+combo*2);
  });
  showBigCombo(tier.text,tier.color);
}

function showScorePopup(row,col,points,combo){
  const el=document.createElement('div');
  el.className='score-pop';
  el.textContent='+'+points+(combo>1?' ×'+combo:'');
  const size=Math.min(30,16+combo*2.5);
  el.style.fontSize=size+'px';
  el.style.color = combo<=1?'#ffd166' : combo===2?'#ff9f4a' : combo===3?'#ff5c5c' : '#c77dff';
  const x=(col+0.5)*cellSize, y=(row+0.5)*cellSize;
  el.style.left=x+'px'; el.style.top=y+'px';
  board.appendChild(el);
  requestAnimationFrame(()=>{
    el.style.opacity='1';
    el.style.transform='translate(-50%,-50%) scale(1.15)';
    el.style.top=(y-32)+'px';
  });
  setTimeout(()=>{
    el.style.opacity='0';
    el.style.transform='translate(-50%,-50%) scale(0.9)';
    el.style.top=(y-48)+'px';
  },420);
  setTimeout(()=>{ el.remove(); },700);
}

async function resolveCascade(){
  let combo=1;
  while(running){
    const typesGrid=liveTypesGrid();
    const matched=findMatchesInGrid(typesGrid);
    if(matched.size===0) break;

    const clusters=clusterMatches(matched);
    clusters.forEach(cluster=>{
      const pts=cluster.length*10*combo;
      score+=pts;
      const avgR=cluster.reduce((s,cc)=>s+cc[0],0)/cluster.length;
      const avgC=cluster.reduce((s,cc)=>s+cc[1],0)/cluster.length;
      showScorePopup(avgR,avgC,pts,combo);
    });
    updateHUD();
    celebrateCombo(combo,clusters);

    matched.forEach(key=>{
      const [r,c]=key.split('_').map(Number);
      const id=grid[r][c];
      if(id!=null) tiles[id].el.classList.add('clearing');
    });
    await wait(170);
    matched.forEach(key=>{
      const [r,c]=key.split('_').map(Number);
      const id=grid[r][c];
      if(id!=null){ tiles[id].el.remove(); delete tiles[id]; grid[r][c]=null; }
    });

    for(let c=0;c<GRID_SIZE;c++){
      let writeRow=GRID_SIZE-1;
      for(let r=GRID_SIZE-1;r>=0;r--){
        if(grid[r][c]!=null){
          if(writeRow!==r){
            const id=grid[r][c];
            grid[writeRow][c]=id; grid[r][c]=null;
            tiles[id].row=writeRow;
            positionTile(tiles[id]);
          }
          writeRow--;
        }
      }
      let idx=0;
      const need=writeRow+1;
      for(let r=writeRow;r>=0;r--){
        idx++;
        const t=TYPES[Math.floor(Math.random()*TYPES.length)];
        const id=createTile(r,c,t,r-need-1+idx);
        grid[r][c]=id;
      }
    }
    await wait(240);
    combo++;
  }
}

function attachTileEvents(tile){
  tile.el.addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(locked||!running) return;
    dragStart={row:tile.row,col:tile.col,x:e.clientX,y:e.clientY};
  });
  tile.el.addEventListener('pointerup',e=>{
    if(locked||!running||!dragStart) return;
    const dx=e.clientX-dragStart.x, dy=e.clientY-dragStart.y;
    const dist=Math.hypot(dx,dy);
    const from={row:dragStart.row,col:dragStart.col};
    dragStart=null;
    if(dist>cellSize*0.28){
      // 스와이프로 방향 판정
      let tr=from.row,tc=from.col;
      if(Math.abs(dx)>Math.abs(dy)) tc+=dx>0?1:-1; else tr+=dy>0?1:-1;
      handleSwapAttempt(from.row,from.col,tr,tc);
    } else {
      handleTap(from.row,from.col);
    }
  });
}

function clearSelection(){
  if(selected){
    const id=grid[selected.row][selected.col];
    if(id!=null) tiles[id].el.classList.remove('selected');
  }
  selected=null;
}

function handleTap(row,col){
  if(!selected){
    selected={row,col};
    const id=grid[row][col];
    if(id!=null) tiles[id].el.classList.add('selected');
    return;
  }
  if(selected.row===row&&selected.col===col){ clearSelection(); return; }
  const adjacent=Math.abs(selected.row-row)+Math.abs(selected.col-col)===1;
  if(adjacent){
    const from=selected;
    clearSelection();
    handleSwapAttempt(from.row,from.col,row,col);
  } else {
    clearSelection();
    selected={row,col};
    const id=grid[row][col];
    if(id!=null) tiles[id].el.classList.add('selected');
  }
}

async function handleSwapAttempt(r1,c1,r2,c2){
  if(r2<0||r2>=GRID_SIZE||c2<0||c2>=GRID_SIZE) return;
  if(Math.abs(r1-r2)+Math.abs(c1-c2)!==1) return;
  clearSelection();
  locked=true;
  swapTiles(r1,c1,r2,c2);
  await wait(190);
  const typesGrid=liveTypesGrid();
  if(findMatchesInGrid(typesGrid).size>0){
    await resolveCascade();
    if(running && !hasMoveInTypesGrid(liveTypesGrid())){
      await reshuffleBoard();
    }
  } else {
    swapTiles(r1,c1,r2,c2);
    await wait(190);
  }
  locked=false;
}

// ---- 타이머 / 시작 / 종료 ----
function tickTimer(){
  if(!running) return;
  const elapsed=(performance.now()-startTs-pauseAccum)/1000;
  const remain=Math.max(0,TIME_LIMIT-elapsed);
  document.getElementById('hud-time').textContent=Math.ceil(remain);
  if(remain<=0) endGame();
}

function startGame(){
  document.getElementById('ov-start').style.display='none';
  document.getElementById('ov-dead').style.display='none';
  sizeBoard();
  best=loadBest();
  score=0;locked=false;selected=null;dragStart=null;pauseAccum=0;
  updateHUD();
  initBoard();
  document.getElementById('hud-time').textContent=TIME_LIMIT;
  running=true;
  startTs=performance.now();
  if(timerInt) clearInterval(timerInt);
  timerInt=setInterval(tickTimer,100);
}

function endGame(){
  if(!running) return;
  running=false;
  clearInterval(timerInt);
  const isNew=score>best;
  if(isNew){ best=score; saveBest(best); }
  saveScore(score);
  document.getElementById('ov-score-val').textContent=score+'점';
  document.getElementById('ov-record').textContent='최고 기록 '+best+'점';
  document.getElementById('ov-new').style.display=isNew?'block':'none';
  document.getElementById('ov-dead').style.display='flex';
}

// 탭 전환/최소화 시 타이머 일시정지 (시간 손해 방지)
let hiddenAt=0;
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){ hiddenAt=performance.now(); }
  else if(hiddenAt&&running){ pauseAccum+=performance.now()-hiddenAt; hiddenAt=0; }
});

window.addEventListener('resize',()=>{ if(running) sizeBoard(); });
best=loadBest();
</script>
