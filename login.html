<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>로그인</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;}
#app{max-width:430px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column;}
.top-bar{display:flex;align-items:center;gap:10px;padding:1rem 1rem 0.75rem;border-bottom:1px solid #eee;}
.back-btn{background:none;border:none;cursor:pointer;color:#888;font-size:20px;padding:2px 8px;border-radius:8px;}
.top-title{font-size:17px;font-weight:600;color:#111;}
.body{padding:2rem 1.5rem;display:flex;flex-direction:column;gap:1.25rem;}
.desc{font-size:14px;color:#888;line-height:1.6;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:13px;font-weight:600;color:#333;}
.field input{padding:12px 14px;border:1.5px solid #eee;border-radius:10px;font-size:15px;outline:none;font-family:inherit;}
.field input:focus{border-color:#378ADD;}
.login-btn{padding:14px;border-radius:12px;border:none;background:#378ADD;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.login-btn:active{background:#185FA5;}
.login-btn:disabled{opacity:0.6;cursor:default;}
.logout-btn{padding:14px;border-radius:12px;border:1px solid #ddd;background:#fff;color:#E24B4A;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.msg{text-align:center;font-size:13px;min-height:20px;}
.msg.error{color:#E24B4A;}
.msg.success{color:#1D9E75;}
.current-user{background:#f5f5f5;border-radius:12px;padding:1rem;text-align:center;}
.current-user .name{font-size:18px;font-weight:700;color:#111;margin-bottom:4px;}
.current-user .sub{font-size:13px;color:#888;}
.divider{height:1px;background:#eee;}
.section-title{font-size:13px;font-weight:700;color:#888;margin-top:8px;}
.cancel-btn{padding:12px;border-radius:10px;border:1px solid #eee;background:#fff;color:#888;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <button class="back-btn" onclick="location.href='index.html'">←</button>
    <span class="top-title">로그인</span>
  </div>
  <div class="body" id="body"></div>
</div>
<script>
const SUPABASE_URL='https://pampoyeyhwwdpzcaubdm.supabase.co';
const SUPABASE_KEY='sb_publishable_xWRbj6jRwR_sojPBYCLfEg_DylayGH5';

// XSS 방지: 사용자 입력값(닉네임 등)을 HTML에 넣기 전에 이스케이프
function esc(str){
  return String(str??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function getCurrentUser(){
  try{return JSON.parse(localStorage.getItem('puzzle_user')||'null');}catch(e){return null;}
}

// 비밀번호 검증은 이제 클라이언트가 아니라 Supabase RPC(서버) 안에서 처리됩니다.
async function callRpc(fn, body){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`,{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
    body:JSON.stringify(body)
  });
  const data=await res.json();
  if(!res.ok){
    const err=new Error((data&&data.message)||'rpc_error');
    throw err;
  }
  return data;
}

function renderPage(){
  const user=getCurrentUser();
  const body=document.getElementById('body');
  if(user){
    body.innerHTML=`
      <div class="current-user">
        <div class="name">👤 ${esc(user.username)}</div>
        <div class="sub">로그인 중</div>
      </div>
      <button class="login-btn" style="background:#EF9F27;margin-bottom:0" onclick="showRenameForm()">✏️ 닉네임 변경</button>
      <button class="login-btn" style="background:#1D9E75;margin-bottom:0" onclick="syncAndReload()">🔄 기록 동기화</button>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
      <div class="divider"></div>
      <button class="login-btn" style="background:#534AB7" onclick="location.href='ranking.html'">🏆 랭킹 보기</button>
    `;
  } else {
    body.innerHTML=`
      <p class="desc">원하는 닉네임과 비밀번호로 로그인하세요.<br>처음 로그인하면 자동으로 계정이 만들어져요!</p>
      <div class="field">
        <label>닉네임</label>
        <input id="username" type="text" placeholder="닉네임 입력" maxlength="12">
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input id="password" type="password" placeholder="비밀번호 입력">
      </div>
      <div class="msg" id="msg"></div>
      <button class="login-btn" onclick="doLogin()">로그인 / 가입</button>
    `;
  }
}

async function doLogin(){
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  const msg=document.getElementById('msg');
  if(!username||!password){msg.className='msg error';msg.textContent='닉네임과 비밀번호를 입력해주세요.';return;}
  if(username.length<2){msg.className='msg error';msg.textContent='닉네임은 2글자 이상이어야 해요.';return;}
  msg.className='msg';msg.textContent='확인 중...';

  try{
    const rows=await callRpc('login_or_signup',{p_username:username,p_password:password});
    const user=rows[0];
    localStorage.setItem('puzzle_user',JSON.stringify({id:user.id,username:user.username}));

    if(user.is_new){
      msg.className='msg success';msg.textContent='가입 및 로그인 성공! 🎉';
    } else {
      msg.className='msg success';msg.textContent='클리어 기록 불러오는 중...';
      await syncClears(user.id);
      msg.className='msg success';msg.textContent='로그인 성공! 🎉';
    }
    setTimeout(()=>location.href='index.html',800);
  } catch(e){
    msg.className='msg error';
    if(e.message==='invalid_password'){
      msg.textContent='비밀번호가 틀렸어요.';
    } else {
      msg.textContent='오류가 발생했어요. 다시 시도해주세요.';
    }
  }
}

async function syncAndReload(){
  const user=getCurrentUser();
  if(!user)return;
  const body=document.getElementById('body');
  const btn=body.querySelector('button');
  if(btn){btn.textContent='동기화 중...';btn.disabled=true;}
  await syncClears(user.id);
  alert('클리어 기록을 불러왔어요! 🎉');
  location.href='index.html';
}

async function syncClears(userId){
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/clears?user_id=eq.${userId}&select=game,stage`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    const data=await res.json();
    // 게임별로 분류
    const gameMap={shikaku:[],sudoku:[],nonogram:[]};
    data.forEach(row=>{
      if(gameMap[row.game]) gameMap[row.game].push(Number(row.stage));
    });
    // localStorage에 저장
    if(gameMap.shikaku.length>0)
      localStorage.setItem('shikaku_v5',JSON.stringify(gameMap.shikaku));
    if(gameMap.sudoku.length>0)
      localStorage.setItem('sudoku_cleared',JSON.stringify(gameMap.sudoku));
    if(gameMap.nonogram.length>0)
      localStorage.setItem('nonogram_cleared',JSON.stringify(gameMap.nonogram));
    // 2048 최고점수도 복원
    const scoreRes=await fetch(`${SUPABASE_URL}/rest/v1/scores?user_id=eq.${userId}&game=eq.2048&select=score`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    const scores=await scoreRes.json();
    if(scores.length>0) localStorage.setItem('2048_best',String(scores[0].score));
  }catch(e){console.error('syncClears error',e);}
}

function showRenameForm(){
  const body=document.getElementById('body');
  body.innerHTML=`
    <p class="section-title">닉네임 변경</p>
    <div class="field">
      <label>새 닉네임</label>
      <input id="new-username" type="text" placeholder="새 닉네임 입력" maxlength="12">
    </div>
    <div class="field">
      <label>현재 비밀번호</label>
      <input id="confirm-password" type="password" placeholder="비밀번호 확인">
    </div>
    <div class="msg" id="msg"></div>
    <button class="login-btn" style="background:#EF9F27" onclick="doRename()">변경하기</button>
    <button class="cancel-btn" onclick="renderPage()">취소</button>
  `;
}

async function doRename(){
  const user=getCurrentUser();
  if(!user)return;
  const newUsername=document.getElementById('new-username').value.trim();
  const password=document.getElementById('confirm-password').value;
  const msg=document.getElementById('msg');

  if(!newUsername||!password){msg.className='msg error';msg.textContent='닉네임과 비밀번호를 입력해주세요.';return;}
  if(newUsername.length<2){msg.className='msg error';msg.textContent='닉네임은 2글자 이상이어야 해요.';return;}
  if(newUsername===user.username){msg.className='msg error';msg.textContent='현재 닉네임과 같아요.';return;}

  msg.className='msg';msg.textContent='확인 중...';

  try{
    const rows=await callRpc('rename_user',{p_user_id:user.id,p_new_username:newUsername,p_password:password});
    const updated=rows[0];
    localStorage.setItem('puzzle_user',JSON.stringify({id:updated.id,username:updated.username}));
    msg.className='msg success';msg.textContent='닉네임이 변경되었어요! 🎉';
    setTimeout(()=>renderPage(),800);
  }catch(e){
    msg.className='msg error';
    if(e.message==='invalid_password'){
      msg.textContent='비밀번호가 틀렸어요.';
    } else if(e.message==='duplicate_username'){
      msg.textContent='이미 사용 중인 닉네임이에요.';
    } else {
      msg.textContent='오류가 발생했어요. 다시 시도해주세요.';
    }
  }
}

function logout(){
  // 로그아웃 시 클리어 기록도 초기화
  localStorage.removeItem('puzzle_user');
  localStorage.removeItem('shikaku_v5');
  localStorage.removeItem('sudoku_cleared');
  localStorage.removeItem('nonogram_cleared');
  localStorage.removeItem('2048_best');
  renderPage();
}

// 엔터키
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&getCurrentUser()===null)doLogin();});
renderPage();
</script>
</body>
</html>
