<script>

function headers(){ return {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function jheaders(){ return {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function esc(str){ return String(str??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }

// ---- 물리 상수 ----
const BOARD_W=320, BOARD_H=480;
// 가로로 누운 경첩(중앙 접히는 선의 좌/우 구간) - 선분 형태로 충돌 처리
const HINGES=[
  {y:BOARD_H/2, x1:BOARD_W*0.14, x2:BOARD_W*0.38, half:4},
  {y:BOARD_H/2, x1:BOARD_W*0.62, x2:BOARD_W*0.86, half:4}
];
function closestPointOnSegment(px,py,y,x1,x2){
  const cx=Math.max(x1,Math.min(x2,px));
  return {x:cx, y};
}
const MAX_PULL=85;
const BASE_LAUNCH_SPEED=11; // 최대로 당겼을 때, 파워배율 1.0인 말(궁) 기준 속도 (기존 대비 +30%)
const FRICTION=0.95;
const RESTITUTION=0.78;
const STOP_THRESHOLD=3;
const SIM_MAX_STEPS=600;

const JANGGI_SET=[
  {type:'궁',r:18,mass:2.3,power:1.0},
  {type:'차',r:16,mass:1.9,power:0.85},
  {type:'포',r:16,mass:1.8,power:0.8},
  {type:'상',r:15,mass:1.6,power:0.7},
  {type:'마',r:15,mass:1.5,power:0.65},
  {type:'사',r:14,mass:1.3,power:0.5},
  {type:'졸',r:13,mass:1.0,power:0.3}
];
function hanjaFor(type,seat){
  // seat 0 = 초(楚)군, seat 1 = 한(漢)군 - 실제 장기처럼 궁/병졸 한자가 서로 달라요
  if(type==='궁') return seat===0?'楚':'漢';
  if(type==='졸') return seat===0?'卒':'兵';
  if(type==='포') return seat===0?'包':'砲';
  const map={'차':'車','상':'象','마':'馬','사':'士'};
  return map[type]||type;
}

function buildPieces(mode,omokCount){
  const pieces=[];
  let id=0;
  if(mode==='janggi'){
    [0,1].forEach(seat=>layoutJanggiSeat(pieces,seat,()=>id++));
  } else {
    [0,1].forEach(seat=>layoutOmokSeat(pieces,seat,omokCount,()=>id++));
  }
  return pieces;
}

function layoutJanggiSeat(pieces,seat,nextId){
  const marginX=20;
  const colGap=(BOARD_W-marginX*2)/8;
  const cols=[]; for(let i=0;i<9;i++) cols.push(marginX+colGap*i);
  const rowGap=34;
  const backY = seat===0 ? 28 : BOARD_H-28;
  const dir = seat===0 ? 1 : -1; // 뒤에서 중앙 쪽으로 갈수록 y가 어느 방향으로 가는지
  const rowY = r => backY + dir*rowGap*r;

  const specOf=t=>JANGGI_SET.find(s=>s.type===t);
  function place(type,colIdx,row){
    const spec=specOf(type);
    pieces.push({
      id:nextId(), seat, type, hanja:hanjaFor(type,seat), r:spec.r, mass:spec.mass, power:spec.power,
      x:cols[colIdx], y:rowY(row), vx:0, vy:0, alive:true, trail:[]
    });
  }
  // 뒷줄(0열): 차 마 상 사 [궁은 중앙] 사 상 마 차
  const backRow=['차','마','상','사',null,'사','상','마','차'];
  backRow.forEach((t,i)=>{ if(t) place(t,i,0); });
  place('궁',4,0.6); // 궁은 뒷줄과 포줄 사이(궁성 안쪽)
  // 포줄(1.6열): 2번째, 8번째 칸
  place('포',1,1.6);
  place('포',7,1.6);
  // 졸줄(2.6열): 1,3,5,7,9번째 칸(0-index 0,2,4,6,8)
  [0,2,4,6,8].forEach(c=>place('졸',c,2.6));
}

function layoutOmokSeat(pieces,seat,omokCount,nextId){
  const n=omokCount||6;
  const perRow=Math.min(8,n);
  const marginX=30;
  const spacingX=perRow>1?(BOARD_W-marginX*2)/(perRow-1):0;
  for(let i=0;i<n;i++){
    const row=Math.floor(i/perRow), col=i%perRow;
    const x=perRow>1?marginX+col*spacingX:BOARD_W/2;
    const y=seat===0?(34+row*40):(BOARD_H-34-row*40);
    pieces.push({id:nextId(), seat, type:'●', hanja:null, r:14, mass:1.0, power:0.7, x, y, vx:0, vy:0, alive:true, trail:[]});
  }
}

// ---- 결정론적 물리 스텝 (양쪽 클라이언트가 똑같이 계산) ----
function stepPhysics(pieces){
  pieces.forEach(p=>{
    if(!p.alive) return;
    const speed=Math.hypot(p.vx,p.vy);
    if(speed>1.5){
      if(!p.trail) p.trail=[];
      p.trail.push({x:p.x,y:p.y});
      if(p.trail.length>6) p.trail.shift();
    } else if(p.trail&&p.trail.length){
      p.trail.shift();
    }
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=FRICTION; p.vy*=FRICTION;
    if(Math.hypot(p.vx,p.vy)<STOP_THRESHOLD*0.06){ p.vx=0; p.vy=0; }
  });
  for(let i=0;i<pieces.length;i++){
    for(let j=i+1;j<pieces.length;j++){
      const a=pieces[i], b=pieces[j];
      if(!a.alive||!b.alive) continue;
      const dx=b.x-a.x, dy=b.y-a.y;
      const dist=Math.hypot(dx,dy);
      const minDist=a.r+b.r;
      if(dist<minDist&&dist>0.0001){
        const overlap=minDist-dist;
        const nx=dx/dist, ny=dy/dist;
        const totalMass=a.mass+b.mass;
        a.x-=nx*overlap*(b.mass/totalMass); a.y-=ny*overlap*(b.mass/totalMass);
        b.x+=nx*overlap*(a.mass/totalMass); b.y+=ny*overlap*(a.mass/totalMass);
        const rvx=b.vx-a.vx, rvy=b.vy-a.vy;
        const velAlongNormal=rvx*nx+rvy*ny;
        if(velAlongNormal<0){
          const jImp=-(1+RESTITUTION)*velAlongNormal/(1/a.mass+1/b.mass);
          const ix=jImp*nx, iy=jImp*ny;
          a.vx-=ix/a.mass; a.vy-=iy/a.mass;
          b.vx+=ix/b.mass; b.vy+=iy/b.mass;
        }
      }
    }
  }
  pieces.forEach(p=>{
    if(!p.alive) return;
    HINGES.forEach(H=>{
      const cp=closestPointOnSegment(p.x,p.y,H.y,H.x1,H.x2);
      const dx=p.x-cp.x, dy=p.y-cp.y;
      const dist=Math.hypot(dx,dy);
      const minDist=p.r+H.half;
      if(dist<minDist&&dist>0.0001){
        const nx=dx/dist, ny=dy/dist;
        p.x=cp.x+nx*minDist; p.y=cp.y+ny*minDist;
        const velAlongNormal=p.vx*nx+p.vy*ny;
        if(velAlongNormal<0){
          p.vx-=(1+RESTITUTION)*velAlongNormal*nx;
          p.vy-=(1+RESTITUTION)*velAlongNormal*ny;
        }
      }
    });
  });
  pieces.forEach(p=>{
    if(!p.alive) return;
    if(p.x<-p.r||p.x>BOARD_W+p.r||p.y<-p.r||p.y>BOARD_H+p.r) p.alive=false;
  });
}
function allSettled(pieces){
  return pieces.every(p=>!p.alive||(Math.abs(p.vx)<0.001&&Math.abs(p.vy)<0.001));
}

// ---- 방/유저 상태 ----
let room=null, mySeat=-1, pollTimer=null, lastHeartbeatAt=0;
let pieces=[]; // 로컬 렌더/시뮬레이션용 (room.state.pieces에서 동기화)
let simulating=false;
let dragState=null; // {pieceId, startClientX, startClientY}
let channel=null, channelReady=false;

function safeSend(payload){
  if(!channelReady||!channel) return;
  try{ const res=channel.send(payload); if(res&&res.catch) res.catch(()=>{}); }catch(e){}
}

async function ensurePoints(){
  if(!currentUser) return null;
  const r=await fetch(`${SUPABASE_URL}/rest/v1/alkkagi_points?user_id=eq.${currentUser.id}&select=*`,{headers:headers()});
  const data=await r.json();
  if(!data.length){
    const created={user_id:currentUser.id,username:currentUser.username,points:STARTING_POINTS};
    await fetch(`${SUPABASE_URL}/rest/v1/alkkagi_points`,{method:'POST',headers:jheaders(),body:JSON.stringify(created)});
    return created;
  }
  return data[0];
}

async function fetchRoom(){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/alkkagi_rooms?id=eq.${roomId}&select=*`,{headers:headers()});
    const data=await r.json();
    if(!data.length){ document.getElementById('mainArea').innerHTML='<div class="center-msg">방을 찾을 수 없어요.</div>'; clearInterval(pollTimer); return; }
    room=data[0];
    const players=room.players||[];
    mySeat=currentUser?players.findIndex(p=>String(p.user_id)===String(currentUser.id)):-1;
    if(!simulating) render();
    const now=Date.now();
    if(mySeat>=0&&now-lastHeartbeatAt>20000){
      lastHeartbeatAt=now;
      fetch(`${SUPABASE_URL}/rest/v1/alkkagi_rooms?id=eq.${roomId}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({last_active_at:new Date().toISOString()})}).catch(()=>{});
    }
  }catch(e){}
}

function render(){
  const area=document.getElementById('mainArea');
  const infoBar=document.getElementById('playerInfoBar');
  document.getElementById('roomTitle').textContent='⚪ '+esc(room.host_username)+'님의 방';
  if(room.status==='waiting'){
    infoBar.style.display='none';
    renderLobby(area);
  } else if(room.status==='playing'){
    const st=room.state;
    if(st.stage==='result'){
      infoBar.style.display='none';
      renderResult(area,st);
    } else {
      infoBar.style.display='flex';
      renderGame(area,st);
    }
  }
}

// ---- 로비(대기실) ----
function renderLobby(area){
  const players=room.players||[];
  const isHost=currentUser&&String(room.host_user_id)===String(currentUser.id);
  const isIn=mySeat>=0;
  const myReady=isIn&&players[mySeat].ready;
  let html='<div class="lobby-wrap">';
  html+='<div style="text-align:center;font-size:40px;margin-bottom:6px;">⚪⚫</div>';
  html+='<div class="mode-summary">'+(room.mode==='omok'?('오목알 '+(room.omok_count||6)+'개'):'장기알 16개')+' · 1:1 대전</div>';
  if(isHost){
    html+='<div style="text-align:center;">';
    html+='<div class="mode-opt-row">';
    html+=`<div class="hostModeOpt ${room.mode==='janggi'?'sel':''}" data-m="janggi">장기알</div>`;
    html+=`<div class="hostModeOpt ${room.mode==='omok'?'sel':''}" data-m="omok">오목알</div>`;
    html+='</div>';
    if(room.mode==='omok'){
      html+='<div class="mode-opt-row">';
      [4,6,8,10,12].forEach(c=>{ html+=`<div class="hostCountOpt ${room.omok_count===c?'sel':''}" data-c="${c}">${c}알</div>`; });
      html+='</div>';
    }
    html+='</div>';
  }
  html+='<div style="margin-top:14px;">';
  players.forEach((p,i)=>{
    html+=`<div class="player-row"><span class="player-name">${i===0?'🔴':'🔵'} ${esc(p.username)}${currentUser&&String(p.user_id)===String(currentUser.id)?' (나)':''}</span><span class="ready-chip ${p.ready?'on':''}">${p.ready?'준비완료':'대기중'}</span></div>`;
  });
  for(let i=players.length;i<2;i++){
    html+='<div class="player-row" style="opacity:0.4;"><span class="player-name">— 빈 자리 —</span></div>';
  }
  html+='</div>';
  if(isIn){
    html+=`<div class="big-btn" id="readyBtn" style="background:${myReady?'#555':'#2e8b57'};color:#fff;">${myReady?'준비 취소':'준비완료'}</div>`;
  }
  html+='</div>';
  area.innerHTML=html;

  if(isHost){
    area.querySelectorAll('.hostModeOpt').forEach(el=>{
      el.addEventListener('click',async()=>{
        await patchRoom({mode:el.dataset.m});
      });
    });
    area.querySelectorAll('.hostCountOpt').forEach(el=>{
      el.addEventListener('click',async()=>{
        await patchRoom({omok_count:parseInt(el.dataset.c)});
      });
    });
  }
  if(isIn){
    document.getElementById('readyBtn').addEventListener('click',async()=>{
      const np=players.map((p,i)=>i===mySeat?{...p,ready:!p.ready}:p);
      await patchRoom({players:np});
      maybeStartGame();
    });
  }
}

async function patchRoom(patch){
  let attempts=0;
  while(attempts<6){
    attempts++;
    const res=await fetch(`${SUPABASE_URL}/rest/v1/alkkagi_rooms?id=eq.${roomId}&move_count=eq.${room.move_count}`,{
      method:'PATCH',headers:{...jheaders(),'Prefer':'return=representation'},
      body:JSON.stringify({...patch,move_count:room.move_count+1})
    });
    const data=await res.json();
    if(data&&data.length){ room=data[0]; return true; }
    await fetchRoom();
  }
  return false;
}

let startTriggeredKey=null;
async function maybeStartGame(){
  const isHost=currentUser&&String(room.host_user_id)===String(currentUser.id);
  if(!isHost) return;
  const players=room.players||[];
  if(players.length<2||!players.every(p=>p.ready)) return;
  const key=room.id+':'+room.move_count;
  if(startTriggeredKey===key) return;
  startTriggeredKey=key;
  const initPieces=buildPieces(room.mode,room.omok_count);
  await patchRoom({
    status:'playing',
    state:{ mode:room.mode, omokCount:room.omok_count, pieces:initPieces, turn:0, stage:'playing', winner:null, postHandAt:null, turnStartedAt:Date.now() }
  });
}

// ---- 실시간 채널 (쏘는 순간의 힘만 주고받고, 이후 물리는 양쪽이 각자 똑같이 계산) ----
async function joinChannel(){
  channel=sb.channel('alkkagi-room-'+roomId, { config:{ broadcast:{ self:false } } });
  channel.on('broadcast', {event:'shot'}, ({payload})=>{
    if(simulating) return; // 이미 시뮬레이션 중이면 무시(내가 쏜 경우 등)
    if(payload.seat===mySeat) return; // 내가 쏜건 이미 로컬에서 처리중
    const piece=pieces.find(p=>p.id===payload.pieceId);
    if(!piece) return;
    piece.vx=payload.vx; piece.vy=payload.vy;
    runSimulation(()=>{ /* 관전자는 저장 안 함, 다음 poll이 정답으로 맞춰줌 */ });
  });
  await new Promise(resolve=>{
    channel.subscribe(status=>{ if(status==='SUBSCRIBED'){ channelReady=true; resolve(); } });
  });
}

// ---- 게임 화면(캔버스 보드) ----
let boardCanvasSetup=false;
let playerRecords={}; // user_id -> {wins,losses}
let recordsLoadedFor=null;
async function loadPlayerRecords(){
  const players=room.players||[];
  const key=players.map(p=>p.user_id).join(',');
  if(recordsLoadedFor===key) return;
  recordsLoadedFor=key;
  try{
    const results=await Promise.all(players.map(p=>
      fetch(`${SUPABASE_URL}/rest/v1/alkkagi_points?user_id=eq.${p.user_id}&select=wins,losses`,{headers:headers()}).then(r=>r.json())
    ));
    players.forEach((p,i)=>{ playerRecords[p.user_id]=(results[i]&&results[i][0])||{wins:0,losses:0}; });
    renderPlayerInfoBar(room.state);
  }catch(e){}
}

function renderPlayerInfoBar(st){
  const players=room.players||[];
  const p0=players[0], p1=players[1];
  const rec=p=>{ const r=p&&playerRecords[p.user_id]; return r?(r.wins||0)+'승 '+(r.losses||0)+'패':'전적 없음'; };
  const bar=document.getElementById('playerInfoBar');
  bar.innerHTML=`
    <div class="pi-side">
      <span class="pi-dot" style="background:#d64545;"></span>
      <span class="pi-text"><div class="pi-name">${p0?esc(p0.username):'—'}${p0&&currentUser&&String(p0.user_id)===String(currentUser.id)?' (나)':''}</div><div class="pi-record">${rec(p0)}</div></span>
    </div>
    <span class="pi-timer" id="timerP0">--</span>
    <span style="color:#8fa899;font-size:11px;">VS</span>
    <span class="pi-timer" id="timerP1">--</span>
    <div class="pi-side right">
      <span class="pi-dot" style="background:#2f4fa8;"></span>
      <span class="pi-text"><div class="pi-name">${p1?esc(p1.username):'—'}${p1&&currentUser&&String(p1.user_id)===String(currentUser.id)?' (나)':''}</div><div class="pi-record">${rec(p1)}</div></span>
    </div>
  `;
  updateTimerDisplay();
}

function updateTimerDisplay(){
  if(!room||!room.state) return;
  const st=room.state;
  const t0=document.getElementById('timerP0'), t1=document.getElementById('timerP1');
  if(!t0||!t1) return;
  const elapsed=(Date.now()-(st.turnStartedAt||Date.now()))/1000;
  const remain=Math.max(0,Math.ceil(20-elapsed));
  [ [0,t0], [1,t1] ].forEach(([seat,el])=>{
    if(st.turn===seat&&!simulating){
      el.textContent=remain;
      el.className='pi-timer active'+(remain<=5?' low':'');
    } else {
      el.textContent=seat===st.turn?'⏸':'-';
      el.className='pi-timer';
    }
  });
}

function renderGame(area,st){
  if(!document.getElementById('boardCanvas')){
    area.innerHTML=`<div id="boardWrap"><canvas id="boardCanvas"></canvas></div><div id="bottomBar"></div>`;
    boardCanvasSetup=false;
  }
  loadPlayerRecords();
  renderPlayerInfoBar(st);
  document.getElementById('bottomBar').innerHTML = (st.turn===mySeat && !simulating
    ? '<div style="color:#cfe9d8;font-size:12px;">내 알을 뒤로 당겼다 놓으면 발사돼요</div>'
    : '<div style="color:#8fa899;font-size:12px;">'+(simulating?'굴러가는 중...':'상대가 준비하고 있어요')+'</div>')
    + '<div class="surrender-btn" id="surrenderBtn">🏳️ 항복하기</div>';
  const sb=document.getElementById('surrenderBtn');
  if(sb) sb.addEventListener('click',surrender);
  startTurnTicker();

  if(!simulating){
    pieces=st.pieces.map(p=>({...p, trail:[]}));
  }
  if(!boardCanvasSetup){
    setupBoardCanvas();
    boardCanvasSetup=true;
  }
  drawBoard();
}

let turnTickTimer=null, timeoutTriggeredKey=null;
function startTurnTicker(){
  if(turnTickTimer) return;
  turnTickTimer=setInterval(()=>{
    if(!room||room.status!=='playing'||!room.state||room.state.stage!=='playing') return;
    updateTimerDisplay();
    const st=room.state;
    const elapsed=(Date.now()-(st.turnStartedAt||Date.now()))/1000;
    if(elapsed>=20){
      const key=room.id+':'+room.move_count+':timeout';
      if(timeoutTriggeredKey!==key&&st.turn===mySeat&&!simulating){
        timeoutTriggeredKey=key;
        autoPassTurn();
      }
    }
  },250);
}
async function autoPassTurn(){
  const st=room.state;
  await patchRoom({state:{...st, turn:st.turn===0?1:0, turnStartedAt:Date.now()}});
}
async function surrender(){
  if(!confirm('정말 항복하시겠어요?')) return;
  const loserSeat=mySeat, winnerSeat=mySeat===0?1:0;
  await patchRoom({state:{...room.state, stage:'result', winner:winnerSeat, postHandAt:Date.now()}});
  await settleMatch(winnerSeat);
}

let renderScale=1;
function isFlipped(){ return mySeat===0; } // 1번 자리는 원본 그대로가 "나 아래"라서, 0번 자리만 180도 돌려서 보여줌
function toLogical(bx,by){
  return isFlipped() ? {x:BOARD_W-bx, y:BOARD_H-by} : {x:bx, y:by};
}

function resizeCanvas(){
  const canvas=document.getElementById('boardCanvas');
  if(!canvas) return;
  const topBarH=(document.querySelector('.top-bar')||{offsetHeight:0}).offsetHeight;
  const infoBarH=(document.getElementById('playerInfoBar')||{offsetHeight:0}).offsetHeight;
  const bottomBarH=(document.getElementById('bottomBar')||{offsetHeight:0}).offsetHeight;
  const appW=Math.min(document.getElementById('app').clientWidth,430);
  const availW=appW-16;
  const availH=window.innerHeight-topBarH-infoBarH-bottomBarH-16;
  const scale=Math.max(0.1,Math.min(availW/BOARD_W,availH/BOARD_H));
  const dpr=window.devicePixelRatio||1;
  renderScale=scale*dpr;
  canvas.style.width=Math.floor(BOARD_W*scale)+'px';
  canvas.style.height=Math.floor(BOARD_H*scale)+'px';
  canvas.width=Math.round(BOARD_W*renderScale);
  canvas.height=Math.round(BOARD_H*renderScale);
  drawBoard();
}

function setupBoardCanvas(){
  const canvas=document.getElementById('boardCanvas');
  window.addEventListener('resize',resizeCanvas);
  requestAnimationFrame(resizeCanvas);

  canvas.addEventListener('pointerdown',e=>{
    if(!room||!room.state||room.state.turn!==mySeat||simulating) return;
    const rect=canvas.getBoundingClientRect();
    const scaleX=BOARD_W/rect.width, scaleY=BOARD_H/rect.height;
    const raw=toLogical((e.clientX-rect.left)*scaleX,(e.clientY-rect.top)*scaleY);
    const hit=pieces.find(p=>p.alive&&p.seat===mySeat&&Math.hypot(p.x-raw.x,p.y-raw.y)<=p.r+6);
    if(!hit) return;
    canvas.setPointerCapture(e.pointerId); // 화면 밖으로 나가도 드래그가 계속되게
    dragState={pieceId:hit.id, curBX:raw.x, curBY:raw.y, pointerId:e.pointerId};
    drawBoard();
  });
  canvas.addEventListener('pointermove',e=>{
    if(!dragState||e.pointerId!==dragState.pointerId) return;
    const rect=canvas.getBoundingClientRect();
    const scaleX=BOARD_W/rect.width, scaleY=BOARD_H/rect.height;
    const raw=toLogical((e.clientX-rect.left)*scaleX,(e.clientY-rect.top)*scaleY);
    dragState.curBX=raw.x;
    dragState.curBY=raw.y;
    drawBoard();
  });
  function onRelease(e){
    if(!dragState||(e.pointerId!==undefined&&e.pointerId!==dragState.pointerId)) return;
    const piece=pieces.find(p=>p.id===dragState.pieceId);
    if(piece){
      let dx=dragState.curBX-piece.x, dy=dragState.curBY-piece.y;
      const dist=Math.min(MAX_PULL,Math.hypot(dx,dy));
      if(dist>6){
        const angle=Math.atan2(dy,dx);
        const power=(dist/MAX_PULL)*BASE_LAUNCH_SPEED*(piece.power||0.7);
        const vx=-Math.cos(angle)*power, vy=-Math.sin(angle)*power;
        fireShot(piece.id,vx,vy);
      }
    }
    dragState=null;
    drawBoard();
  }
  canvas.addEventListener('pointerup',onRelease);
  canvas.addEventListener('pointercancel',onRelease);
}

function drawOctagonPath(ctx,cx,cy,r){
  ctx.beginPath();
  for(let i=0;i<8;i++){
    const angle=Math.PI/8+i*Math.PI/4;
    const x=cx+r*Math.cos(angle), y=cy+r*Math.sin(angle);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
}

function drawBoard(){
  const canvas=document.getElementById('boardCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.scale(renderScale,renderScale);
  const flipped=isFlipped();
  if(flipped){ ctx.translate(BOARD_W,BOARD_H); ctx.rotate(Math.PI); }

  // 보드 배경
  const g=ctx.createLinearGradient(0,0,0,BOARD_H);
  g.addColorStop(0,'#d9b06a'); g.addColorStop(1,'#c89a54');
  ctx.fillStyle=g; ctx.fillRect(0,0,BOARD_W,BOARD_H);
  ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=6;
  ctx.strokeRect(3,3,BOARD_W-6,BOARD_H-6);
  // 경첩 접히는 선(중앙 가로줄) + 좌우 구간에 가로로 누운 경첩
  ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,BOARD_H/2); ctx.lineTo(BOARD_W,BOARD_H/2); ctx.stroke();
  HINGES.forEach(H=>{
    ctx.fillStyle='#8f6a30';
    ctx.fillRect(H.x1,H.y-H.half,H.x2-H.x1,H.half*2);
    ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1.5;
    ctx.strokeRect(H.x1,H.y-H.half,H.x2-H.x1,H.half*2);
    ctx.fillStyle='rgba(255,255,255,0.25)';
    ctx.fillRect(H.x1+2,H.y-H.half+1,H.x2-H.x1-4,1.5);
  });

  let aimInfo=null;
  // 조준선(당기는 선 + 발사 방향 화살표) - 게이지/각도 숫자는 아래 별도 HUD에서 그려요
  if(dragState){
    const piece=pieces.find(p=>p.id===dragState.pieceId);
    if(piece){
      let dx=dragState.curBX-piece.x, dy=dragState.curBY-piece.y;
      const dist=Math.min(MAX_PULL,Math.hypot(dx,dy));
      const pct=dist/MAX_PULL;
      const angle=Math.atan2(dy,dx);
      const pullX=piece.x+Math.cos(angle)*dist, pullY=piece.y+Math.sin(angle)*dist;
      const shootAngle=angle+Math.PI;
      const powerColor = pct<0.5 ? 'rgba(120,220,120,0.85)' : pct<0.8 ? 'rgba(255,210,80,0.9)' : 'rgba(255,80,80,0.95)';

      ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=3; ctx.setLineDash([6,5]);
      ctx.beginPath(); ctx.moveTo(piece.x,piece.y); ctx.lineTo(pullX,pullY); ctx.stroke();
      ctx.setLineDash([]);

      const aimLen=dist*2.2;
      const aimX=piece.x+Math.cos(shootAngle)*aimLen, aimY=piece.y+Math.sin(shootAngle)*aimLen;
      ctx.strokeStyle=powerColor; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(piece.x,piece.y); ctx.lineTo(aimX,aimY); ctx.stroke();
      const ah=8;
      ctx.beginPath();
      ctx.moveTo(aimX,aimY);
      ctx.lineTo(aimX-ah*Math.cos(shootAngle-0.4),aimY-ah*Math.sin(shootAngle-0.4));
      ctx.lineTo(aimX-ah*Math.cos(shootAngle+0.4),aimY-ah*Math.sin(shootAngle+0.4));
      ctx.closePath();
      ctx.fillStyle=powerColor; ctx.fill();

      let deg=Math.round(shootAngle*180/Math.PI);
      deg=((deg%360)+360)%360;
      aimInfo={pct,powerColor,deg};
    }
  }

  // 움직이는 알의 잔상(꼬리) 효과 - 빨리 지나갈 때 잘 보이도록
  pieces.forEach(p=>{
    if(!p.alive||!p.trail||!p.trail.length) return;
    p.trail.forEach((t,i)=>{
      const alpha=(i+1)/(p.trail.length+1)*0.35;
      ctx.beginPath(); ctx.arc(t.x,t.y,p.r*0.85,0,Math.PI*2);
      ctx.fillStyle = (p.seat===0?'rgba(214,69,69,':'rgba(47,79,168,')+alpha+')';
      ctx.fill();
    });
  });

  // 알들 (8각형 - 실제 장기알 모양)
  pieces.forEach(p=>{
    if(!p.alive) return;
    const isJanggi=p.type!=='●';
    if(isJanggi) drawOctagonPath(ctx,p.x,p.y,p.r);
    else { ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); }
    ctx.fillStyle = p.seat===0 ? '#d64545' : '#2f4fa8';
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=2; ctx.stroke();
    if(isJanggi){
      ctx.save();
      // 글자는 시점이 뒤집혀도 항상 똑바로 보이게
      ctx.translate(p.x,p.y);
      if(flipped) ctx.rotate(Math.PI);
      ctx.fillStyle='#fff'; ctx.font='bold '+(p.r*0.9)+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(p.hanja||p.type,0,1);
      ctx.restore();
    }
    if(mySeat===p.seat&&room&&room.state&&room.state.turn===mySeat&&!simulating){
      ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r+3,0,Math.PI*2); ctx.stroke();
    }
  });

  ctx.restore();

  // 파워 게이지 HUD (알에 안 겹치게 화면 하단 고정, 회전 영향 안 받음)
  if(aimInfo){
    ctx.save();
    ctx.scale(renderScale,renderScale);
    const gaugeW=160, gaugeH=16, gaugeX=BOARD_W/2-gaugeW/2, gaugeY=BOARD_H-30;
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.roundRect?ctx.roundRect(gaugeX,gaugeY,gaugeW,gaugeH,8):ctx.rect(gaugeX,gaugeY,gaugeW,gaugeH); ctx.fill();
    ctx.fillStyle=aimInfo.powerColor;
    const fillW=Math.max(gaugeH,gaugeW*aimInfo.pct);
    ctx.beginPath(); ctx.roundRect?ctx.roundRect(gaugeX,gaugeY,fillW,gaugeH,8):ctx.rect(gaugeX,gaugeY,fillW,gaugeH); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect?ctx.roundRect(gaugeX,gaugeY,gaugeW,gaugeH,8):ctx.rect(gaugeX,gaugeY,gaugeW,gaugeH); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('파워 '+Math.round(aimInfo.pct*100)+'% · '+aimInfo.deg+'°',gaugeX+gaugeW/2,gaugeY+gaugeH/2+1);
    ctx.restore();
  }
}

function fireShot(pieceId,vx,vy){
  const piece=pieces.find(p=>p.id===pieceId);
  if(!piece) return;
  piece.vx=vx; piece.vy=vy;
  safeSend({type:'broadcast',event:'shot',payload:{pieceId,vx,vy,seat:mySeat}});
  runSimulation(()=>{ finishTurnAfterShot(); });
}

function runSimulation(onDone){
  simulating=true;
  let steps=0;
  function frame(){
    stepPhysics(pieces);
    steps++;
    drawBoard();
    if(allSettled(pieces)||steps>=SIM_MAX_STEPS){
      simulating=false;
      onDone();
      return;
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

async function finishTurnAfterShot(){
  const st=room.state;
  const aliveP0=pieces.filter(p=>p.seat===0&&p.alive).length;
  const aliveP1=pieces.filter(p=>p.seat===1&&p.alive).length;
  const cleanPieces=pieces.map(({trail,...rest})=>rest);
  let newState;
  if(aliveP0===0||aliveP1===0){
    const winner=aliveP0===0?1:0;
    newState={...st,pieces:cleanPieces,stage:'result',winner,postHandAt:Date.now()};
    await settleMatch(winner);
  } else {
    newState={...st,pieces:cleanPieces,turn:st.turn===0?1:0,turnStartedAt:Date.now()};
  }
  await patchRoom({state:newState});
}

async function settleMatch(winnerSeat){
  const players=room.players||[];
  const winP=players[winnerSeat], loseP=players[winnerSeat===0?1:0];
  if(!winP||!loseP) return;
  try{
    const [wr,lr]=await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/alkkagi_points?user_id=eq.${winP.user_id}&select=*`,{headers:headers()}),
      fetch(`${SUPABASE_URL}/rest/v1/alkkagi_points?user_id=eq.${loseP.user_id}&select=*`,{headers:headers()})
    ]);
    const wd=(await wr.json())[0], ld=(await lr.json())[0];
    if(wd){ await fetch(`${SUPABASE_URL}/rest/v1/alkkagi_points?user_id=eq.${winP.user_id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({points:(wd.points||0)+300,wins:(wd.wins||0)+1})}); }
    if(ld){ await fetch(`${SUPABASE_URL}/rest/v1/alkkagi_points?user_id=eq.${loseP.user_id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({points:Math.max(0,(ld.points||0)-100),losses:(ld.losses||0)+1})}); }
  }catch(e){ console.error('점수 반영 실패:',e); }
}

// ---- 결과 화면 ----
function renderResult(area,st){
  const players=room.players||[];
  const iWon=st.winner===mySeat;
  const winP=players[st.winner];
  area.innerHTML=`
    <div class="result-wrap">
      <div style="font-size:44px;margin-bottom:10px;">${iWon?'🏆':'💧'}</div>
      <div style="font-size:20px;font-weight:800;margin-bottom:6px;">${winP?esc(winP.username):''}님 승리!</div>
      <div style="font-size:13px;color:#cfe9d8;margin-bottom:20px;">${iWon?'상대 알을 다 떨어뜨렸어요':'내 알이 다 떨어졌어요'}</div>
      <div class="big-btn" id="backToLobbyBtn" style="background:#2e8b57;color:#fff;">방으로 돌아가기</div>
    </div>
  `;
  document.getElementById('backToLobbyBtn').addEventListener('click',returnToLobby);
}

async function returnToLobby(){
  const players=(room.players||[]).map(p=>({...p,ready:false}));
  startTriggeredKey=null;
  boardCanvasSetup=false;
  recordsLoadedFor=null;
  timeoutTriggeredKey=null;
  if(turnTickTimer){ clearInterval(turnTickTimer); turnTickTimer=null; }
  await patchRoom({status:'waiting',players});
}

// ---- 나가기 ----
async function leaveRoom(){
  try{
    if(mySeat>=0&&room){
      const np=(room.players||[]).filter((_,i)=>i!==mySeat).map((p,i)=>({...p,seat:i}));
      if(np.length===0){
        await fetch(`${SUPABASE_URL}/rest/v1/alkkagi_rooms?id=eq.${roomId}`,{method:'DELETE',headers:headers()});
      } else {
        const patch={players:np};
        if(String(room.host_user_id)===String(currentUser.id)){ patch.host_user_id=np[0].user_id; patch.host_username=np[0].username; }
        if(room.status==='playing'){ patch.status='finished'; }
        await fetch(`${SUPABASE_URL}/rest/v1/alkkagi_rooms?id=eq.${roomId}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify(patch)});
      }
    }
  }catch(e){}
  location.href='alkkagi_rooms.html';
}
document.getElementById('leaveBtn').addEventListener('click',leaveRoom);
window.addEventListener('pagehide',()=>{
  try{
    if(mySeat<0||!room) return;
    const np=(room.players||[]).filter((_,i)=>i!==mySeat).map((p,i)=>({...p,seat:i}));
    const patch={players:np};
    if(String(room.host_user_id)===String(currentUser.id)&&np.length){ patch.host_user_id=np[0].user_id; patch.host_username=np[0].username; }
    fetch(`${SUPABASE_URL}/rest/v1/alkkagi_rooms?id=eq.${roomId}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify(patch),keepalive:true});
  }catch(e){}
});

// ---- 초기화 ----
async function init(){
  if(!roomId){ document.getElementById('mainArea').innerHTML='<div class="center-msg">잘못된 접근이에요.</div>'; return; }
  if(currentUser) await ensurePoints();
  await fetchRoom();
  await joinChannel();
  pollTimer=setInterval(fetchRoom,1000);
}
init();
</script>
