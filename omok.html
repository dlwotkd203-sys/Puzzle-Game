<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>오목</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;}
#app{max-width:430px;margin:0 auto;background:#fff;min-height:100vh;}
.top-bar{display:flex;align-items:center;gap:10px;padding:1rem 1rem 0.75rem;border-bottom:1px solid #eee;}
.back-btn{background:none;border:none;cursor:pointer;color:#888;font-size:20px;padding:2px 8px;line-height:1;border-radius:8px;}
.top-title{font-size:17px;font-weight:600;color:#111;flex:1;}
.wrap{padding:2rem 1.2rem;display:flex;flex-direction:column;gap:16px;align-items:center;}
.big-title{font-family:-apple-system,sans-serif;font-weight:800;font-size:24px;color:#1a1a2e;margin-bottom:6px;}
.mode-card{width:100%;max-width:340px;border-radius:16px;padding:22px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.mode-card:active{transform:scale(0.98);}
.mode-icon{font-size:34px;}
.mode-name{font-weight:800;font-size:16px;color:#1a1a2e;}
.mode-desc{font-size:12px;color:#8a8a9a;margin-top:2px;}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <button class="back-btn" onclick="location.href='index.html'">←</button>
    <span class="top-title">오목</span>
  </div>
  <div class="wrap">
    <div class="big-title">⚫⚪ 오목</div>
    <div class="mode-card" style="background:#eef6ff;" onclick="location.href='omok_rooms.html'">
      <div class="mode-icon">🌐</div>
      <div>
        <div class="mode-name">실시간 대전</div>
        <div class="mode-desc">다른 유저와 방을 만들어 대국 · 랭킹 반영</div>
      </div>
    </div>
    <div class="mode-card" style="background:#fff4ea;" onclick="location.href='omok_ai.html'">
      <div class="mode-icon">🤖</div>
      <div>
        <div class="mode-name">컴퓨터 대전</div>
        <div class="mode-desc">하수 / 중수 / 고수 난이도 선택</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
