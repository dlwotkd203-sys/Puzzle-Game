#bottomBar{flex-shrink:0;padding:10px 16px 18px;text-align:center;}

.pi-timer.active{background:#1e5aa8;}
.pi-timer.low{background:#c0392b;}
.surrender-btn{display:inline-block;margin-top:8px;font-size:11px;font-weight:700;color:#e08080;background:rgba(224,128,128,0.12);padding:6px 14px;border-radius:10px;cursor:pointer;}
#aimHint{position:absolute;top:8px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.75);font-size:11px;font-weight:700;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,0.8);}
</style>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';
const SUPABASE_URL='https://pampoyeyhwwdpzcaubdm.supabase.co';
const SUPABASE_KEY='sb_publishable_xWRbj6jRwR_sojPBYCLfEg_DylayGH5';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const STARTING_POINTS=10000;

let currentUser=null;
try{currentUser=JSON.parse(localStorage.getItem('puzzle_user')||'null');}catch(e){}
const params=new URLSearchParams(location.search);
const roomId=params.get('id');

function headers(){ return {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function jheaders(){ return {'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}; }
function esc(str){ return String(str??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }

// ================= 볼링 물리/레인 상수 =================
const LANE_W=1.05, LANE_LEN=22, GUTTER_W=0.22;
const BALL_R=0.11, BALL_MASS=6.2;
const PIN_R=0.06, PIN_H=0.38, PIN_MASS=1.55;
const PIN_SPACING=0.305;
const FOUL_Z=1.5;              // 파울선(공 출발 지점) z좌표
const PIN_AREA_Z=-(LANE_LEN-5); // 핀 삼각형의 맨 앞줄(1번핀) z좌표 - 뒷줄까지 바닥 범위 안에 여유있게 들어오도록
const MAX_POWER_SPEED=8.6;      // 최대 파워일 때 공 속도(m/s) - 실제 프로 볼러의 최고 구속대와 비슷하게
const MAX_AIM_ANGLE=0.30;       // 좌우 최대 조준각(라디안)

function pinLayout(){
  const rows=[[0],[-0.5,0.5],[-1,0,1],[-1.5,-0.5,0.5,1.5]];
  const rowDepth=PIN_SPACING*Math.sqrt(3)/2;
  const list=[];
  rows.forEach((row,ri)=>{
    row.forEach(xOff=>{ list.push({x:xOff*PIN_SPACING, z:PIN_AREA_Z-ri*rowDepth}); });
  });
  return list; // 10개, 인덱스 0~9
}

// 실제 볼링핀의 옆모습 실루엣(바닥→배→목→머리)을 흉내낸 회전체 프로필
function createPinGeometry(){
  const profile=[
    [0.70,0.000],[0.83,0.015],[0.98,0.10],[1.00,0.18],[0.93,0.28],
    [0.78,0.42],[0.60,0.55],[0.40,0.66],[0.44,0.72],[0.58,0.80],
    [0.66,0.86],[0.60,0.92],[0.42,0.97],[0.10,1.00]
  ];
  const points=profile.map(([r,y])=>new THREE.Vector2(Math.max(0.001,r*PIN_R),y*PIN_H));
  return new THREE.LatheGeometry(points,20);
}

// ================= Three.js 씬 + Cannon 물리월드 =================
let renderer,scene,camera,threeReady=false;
let world;
let ballMesh,ballBody;
let aimLineGroup;
let pinMeshes=[],pinBodies=[];
let laneMaterial,gutterMaterial,ballCMaterial,pinCMaterial;

function setupThree(mountEl){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x1b2438);
  scene.fog=new THREE.Fog(0x1b2438,18,LANE_LEN+16);

  camera=new THREE.PerspectiveCamera(58,1,0.05,60);
  camera.position.set(0,1.15,FOUL_Z+1.6);
  camera.lookAt(0,0.3,PIN_AREA_Z);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(2,window.devicePixelRatio||1));
  renderer.shadowMap.enabled=true;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.25;
  if('outputColorSpace' in renderer) renderer.outputColorSpace=THREE.SRGBColorSpace;
  mountEl.appendChild(renderer.domElement);

  // 밝은 볼링장 조명: 은은한 전역광 + 레인을 따라 늘어선 스팟라이트들 + 핀 위 강조광
  const ambient=new THREE.AmbientLight(0xaebcdd,1.05);
  scene.add(ambient);
  const hemi=new THREE.HemisphereLight(0xffffff,0x33405a,0.6);
  scene.add(hemi);
  for(let i=0;i<4;i++){
    const z=FOUL_Z-i*4.2;
    const spot=new THREE.SpotLight(0xfff6e0,1.5,14,Math.PI/4,0.5,1.2);
    spot.position.set(0,4.2,z);
    spot.target.position.set(0,0,z-3);
    if(i===1){ spot.castShadow=true; spot.shadow.mapSize.set(1024,1024); }
    scene.add(spot); scene.add(spot.target);
    // 조명 갓(작은 발광 패널) - 눈에 보이는 천장 조명 느낌
    const fixture=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.05,0.3),new THREE.MeshStandardMaterial({color:0xfff6d8,emissive:0xfff2b0,emissiveIntensity:1.6}));
    fixture.position.set(0,4.25,z);
    scene.add(fixture);
  }
  const pinLight=new THREE.PointLight(0xfff3d8,1.6,12);
  pinLight.position.set(0,2.3,PIN_AREA_Z-0.3);
  scene.add(pinLight);

  // 레인 바닥 (밝은 나무색)
  const laneGeo=new THREE.PlaneGeometry(LANE_W,LANE_LEN);
  const laneMat=new THREE.MeshStandardMaterial({color:0xe0b878,roughness:0.28,metalness:0.08});
  const laneMesh=new THREE.Mesh(laneGeo,laneMat);
  laneMesh.rotation.x=-Math.PI/2;
  laneMesh.position.set(0,0,-(LANE_LEN/2-FOUL_Z));
  laneMesh.receiveShadow=true;
  scene.add(laneMesh);
  // 레인 중앙 화살표 장식(라인)
  for(let i=0;i<7;i++){
    const g=new THREE.PlaneGeometry(0.03,0.5);
    const m=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:0x5a3f1c}));
    m.rotation.x=-Math.PI/2;
    m.position.set((i-3)*0.13,0.001,FOUL_Z-3.5);
    scene.add(m);
  }
  // 거터 (양쪽, 레인보다 한 단 낮은 도랑 - 실제 물리 낙차와 맞춤)
  [-1,1].forEach(side=>{
    const gGeo=new THREE.PlaneGeometry(GUTTER_W,LANE_LEN);
    const gMat=new THREE.MeshStandardMaterial({color:0x4a5a78,roughness:0.5,metalness:0.35});
    const gMesh=new THREE.Mesh(gGeo,gMat);
    gMesh.rotation.x=-Math.PI/2;
    gMesh.position.set(side*(LANE_W/2+GUTTER_W/2),-0.07,-(LANE_LEN/2-FOUL_Z));
    gMesh.receiveShadow=true;
    scene.add(gMesh);
  });
  // 핀 뒤 백보드 (밝은 패널 + 은은한 발광)
  const backGeo=new THREE.PlaneGeometry(LANE_W+GUTTER_W*2+0.6,2.4);
  const backMesh=new THREE.Mesh(backGeo,new THREE.MeshStandardMaterial({color:0x394866,emissive:0x1a2438,emissiveIntensity:0.4}));
  backMesh.position.set(0,1.1,PIN_AREA_Z-1.0);
  scene.add(backMesh);
  // 레인 좌우 벽면(밝게, 알레이 느낌)
  [-1,1].forEach(side=>{
    const wallGeo=new THREE.PlaneGeometry(LANE_LEN,3);
    const wallMesh=new THREE.Mesh(wallGeo,new THREE.MeshStandardMaterial({color:0x28324a,roughness:0.9}));
    wallMesh.rotation.y=side>0?-Math.PI/2:Math.PI/2;
    wallMesh.position.set(side*(LANE_W/2+GUTTER_W+0.6),1.4,-(LANE_LEN/2-FOUL_Z));
    scene.add(wallMesh);
  });

  // 공
  const ballGeo=new THREE.SphereGeometry(BALL_R,24,24);
  const ballMat=new THREE.MeshStandardMaterial({color:0x3a6bf0,roughness:0.2,metalness:0.55});
  ballMesh=new THREE.Mesh(ballGeo,ballMat);
  ballMesh.castShadow=true;
  scene.add(ballMesh);

  // 핀 10개 - 실제 볼링핀 실루엣(바닥→배→목→머리)에 가까운 회전체 형태
  const pinGeo=createPinGeometry();
  const layout=pinLayout();
  pinMeshes=layout.map(()=>{
    const g=new THREE.Group();
    const body=new THREE.Mesh(pinGeo,new THREE.MeshStandardMaterial({color:0xfbfaf4,roughness:0.32,metalness:0.02}));
    body.position.y=-PIN_H/2; // 그룹 원점(물리 바디의 중심 높이)을 기준으로 핀 바닥이 y=0에 오도록
    body.castShadow=true;
    // 목 부분의 붉은 띠 2줄(실제 핀처럼) - 프로필 곡선 반지름에 맞춰서
    const stripe1=new THREE.Mesh(new THREE.CylinderGeometry(PIN_R*0.60,PIN_R*0.60,PIN_H*0.09,18),new THREE.MeshStandardMaterial({color:0xd81f1f,roughness:0.4}));
    stripe1.position.y=-PIN_H/2+PIN_H*0.80;
    const stripe2=new THREE.Mesh(new THREE.CylinderGeometry(PIN_R*0.42,PIN_R*0.42,PIN_H*0.04,18),new THREE.MeshStandardMaterial({color:0xd81f1f,roughness:0.4}));
    stripe2.position.y=-PIN_H/2+PIN_H*0.66;
    g.add(body); g.add(stripe1); g.add(stripe2);
    scene.add(g);
    return g;
  });

  // 조준 방향 가이드라인 (점선 느낌으로 여러 조각을 이어붙임)
  aimLineGroup=new THREE.Group();
  const dashMat=new THREE.MeshBasicMaterial({color:0x7ed957,transparent:true,opacity:0.85});
  const dashCount=22;
  for(let i=0;i<dashCount;i++){
    const dash=new THREE.Mesh(new THREE.BoxGeometry(0.025,0.01,0.16),dashMat);
    dash.position.z=-(0.35+i*0.32);
    aimLineGroup.add(dash);
  }
  const arrowHead=new THREE.Mesh(new THREE.ConeGeometry(0.05,0.14,10),dashMat);
  arrowHead.rotation.x=-Math.PI/2;
  arrowHead.position.z=-(0.35+dashCount*0.32);
  aimLineGroup.add(arrowHead);
  aimLineGroup.visible=false;
  scene.add(aimLineGroup);

  threeReady=true;
  resizeThree(mountEl);
}
function resizeThree(mountEl){
  if(!threeReady) return;
  const w=mountEl.clientWidth, h=mountEl.clientHeight;
  if(w<10||h<10) return;
  renderer.setSize(w,h);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}

function setupWorld(){
  world=new CANNON.World({gravity:new CANNON.Vec3(0,-9.82,0)});
  world.broadphase=new CANNON.SAPBroadphase(world);
  world.allowSleep=true;
  world.solver.iterations=20;
  world.solver.tolerance=0.001;

  laneMaterial=new CANNON.Material('lane');
  gutterMaterial=new CANNON.Material('gutter');
  ballCMaterial=new CANNON.Material('ball');
  pinCMaterial=new CANNON.Material('pin');
  // 레인은 오일 구간(마찰 거의 없음), 거터는 마찰 낮고 반발도 거의 없어서 공이 튕기지 않고 매끄럽게 굴러감
  world.addContactMaterial(new CANNON.ContactMaterial(laneMaterial,ballCMaterial,{friction:0.02,restitution:0.02}));
  world.addContactMaterial(new CANNON.ContactMaterial(gutterMaterial,ballCMaterial,{friction:0.03,restitution:0.01}));
  world.addContactMaterial(new CANNON.ContactMaterial(laneMaterial,pinCMaterial,{friction:0.5,restitution:0.03}));
  world.addContactMaterial(new CANNON.ContactMaterial(ballCMaterial,pinCMaterial,{friction:0.32,restitution:0.55}));
  world.addContactMaterial(new CANNON.ContactMaterial(pinCMaterial,pinCMaterial,{friction:0.35,restitution:0.35}));

  // 레인 바닥 (핀이 놓이는 폭만큼만 - 거터와는 분리된 별도 바닥)
  const laneShape=new CANNON.Box(new CANNON.Vec3(LANE_W/2,0.1,LANE_LEN/2));
  const laneBody=new CANNON.Body({mass:0,material:laneMaterial});
  laneBody.addShape(laneShape);
  laneBody.position.set(0,-0.1,-(LANE_LEN/2-FOUL_Z));
  world.addBody(laneBody);
  // 거터 (양쪽, 레인보다 한 단 낮은 도랑 - 공이 벽에 부딪혀 튕기는 게 아니라 자연스럽게 뚝 떨어져서 굴러감)
  const GUTTER_DROP=0.07;
  [-1,1].forEach(side=>{
    const gShape=new CANNON.Box(new CANNON.Vec3(GUTTER_W/2,0.1,LANE_LEN/2));
    const gBody=new CANNON.Body({mass:0,material:gutterMaterial});
    gBody.addShape(gShape);
    gBody.position.set(side*(LANE_W/2+GUTTER_W/2),-0.1-GUTTER_DROP,-(LANE_LEN/2-FOUL_Z));
    world.addBody(gBody);
  });
  // 거터보다 더 바깥쪽엔 두꺼운 벽(빠른 공이 얇은 벽을 뚫고 지나가 튕기는 현상 방지)
  [-1,1].forEach(side=>{
    const wallShape=new CANNON.Box(new CANNON.Vec3(0.15,0.5,LANE_LEN/2));
    const wallBody=new CANNON.Body({mass:0,material:gutterMaterial});
    wallBody.addShape(wallShape);
    wallBody.position.set(side*(LANE_W/2+GUTTER_W+0.15),0.15,-(LANE_LEN/2-FOUL_Z));
    world.addBody(wallBody);
  });
  // 핀 뒤쪽 벽(핀/공이 안 날아가도록)
  const backWallShape=new CANNON.Box(new CANNON.Vec3((LANE_W+GUTTER_W*2)/2,1.2,0.15));
  const backWallBody=new CANNON.Body({mass:0,material:laneMaterial});
  backWallBody.addShape(backWallShape);
  backWallBody.position.set(0,1.2,PIN_AREA_Z-1.15);
  world.addBody(backWallBody);

  // 공 (실제 볼링공처럼: 무겁고, 구름저항은 아주 작게)
  ballBody=new CANNON.Body({mass:BALL_MASS,material:ballCMaterial,linearDamping:0.01,angularDamping:0.15});
  ballBody.addShape(new CANNON.Sphere(BALL_R));
  ballBody.sleepSpeedLimit=0.1;
  ballBody.sleepTimeLimit=0.4;
  world.addBody(ballBody);

  // 핀 10개 (댐핑을 낮춰서 세게 맞으면 실제로 잘 넘어가도록)
  const layout=pinLayout();
  pinBodies=layout.map(()=>{
    const b=new CANNON.Body({mass:PIN_MASS,material:pinCMaterial,linearDamping:0.04,angularDamping:0.06});
    b.addShape(new CANNON.Cylinder(PIN_R*0.8,PIN_R,PIN_H,12));
    b.sleepSpeedLimit=0.2;
    b.sleepTimeLimit=0.3;
    world.addBody(b);
    return b;
  });
}
function resetPinsPhysics(standingMask){
  const layout=pinLayout();
  pinBodies.forEach((b,i)=>{
    if(standingMask[i]){
      // 바닥에 정확히 딱 붙이면(간격 0) 접촉 지터로 미세하게 떨리다 넘어질 수 있어서, 아주 살짝 띄워서 스폰
      b.position.set(layout[i].x,PIN_H/2+0.004,layout[i].z);
      b.quaternion.set(0,0,0,1);
      b.velocity.set(0,0,0); b.angularVelocity.set(0,0,0);
      b.force.set(0,0,0); b.torque.set(0,0,0);
      b.wakeUp();
    } else {
      b.position.set(layout[i].x, -3, layout[i].z); // 이미 쓰러진 핀은 화면 밖(아래)로 치워둠
      b.velocity.set(0,0,0); b.angularVelocity.set(0,0,0);
      b.force.set(0,0,0); b.torque.set(0,0,0);
      b.sleep();
    }
  });
  // 스폰 직후 약간의 안정화 스텝을 미리 돌려서(화면엔 안 보이게) 완전히 정지한 상태로 시작하게 함
  for(let i=0;i<8;i++) world.step(1/60);
  pinBodies.forEach((b,i)=>{ if(standingMask[i]){ b.velocity.set(0,0,0); b.angularVelocity.set(0,0,0); } });
}
// 핀세터가 위에서 새 핀을 내려놓는 듯한 연출: 위에서 내려와 살짝 튀었다가 자리잡음
let pinIntroPlaying=false, pinIntroKey=null;
function playPinSetterIntro(standingMask,onDone){
  pinIntroPlaying=true;
  const layout=pinLayout();
  const startY=1.15, midY=PIN_H/2+0.05, targetY=PIN_H/2;
  const dropDur=480, bounceDur=180;
  const t0=performance.now();
  function frame(ts){
    const el=ts-t0;
    let y;
    if(el<dropDur){
      const t=el/dropDur;
      const eased=1-Math.pow(1-t,3);
      y=startY+(midY-startY)*eased;
    } else if(el<dropDur+bounceDur){
      const t=(el-dropDur)/bounceDur;
      y=midY+(targetY-midY)*(1-Math.pow(1-t,2));
    } else {
      y=targetY;
    }
    pinBodies.forEach((b,i)=>{
      if(!standingMask[i]){ b.position.set(layout[i].x,-3,layout[i].z); return; }
      b.position.set(layout[i].x,y,layout[i].z);
      b.quaternion.set(0,0,0,1);
    });
    syncMeshesFromBodies();
    if(threeReady) renderer.render(scene,camera);
    if(el<dropDur+bounceDur){
      requestAnimationFrame(frame);
    } else {
      pinIntroPlaying=false;
      resetPinsPhysics(standingMask);
      syncMeshesFromBodies();
      if(onDone) onDone();
    }
  }
  requestAnimationFrame(frame);
}
function resetBallPhysics(x,z){
  ballBody.position.set(x,BALL_R,z);
  ballBody.velocity.set(0,0,0);
  ballBody.angularVelocity.set(0,0,0);
  ballBody.quaternion.set(0,0,0,1);
  ballBody.wakeUp();
}
function isPinDown(body){
  const up=new CANNON.Vec3(0,1,0);
  const worldUp=body.quaternion.vmult(up);
  const angle=Math.acos(Math.max(-1,Math.min(1,worldUp.y)));
  return angle>Math.PI/3 || body.position.y< -1; // 60도 이상 기울거나 이미 치워진 핀
}
function syncMeshesFromBodies(){
  ballMesh.position.copy(ballBody.position);
  ballMesh.quaternion.copy(ballBody.quaternion);
  pinBodies.forEach((b,i)=>{
    pinMeshes[i].position.copy(b.position);
    pinMeshes[i].quaternion.copy(b.quaternion);
  });
}

// 표준 볼링 점수 계산 (스트라이크/스페어 보너스 포함)
function calcScore(rolls){
  let score=0, i=0;
  for(let frame=0; frame<10 && i<rolls.length; frame++){
    if(rolls[i]===10){
      score += 10 + (rolls[i+1]||0) + (rolls[i+2]||0);
      i+=1;
    } else {
      const r0=rolls[i]||0, r1=rolls[i+1];
      if(r1===undefined){ score+=r0; i+=1; continue; }
      const two=r0+r1;
      if(two===10) score += 10 + (rolls[i+2]||0);
      else score += two;
      i+=2;
    }
  }
  return score;
}
// 프레임별로 나눠서 UI 표시용으로 가공 (각 프레임의 롤 표시 + 누적점수)
// 프레임별 롤 목록 + 각 프레임까지의 확정 누적점수(보너스가 아직 안 나왔으면 null)
function frameBreakdown(rolls){
  const frames=[]; let i=0;
  for(let frame=0; frame<10; frame++){
    if(i>=rolls.length){ frames.push(null); continue; }
    if(frame<9){
      if(rolls[i]===10){ frames.push({rolls:[rolls[i]]}); i+=1; }
      else if(rolls[i+1]!==undefined){ frames.push({rolls:[rolls[i],rolls[i+1]]}); i+=2; }
      else { frames.push({rolls:[rolls[i]],partial:true}); i+=1; }
    } else {
      frames.push({rolls:rolls.slice(i)});
      i=rolls.length;
    }
  }
  let score=0, ri=0; const cums=[];
  for(let frame=0; frame<10; frame++){
    if(!frames[frame]||frames[frame].partial){ cums.push(null); continue; }
    if(rolls[ri]===10){
      if(rolls[ri+1]===undefined||rolls[ri+2]===undefined){ cums.push(null); continue; }
      score+=10+rolls[ri+1]+rolls[ri+2]; cums.push(score); ri+=1;
    } else {
      const r0=rolls[ri]||0, r1=rolls[ri+1];
      if(r1===undefined){ cums.push(null); continue; }
      const two=r0+r1;
      if(two===10){
        if(rolls[ri+2]===undefined){ cums.push(null); continue; }
        score+=10+rolls[ri+2];
      } else { score+=two; }
      cums.push(score); ri+=2;
    }
  }
  return {frames,cums};
}

// 이번 롤을 시작하기 전에 핀을 새로 세워야 하는지 판단
function needsPinResetForRoll(state,seat){
  const frame=state.frameIdx[seat], rollN=state.rollInFrame[seat];
  if(frame>=10) return false;
  if(frame<9) return rollN===0;
  // 10프레임
  if(rollN===0) return true;
  if(rollN===1){
    const lastRoll=state.rolls[seat][state.rolls[seat].length-1];
    return lastRoll===10; // 1구가 스트라이크였으면 2구도 새 핀
  }
  if(rollN===2) return true; // 보너스 3구는 항상 새 핀
  return false;
}
// 롤 결과를 받아 프레임/턴을 진행시키고 새 state를 반환
function advanceAfterRoll(state,seat,knocked){
  const s={...state, frameIdx:[...state.frameIdx], rollInFrame:[...state.rollInFrame], rolls:[state.rolls[0].slice(),state.rolls[1].slice()]};
  s.rolls[seat].push(knocked);
  const frame=s.frameIdx[seat];
  let frameOver=false;
  if(frame<9){
    if(s.rollInFrame[seat]===0){
      if(knocked===10){ s.frameIdx[seat]++; s.rollInFrame[seat]=0; frameOver=true; }
      else { s.rollInFrame[seat]=1; }
    } else {
      s.frameIdx[seat]++; s.rollInFrame[seat]=0; frameOver=true;
    }
  } else {
    const r=s.rollInFrame[seat];
    if(r===0){ s.rollInFrame[seat]=1; }
    else if(r===1){
      const firstRoll=s.rolls[seat][s.rolls[seat].length-2];
      if(firstRoll===10 || firstRoll+knocked>=10){ s.rollInFrame[seat]=2; }
      else { s.frameIdx[seat]=10; frameOver=true; }
    } else {
      s.frameIdx[seat]=10; frameOver=true;
    }
  }
  if(frameOver){
    const other=seat===0?1:0;
    if(s.frameIdx[other]<10){ s.turn=other; }
    else if(s.frameIdx[seat]<10){ s.turn=seat; }
    else {
      s.stage='result';
      const sc0=calcScore(s.rolls[0]), sc1=calcScore(s.rolls[1]);
      s.winner = sc0>=sc1 ? 0 : 1;
      s.postHandAt=Date.now();
    }
  }
  s.needsReset=needsPinResetForRoll(s,s.turn);
  s.turnStartedAt=Date.now();
  return s;
}

function formatRollSymbol(frameRolls,idx){
  const v=frameRolls[idx];
  if(v===undefined) return '';
  if(v===10) return 'X';
  if(idx>0){
    const prev=frameRolls[idx-1];
    if(prev!==undefined&&prev!==10&&prev+v===10) return '/';
  }
  return v===0?'—':String(v);
}
function frameCellHtml(f,cum,isLast){
  let cells;
  if(!f){
    cells=isLast?['','','']:['',''];
  } else if(isLast){
    cells=[0,1,2].map(i=>formatRollSymbol(f.rolls,i));
  } else if(f.rolls.length===1&&f.rolls[0]===10){
    cells=['','X'];
  } else {
    cells=[formatRollSymbol(f.rolls,0), f.rolls.length>1?formatRollSymbol(f.rolls,1):''];
  }
  const totalTxt=cum!==null&&cum!==undefined?cum:'';
  return `<div class="roll-row">${cells.filter(c=>c!=='').map(c=>`<span class="roll-cell">${c}</span>`).join('')||'<span class="roll-cell">&nbsp;</span>'}</div><div class="total-cell">${totalTxt}</div>`;
}

    if(!isMyRollTurn()) return;
    aimDragging=true;
    mount.setPointerCapture(e.pointerId);
    mount.dataset.startX=e.clientX;
    mount.dataset.startAngle=aimAngle;
  });
  mount.addEventListener('pointermove',e=>{
    if(!aimDragging) return;
    const dx=e.clientX-parseFloat(mount.dataset.startX);
    const startAngle=parseFloat(mount.dataset.startAngle);
    aimAngle=Math.max(-MAX_AIM_ANGLE,Math.min(MAX_AIM_ANGLE,startAngle-dx*0.003));
    updateAimLine();
    renderer.render(scene,camera);
    const hint=document.getElementById('aimHint');
    if(hint) hint.textContent='조준 '+Math.round(aimAngle*180/Math.PI)+'°';
  });
  function endAim(){ aimDragging=false; }
  mount.addEventListener('pointerup',endAim);
  mount.addEventListener('pointercancel',endAim);

  const pc=document.getElementById('powerCanvas');
  pc.addEventListener('pointerdown',e=>{
    if(!isMyRollTurn()||!powerOscRunning) return;
    const capturedPower=pendingPower;
    stopPowerOscillation();
    rollBall(aimAngle,capturedPower);
  });
  window.addEventListener('resize',()=>{ const m=document.getElementById('threeMount'); if(m) resizeThree(m); });
}
let powerOscRunning=false, powerOscRaf=null, powerOscStart=0;
function startPowerOscillation(){
  if(powerOscRunning) return;
  powerOscRunning=true;
  powerOscStart=performance.now();
  function loop(ts){
    if(!powerOscRunning) return;
    const t=(ts-powerOscStart)/1000;
    const cycle=1.15; // 왕복 주기(초) - 채워졌다 줄었다 반복
    const phase=(t%cycle)/cycle;
    pendingPower = phase<0.5 ? phase*2 : (1-phase)*2;
    drawPowerSlider();
    powerOscRaf=requestAnimationFrame(loop);
  }
  powerOscRaf=requestAnimationFrame(loop);
}
function stopPowerOscillation(){
  powerOscRunning=false;
  if(powerOscRaf){ cancelAnimationFrame(powerOscRaf); powerOscRaf=null; }
  pendingPower=0;
}
let ballSpin=0; // -1(왼쪽 훅) ~ 1(오른쪽 훅)
let spinDragging=false;
function setupSpinControl(){
  const c=document.getElementById('spinCanvas');
  if(!c) return;
  function update(e){
    const rect=c.getBoundingClientRect();
    const rel=(e.clientX-rect.left)/rect.width;
    ballSpin=Math.max(-1,Math.min(1,(rel-0.5)*2));
    drawSpinSlider();
  }
  c.addEventListener('pointerdown',e=>{ if(!isMyRollTurn()) return; spinDragging=true; c.setPointerCapture(e.pointerId); update(e); });
  c.addEventListener('pointermove',e=>{ if(spinDragging) update(e); });
  function release(){ spinDragging=false; }
  c.addEventListener('pointerup',release);
  c.addEventListener('pointercancel',release);
}
function drawSpinSlider(){
  const c=document.getElementById('spinCanvas');
  if(!c) return;
  const ctx=c.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=c.getBoundingClientRect();
  const cw=rect.width||220, ch=34;
  if(c.width!==Math.round(cw*dpr)){ c.width=Math.round(cw*dpr); c.height=Math.round(ch*dpr); }
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,c.width,c.height);
  ctx.scale(dpr,dpr);
  ctx.fillStyle='rgba(255,255,255,0.1)';
  ctx.beginPath(); ctx.roundRect?ctx.roundRect(0,0,cw,ch,ch/2):ctx.rect(0,0,cw,ch); ctx.fill();
  // 가운데(스핀 없음) 표시선
  ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(cw/2,4); ctx.lineTo(cw/2,ch-4); ctx.stroke();
  const knobX=cw/2+ballSpin*(cw/2-14);
  const g=ctx.createLinearGradient(0,0,cw,0);
  g.addColorStop(0,'#4a8cff'); g.addColorStop(0.5,'rgba(255,255,255,0.15)'); g.addColorStop(1,'#ff6b6b');
  ctx.fillStyle=g;
  ctx.save();
  ctx.beginPath(); ctx.roundRect?ctx.roundRect(0,0,cw,ch,ch/2):ctx.rect(0,0,cw,ch); ctx.clip();
  ctx.globalAlpha=0.35; ctx.fillRect(0,0,cw,ch); ctx.globalAlpha=1;
  ctx.restore();
  ctx.beginPath(); ctx.arc(knobX,ch/2,11,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=1; ctx.stroke();
  if(Math.abs(ballSpin)>0.05){
    ctx.fillStyle='#1a2438'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(Math.round(ballSpin*100),knobX,ch/2+1);
  }
}
function drawPowerSlider(){
  const c=document.getElementById('powerCanvas');
  if(!c) return;
  const ctx=c.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  if(c.width!==Math.round(34*dpr)){ c.width=Math.round(34*dpr); c.height=Math.round(300*dpr); }
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,c.width,c.height);
  ctx.scale(dpr,dpr);
  const w=34,h=300;
  ctx.fillStyle='rgba(255,255,255,0.1)';
  ctx.beginPath(); ctx.roundRect?ctx.roundRect(0,0,w,h,w/2):ctx.rect(0,0,w,h); ctx.fill();
  const fillH=Math.max(6,h*pendingPower);
  const g=ctx.createLinearGradient(0,h,0,0);
  g.addColorStop(0,'#7ed957'); g.addColorStop(0.6,'#ffd166'); g.addColorStop(1,'#ff6b6b');
  ctx.fillStyle=g;
  ctx.save();
  ctx.beginPath(); ctx.roundRect?ctx.roundRect(0,0,w,h,w/2):ctx.rect(0,0,w,h); ctx.clip();
  ctx.fillRect(0,h-fillH,w,fillH);
  ctx.restore();
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect?ctx.roundRect(0,0,w,h,w/2):ctx.rect(0,0,w,h); ctx.stroke();
  if(pendingPower>0){
    ctx.fillStyle='#fff'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
    ctx.save(); ctx.translate(w/2,h-fillH-8); ctx.fillText(Math.round(pendingPower*100)+'%',0,0); ctx.restore();
  }
}

// ================= 공 굴리기 + 물리 시뮬레이션 =================
let activeRollSpin=0;
function rollBall(angle,powerPct,spinOverride){
  if(aimLineGroup) aimLineGroup.visible=false;
  const useSpin=spinOverride!==undefined?spinOverride:ballSpin;
  activeRollSpin=useSpin;
  const speed=powerPct*MAX_POWER_SPEED;
  // z축(-)방향이 핀 쪽. 각도(angle)만큼 좌우로 틀어서 속도 성분 계산
  ballBody.velocity.set(Math.sin(angle)*speed, 0, -Math.cos(angle)*speed);
  // 실제 볼링공처럼 미끄러지지 않고 앞으로 구르는 회전(진행방향에 수직인 X축 기준) + 스핀(Y축)
  ballBody.angularVelocity.set(-speed/BALL_R*Math.cos(angle), -useSpin*5, -speed/BALL_R*Math.sin(angle));
  safeSend({type:'broadcast',event:'rollStart',payload:{angle,powerPct,seat:mySeat}});
  runSimulation(true);
}

let simStep=0;
let lastBroadcastAt=0;
const HOOK_FORCE=32; // 훅이 최대로 먹을 때(드라이존, 스핀100%) 옆으로 미는 힘의 세기
// ---- 타격감: 충돌 감지시 카메라 흔들림 + 합성 타격음 ----
let audioCtx=null;
function getAudioCtx(){
  if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  return audioCtx;
}
function playCrashSound(intensity){
  const ctx=getAudioCtx();
  if(!ctx) return;
  try{
    if(ctx.state==='suspended') ctx.resume();
    const dur=0.16+Math.min(0.18,intensity*0.05);
    const bufferSize=Math.floor(ctx.sampleRate*dur);
    const buffer=ctx.createBuffer(1,bufferSize,ctx.sampleRate);
    const data=buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++){
      const decay=Math.pow(1-i/bufferSize,1.7);
      data[i]=(Math.random()*2-1)*decay;
    }
    const noise=ctx.createBufferSource();
    noise.buffer=buffer;
    const filter=ctx.createBiquadFilter();
    filter.type='bandpass';
    filter.frequency.value=700+Math.random()*500;
    filter.Q.value=0.6;
    const gain=ctx.createGain();
    gain.gain.value=Math.min(1,0.35+intensity*0.18);
    noise.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    noise.start();
    // 저음 "퍽" 성분도 살짝 섞어서 묵직하게
    const osc=ctx.createOscillator();
    osc.type='triangle';
    osc.frequency.setValueAtTime(120+Math.random()*40,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(45,ctx.currentTime+0.12);
    const oGain=ctx.createGain();
    oGain.gain.setValueAtTime(Math.min(0.7,0.25+intensity*0.12),ctx.currentTime);
    oGain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
    osc.connect(oGain); oGain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+0.16);
  }catch(e){}
}
let cameraShake=0, lastImpactSoundAt=0;

function runSimulation(isAuthoritative){
  simulating=true;
  simStep=0;
  function frame(){
    if(isAuthoritative&&activeRollSpin){
      // 실제 볼링처럼: 파울선 근처(오일 구간)는 거의 안 휘고, 핀 쪽(드라이 구간)으로 갈수록 훅이 강하게 걸림
      const travel=Math.min(1,Math.max(0,(FOUL_Z-ballBody.position.z)/(FOUL_Z-PIN_AREA_Z)));
      const hookZone=Math.max(0,(travel-0.4)/0.6); // 40% 지점부터 서서히 시작해서 핀 근처에서 최대
      const eased=hookZone*hookZone; // 갈수록 더 급격하게 꺾이도록
      const lateral=activeRollSpin*eased*HOOK_FORCE;
      ballBody.applyForce(new CANNON.Vec3(lateral,0,0),ballBody.position);
    }
    const prevBallSpeed=ballBody.velocity.length();
    const prevPinSpeeds=pinBodies.map(b=>b.velocity.length());
    world.step(1/60);
    if(isAuthoritative){
      const ballDelta=Math.abs(ballBody.velocity.length()-prevBallSpeed);
      let maxPinDelta=0;
      pinBodies.forEach((b,i)=>{ maxPinDelta=Math.max(maxPinDelta,Math.abs(b.velocity.length()-prevPinSpeeds[i])); });
      const impact=Math.max(ballDelta,maxPinDelta);
      if(impact>1.0){
        const now=Date.now();
        if(now-lastImpactSoundAt>85){
          lastImpactSoundAt=now;
          playCrashSound(Math.min(3,impact/2.2));
          cameraShake=Math.min(0.1,impact*0.013);
        }
      }
    }
    syncMeshesFromBodies();
    // 카메라가 공을 바짝 따라가서 핀에 부딪히는 순간을 가까이서 볼 수 있도록
    const minCamZ=PIN_AREA_Z+1.4; // 핀에 너무 가까이(파묻히지) 않도록 최소 거리 확보
    const targetCamZ=Math.max(minCamZ, ballBody.position.z+1.35);
    camera.position.z += (targetCamZ-camera.position.z)*0.09;
    camera.position.x += (ballBody.position.x*0.6-camera.position.x)*0.07;
    const progress=Math.min(1,Math.max(0,(FOUL_Z-ballBody.position.z)/(FOUL_Z-PIN_AREA_Z)));
    camera.position.y=1.15-progress*0.55;
    if(cameraShake>0.0008){
      camera.position.x+=(Math.random()-0.5)*cameraShake;
      camera.position.y+=(Math.random()-0.5)*cameraShake;
      cameraShake*=0.82;
    } else cameraShake=0;
    const lookZ=Math.min(ballBody.position.z-2.2, PIN_AREA_Z+0.3);
    camera.lookAt(ballBody.position.x*0.7,0.25,lookZ);
    renderer.render(scene,camera);
    simStep++;

    if(isAuthoritative){
      const now=Date.now();
      if(now-lastBroadcastAt>90){
        lastBroadcastAt=now;
        safeSend({type:'broadcast',event:'rollFrame',payload:{
          ball:[ballBody.position.x,ballBody.position.y,ballBody.position.z,ballBody.quaternion.x,ballBody.quaternion.y,ballBody.quaternion.z,ballBody.quaternion.w],
          pins:pinBodies.map(b=>[b.position.x,b.position.y,b.position.z,b.quaternion.x,b.quaternion.y,b.quaternion.z,b.quaternion.w])
        }});
      }
    }

    const settled = ballBody.position.z<PIN_AREA_Z-1.3 || (ballBody.velocity.length()<0.15 && simStep>20);
    const pinsSettled = pinBodies.every(b=>b.velocity.length()<0.2)||simStep>420;
    if((settled&&pinsSettled)||simStep>600){
      simulating=false;
      camera.position.set(0,1.15,FOUL_Z+1.6); camera.lookAt(0,0.3,PIN_AREA_Z);
      if(isAuthoritative){
        safeSend({type:'broadcast',event:'rollEnd',payload:{seat:mySeat}});
        finishRoll();
      }
      return;
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

async function finishRoll(){
  const st=room.state;
  const seat=st.turn;
  const newMask=myPinsMask.map((was,i)=>was && !isPinDown(pinBodies[i]));
  const knockedThisRoll=myPinsMask.filter(Boolean).length - newMask.filter(Boolean).length;
  myPinsMask=newMask;
  let newState=advanceAfterRoll(st,seat,knockedThisRoll);
  newState={...newState, pinsStanding: newState.needsReset? new Array(10).fill(true) : myPinsMask};
  if(newState.stage==='result'){
    await settleMatch(newState.winner);
  }
  await patchRoom({state:newState});
}

async function settleMatch(winnerSeat){
  const players=room.players||[];
  const winP=players[winnerSeat], loseP=players[winnerSeat===0?1:0];
  if(!winP||!loseP) return;
  const vsCom=isVsCom();
  const winPts=vsCom?75:300;
  const losePts=vsCom?25:100;
  try{
    if(!winP.isCom){
      const wr=await fetch(`${SUPABASE_URL}/rest/v1/bowling_points?user_id=eq.${winP.user_id}&select=*`,{headers:headers()});
      const wd=(await wr.json())[0];
      if(wd){ await fetch(`${SUPABASE_URL}/rest/v1/bowling_points?user_id=eq.${winP.user_id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({points:(wd.points||0)+winPts,wins:(wd.wins||0)+1})}); }
    }
    if(!loseP.isCom){
      const lr=await fetch(`${SUPABASE_URL}/rest/v1/bowling_points?user_id=eq.${loseP.user_id}&select=*`,{headers:headers()});
      const ld=(await lr.json())[0];
      if(ld){ await fetch(`${SUPABASE_URL}/rest/v1/bowling_points?user_id=eq.${loseP.user_id}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify({points:Math.max(0,(ld.points||0)-losePts),losses:(ld.losses||0)+1})}); }
    }
  }catch(e){ console.error('점수 반영 실패:',e); }
}

// ---- 실시간 채널 (관전자는 굴러가는 모습을 그대로 받아서 렌더링만) ----
async function joinChannel(){
  channel=sb.channel('bowling-room-'+roomId, { config:{ broadcast:{ self:false } } });
  channel.on('broadcast', {event:'rollStart'}, ({payload})=>{
    if(payload.seat===mySeat) return;
    simulating=true;
  });
  channel.on('broadcast', {event:'rollFrame'}, ({payload})=>{
    if(!boardSetup) return;
    ballBody.position.set(payload.ball[0],payload.ball[1],payload.ball[2]);
    ballBody.quaternion.set(payload.ball[3],payload.ball[4],payload.ball[5],payload.ball[6]);
    payload.pins.forEach((p,i)=>{
      pinBodies[i].position.set(p[0],p[1],p[2]);
      pinBodies[i].quaternion.set(p[3],p[4],p[5],p[6]);
    });
    syncMeshesFromBodies();
    renderer.render(scene,camera);
  });
  channel.on('broadcast', {event:'rollEnd'}, ({payload})=>{
    if(payload.seat===mySeat) return;
    simulating=false; // 최종 상태는 다음 poll에서 room.state로 정확히 동기화됨
  });
  await new Promise(resolve=>{
    channel.subscribe(status=>{ if(status==='SUBSCRIBED'){ channelReady=true; resolve(); } });
  });
}

// ================= 컴퓨터(COM) 봇 =================
let comThinking=false;
function computeComRoll(){
  const st=room.state;
  const standing=st.pinsStanding;
  const layout=pinLayout();
  const standingPositions=layout.filter((p,i)=>standing[i]);
  if(!standingPositions.length) return {angle:0,power:0.85};
  const avgX=standingPositions.reduce((s,p)=>s+p.x,0)/standingPositions.length;
  const dist=Math.abs(PIN_AREA_Z-FOUL_Z);
  let angle=Math.atan2(avgX,dist);
  angle=Math.max(-MAX_AIM_ANGLE,Math.min(MAX_AIM_ANGLE, angle+(Math.random()-0.5)*0.04));
  const power=0.82+Math.random()*0.14;
  return {angle,power};
}
async function maybeRunComTurn(){
  if(!boardSetup||!isVsCom()||comThinking) return;
  const st=room.state;
  if(!st||st.stage!=='playing') return;
  const players=room.players||[];
  const comSeats=players.map((p,i)=>p.isCom?i:-1).filter(i=>i>=0);
  if(!comSeats.includes(st.turn)||simulating||pinIntroPlaying) return;
  comThinking=true;
  await new Promise(r=>setTimeout(r,900+Math.random()*700));
  comThinking=false;
  if(!room||!room.state||room.state.turn!==st.turn||room.state.stage!=='playing'||simulating||pinIntroPlaying) return;
  myPinsMask=room.state.pinsStanding.slice();
  resetBallPhysics(0,FOUL_Z);
  resetPinsPhysics(myPinsMask);
  syncMeshesFromBodies();
  const {angle,power}=computeComRoll();
  aimAngle=angle;
  rollBall(angle,power,0);
}

// ================= 턴 타이머 + 자리비움 감지 =================
let turnTickTimer=null, timeoutTriggeredKey=null;
let opponentAwaySince=null, afkForfeitTriggeredKey=null;
const AFK_THRESHOLD=10000, AFK_FORFEIT_AFTER=30000;
function startTurnTicker(){
  if(turnTickTimer) return;
  turnTickTimer=setInterval(()=>{
    if(!room||room.status!=='playing'||!room.state||room.state.stage==='result') return;
    updateTimerDisplay();
    if(isVsCom()) return;
    checkOpponentAway();
    const st=room.state;
    const elapsed=(Date.now()-(st.turnStartedAt||Date.now()))/1000;
    if(elapsed>=25){
      const key=room.id+':'+room.move_count+':timeout';
      if(timeoutTriggeredKey!==key&&st.turn===mySeat&&!simulating&&!pinIntroPlaying){
        timeoutTriggeredKey=key;
        autoRollWeak();
      }
    }
  },250);
}
async function autoRollWeak(){
  // 시간초과시 그냥 약하게 굴려서 턴을 넘김
  if(!boardSetup||simulating) return;
  rollBall(0,0.35,0);
}
function checkOpponentAway(){
  if(mySeat<0) return;
  const oppSeat=mySeat===0?1:0;
  const players=room.players||[];
  const opp=players[oppSeat];
  const recEl=document.getElementById(oppSeat===0?'recP0':'recP1');
  if(!opp){ opponentAwaySince=null; return; }
  if(!opp.lastSeenAt){ opponentAwaySince=null; return; }
  const silentFor=Date.now()-opp.lastSeenAt;
  if(silentFor>AFK_THRESHOLD){
    if(!opponentAwaySince) opponentAwaySince=Date.now()-silentFor;
    if(recEl) recEl.innerHTML='<span style="color:#ffb0b0;font-weight:700;">⏳ 자리비움</span>';
    if(Date.now()-opponentAwaySince>=AFK_FORFEIT_AFTER){
      const key=room.id+':'+room.move_count+':afk';
      if(afkForfeitTriggeredKey!==key){ afkForfeitTriggeredKey=key; declareForfeitWin(); }
    }
  } else { opponentAwaySince=null; }
}
async function declareForfeitWin(){
  if(!room||!room.state||room.state.stage==='result') return;
  await patchRoom({state:{...room.state, stage:'result', winner:mySeat, postHandAt:Date.now()}});
  await settleMatch(mySeat);
}
async function surrender(){
  if(!confirm('정말 항복하시겠어요?')) return;
  const winnerSeat=mySeat===0?1:0;
  await patchRoom({state:{...room.state, stage:'result', winner:winnerSeat, postHandAt:Date.now()}});
  await settleMatch(winnerSeat);
}

// ---- 결과 화면 ----
function renderResult(area,st){
  const players=room.players||[];

    <div class="result-wrap">

      <div style="font-size:13px;color:#a8bfe0;margin-bottom:8px;">${esc((players[0]||{}).username||'')} ${sc0}점 · ${esc((players[1]||{}).username||'')} ${sc1}점</div>
      <div style="font-size:12px;color:#8fa8c8;margin-bottom:20px;">${st.foulMsg?esc(st.foulMsg):''}</div>

    </div>
  `;
  document.getElementById('backToLobbyBtn').addEventListener('click',returnToLobby);
}
async function returnToLobby(){
  const players=(room.players||[]).map(p=>({...p,ready:p.isCom?true:false}));
  startTriggeredKey=null;
  boardSetup=false;
  recordsLoadedFor=null;
  timeoutTriggeredKey=null;
  opponentAwaySince=null;
  afkForfeitTriggeredKey=null;
  comThinking=false;
  pinIntroPlaying=false; pinIntroKey=null;
  if(turnTickTimer){ clearInterval(turnTickTimer); turnTickTimer=null; }
  await patchRoom({status:'waiting',players});
}

// ---- 나가기 ----
async function leaveRoom(){
  try{
    if(mySeat>=0&&room){
      if(isVsCom()){
        await fetch(`${SUPABASE_URL}/rest/v1/bowling_rooms?id=eq.${roomId}`,{method:'DELETE',headers:headers()});
      } else if(room.status==='playing'){
        // 게임중엔 자리비움->30초 기권패 시스템에 맡김
      } else {
        const np=(room.players||[]).filter((_,i)=>i!==mySeat).map((p,i)=>({...p,seat:i}));
        if(np.length===0){
          await fetch(`${SUPABASE_URL}/rest/v1/bowling_rooms?id=eq.${roomId}`,{method:'DELETE',headers:headers()});
        } else {
          const patch={players:np};
          if(String(room.host_user_id)===String(currentUser.id)){ patch.host_user_id=np[0].user_id; patch.host_username=np[0].username; }
          await fetch(`${SUPABASE_URL}/rest/v1/bowling_rooms?id=eq.${roomId}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify(patch)});
        }
      }
    }
  }catch(e){}
  location.href='bowling_rooms.html';
}
document.getElementById('leaveBtn').addEventListener('click',leaveRoom);
window.addEventListener('pagehide',()=>{
  try{
    if(mySeat<0||!room||room.status==='playing'||isVsCom()) return;
    const np=(room.players||[]).filter((_,i)=>i!==mySeat).map((p,i)=>({...p,seat:i}));
    const patch={players:np};
    if(String(room.host_user_id)===String(currentUser.id)&&np.length){ patch.host_user_id=np[0].user_id; patch.host_username=np[0].username; }
    fetch(`${SUPABASE_URL}/rest/v1/bowling_rooms?id=eq.${roomId}`,{method:'PATCH',headers:jheaders(),body:JSON.stringify(patch),keepalive:true});
  }catch(e){}
});

// ---- 초기화 ----
async function init(){
  if(!roomId){ document.getElementById('mainArea').innerHTML='<div class="center-msg">잘못된 접근이에요.</div>'; return; }
  if(currentUser) await ensurePoints();
  await fetchRoom();
  await joinChannel();
  pollTimer=setInterval(fetchRoom,1000);
}
init();
</script>
